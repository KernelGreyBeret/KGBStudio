<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>KGB Studio v0.2 — Core + Module Adapter System</title>
<style>
:root{--bg:#020607;--panel:#071014;--panel2:#0b171c;--line:#1b3b42;--text:#d9fff8;--muted:#7aa7a6;--green:#b8ff19;--cyan:#00e5ff;--mag:#ff2bd6;--amber:#ffb000;--red:#ff365e;--shadow:rgba(0,229,255,.22);--radius:16px;--top:58px;--nav:54px;--left:260px;--right:300px}*{box-sizing:border-box}html,body{height:100%;margin:0;background:radial-gradient(circle at 50% 0%,#102124 0%,#020607 42%,#000 100%);color:var(--text);font:14px/1.35 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;overflow:hidden}button,input,select,textarea{font:inherit}button{border:1px solid #22515b;background:linear-gradient(#10242b,#071014);color:var(--text);border-radius:12px;padding:9px 12px;font-weight:800;letter-spacing:.03em;cursor:pointer;box-shadow:0 0 0 1px rgba(0,229,255,.05) inset,0 0 18px rgba(0,229,255,.07)}button:hover{border-color:var(--cyan);box-shadow:0 0 18px var(--shadow)}button.primary{border-color:var(--green);color:#071014;background:linear-gradient(180deg,#d9ff63,#77d900)}button.hot{border-color:var(--mag);color:#fff;background:linear-gradient(180deg,#3c1437,#140914)}button.small{padding:6px 9px;border-radius:10px;font-size:12px}button.active{border-color:var(--green);color:var(--green)}input,select,textarea{width:100%;border:1px solid #21464e;border-radius:12px;background:#02080a;color:var(--text);padding:9px 10px;outline:none}textarea{min-height:130px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}label{display:block;color:var(--muted);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin:10px 0 6px}.app{height:100%;display:grid;grid-template-rows:var(--top) var(--nav) 1fr}.topbar{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--line);background:rgba(2,6,7,.9);backdrop-filter:blur(10px)}.brand{display:flex;align-items:center;gap:10px;font-weight:1000;letter-spacing:.14em;white-space:nowrap}.logo{width:34px;height:34px;border:1px solid var(--green);border-radius:10px;display:grid;place-items:center;color:var(--green);box-shadow:0 0 18px rgba(184,255,25,.35);font-weight:1000}.status{margin-left:auto;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:40vw}.nav{display:flex;gap:8px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--line);background:rgba(7,16,20,.86);overflow:auto}.nav button{white-space:nowrap;min-width:110px}.shell{min-height:0;display:grid;grid-template-columns:var(--left) 1fr var(--right)}.left,.right{min-height:0;overflow:auto;background:rgba(7,16,20,.88);border-right:1px solid var(--line);padding:12px}.right{border-right:0;border-left:1px solid var(--line)}.center{min-width:0;min-height:0;display:grid;grid-template-rows:auto 1fr;background:rgba(1,4,5,.62)}.modulebar{display:flex;gap:8px;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--line);background:rgba(2,8,10,.8)}.workspace{min-height:0;overflow:auto;padding:14px}.card{border:1px solid #1a3c43;background:linear-gradient(180deg,rgba(11,23,28,.96),rgba(4,10,12,.96));border-radius:var(--radius);padding:14px;box-shadow:0 0 30px rgba(0,0,0,.25);margin-bottom:12px}.card h3,.card h4{margin:0 0 10px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.stack{display:grid;gap:8px}.muted{color:var(--muted)}.asset{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 9px;border:1px solid #18373d;border-radius:12px;background:#030b0e;margin-bottom:7px}.asset b{font-size:12px}.asset span{font-size:11px;color:var(--muted)}.canvasWrap{width:100%;display:grid;place-items:center;min-height:420px;border:1px solid #18373d;border-radius:18px;background:radial-gradient(circle at 50% 45%,#092126,#020607 56%,#000);overflow:hidden}canvas{max-width:100%;height:auto;touch-action:none}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.hidden{display:none!important}pre.output{max-height:260px;overflow:auto;white-space:pre-wrap;padding:12px;border:1px solid #18373d;border-radius:12px;background:#02080a;color:#bff}.pill{font-size:11px;color:var(--green);border:1px solid rgba(184,255,25,.4);border-radius:999px;padding:3px 8px}.modalBackdrop{position:fixed;inset:0;display:none;place-items:center;background:rgba(0,0,0,.72);z-index:10;padding:18px}.modal{max-width:860px;width:100%;max-height:88vh;overflow:auto;border:1px solid var(--cyan);border-radius:18px;background:#061014;padding:16px;box-shadow:0 0 40px rgba(0,229,255,.25)}.modalBackdrop.show{display:grid}@media(max-width:900px){:root{--top:56px;--nav:50px}.shell{grid-template-columns:1fr;grid-template-rows:auto 1fr auto}.left,.right{max-height:26vh;border:0;border-bottom:1px solid var(--line)}.right{border-top:1px solid var(--line)}.grid2,.grid3{grid-template-columns:1fr}.status{display:none}}
</style>
</head>
<body>
<div class="app">
<header class="topbar"><div class="brand"><div class="logo">K</div><div>KGB STUDIO <span class="pill">v0.2</span></div></div><button class="small" id="newProjectBtn">New</button><button class="small" id="saveProjectBtn">Save JSON</button><button class="small" id="loadProjectBtn">Load JSON</button><input id="loadProjectInput" type="file" accept=".json,application/json" class="hidden"><button class="small" id="exportBtn">Export Bundle</button><button class="small" id="helpBtn">Help</button><div id="status" class="status">Ready.</div></header>
<nav class="nav" id="mainNav"></nav>
<section class="shell">
<aside class="left"><div class="card"><h3>Mission Project</h3><label>Project Name</label><input id="projectName" value="Untitled KGB Game"><label>Operator Note</label><textarea id="projectNote" placeholder="What are we building?"></textarea></div><div class="card"><h3>Asset Library</h3><div class="tabs"><button class="small active" data-asset-tab="sprites">Sprites</button><button class="small" data-asset-tab="particles">Particles</button><button class="small" data-asset-tab="sounds">Sounds</button><button class="small" data-asset-tab="palettes">Palettes</button><button class="small" data-asset-tab="maps">Maps</button></div><div id="assetList"></div></div></aside>
<main class="center"><div class="modulebar"><div><b id="moduleTitle">Mission</b><div class="muted" id="moduleSub">Project command surface</div></div><div class="row" id="moduleActions"></div></div><div class="workspace" id="workspace"></div></main>
<aside class="right"><div class="card"><h3>Properties</h3><div id="propertiesPanel" class="stack"></div></div><div class="card"><h3>Event Log</h3><pre id="log" class="output"></pre></div></aside>
</section></div>
<div id="modalBackdrop" class="modalBackdrop"><div class="modal"><div class="row" style="justify-content:space-between"><h2 id="modalTitle" style="margin:0">Help</h2><button id="modalClose">Close</button></div><div id="modalBody"></div></div></div>
<script>
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
const Studio={version:"0.2",currentSection:"MISSION",currentModule:"mission.brief",currentAssetTab:"sprites",modules:new Map(),state:{project:{meta:{name:"Untitled KGB Game",created:new Date().toISOString(),updated:new Date().toISOString(),studioVersion:"0.2"},mission:{note:""},assets:{sprites:[],particles:[],sounds:[],palettes:[],maps:[]},settings:{theme:"kgb-neon",target:"web-pwa"}},selection:null},log(msg){const stamp=new Date().toLocaleTimeString();$("#log").textContent=`[${stamp}] ${msg}\n`+$("#log").textContent;$("#status").textContent=msg},register(m){this.modules.set(m.id,m)},open(id){const mod=this.modules.get(id);if(!mod)return this.log(`Module not found: ${id}`);this.currentModule=id;$("#moduleTitle").textContent=mod.title;$("#moduleSub").textContent=mod.description||"";$("#moduleActions").innerHTML="";$("#workspace").innerHTML="";$("#propertiesPanel").innerHTML="";mod.render($("#workspace"),this);if(mod.actions)mod.actions($("#moduleActions"),this);if(mod.properties)mod.properties($("#propertiesPanel"),this);$$("#mainNav button").forEach(b=>b.classList.toggle("active",b.dataset.section===mod.section));this.currentSection=mod.section;this.log(`Opened ${mod.title}`)},addAsset(type,asset){const bucket=this.state.project.assets[type];if(!bucket)throw new Error("Unknown asset type "+type);asset.id||=`${type}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,6)}`;asset.created||=new Date().toISOString();bucket.push(asset);this.state.project.meta.updated=new Date().toISOString();renderAssetList();this.log(`Added ${type.slice(0,-1)}: ${asset.name||asset.id}`);return asset},exportProject(){this.syncProjectFields();return JSON.stringify(this.state.project,null,2)},syncProjectFields(){this.state.project.meta.name=$("#projectName").value.trim()||"Untitled KGB Game";this.state.project.mission.note=$("#projectNote").value;this.state.project.meta.updated=new Date().toISOString()},hydrateProject(project){this.state.project=project;$("#projectName").value=project.meta?.name||"Untitled KGB Game";$("#projectNote").value=project.mission?.note||"";renderAssetList();this.log("Project loaded.")}};
const sections={MISSION:[["mission.brief","Brief"],["mission.project","Project JSON"]],ASSETS:[["asset.sprite","Sprite Forge Adapter"],["asset.particle","Particle Forge"],["asset.sound","Sound Forge"],["asset.palette","Palette Forge"],["asset.tile","Tile Forge"]],SYSTEMS:[["system.runtime","Runtime Preview"],["system.taio","TAIO Adapter"]],BUILD:[["build.export","Export Center"],["build.validate","Project Validator"]],DEPLOY:[["deploy.pwa","PWA Packager"],["deploy.notes","Deploy Notes"]]};
function renderNav(){const nav=$("#mainNav");nav.innerHTML="";Object.keys(sections).forEach(section=>{const btn=document.createElement("button");btn.textContent=section;btn.dataset.section=section;btn.onclick=()=>openSection(section);nav.appendChild(btn)})}function openSection(section){Studio.open(sections[section][0][0])}
function renderAssetList(){const type=Studio.currentAssetTab,list=$("#assetList"),assets=Studio.state.project.assets[type]||[];list.innerHTML=assets.length?"":`<div class="muted">No ${type} yet.</div>`;assets.forEach(asset=>{const div=document.createElement("div");div.className="asset";div.innerHTML=`<div><b>${escapeHtml(asset.name||asset.id)}</b><br><span>${escapeHtml(asset.kind||asset.type||"asset")}</span></div><button class="small">Use</button>`;div.querySelector("button").onclick=()=>{Studio.state.selection={type,id:asset.id};Studio.log(`Selected ${asset.name||asset.id}`)};list.appendChild(div)})}
function download(name,text,mime="text/plain"){const blob=new Blob([text],{type:mime}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href)}function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function showModal(title,html){$("#modalTitle").textContent=title;$("#modalBody").innerHTML=html;$("#modalBackdrop").classList.add("show")}
Studio.register({id:"mission.brief",section:"MISSION",title:"Mission Brief",description:"Define the game, target, and build intent.",render(root){root.innerHTML=`<div class="card"><h3>Command Surface</h3><p class="muted">KGB Studio is now module-driven. This v0.2 shell gives us the core adapter system needed to plug in Sprite Forge, TAIO, Particle Forge, Sound Forge, Tile Forge, and future tools without rebuilding the shell each time.</p><div class="grid3"><div class="card"><h4>MISSION</h4><p>Project brief, game concept, requirements, notes.</p></div><div class="card"><h4>ASSETS</h4><p>Create sprites, particles, sounds, palettes, and maps.</p></div><div class="card"><h4>SYSTEMS</h4><p>Preview runtime, TAIO utilities, shared project systems.</p></div><div class="card"><h4>BUILD</h4><p>Validate, export, and package project files.</p></div><div class="card"><h4>DEPLOY</h4><p>PWA packaging and deployment checklist.</p></div><div class="card"><h4>NEXT</h4><p>Start wrapping the full existing tools as modules.</p></div></div></div>`},properties(panel){panel.innerHTML=`<div class="muted">No object selected. Project-level settings live here.</div>`}});
Studio.register({id:"mission.project",section:"MISSION",title:"Project JSON",description:"Inspect the live Studio project object.",render(root){root.innerHTML=`<div class="card"><h3>Live Project JSON</h3><button id="refreshJson">Refresh</button><pre class="output" id="projectJson"></pre></div>`;const refresh=()=>{Studio.syncProjectFields();$("#projectJson").textContent=Studio.exportProject()};$("#refreshJson").onclick=refresh;refresh()}});
Studio.register({id:"asset.sprite",section:"ASSETS",title:"Sprite Forge Adapter",description:"Placeholder adapter for Sprite Forge integration.",render(root){root.innerHTML=`<div class="card"><h3>Sprite Forge Adapter</h3><p class="muted">This is the adapter slot where KGB Canvas Sprite Forge v6.4 gets embedded next. For v0.2, this creates a procedural demo sprite asset to prove the asset pipeline.</p><div class="canvasWrap"><canvas id="spriteCanvas" width="512" height="512"></canvas></div><div class="row" style="margin-top:10px"><input id="spriteName" value="Demo Neon Rider Sprite" style="max-width:280px"><button class="primary" id="saveSpriteAsset">Save Sprite Asset</button></div></div>`;const c=$("#spriteCanvas"),ctx=c.getContext("2d");drawDemoSprite(ctx);$("#saveSpriteAsset").onclick=()=>Studio.addAsset("sprites",{name:$("#spriteName").value||"Sprite",kind:"procedural-canvas-sprite",source:"demo",drawFunction:"drawDemoSprite(ctx)"})}});
Studio.register({id:"asset.particle",section:"ASSETS",title:"Particle Forge",description:"Create reusable procedural particle presets.",render(root){root.innerHTML=`<div class="grid2"><div class="card"><h3>Particle Forge</h3><label>Preset Name</label><input id="particleName" value="Boost Trail"><label>Type</label><select id="particleType"><option>boost</option><option>spark</option><option>smoke</option><option>explosion</option><option>rain</option></select><label>Count</label><input id="particleCount" type="range" min="10" max="250" value="90"><label>Spread</label><input id="particleSpread" type="range" min="1" max="100" value="42"><label>Glow</label><input id="particleGlow" type="range" min="0" max="60" value="28"><button class="primary" id="saveParticle">Save Particle Asset</button></div><div class="card"><div class="canvasWrap"><canvas id="particleCanvas" width="512" height="512"></canvas></div></div></div>`;const c=$("#particleCanvas"),ctx=c.getContext("2d");function loop(t){if(!document.body.contains(c))return;drawParticles(ctx,t/1000,{count:+$("#particleCount").value,spread:+$("#particleSpread").value,glow:+$("#particleGlow").value,type:$("#particleType").value});requestAnimationFrame(loop)}loop(0);$("#saveParticle").onclick=()=>Studio.addAsset("particles",{name:$("#particleName").value||"Particle Preset",kind:"particle-preset",type:$("#particleType").value,count:+$("#particleCount").value,spread:+$("#particleSpread").value,glow:+$("#particleGlow").value})}});
Studio.register({id:"asset.sound",section:"ASSETS",title:"Sound Forge",description:"Generate arcade sound presets.",render(root){root.innerHTML=`<div class="card"><h3>Sound Forge</h3><div class="grid2"><div><label>Name</label><input id="soundName" value="Boost Pulse"></div><div><label>Wave</label><select id="wave"><option>sawtooth</option><option>square</option><option>triangle</option><option>sine</option></select></div><div><label>Start Frequency</label><input id="freqA" type="range" min="50" max="1400" value="220"></div><div><label>End Frequency</label><input id="freqB" type="range" min="30" max="1800" value="680"></div><div><label>Duration</label><input id="dur" type="range" min="60" max="1600" value="420"></div><div><label>Volume</label><input id="vol" type="range" min="1" max="100" value="22"></div></div><div class="row" style="margin-top:12px"><button id="playSound" class="primary">Play</button><button id="saveSound">Save Sound Asset</button></div></div>`;$("#playSound").onclick=playSynthFromUi;$("#saveSound").onclick=()=>Studio.addAsset("sounds",{name:$("#soundName").value||"Sound",kind:"synth-preset",wave:$("#wave").value,freqA:+$("#freqA").value,freqB:+$("#freqB").value,duration:+$("#dur").value,volume:+$("#vol").value})}});
Studio.register({id:"asset.palette",section:"ASSETS",title:"Palette Forge",description:"Build neon palettes shared by all modules.",render(root){root.innerHTML=`<div class="card"><h3>Palette Forge</h3><label>Palette Name</label><input id="paletteName" value="KGB Neon Default"><div class="grid3"><input type="color" id="pal1" value="#b8ff19"><input type="color" id="pal2" value="#00e5ff"><input type="color" id="pal3" value="#ff2bd6"><input type="color" id="pal4" value="#ffb000"><input type="color" id="pal5" value="#ff365e"><input type="color" id="pal6" value="#071014"></div><div id="palettePreview" class="row" style="margin:14px 0"></div><button class="primary" id="savePalette">Save Palette</button></div>`;const update=()=>{$("#palettePreview").innerHTML=[1,2,3,4,5,6].map(i=>`<div style="height:54px;flex:1;min-width:54px;border-radius:14px;border:1px solid #244;background:${$("#pal"+i).value};box-shadow:0 0 22px ${$("#pal"+i).value}66"></div>`).join("")};[1,2,3,4,5,6].forEach(i=>$("#pal"+i).oninput=update);update();$("#savePalette").onclick=()=>Studio.addAsset("palettes",{name:$("#paletteName").value||"Palette",kind:"color-palette",colors:[1,2,3,4,5,6].map(i=>$("#pal"+i).value)})}});
Studio.register({id:"asset.tile",section:"ASSETS",title:"Tile Forge",description:"Generate simple procedural tiles.",render(root){root.innerHTML=`<div class="grid2"><div class="card"><h3>Tile Forge</h3><label>Name</label><input id="tileName" value="Neon Grid Tile"><label>Tile Type</label><select id="tileType"><option>grid</option><option>river</option><option>road</option><option>circuit</option></select><label>Density</label><input id="tileDensity" type="range" min="2" max="24" value="10"><button class="primary" id="saveTile">Save Map/Tile Asset</button></div><div class="card"><div class="canvasWrap"><canvas id="tileCanvas" width="512" height="512"></canvas></div></div></div>`;const draw=()=>drawTile($("#tileCanvas").getContext("2d"),$("#tileType").value,+$("#tileDensity").value);$("#tileType").oninput=draw;$("#tileDensity").oninput=draw;draw();$("#saveTile").onclick=()=>Studio.addAsset("maps",{name:$("#tileName").value||"Tile",kind:"procedural-tile",type:$("#tileType").value,density:+$("#tileDensity").value})}});
Studio.register({id:"system.runtime",section:"SYSTEMS",title:"Runtime Preview",description:"Test selected assets in a KGB Engine-style stage.",render(root){root.innerHTML=`<div class="card"><h3>Runtime Preview</h3><p class="muted">This is where KGB Arcade Runtime preview plugs in next.</p><div class="canvasWrap"><canvas id="runtimeCanvas" width="720" height="420"></canvas></div></div>`;const c=$("#runtimeCanvas"),ctx=c.getContext("2d");function loop(t){if(!document.body.contains(c))return;ctx.clearRect(0,0,c.width,c.height);const g=ctx.createRadialGradient(360,210,20,360,210,460);g.addColorStop(0,"#0a2228");g.addColorStop(1,"#000");ctx.fillStyle=g;ctx.fillRect(0,0,c.width,c.height);ctx.strokeStyle="#00e5ff33";ctx.lineWidth=1;for(let x=0;x<c.width;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke()}for(let y=0;y<c.height;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width,y);ctx.stroke()}ctx.save();ctx.translate(360+Math.sin(t/700)*50,220);ctx.scale(.45,.45);drawDemoSprite(ctx);ctx.restore();requestAnimationFrame(loop)}loop(0)}});
Studio.register({id:"system.taio",section:"SYSTEMS",title:"TAIO Adapter",description:"Temporary utility adapter until full TAIO module import.",render(root){root.innerHTML=`<div class="card"><h3>TAIO Adapter</h3><p class="muted">The refreshed TAIO gets embedded here as a module. This tiny adapter proves the workspace pattern.</p><textarea id="taioIn" placeholder="Paste text..."></textarea><div class="row"><button id="b64">Base64</button><button id="urlenc">URL Encode</button><button id="lines">Line Count</button></div><pre class="output" id="taioOut"></pre></div>`;$("#b64").onclick=()=>$("#taioOut").textContent=btoa(unescape(encodeURIComponent($("#taioIn").value)));$("#urlenc").onclick=()=>$("#taioOut").textContent=encodeURIComponent($("#taioIn").value);$("#lines").onclick=()=>$("#taioOut").textContent=`Lines: ${$("#taioIn").value.split(/\r?\n/).length}\nChars: ${$("#taioIn").value.length}`}});
Studio.register({id:"build.export",section:"BUILD",title:"Export Center",description:"Export project data and future game bundles.",render(root){root.innerHTML=`<div class="card"><h3>Export Center</h3><div class="row"><button class="primary" id="dlProject">Download Project JSON</button><button id="dlRuntime">Download Runtime Stub</button></div><pre class="output" id="exportOut"></pre></div>`;$("#dlProject").onclick=()=>download(`${safeName(Studio.state.project.meta.name)}.kgbproject.json`,Studio.exportProject(),"application/json");$("#dlRuntime").onclick=()=>download(`${safeName(Studio.state.project.meta.name)}_runtime_stub.html`,runtimeStub(),"text/html");$("#exportOut").textContent="v0.2 exports project JSON and a runtime stub. ZIP/PWA export comes next."}});
Studio.register({id:"build.validate",section:"BUILD",title:"Project Validator",description:"Check project health before export.",render(root){root.innerHTML=`<div class="card"><h3>Project Validator</h3><button class="primary" id="runValidate">Run Validation</button><pre class="output" id="validateOut"></pre></div>`;$("#runValidate").onclick=()=>{Studio.syncProjectFields();const p=Studio.state.project,notes=[];if(!p.meta.name)notes.push("Missing project name.");Object.entries(p.assets).forEach(([k,v])=>notes.push(`${k}: ${v.length}`));$("#validateOut").textContent="Validation complete.\n\n"+notes.join("\n")}}});
Studio.register({id:"deploy.pwa",section:"DEPLOY",title:"PWA Packager",description:"Prepare installable web app assets.",render(root){root.innerHTML=`<div class="card"><h3>PWA Packager</h3><p class="muted">Coming next: generate manifest, service worker, icons checklist, offline cache list, and deploy-ready folder.</p><button class="primary" onclick="Studio.log('PWA packaging queued for v0.3')">Queue PWA Build</button></div>`}});
Studio.register({id:"deploy.notes",section:"DEPLOY",title:"Deploy Notes",description:"Deployment checklist for kgbarcade.dev / GitHub Pages.",render(root){root.innerHTML=`<div class="card"><h3>Deploy Notes</h3><pre class="output">Suggested temporary home:\nkgbarcade.dev → KGB Studio / dev tools hub\n\nRecommended paths:\n/       KGB Studio landing\n/studio/ installable KGB Studio PWA\n/tools/  individual tools if you still want direct launch links\n/docs/   notes, readme, module docs\n\nKeep kgbarcade.com player-facing.\nUse kgbarcade.dev builder-facing.</pre></div>`}});

a(${hue+i%40},100%,60%,${.25+Math.random()*.25})`;ctx.shadowColor=ctx.fillStyle;ctx.shadowBlur=opt.glow;ctx.beginPath();ctx.arc(x,y,2+i%5,0,Math.PI*2);ctx.fill()}ctx.globalCompositeOperation="source-over"}function drawTile(ctx,type,density){const w=ctx.canvas.width,h=ctx.canvas.height;ctx.clearRect(0,0,w,h);ctx.fillStyle="#020607";ctx.fillRect(0,0,w,h);ctx.shadowBlur=16;ctx.shadowColor="#00e5ff";ctx.strokeStyle="#00e5ff88";ctx.lineWidth=2;if(type==="grid"||type==="circuit"){const step=w/density;for(let x=0;x<=w;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}for(let y=0;y<=h;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}if(type==="circuit"){ctx.strokeStyle="#b8ff19";ctx.lineWidth=5;for(let i=0;i<density;i+=3)ctx.strokeRect(i*step,i%2?step:step*2,step*2,step)}}else if(type==="river"){ctx.strokeStyle="#00e5ff";ctx.lineWidth=80;ctx.beginPath();ctx.moveTo(80,0);ctx.bezierCurveTo(320,150,170,310,420,512);ctx.stroke()}else if(type==="road"){ctx.strokeStyle="#333";ctx.lineWidth=130;ctx.beginPath();ctx.moveTo(256,0);ctx.bezierCurveTo(200,170,320,300,256,512);ctx.stroke();ctx.strokeStyle="#ffb000";ctx.lineWidth=6;ctx.setLineDash([24,20]);ctx.stroke();ctx.setLineDash([])}}function playSynthFromUi(){const ac=new(window.AudioContext||window.webkitAudioContext)(),osc=ac.createOscillator(),gain=ac.createGain();osc.type=$("#wave").value;osc.frequency.setValueAtTime(+$("#freqA").value,ac.currentTime);osc.frequency.exponentialRampToValueAtTime(Math.max(1,+$("#freqB").value),ac.currentTime+ +$("#dur").value/1000);gain.gain.setValueAtTime(+$("#vol").value/100,ac.currentTime);gain.gain.exponentialRampToValueAtTime(.001,ac.currentTime+ +$("#dur").value/1000);osc.connect(gain);gain.connect(ac.destination);osc.start();osc.stop(ac.currentTime+ +$("#dur").value/1000)}function safeName(s){return String(s||"kgb_project").toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"")}function runtimeStub(){return `<!doctype html><html><head><meta charset="utf-8"><title>${escapeHtml(Studio.state.project.meta.name)}</title></head><body><canvas id="game" width="960" height="540"></canvas><script>const KGB_PROJECT=${Studio.exportProject()}; console.log("Loaded KGB project", KGB_PROJECT);<\/script></body></html>`}
