/*
-------------------------------------------------------------------------------
SYSTEMS → TAIO

The standalone KGB TAIO Tool Suite is hosted in an iframe to preserve the full
single-file local toolkit behavior.

Studio-side bridge:
- Save/restore TAIO workspace.
- Push selected Studio asset text/data into TAIO Scratch.
- Save TAIO Scratch back as a Studio misc/text asset.
-------------------------------------------------------------------------------
*/
const TAIOStudioHost={
  getBridge(){
    return $("#taioFrame")?.contentWindow?.KGBTAIOBridge||null;
  },

  assetToText(asset){
    if(!asset)return "";
    if(asset.text)return asset.text;
    if(asset.exportedJS)return asset.exportedJS;
    if(asset.exportedHTML)return asset.exportedHTML;
    if(asset.map)return JSON.stringify(asset.map,null,2);
    if(asset.workspace)return JSON.stringify(asset.workspace,null,2);
    if(asset.project)return JSON.stringify(asset.project,null,2);
    if(asset.dataUrl){
      return JSON.stringify({
        name:asset.name,
        kind:asset.kind,
        mime:asset.mime,
        extension:asset.extension,
        dataUrl:asset.dataUrl
      },null,2);
    }
    return JSON.stringify(asset,null,2);
  },

  selectedAsset(){
    const sel=Studio.state.selection;
    return sel?Studio.find(sel.type,sel.id):null;
  },

  loadSelectedAsset(){
    const bridge=this.getBridge();
    if(!bridge){
      alert("TAIO is still loading. Try again in a second.");
      return;
    }
    const asset=this.selectedAsset();
    if(!asset){
      alert("Select an asset in Asset Library/Inspector first.");
      return;
    }
    bridge.loadText(this.assetToText(asset),asset.name||asset.id||"Studio Asset");
    globalThis.KGBWorkspaceCache?.capture?.();
    Studio.log("Loaded selected asset into TAIO Scratch: "+(asset.name||asset.id));
  },

  saveWorkspace(){
    const bridge=this.getBridge();
    if(!bridge?.getWorkspace){
      alert("TAIO workspace bridge is still loading. Try again in a second.");
      return;
    }
    try{
      const workspace=bridge.getWorkspace();
      const asset={
        name:"TAIO Workspace "+new Date().toLocaleTimeString(),
        kind:"taio-workspace",
        adapter:"taio",
        source:"taio",
        folder:"/taio",
        tags:["taio","workspace","operator-tools"],
        notes:"Saved from embedded KGB TAIO Tool Suite.",
        workspace,
        text:JSON.stringify(workspace,null,2),
        updated:new Date().toISOString()
      };
      Studio.addAsset("misc",asset);
      renderExplorer();
      Studio.renderProps();
      Studio.log("Saved TAIO workspace.");
      alert("Saved TAIO workspace to Studio.");
    }catch(e){
      alert("Could not save TAIO workspace: "+e.message);
    }
  },

  saveScratch(){
    const bridge=this.getBridge();
    if(!bridge?.getScratch){
      alert("TAIO is still loading. Try again in a second.");
      return;
    }
    try{
      const scratch=bridge.getScratch();
      const asset={
        name:"TAIO Scratch "+new Date().toLocaleTimeString(),
        kind:"taio-scratch",
        adapter:"taio",
        source:"taio",
        folder:"/taio",
        tags:["taio","scratch","notes"],
        notes:"Saved from embedded KGB TAIO Scratch.",
        text:scratch,
        mime:"text/plain",
        extension:"txt",
        updated:new Date().toISOString()
      };
      Studio.addAsset("misc",asset);
      renderExplorer();
      Studio.renderProps();
      Studio.log("Saved TAIO scratch.");
      alert("Saved TAIO scratch to Studio.");
    }catch(e){
      alert("Could not save TAIO scratch: "+e.message);
    }
  },

  async loadWorkspaceAsset(asset){
    const bridge=this.getBridge();
    if(!bridge?.setWorkspace||!asset?.workspace)return false;
    try{
      bridge.setWorkspace(asset.workspace);
      Studio.log("Loaded TAIO workspace: "+(asset.name||asset.id));
      return true;
    }catch(e){
      alert("Could not load TAIO workspace: "+e.message);
      return false;
    }
  },

  downloadStandalone(){
    const blob=new Blob([KGB_TAIO_HTML],{type:"text/html"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="kgb_taio_tool_suite_standalone.html";
    a.click();
    URL.revokeObjectURL(a.href);
  }
};

Studio.register({
  id:"system.taio",
  section:"SYSTEMS",
  title:"TAIO",
  description:"Embedded Tactical All-In-One Operator Toolkit for local text, data, regex, conversion, hashing, diff, and scratch work.",
  render(root,studio,opt){
    root.innerHTML=
      '<div class="taioHost">'+
        '<div class="card">'+
          '<div class="row taioToolbar">'+
            '<button class="primary" id="saveTAIOWorkspace">Save TAIO Workspace to Studio</button>'+
            '<button id="saveTAIOScratch">Save Scratch to Studio</button>'+
            '<button id="loadAssetIntoTAIO">Load Selected Asset Text</button>'+
            '<button id="downloadTAIOStandalone">Download Standalone TAIO</button>'+
            '<button id="focusTAIOWorkspace">Focus Workspace</button>'+
            '<button id="openTAIOLibrary">Asset Library</button>'+
            '<span class="muted">Use TAIO as the local operator bench for regex, JSON, conversion, diffing, hashing, file viewing, and scratch notes.</span>'+
          '</div>'+
        '</div>'+
        '<iframe id="taioFrame" class="taioFrame" title="KGB TAIO"></iframe>'+
      '</div>';

    const frame=$("#taioFrame");
    frame.srcdoc=KGB_TAIO_HTML;

    $("#saveTAIOWorkspace").onclick=()=>TAIOStudioHost.saveWorkspace();
    $("#saveTAIOScratch").onclick=()=>TAIOStudioHost.saveScratch();
    $("#loadAssetIntoTAIO").onclick=()=>TAIOStudioHost.loadSelectedAsset();
    $("#downloadTAIOStandalone").onclick=()=>TAIOStudioHost.downloadStandalone();
    $("#focusTAIOWorkspace").onclick=()=>LayoutControls.toggleFocus();
    $("#openTAIOLibrary").onclick=()=>Studio.open("asset.library");

    frame.onload=()=>{
      if(opt?.asset?.kind==="taio-workspace"&&opt.asset.workspace){
        setTimeout(()=>TAIOStudioHost.loadWorkspaceAsset(opt.asset),120);
      }else if(globalThis.KGBWorkspaceCache?.taio){
        setTimeout(()=>TAIOStudioHost.loadWorkspaceAsset({workspace:globalThis.KGBWorkspaceCache.taio,name:"In-session TAIO Workspace"}),120);
      }
    };
  },
  actions(root){
    root.innerHTML='<button class="primary" onclick="TAIOStudioHost.saveWorkspace()">Save Workspace</button><button onclick="TAIOStudioHost.saveScratch()">Save Scratch</button><button onclick="TAIOStudioHost.loadSelectedAsset()">Load Asset</button><button onclick="LayoutControls.toggleFocus()">Focus</button>';
  },
  properties(panel){
    panel.innerHTML='<div class="muted">TAIO runs as a standalone local toolkit inside Studio. Select an asset, then use Load Selected Asset Text to push it into Scratch.</div>';
  }

); transition: width 0.15s linear; }\n\n    .file-list, .report-list {\n      margin-top: 14px;\n      border: 1px solid var(--border);\n      border-radius: 16px;\n      overflow: hidden;\n      background: #070c13;\n      max-height: 340px;\n      overflow-y: auto;\n    }\n\n    .file-row, .report-row {\n      display: grid;\n      grid-template-columns: minmax(0, 1fr) auto auto;\n      gap: 12px;\n      align-items: center;\n      padding: 11px 13px;\n      border-bottom: 1px solid var(--border);\n      font-size: 13px;\n    }\n\n    .report-row { grid-template-columns: minmax(0, 1.2fr) auto minmax(0, 1fr); }\n    .file-row:last-child, .report-row:last-child { border-bottom: 0; }\n\n    .name {\n      min-width: 0;\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n\n    .muted { color: var(--muted); }\n    .small { font-size: 12px; }\n\n    .badge {\n      border-radius: 999px;\n      padding: 4px 8px;\n      font-size: 11px;\n      font-weight: 900;\n      white-space: nowrap;\n      border: 1px solid var(--border);\n      color: #dce9ff;\n      background: #101722;\n    }\n\n    .badge.clean { color: #061009; background: var(--accent); border-color: transparent; }\n    .badge.warn { color: #161002; background: var(--warn); border-color: transparent; }\n    .badge.err { color: #fff; background: var(--danger); border-color: transparent; }\n\n    .support-grid {\n      display: grid;\n      grid-template-columns: repeat(2, minmax(0, 1fr));\n      gap: 8px;\n      margin-top: 10px;\n    }\n\n    .support-item {\n      border: 1px solid var(--border);\n      background: var(--panel3);\n      border-radius: 13px;\n      padding: 10px;\n      font-size: 12px;\n      color: var(--muted);\n      line-height: 1.35;\n    }\n\n    .support-item strong { display: block; color: #dce9ff; margin-bottom: 3px; }\n\n    .download-link { display: none; margin-top: 12px; width: 100%; }\n    .download-link.show { display: flex; }\n\n    .footer-note {\n      margin-top: 14px;\n      color: var(--muted);\n      font-size: 12px;\n      line-height: 1.45;\n    }\n\n    @media (max-width: 900px) {\n      body { padding: 14px; }\n      .grid { grid-template-columns: 1fr; }\n      .two { grid-template-columns: 1fr; }\n      .file-row { grid-template-columns: minmax(0, 1fr) auto; }\n      .file-row .muted { display: none; }\n      .report-row { grid-template-columns: minmax(0, 1fr); gap: 5px; }\n      button, .download-link { width: 100%; }\n      .button-row { display: grid; grid-template-columns: 1fr; }\n    }\n  </style>\n</head>\n<body>\n  <div class=\"shell\">\n    <header>\n      <h1>KGB Metadata Forge <span style=\"color:var(--accent2);font-size:.42em\">Studio</span></h1>\n      <div class=\"subhead\">\n        Strip or replace basic metadata from project files locally in the browser. Studio mode can load KGB Studio assets, apply KGB/KGBA metadata, and export cleaned release bundles. Best support: raster images, SVG, HTML, PDF document info, and Office package metadata. Unsupported files are copied unchanged and clearly reported.\n      </div>\n    </header>\n\n    <div class=\"grid\">\n      <section class=\"card\">\n        <div class=\"card-title\">\n          <h2>Input</h2>\n          <div class=\"pill\">Local only</div>\n        </div>\n        <div class=\"card-inner\">\n          <div class=\"dropzone\" id=\"dropzone\">\n            <div>\n              <strong>Drop files or folders here</strong>\n              <span>Use the buttons below on Android. For best folder support, open this over HTTPS in Chrome/Edge.</span>\n            </div>\n          </div>\n\n          <div class=\"button-row\">\n            <button id=\"addFilesBtn\" type=\"button\">Add Files</button>\n            <button id=\"addFolderBtn\" class=\"blue\" type=\"button\">Add Folder</button>\n            <button id=\"addZipBtn\" class=\"secondary\" type=\"button\">Add Existing ZIP</button>\n            <button id=\"clearBtn\" class=\"danger\" type=\"button\" disabled>Clear</button>\n          </div>\n\n          <input id=\"fileInput\" type=\"file\" multiple />\n          <input id=\"zipInput\" type=\"file\" accept=\".zip,application/zip\" multiple />\n          <input id=\"folderInput\" type=\"file\" webkitdirectory directory multiple />\n\n          <div class=\"status\" id=\"inputStatus\">No files selected.</div>\n          <div class=\"file-list\" id=\"fileList\" hidden></div>\n        </div>\n      </section>\n\n      <section class=\"card\">\n        <div class=\"card-title\">\n          <h2>Metadata Action</h2>\n          <div class=\"pill\">Strip / Replace</div>\n        </div>\n        <div class=\"card-inner\">\n          <div class=\"settings\">\n            <label class=\"field\">\n              Mode\n              <select id=\"mode\">\n                <option value=\"strip\">Strip metadata only</option>\n                <option value=\"replace\">Strip then add custom metadata where supported</option>\n              </select>\n            </label>\n\n            <div class=\"two\">\n              <label class=\"field\">\n                Output ZIP name\n                <input id=\"outputName\" type=\"text\" value=\"cleaned-files.zip\" />\n              </label>\n              <label class=\"field\">\n                JPEG/WebP quality\n                <input id=\"quality\" type=\"text\" value=\"0.92\" />\n              </label>\n            </div>\n\n            <div id=\"metadataFields\" class=\"settings\" hidden>\n              <div class=\"two\">\n                <label class=\"field\">Title<input id=\"metaTitle\" type=\"text\" placeholder=\"Project / file title\" /></label>\n                <label class=\"field\">Author<input id=\"metaAuthor\" type=\"text\" placeholder=\"Tommy Burke / KGB\" /></label>\n              </div>\n              <div class=\"two\">\n                <label class=\"field\">Subject<input id=\"metaSubject\" type=\"text\" placeholder=\"Optional subject\" /></label>\n                <label class=\"field\">Keywords<input id=\"metaKeywords\" type=\"text\" placeholder=\"comma, separated, tags\" /></label>\n              </div>\n              <label class=\"field\">Description<textarea id=\"metaDescription\" placeholder=\"Optional description\"></textarea></label>\n              <div class=\"two\">\n                <label class=\"field\">Creator / App<input id=\"metaCreator\" type=\"text\" placeholder=\"KGB Metadata Stripper\" /></label>\n                <label class=\"field\">Copyright<input id=\"metaCopyright\" type=\"text\" placeholder=\"\u00a9 2026 Tommy Burke\" /></label>\n              </div>\n            </div>\n\n            <label class=\"checkline\">\n              <input id=\"forceZip\" type=\"checkbox\" checked />\n              <span>Always output one ZIP, preserving folder paths. Recommended for games, tools, essay folders, book assets, and project bundles.</span>\n            </label>\n\n            <label class=\"checkline\">\n              <input id=\"renameClean\" type=\"checkbox\" />\n              <span>Add <strong>-clean</strong> before file extensions. Useful when processing loose files and keeping originals nearby.</span>\n            </label>\n\n            <div class=\"hint\">\n              <strong>Reality check:</strong> metadata is format-specific. This tool can clean common metadata containers, but it cannot guarantee forensic sanitization of every possible embedded object, annotation, revision, hidden layer, or proprietary metadata field.\n            </div>\n\n            <button id=\"processBtn\" type=\"button\" disabled>Strip Metadata</button>\n            <div class=\"bar\" id=\"progressBar\"><div></div></div>\n            <div class=\"status\" id=\"processStatus\">Ready.</div>\n            <a id=\"downloadLink\" class=\"download-link\">Download cleaned output</a>\n          </div>\n        </div>\n      </section>\n    </div>\n\n    <section class=\"card\" style=\"margin-top:16px;\">\n      <div class=\"card-title\">\n        <h2>Report</h2>\n        <div class=\"pill\">No surprises</div>\n      </div>\n      <div class=\"card-inner\">\n        <div id=\"reportEmpty\" class=\"hint\">Process files to see exactly what was cleaned, replaced, copied unchanged, or failed.</div>\n        <div class=\"report-list\" id=\"reportList\" hidden></div>\n\n        <div class=\"support-grid\">\n          <div class=\"support-item\"><strong>Raster images</strong>JPG, PNG, WebP are re-encoded through canvas, which strips EXIF and ancillary chunks.</div>\n          <div class=\"support-item\"><strong>SVG / HTML</strong>Removes obvious metadata tags and comments. Replace mode adds clean tags.</div>\n          <div class=\"support-item\"><strong>PDF</strong>Best-effort: rebuilds pages into a fresh PDF and sets/omits basic document info.</div>\n          <div class=\"support-item\"><strong>Office</strong>DOCX, PPTX, XLSX package metadata files are removed or replaced.</div>\n        </div>\n\n        <div class=\"footer-note\">\n          For highly sensitive releases, run a second pass with format-specific tools too, especially for PDFs, Office revisions/comments, design files, photos with hidden layers, and archives from third-party apps.\n        </div>\n      </div>\n    </section>\n  </div>\n\n  <script src=\"https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js\"><\/script>\n  <script src=\"https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js\"><\/script>\n\n  <script>\n    const els = {\n      dropzone: document.getElementById('dropzone'),\n      addFilesBtn: document.getElementById('addFilesBtn'),\n      addFolderBtn: document.getElementById('addFolderBtn'),\n      addZipBtn: document.getElementById('addZipBtn'),\n      clearBtn: document.getElementById('clearBtn'),\n      fileInput: document.getElementById('fileInput'),\n      zipInput: document.getElementById('zipInput'),\n      folderInput: document.getElementById('folderInput'),\n      inputStatus: document.getElementById('inputStatus'),\n      fileList: document.getElementById('fileList'),\n      mode: document.getElementById('mode'),\n      metadataFields: document.getElementById('metadataFields'),\n      outputName: document.getElementById('outputName'),\n      quality: document.getElementById('quality'),\n      metaTitle: document.getElementById('metaTitle'),\n      metaAuthor: document.getElementById('metaAuthor'),\n      metaSubject: document.getElementById('metaSubject'),\n      metaKeywords: document.getElementById('metaKeywords'),\n      metaDescription: document.getElementById('metaDescription'),\n      metaCreator: document.getElementById('metaCreator'),\n      metaCopyright: document.getElementById('metaCopyright'),\n      forceZip: document.getElementById('forceZip'),\n      renameClean: document.getElementById('renameClean'),\n      processBtn: document.getElementById('processBtn'),\n      progressBar: document.getElementById('progressBar'),\n      progressFill: document.querySelector('#progressBar > div'),\n      processStatus: document.getElementById('processStatus'),\n      downloadLink: document.getElementById('downloadLink'),\n      reportEmpty: document.getElementById('reportEmpty'),\n      reportList: document.getElementById('reportList')\n    };\n\n    let items = [];\n    let currentDownloadUrl = null;\n    let lastOutputBlob = null;\n    let lastOutputName = '';\n\n    function extOf(path) {\n      const clean = path.split('?')[0].split('#')[0];\n      const dot = clean.lastIndexOf('.');\n      return dot >= 0 ? clean.slice(dot + 1).toLowerCase() : '';\n    }\n\n    function baseName(path) {\n      return path.replace(/^.*[\\\\/]/, '');\n    }\n\n    function stripZipExtension(name) {\n      return name.replace(/\\.zip$/i, '');\n    }\n\n    function safePath(path) {\n      return String(path || '')\n        .replace(/\\\\/g, '/')\n        .replace(/^\\/+/, '')\n        .replace(/(^|\\/)\\.\\.?(?=\\/|$)/g, '')\n        .replace(/[\\u0000-\\u001f]/g, '') || 'file';\n    }\n\n    function formatBytes(bytes) {\n      if (!bytes) return '0 B';\n      const units = ['B', 'KB', 'MB', 'GB'];\n      const i = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);\n      const value = bytes / Math.pow(1024, i);\n      return `${value.toFixed(value >= 10 ? 0 : 1)} ${units[i]}`;\n    }\n\n    function mimeForExtension(ext) {\n      const map = {\n        jpg: 'image/jpeg', jpeg: 'image/jpeg', png: 'image/png', webp: 'image/webp', svg: 'image/svg+xml',\n        pdf: 'application/pdf', html: 'text/html', htm: 'text/html', txt: 'text/plain', css: 'text/css', js: 'text/javascript', json: 'application/json',\n        docx: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',\n        pptx: 'application/vnd.openxmlformats-officedocument.presentationml.presentation',\n        xlsx: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',\n        zip: 'application/zip'\n      };\n      return map[ext] || 'application/octet-stream';\n    }\n\n    function cleanOutputName(name) {\n      let out = String(name || '').trim() || 'cleaned-files.zip';\n      if (!out.toLowerCase().endsWith('.zip')) out += '.zip';\n      return out;\n    }\n\n    function cleanQuality() {\n      const parsed = Number.parseFloat(els.quality.value);\n      if (Number.isFinite(parsed)) return Math.max(0.1, Math.min(1, parsed));\n      return 0.92;\n    }\n\n    function outputPathFor(path) {\n      path = safePath(path);\n      if (!els.renameClean.checked) return path;\n      const slash = path.lastIndexOf('/');\n      const dir = slash >= 0 ? path.slice(0, slash + 1) : '';\n      const name = slash >= 0 ? path.slice(slash + 1) : path;\n      const dot = name.lastIndexOf('.');\n      if (dot <= 0) return dir + name + '-clean';\n      return dir + name.slice(0, dot) + '-clean' + name.slice(dot);\n    }\n\n    function xmlEscape(value) {\n      return String(value || '')\n        .replace(/&/g, '&amp;')\n        .replace(/</g, '&lt;')\n        .replace(/>/g, '&gt;')\n        .replace(/\"/g, '&quot;')\n        .replace(/'/g, '&apos;');\n    }\n\n    function htmlEscape(value) {\n      return String(value || '')\n        .replace(/&/g, '&amp;')\n        .replace(/</g, '&lt;')\n        .replace(/>/g, '&gt;')\n        .replace(/\"/g, '&quot;');\n    }\n\n    function getMeta() {\n      return {\n        title: els.metaTitle.value.trim(),\n        author: els.metaAuthor.value.trim(),\n        subject: els.metaSubject.value.trim(),\n        keywords: els.metaKeywords.value.trim(),\n        description: els.metaDescription.value.trim(),\n        creator: els.metaCreator.value.trim() || 'KGB Metadata Stripper',\n        copyright: els.metaCopyright.value.trim()\n      };\n    }\n\n    function revokeDownload() {\n      if (currentDownloadUrl) URL.revokeObjectURL(currentDownloadUrl);\n      currentDownloadUrl = null;\n      lastOutputBlob = null;\n      lastOutputName = '';\n      els.downloadLink.classList.remove('show');\n      els.downloadLink.removeAttribute('href');\n      els.downloadLink.removeAttribute('download');\n    }\n\n    function addItem(file, path) {\n      const clean = safePath(path || file.webkitRelativePath || file.name);\n      items.push({ file, path: clean });\n    }\n\n    function addFiles(fileList, pathPrefix = '') {\n      revokeDownload();\n      for (const file of Array.from(fileList || [])) {\n        const path = safePath(pathPrefix + (file.webkitRelativePath || file.name));\n        addItem(file, path);\n      }\n      renderInput();\n    }\n\n    async function addZipFiles(fileList) {\n      revokeDownload();\n      for (const zipFile of Array.from(fileList || [])) {\n        try {\n          const zip = await JSZip.loadAsync(zipFile);\n          const entries = Object.values(zip.files).filter(entry => !entry.dir);\n          const prefix = stripZipExtension(baseName(zipFile.name));\n          for (const entry of entries) {\n            const blob = await entry.async('blob');\n            const ext = extOf(entry.name);\n            const file = new File([blob], baseName(entry.name), { type: mimeForExtension(ext), lastModified: Date.now() });\n            addItem(file, safePath(prefix + '/' + entry.name));\n          }\n        } catch (error) {\n          console.error(error);\n          alert(`Could not read ZIP: ${zipFile.name}`);\n        }\n      }\n      renderInput();\n    }\n\n    async function readDirectoryHandle(handle, prefix = '') {\n      for await (const entry of handle.values()) {\n        const path = safePath(prefix + entry.name);\n        if (entry.kind === 'file') {\n          const file = await entry.getFile();\n          addItem(file, path);\n        } else if (entry.kind === 'directory') {\n          await readDirectoryHandle(entry, path + '/');\n        }\n      }\n    }\n\n    async function readDataTransferItems(dataTransferItems) {\n      const pending = [];\n      for (const item of Array.from(dataTransferItems || [])) {\n        if (item.kind !== 'file') continue;\n\n        if (item.getAsFileSystemHandle) {\n          pending.push((async () => {\n            const handle = await item.getAsFileSystemHandle();\n            if (!handle) return;\n            if (handle.kind === 'file') {\n              const file = await handle.getFile();\n              addItem(file, handle.name);\n            } else if (handle.kind === 'directory') {\n              await readDirectoryHandle(handle, handle.name + '/');\n            }\n          })());\n        } else if (item.webkitGetAsEntry) {\n          const entry = item.webkitGetAsEntry();\n          if (entry) pending.push(readWebkitEntry(entry, ''));\n        } else {\n          const file = item.getAsFile();\n          if (file) addItem(file, file.name);\n        }\n      }\n      await Promise.all(pending);\n    }\n\n    function readWebkitEntry(entry, prefix) {\n      return new Promise((resolve) => {\n        if (entry.isFile) {\n          entry.file(file => {\n            addItem(file, safePath(prefix + file.name));\n            resolve();\n          }, () => resolve());\n        } else if (entry.isDirectory) {\n          const reader = entry.createReader();\n          const dirPrefix = safePath(prefix + entry.name) + '/';\n          const batchRead = () => {\n            reader.readEntries(async entries => {\n              if (!entries.length) return resolve();\n              await Promise.all(entries.map(child => readWebkitEntry(child, dirPrefix)));\n              batchRead();\n            }, () => resolve());\n          };\n          batchRead();\n        } else {\n          resolve();\n        }\n      });\n    }\n\n    function renderInput() {\n      els.fileList.innerHTML = '';\n      if (!items.length) {\n        els.fileList.hidden = true;\n        els.inputStatus.textContent = 'No files selected.';\n        els.clearBtn.disabled = true;\n        els.processBtn.disabled = true;\n        return;\n      }\n\n      let total = 0;\n      items.forEach((item, index) => {\n        total += item.file.size;\n        const row = document.createElement('div');\n        row.className = 'file-row';\n        const name = document.createElement('div');\n        name.className = 'name';\n        name.textContent = item.path;\n        const size = document.createElement('div');\n        size.className = 'muted small';\n        size.textContent = formatBytes(item.file.size);\n        const remove = document.createElement('button');\n        remove.className = 'danger';\n        remove.type = 'button';\n        remove.textContent = 'Remove';\n        remove.style.minHeight = '32px';\n        remove.style.padding = '7px 9px';\n        remove.addEventListener('click', () => {\n          items.splice(index, 1);\n          revokeDownload();\n          renderInput();\n        });\n        row.append(name, size, remove);\n        els.fileList.appendChild(row);\n      });\n\n      els.fileList.hidden = false;\n      els.inputStatus.textContent = `${items.length} file(s) selected \u2014 ${formatBytes(total)} total.`;\n      els.clearBtn.disabled = false;\n      els.processBtn.disabled = false;\n    }\n\n    function clearAll() {\n      items = [];\n      els.fileInput.value = '';\n      els.folderInput.value = '';\n      els.zipInput.value = '';\n      revokeDownload();\n      clearReport();\n      renderInput();\n      setProgress(0, false);\n      els.processStatus.textContent = 'Ready.';\n    }\n\n    function setProgress(percent, show = true) {\n      els.progressBar.classList.toggle('show', show);\n      els.progressFill.style.width = `${Math.max(0, Math.min(100, percent))}%`;\n    }\n\n    function clearReport() {\n      els.reportList.innerHTML = '';\n      els.reportList.hidden = true;\n      els.reportEmpty.hidden = false;\n    }\n\n    function addReport(path, status, note) {\n      els.reportEmpty.hidden = true;\n      els.reportList.hidden = false;\n      const row = document.createElement('div');\n      row.className = 'report-row';\n\n      const name = document.createElement('div');\n      name.className = 'name';\n      name.textContent = path;\n\n      const badge = document.createElement('div');\n      let cls = 'badge';\n      if (status === 'cleaned' || status === 'replaced') cls += ' clean';\n      if (status === 'copied' || status === 'best-effort') cls += ' warn';\n      if (status === 'failed') cls += ' err';\n      badge.className = cls;\n      badge.textContent = status.toUpperCase();\n\n      const msg = document.createElement('div');\n      msg.className = 'muted small';\n      msg.textContent = note || '';\n\n      row.append(name, badge, msg);\n      els.reportList.appendChild(row);\n    }\n\n    async function fileToText(file) {\n      return await file.text();\n    }\n\n    async function fileToArrayBuffer(file) {\n      return await file.arrayBuffer();\n    }\n\n    async function sanitizeRasterImage(file, path, mode, meta) {\n      const ext = extOf(path);\n      const mime = ext === 'jpg' || ext === 'jpeg' ? 'image/jpeg' : ext === 'png' ? 'image/png' : 'image/webp';\n      const objectUrl = URL.createObjectURL(file);\n      try {\n        let bitmap;\n        try {\n          bitmap = await createImageBitmap(file);\n        } catch (_) {\n          bitmap = await loadImageFallback(objectUrl);\n        }\n\n        const canvas = document.createElement('canvas');\n        canvas.width = bitmap.width;\n        canvas.height = bitmap.height;\n        const ctx = canvas.getContext('2d');\n        ctx.drawImage(bitmap, 0, 0);\n        if (bitmap.close) bitmap.close();\n\n        const blob = await new Promise((resolve, reject) => {\n          canvas.toBlob(out => out ? resolve(out) : reject(new Error('Canvas export failed')), mime, cleanQuality());\n        });\n        return {\n          blob,\n          status: 'cleaned',\n          note: mode === 'replace'\n            ? 'Raster image re-encoded; custom metadata writing is not supported for this image type.'\n            : 'Raster image re-encoded to remove EXIF/ancillary metadata.'\n        };\n      } finally {\n        URL.revokeObjectURL(objectUrl);\n      }\n    }\n\n    function loadImageFallback(url) {\n      return new Promise((resolve, reject) => {\n        const img = new Image();\n        img.onload = () => resolve(img);\n        img.onerror = () => reject(new Error('Image could not be decoded'));\n        img.src = url;\n      });\n    }\n\n    async function sanitizeSvg(file, path, mode, meta) {\n      let text = await fileToText(file);\n      text = text.replace(/<!--[\\s\\S]*?-->/g, '');\n      text = text.replace(/<metadata\\b[\\s\\S]*?<\\/metadata>/gi, '');\n      text = text.replace(/<desc\\b[\\s\\S]*?<\\/desc>/gi, '');\n      text = text.replace(/<title\\b[\\s\\S]*?<\\/title>/gi, '');\n\n      if (mode === 'replace') {\n        const cleanMeta = {\n          title: meta.title,\n          author: meta.author,\n          subject: meta.subject,\n          keywords: meta.keywords,\n          description: meta.description,\n          creator: meta.creator,\n          copyright: meta.copyright\n        };\n        const insert = `\\n<title>${xmlEscape(meta.title || baseName(path))}</title>\\n<desc>${xmlEscape(meta.description || '')}</desc>\\n<metadata id=\"kgb-clean-metadata\"><![CDATA[${JSON.stringify(cleanMeta, null, 2)}]]></metadata>\\n`;\n        text = text.replace(/<svg\\b([^>]*)>/i, match => match + insert);\n      }\n\n      return {\n        blob: new Blob([text], { type: 'image/svg+xml' }),\n        status: mode === 'replace' ? 'replaced' : 'cleaned',\n        note: mode === 'replace' ? 'SVG metadata/comments removed and clean metadata inserted.' : 'SVG metadata/comments removed.'\n      };\n    }\n\n    async function sanitizeHtml(file, path, mode, meta) {\n      let text = await fileToText(file);\n      text = text.replace(/<!--[\\s\\S]*?-->/g, '');\n      text = text.replace(/<meta\\s+[^>]*(?:name|property)=[\"']?(?:author|generator|creator|copyright|keywords|description|application-name|dcterms\\.[^\"'\\s>]+|dc\\.[^\"'\\s>]+)[\"']?[^>]*>/gi, '');\n      text = text.replace(/<meta\\s+[^>]*http-equiv=[\"']?last-modified[\"']?[^>]*>/gi, '');\n\n      if (mode === 'replace') {\n        const tags = [];\n        if (meta.author) tags.push(`<meta name=\"author\" content=\"${htmlEscape(meta.author)}\">`);\n        if (meta.description) tags.push(`<meta name=\"description\" content=\"${htmlEscape(meta.description)}\">`);\n        if (meta.keywords) tags.push(`<meta name=\"keywords\" content=\"${htmlEscape(meta.keywords)}\">`);\n        if (meta.creator) tags.push(`<meta name=\"generator\" content=\"${htmlEscape(meta.creator)}\">`);\n        if (meta.copyright) tags.push(`<meta name=\"copyright\" content=\"${htmlEscape(meta.copyright)}\">`);\n\n        if (meta.title) {\n          if (/<title\\b[\\s\\S]*?<\\/title>/i.test(text)) {\n            text = text.replace(/<title\\b[^>]*>[\\s\\S]*?<\\/title>/i, `<title>${htmlEscape(meta.title)}</title>`);\n          } else {\n            tags.unshift(`<title>${htmlEscape(meta.title)}</title>`);\n          }\n        }\n\n        const insert = tags.join('\\n    ');\n        if (insert) {\n          if (/<head\\b[^>]*>/i.test(text)) {\n            text = text.replace(/<head\\b[^>]*>/i, match => `${match}\\n    ${insert}`);\n          } else {\n            text = `<!doctype html>\\n<html>\\n<head>\\n    ${insert}\\n</head>\\n<body>\\n${text}\\n</body>\\n</html>`;\n          }\n        }\n      }\n\n      return {\n        blob: new Blob([text], { type: 'text/html' }),\n        status: mode === 'replace' ? 'replaced' : 'cleaned',\n        note: mode === 'replace' ? 'HTML comments/meta removed and custom meta inserted.' : 'HTML comments and common metadata meta tags removed.'\n      };\n    }\n\n    async function sanitizePdf(file, path, mode, meta) {\n      const bytes = await fileToArrayBuffer(file);\n      const src = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true, updateMetadata: false });\n      const dst = await PDFLib.PDFDocument.create();\n      const pages = await dst.copyPages(src, src.getPageIndices());\n      pages.forEach(page => dst.addPage(page));\n\n      if (mode === 'replace') {\n        if (meta.title) dst.setTitle(meta.title);\n        if (meta.author) dst.setAuthor(meta.author);\n        if (meta.subject) dst.setSubject(meta.subject);\n        if (meta.keywords) dst.setKeywords(meta.keywords.split(',').map(k => k.trim()).filter(Boolean));\n        if (meta.creator) dst.setCreator(meta.creator);\n        dst.setProducer(meta.creator || 'KGB Metadata Stripper');\n        const now = new Date();\n        dst.setCreationDate(now);\n        dst.setModificationDate(now);\n      } else {\n        dst.setTitle('');\n        dst.setAuthor('');\n        dst.setSubject('');\n        dst.setKeywords([]);\n        dst.setCreator('');\n        dst.setProducer('');\n      }\n\n      const out = await dst.save({ useObjectStreams: true, addDefaultPage: false });\n      return {\n        blob: new Blob([out], { type: 'application/pdf' }),\n        status: 'best-effort',\n        note: mode === 'replace'\n          ? 'Fresh PDF built with custom basic document info. Embedded objects/annotations may still contain metadata.'\n          : 'Fresh PDF built with blank basic document info. Embedded objects/annotations may still contain metadata.'\n      };\n    }\n\n    function officeContentTypesStrip(xml) {\n      if (!xml) return xml;\n      return xml\n        .replace(/<Override\\s+[^>]*PartName=\"\\/docProps\\/(?:core|app|custom)\\.xml\"[^>]*\\/?>/gi, '')\n        .replace(/<Default\\s+[^>]*Extension=\"xml\"[^>]*ContentType=\"application\\/vnd\\.openxmlformats-officedocument\\.custom-properties\\+xml\"[^>]*\\/?>/gi, '');\n    }\n\n    function officeContentTypesAdd(xml, includeCustom) {\n      const additions = [\n        '<Override PartName=\"/docProps/core.xml\" ContentType=\"application/vnd.openxmlformats-package.core-properties+xml\"/>',\n        '<Override PartName=\"/docProps/app.xml\" ContentType=\"application/vnd.openxmlformats-officedocument.extended-properties+xml\"/>'\n      ];\n      if (includeCustom) additions.push('<Override PartName=\"/docProps/custom.xml\" ContentType=\"application/vnd.openxmlformats-officedocument.custom-properties+xml\"/>');\n      let out = officeContentTypesStrip(xml || '<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"yes\"?><Types xmlns=\"http://schemas.openxmlformats.org/package/2006/content-types\"></Types>');\n      return out.replace(/<\\/Types>\\s*$/i, additions.join('') + '</Types>');\n    }\n\n    function relsStrip(xml) {\n      if (!xml) return xml;\n      return xml.replace(/<Relationship\\s+[^>]*Target=\"docProps\\/(?:core|app|custom)\\.xml\"[^>]*\\/?>/gi, '');\n    }\n\n    function relsAdd(xml, includeCustom) {\n      const additions = [\n        '<Relationship Id=\"rIdKgbCore\" Type=\"http://schemas.openxmlformats.org/package/2006/relationships/metadata/core-properties\" Target=\"docProps/core.xml\"/>',\n        '<Relationship Id=\"rIdKgbApp\" Type=\"http://schemas.openxmlformats.org/officeDocument/2006/relationships/extended-properties\" Target=\"docProps/app.xml\"/>'\n      ];\n      if (includeCustom) additions.push('<Relationship Id=\"rIdKgbCustom\" Type=\"http://schemas.openxmlformats.org/officeDocument/2006/relationships/custom-properties\" Target=\"docProps/custom.xml\"/>');\n      let out = relsStrip(xml || '<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"yes\"?><Relationships xmlns=\"http://schemas.openxmlformats.org/package/2006/relationships\"></Relationships>');\n      return out.replace(/<\\/Relationships>\\s*$/i, additions.join('') + '</Relationships>');\n    }\n\n    function makeCoreXml(meta) {\n      const now = new Date().toISOString();\n      return `<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"yes\"?>\n<cp:coreProperties xmlns:cp=\"http://schemas.openxmlformats.org/package/2006/metadata/core-properties\" xmlns:dc=\"http://purl.org/dc/elements/1.1/\" xmlns:dcterms=\"http://purl.org/dc/terms/\" xmlns:dcmitype=\"http://purl.org/dc/dcmitype/\" xmlns:xsi=\"http://www.w3.org/2001/XMLSchema-instance\">\n  <dc:title>${xmlEscape(meta.title)}</dc:title>\n  <dc:subject>${xmlEscape(meta.subject)}</dc:subject>\n  <dc:creator>${xmlEscape(meta.author)}</dc:creator>\n  <cp:keywords>${xmlEscape(meta.keywords)}</cp:keywords>\n  <dc:description>${xmlEscape(meta.description)}</dc:description>\n  <cp:lastModifiedBy>${xmlEscape(meta.author || meta.creator)}</cp:lastModifiedBy>\n  <dcterms:created xsi:type=\"dcterms:W3CDTF\">${now}</dcterms:created>\n  <dcterms:modified xsi:type=\"dcterms:W3CDTF\">${now}</dcterms:modified>\n</cp:coreProperties>`;\n    }\n\n    function makeAppXml(meta) {\n      return `<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"yes\"?>\n<Properties xmlns=\"http://schemas.openxmlformats.org/officeDocument/2006/extended-properties\" xmlns:vt=\"http://schemas.openxmlformats.org/officeDocument/2006/docPropsVTypes\">\n  <Application>${xmlEscape(meta.creator || 'KGB Metadata Stripper')}</Application>\n  <DocSecurity>0</DocSecurity>\n  <ScaleCrop>false</ScaleCrop>\n  <Company>${xmlEscape(meta.author)}</Company>\n  <LinksUpToDate>false</LinksUpToDate>\n  <SharedDoc>false</SharedDoc>\n  <HyperlinksChanged>false</HyperlinksChanged>\n  <AppVersion>1.0</AppVersion>\n</Properties>`;\n    }\n\n    function makeCustomXml(meta) {\n      const props = [];\n      let pid = 2;\n      function add(name, value) {\n        if (!value) return;\n        props.push(`<property fmtid=\"{D5CDD505-2E9C-101B-9397-08002B2CF9AE}\" pid=\"${pid++}\" name=\"${xmlEscape(name)}\"><vt:lpwstr>${xmlEscape(value)}</vt:lpwstr></property>`);\n      }\n      add('Copyright', meta.copyright);\n      add('SanitizedBy', meta.creator || 'KGB Metadata Stripper');\n      add('Description', meta.description);\n      return `<?xml version=\"1.0\" encoding=\"UTF-8\" standalone=\"yes\"?>\n<Properties xmlns=\"http://schemas.openxmlformats.org/officeDocument/2006/custom-properties\" xmlns:vt=\"http://schemas.openxmlformats.org/officeDocument/2006/docPropsVTypes\">\n${props.join('\\n')}\n</Properties>`;\n    }\n\n    async function sanitizeOffice(file, path, mode, meta) {\n      const zip = await JSZip.loadAsync(file);\n      zip.remove('docProps/core.xml');\n      zip.remove('docProps/app.xml');\n      zip.remove('docProps/custom.xml');\n\n      if (zip.file('[Content_Types].xml')) {\n        const contentXml = await zip.file('[Content_Types].xml').async('string');\n        zip.file('[Content_Types].xml', mode === 'replace' ? officeContentTypesAdd(contentXml, Boolean(meta.copyright || meta.description)) : officeContentTypesStrip(contentXml));\n      }\n\n      if (zip.file('_rels/.rels')) {\n        const relsXml = await zip.file('_rels/.rels').async('string');\n        zip.file('_rels/.rels', mode === 'replace' ? relsAdd(relsXml, Boolean(meta.copyright || meta.description)) : relsStrip(relsXml));\n      }\n\n      if (mode === 'replace') {\n        zip.file('docProps/core.xml', makeCoreXml(meta));\n        zip.file('docProps/app.xml', makeAppXml(meta));\n        if (meta.copyright || meta.description) zip.file('docProps/custom.xml', makeCustomXml(meta));\n      }\n\n      const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });\n      return {\n        blob,\n        status: mode === 'replace' ? 'replaced' : 'cleaned',\n        note: mode === 'replace'\n          ? 'Office package metadata removed and clean docProps metadata added.'\n          : 'Office package docProps metadata removed.'\n      };\n    }\n\n    async function copyUnchanged(file) {\n      return new Blob([await file.arrayBuffer()], { type: file.type || 'application/octet-stream' });\n    }\n\n    async function sanitizeItem(item, mode, meta) {\n      const ext = extOf(item.path);\n      try {\n        if (['jpg', 'jpeg', 'png', 'webp'].includes(ext)) return await sanitizeRasterImage(item.file, item.path, mode, meta);\n        if (ext === 'svg') return await sanitizeSvg(item.file, item.path, mode, meta);\n        if (['html', 'htm'].includes(ext)) return await sanitizeHtml(item.file, item.path, mode, meta);\n        if (ext === 'pdf') return await sanitizePdf(item.file, item.path, mode, meta);\n        if (['docx', 'pptx', 'xlsx'].includes(ext)) return await sanitizeOffice(item.file, item.path, mode, meta);\n\n        return {\n          blob: await copyUnchanged(item.file),\n          status: 'copied',\n          note: `Unsupported .${ext || 'unknown'} metadata format; copied unchanged.`\n        };\n      } catch (error) {\n        console.error('Failed:', item.path, error);\n        return {\n          blob: await copyUnchanged(item.file),\n          status: 'failed',\n          note: `Cleaning failed; copied original unchanged. ${error.message || error}`\n        };\n      }\n    }\n\n    async function processFiles() {\n      if (!items.length) return;\n      revokeDownload();\n      clearReport();\n      setProgress(0, true);\n      els.processBtn.disabled = true;\n      els.processStatus.textContent = 'Processing files...';\n\n      const mode = els.mode.value;\n      const meta = getMeta();\n      const outputs = [];\n\n      for (let i = 0; i < items.length; i++) {\n        const item = items[i];\n        els.processStatus.textContent = `Processing ${i + 1} of ${items.length}: ${item.path}`;\n        const result = await sanitizeItem(item, mode, meta);\n        const outPath = outputPathFor(item.path);\n        outputs.push({ path: outPath, blob: result.blob });\n        addReport(item.path, result.status, result.note);\n        setProgress(((i + 1) / items.length) * 75, true);\n        await new Promise(requestAnimationFrame);\n      }\n\n      const shouldZip = els.forceZip.checked || outputs.length !== 1 || outputs[0].path.includes('/');\n      if (shouldZip) {\n        els.processStatus.textContent = 'Building output ZIP...';\n        const zip = new JSZip();\n        outputs.forEach(out => zip.file(out.path, out.blob));\n        const blob = await zip.generateAsync(\n          { type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } },\n          meta => setProgress(75 + meta.percent * 0.25, true)\n        );\n        currentDownloadUrl = URL.createObjectURL(blob);\n        lastOutputBlob = blob;\n        const name = cleanOutputName(els.outputName.value);\n        lastOutputName = name;\n        els.downloadLink.href = currentDownloadUrl;\n        els.downloadLink.download = name;\n        els.downloadLink.textContent = `Download ${name} (${formatBytes(blob.size)})`;\n      } else {\n        const out = outputs[0];\n        currentDownloadUrl = URL.createObjectURL(out.blob);\n        lastOutputBlob = out.blob;\n        const name = baseName(out.path);\n        lastOutputName = name;\n        els.downloadLink.href = currentDownloadUrl;\n        els.downloadLink.download = name;\n        els.downloadLink.textContent = `Download ${name} (${formatBytes(out.blob.size)})`;\n      }\n\n      els.downloadLink.classList.add('show');\n      setProgress(100, true);\n      els.processStatus.textContent = 'Cleaned output ready.';\n      els.processBtn.disabled = false;\n    }\n\n    els.mode.addEventListener('change', () => {\n      const replace = els.mode.value === 'replace';\n      els.metadataFields.hidden = !replace;\n      els.processBtn.textContent = replace ? 'Replace Metadata' : 'Strip Metadata';\n    });\n\n    els.addFilesBtn.addEventListener('click', () => els.fileInput.click());\n    els.addZipBtn.addEventListener('click', () => els.zipInput.click());\n    els.addFolderBtn.addEventListener('click', async () => {\n      revokeDownload();\n      if ('showDirectoryPicker' in window) {\n        try {\n          const handle = await window.showDirectoryPicker({ mode: 'read' });\n          await readDirectoryHandle(handle, handle.name + '/');\n          renderInput();\n          return;\n        } catch (error) {\n          if (error && error.name === 'AbortError') return;\n          console.warn('showDirectoryPicker failed, falling back:', error);\n        }\n      }\n      els.folderInput.click();\n    });\n\n    els.fileInput.addEventListener('change', () => addFiles(els.fileInput.files));\n    els.folderInput.addEventListener('change', () => addFiles(els.folderInput.files));\n    els.zipInput.addEventListener('change', () => addZipFiles(els.zipInput.files));\n    els.clearBtn.addEventListener('click', clearAll);\n    els.processBtn.addEventListener('click', processFiles);\n\n    ['dragenter', 'dragover'].forEach(type => {\n      els.dropzone.addEventListener(type, event => {\n        event.preventDefault();\n        els.dropzone.classList.add('dragover');\n      });\n    });\n\n    ['dragleave', 'drop'].forEach(type => {\n      els.dropzone.addEventListener(type, event => {\n        event.preventDefault();\n        if (type === 'drop') return;\n        els.dropzone.classList.remove('dragover');\n      });\n    });\n\n    els.dropzone.addEventListener('drop', async event => {\n      event.preventDefault();\n      els.dropzone.classList.remove('dragover');\n      revokeDownload();\n      if (event.dataTransfer.items && event.dataTransfer.items.length) {\n        await readDataTransferItems(event.dataTransfer.items);\n      } else {\n        addFiles(event.dataTransfer.files);\n      }\n      renderInput();\n    });\n\n    renderInput();\n  \n/*\n  KGB Studio Bridge\n  -----------------\n  Keeps the standalone metadata tool intact while allowing Studio to:\n  - inject Studio assets as files for metadata cleaning/replacement\n  - apply a KGB default metadata profile\n  - save the last cleaned output ZIP/blob back into Studio\n*/\nfunction dataUrlToFile(dataUrl,name,mime){\n  const parts=String(dataUrl||'').split(',');\n  const meta=parts[0]||'';\n  const body=parts[1]||'';\n  const detected=(meta.match(/data:([^;]+)/)||[])[1]||mime||'application/octet-stream';\n  const binary=atob(body);\n  const bytes=new Uint8Array(binary.length);\n  for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);\n  return new File([bytes],name,{type:detected,lastModified:Date.now()});\n}\nfunction textToFile(text,name,mime='text/plain'){\n  return new File([String(text||'')],name,{type:mime,lastModified:Date.now()});\n}\nfunction applyKGBMetadataProfile(profile){\n  const p=profile||{};\n  els.mode.value='replace';\n  els.metadataFields.hidden=false;\n  els.processBtn.textContent='Replace Metadata';\n  els.metaTitle.value=p.title||'KGB Studio Asset';\n  els.metaAuthor.value=p.author||'Tommy Burke / Kernel Grey Beret';\n  els.metaSubject.value=p.subject||'KGB Studio / KGB Arcade asset';\n  els.metaKeywords.value=p.keywords||'KGB Studio, KGB Arcade, Kernel Grey Beret, browser-native, indie game assets';\n  els.metaDescription.value=p.description||'Asset produced through KGB Studio for KGB Arcade.';\n  els.metaCreator.value=p.creator||'KGB Studio';\n  els.metaCopyright.value=p.copyright||'\u00a9 2026 Tommy Burke. All rights reserved.';\n}\nwindow.KGBMetadataForgeBridge={\n  loadStudioAssets(assetList,profile){\n    revokeDownload();\n    clearReport();\n    items=[];\n    for(const a of (assetList||[])){\n      const ext=a.extension||'bin';\n      const safeName=(a.fileName||a.originalFileName||a.name||a.id||'studio_asset').replace(/[\\\\/:*?\"<>|]+/g,'_');\n      const path=(a.folder?String(a.folder).replace(/^\\/+/, '')+'/':'')+(safeName.includes('.')?safeName:safeName+'.'+ext);\n      if(a.dataUrl){\n        addItem(dataUrlToFile(a.dataUrl,safeName.includes('.')?safeName:safeName+'.'+ext,a.mime),path);\n      }else if(a.text){\n        addItem(textToFile(a.text,safeName.endsWith('.txt')?safeName:safeName+'.txt',a.mime||'text/plain'),path);\n      }else if(a.exportedHTML){\n        addItem(textToFile(a.exportedHTML,safeName.endsWith('.html')?safeName:safeName+'.html','text/html'),path);\n      }else if(a.exportedJS){\n        addItem(textToFile(a.exportedJS,safeName.endsWith('.js')?safeName:safeName+'.js','text/javascript'),path);\n      }else if(a.project||a.map||a.workspace){\n        addItem(textToFile(JSON.stringify(a.project||a.map||a.workspace,null,2),safeName.endsWith('.json')?safeName:safeName+'.json','application/json'),path);\n      }\n    }\n    if(profile)applyKGBMetadataProfile(profile);\n    renderInput();\n    els.processStatus.textContent='Loaded '+items.length+' Studio asset(s).';\n  },\n  applyProfile(profile){\n    applyKGBMetadataProfile(profile);\n  },\n  getLastOutputSummary(){\n    return lastOutputBlob ? {name:lastOutputName||'cleaned-files.zip',size:lastOutputBlob.size||0,type:lastOutputBlob.type||'application/octet-stream'} : null;\n  },\n  async getLastOutputAsset(){\n    if(!lastOutputBlob)throw new Error('No cleaned output is ready yet. Process files first.');\n    const dataUrl=await new Promise((resolve,reject)=>{\n      const r=new FileReader();\n      r.onerror=()=>reject(r.error||new Error('Could not read cleaned output.'));\n      r.onload=()=>resolve(r.result);\n      r.readAsDataURL(lastOutputBlob);\n    });\n    const name=lastOutputName||'cleaned-files.zip';\n    const ext=(name.split('.').pop()||'zip').toLowerCase();\n    return {\n      name,\n      kind:'metadata-cleaned-output',\n      adapter:'metadata-forge',\n      source:'metadata-forge',\n      folder:'/metadata-forge',\n      tags:['metadata','cleaned','release-hygiene'],\n      notes:'Cleaned output generated by KGB Metadata Forge inside KGB Studio.',\n      mime:lastOutputBlob.type||'application/zip',\n      extension:ext,\n      size:lastOutputBlob.size||0,\n      dataUrl,\n      previewDataUrl:null,\n      importedAt:new Date().toISOString()\n    };\n  },\n  getWorkspace(){\n    return {\n      tool:'KGB Metadata Forge',\n      version:'studio-integrated',\n      mode:els.mode.value,\n      outputName:els.outputName.value,\n      quality:els.quality.value,\n      forceZip:els.forceZip.checked,\n      renameClean:els.renameClean.checked,\n      metadata:getMeta(),\n      itemCount:items.length,\n      savedAt:new Date().toISOString()\n    };\n  }\n};\ntry{window.parent&&window.parent.postMessage({type:'KGB_METADATA_FORGE_READY'},\"*\")}catch(e){}\n\n<\/script>\n</body>\n</html>\n";


/*
-------------------------------------------------------------------------------
ASSETS → METADATA FORGE

Metadata Forge is not placed inside TAIO because it works on binary files,
archives, images, PDFs, Office packages, and release outputs. It is part of
asset hygiene and export/release preparation.
-------------------------------------------------------------------------------
*/
const MetadataForgeStudioHost={
  profile(){
    const year=new Date().getFullYear();
    const projectName=Studio.state.project?.meta?.name||"KGB Studio Project";
    return {
      title:projectName,
      author:"Tommy Burke / Kernel Grey Beret",
      subject:"KGB Studio / KGB Arcade asset",
      keywords:"KGB Studio, KGB Arcade, Kernel Grey Beret, browser-native, indie game assets",
      description:"Asset produced through KGB Studio for KGB Arcade.",
      creator:"KGB Studio",
      copyright:"© "+year+" Tommy Burke. All rights reserved."
    };
  },
  getBridge(){return $("#metadataForgeFrame")?.contentWindow?.KGBMetadataForgeBridge||null;},
  assetToTransfer(bucket,asset){
    return {id:asset.id,bucket,name:asset.name||asset.id,kind:asset.kind||"asset",folder:asset.folder||("/"+bucket),mime:asset.mime||"",extension:asset.extension||"",originalFileName:asset.originalFileName||asset.fileName||"",dataUrl:asset.dataUrl||"",text:asset.text||"",exportedJS:asset.exportedJS||"",exportedHTML:asset.exportedHTML||"",project:asset.project||null,map:asset.map||null,workspace:asset.workspace||null};
  },
  selectedAssetTransfer(){
    const sel=Studio.state.selection;
    if(!sel)return null;
    const asset=Studio.find(sel.type,sel.id);
    return asset?this.assetToTransfer(sel.type,asset):null;
  },
  downloadableAssets(){
    return Object.entries(Studio.state.project.assets||{}).flatMap(([bucket,items])=>(items||[]).filter(a=>AssetDownload.canDownload(a)).map(asset=>this.assetToTransfer(bucket,asset)));
  },
  loadSelected(){
    const bridge=this.getBridge();
    if(!bridge){alert("Metadata Forge is still loading. Try again in a second.");return;}
    const asset=this.selectedAssetTransfer();
    if(!asset){alert("Select an asset in Asset Library/Inspector first.");return;}
    bridge.loadStudioAssets([asset],this.profile());
    Studio.log("Loaded selected asset into Metadata Forge: "+asset.name);
  },
  loadAll(){
    const bridge=this.getBridge();
    if(!bridge){alert("Metadata Forge is still loading. Try again in a second.");return;}
    const assets=this.downloadableAssets();
    if(!assets.length){alert("No downloadable Studio assets found yet.");return;}
    bridge.loadStudioAssets(assets,this.profile());
    Studio.log("Loaded "+assets.length+" Studio asset(s) into Metadata Forge.");
  },
  applyProfile(){
    const bridge=this.getBridge();
    if(!bridge){alert("Metadata Forge is still loading. Try again in a second.");return;}
    bridge.applyProfile(this.profile());
    Studio.log("Applied KGB/KGBA metadata profile.");
  },
  async saveLastOutput(){
    const bridge=this.getBridge();
    if(!bridge?.getLastOutputAsset){alert("Metadata Forge output bridge is still loading. Try again in a second.");return;}
    try{
      const asset=await bridge.getLastOutputAsset();
      Studio.addAsset("misc",asset);
      renderExplorer();
      Studio.renderProps();
      Studio.log("Saved Metadata Forge output to Studio: "+asset.name);
      alert("Saved cleaned output to Studio.");
    }catch(e){alert("Could not save Metadata Forge output: "+e.message);}
  },
  downloadStandalone(){
    const blob=new Blob([KGB_METADATA_FORGE_HTML],{type:"text/html"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="kgb_metadata_forge_standalone.html";
    a.click();
    URL.revokeObjectURL(a.href);
  }
};

  actions(root){root.innerHTML='<button class="primary" onclick="MetadataForgeStudioHost.loadSelected()">Load Selected</button><button onclick="MetadataForgeStudioHost.loadAll()">Load All</button><button onclick="MetadataForgeStudioHost.saveLastOutput()">Save Output</button><button onclick="LayoutControls.toggleFocus()">Focus</button>';},
  properties(panel){panel.innerHTML='<div class="muted">Metadata Forge handles file-level metadata. It is intentionally separate from TAIO because it operates on release assets and binary/container formats, not just text/data operations.</div>';}

ap:8px;align-items:center;flex-wrap:wrap;margin:8px 0}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}label{display:grid;gap:5px;color:var(--muted);font-size:13px;font-weight:800}input,select,textarea{width:100%;border:1px solid #1d6972;border-radius:12px;background:#020b0d;color:var(--text);padding:8px}input[type=color]{height:42px;padding:3px}input[type=range]{padding:0}.tool{display:none}.tool.active{display:block}canvas{width:min(100%,900px);height:auto;max-height:calc(100vh - 92px);background:#020707;border:1px solid #0c3338;border-radius:18px;box-shadow:0 0 40px rgba(0,234,255,.08)}.output{height:190px;font-family:ui-monospace,Consolas,monospace;font-size:12px}.hint{color:var(--muted);font-size:13px;line-height:1.35}.swatches{display:flex;gap:6px;flex-wrap:wrap}.swatch{width:34px;height:34px;border-radius:10px;border:1px solid rgba(255,255,255,.3);cursor:pointer}.pill{display:inline-block;border:1px solid #225b62;border-radius:99px;padding:3px 8px;color:var(--muted);font-size:12px}@media(max-width:850px){html,body{overflow:auto}.app{grid-template-columns:1fr;grid-template-rows:45vh auto}.stage{grid-row:1;padding:8px;position:sticky;top:0;z-index:2;background:#02090a}.side{grid-row:2;border-right:0;border-top:1px solid var(--line)}canvas{max-height:42vh}.tabs{margin-left:0}.brand{width:100%}}\n</style>\n</head>\n<body>\n<header class=\"top\"><div class=\"brand\">KGB FORGE SUITE v1.1</div><div class=\"sub\">Studio integrated \u2022 particle rain ready \u2022 live previews</div><div class=\"tabs\"><button class=\"tab active\" data-tool=\"particle\">Particle</button><button class=\"tab\" data-tool=\"sound\">Sound</button><button class=\"tab\" data-tool=\"palette\">Palette</button><button class=\"tab\" data-tool=\"tile\">Tile</button><button class=\"tab\" data-tool=\"curve\">Curve</button></div></header>\n<div class=\"app\">\n<aside class=\"side\">\n<section id=\"particle\" class=\"tool active\"><div class=\"card\"><h3>Particle Forge</h3><p
