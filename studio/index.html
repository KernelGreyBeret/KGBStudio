    <hr>\n    <label>Current Source Sheets</label>\n    <div class=\"sourceList\" id=\"sourceList\"></div>\n    <div class=\"status\" id=\"status\">Load one production sheet to begin. You can load several, but export is active-sheet only.</div>\n  </aside>\n\n  <section class=\"panel stagePanel\">\n    <div class=\"row\" style=\"margin-bottom:10px\">\n      <div><strong id=\"sheetTitle\">No source sheet loaded</strong><div class=\"sub\" id=\"sheetMeta\">Choose a source sheet from your files.</div></div>\n      <div class=\"row tight\"><button id=\"fitBtn\">Fit</button><button id=\"actualBtn\">100%</button><button id=\"zoomInBtn\">+</button><button id=\"zoomOutBtn\">\u2212</button></div>\n    </div>\n    <div class=\"canvasWrap\" id=\"canvasWrap\"><canvas id=\"stage\"></canvas></div>\n    <div class=\"hint\">Drag the green crop box to move. Drag corners to resize. Hold <span class=\"kbd\">Shift</span> while dragging on empty space to create a new crop.</div>\n  </section>\n\n  <aside class=\"panel right\">\n    <label>Target Folder for Active Sheet</label>\n    <div class=\"row\"><button class=\"cyan\" id=\"attachFolderBtn\">Attach Image Folder</button><button class=\"warn\" id=\"clearFolderBtn\">Clear</button></div>\n    <input id=\"folderInput\" type=\"file\" webkitdirectory directory multiple style=\"display:none\">\n    <div class=\"notice\" id=\"folderNotice\">No target folder attached. Attach the folder that already contains the images you are replacing, such as <span class=\"kbd\">decks/actions/images</span>.</div>\n    <div class=\"row\"><input id=\"fileFilter\" type=\"text\" placeholder=\"Filter target files...\"><button id=\"autoAssignBtn\">Auto Assign</button></div>\n    <div class=\"fileList\" id=\"targetFileList\"></div>\n\n    <hr>\n    <label>Crops for Active Sheet</label>\n    <div class=\"row\"><input id=\"filter\" type=\"text\" placeholder=\"Filter crops...\"><button id=\"newCrop\">New</button></div>\n    <div class=\"row\"><button id=\"duplicateCrop\">Duplicate</button><button class=\"danger\" id=\"deleteCrop\">Delete</button></div>\n    <div class=\"cropList\" id=\"cropList\"></div>\n\n    <hr>\n    <label>Selected Crop</label>\n    <div class=\"row\"><input id=\"name\" type=\"text\" placeholder=\"existing_file.png\"><select id=\"format\"><option value=\"png\">png</option><option value=\"webp\">webp</option></select></div>\n    <div class=\"path\" id=\"selectedPath\">No crop selected</div>\n    <div class=\"miniGrid\"><div><label>X</label><input id=\"x\" type=\"number\"></div><div><label>Y</label><input id=\"y\" type=\"number\"></div><div><label>W</label><input id=\"w\" type=\"number\"></div><div><label>H</label><input id=\"h\" type=\"number\"></div></div>\n    <div class=\"checkrow\"><input id=\"removeBg\" type=\"checkbox\"><span>Remove dark background</span></div>\n    <div class=\"row\"><div><label>Threshold</label><input id=\"threshold\" type=\"number\" value=\"38\"></div><div><label>Pad</label><input id=\"pad\" type=\"number\" value=\"0\"></div></div>\n    <label>Resize Output</label>\n    <div class=\"row\"><input id=\"resizeW\" type=\"number\" placeholder=\"width\"><input id=\"resizeH\" type=\"number\" placeholder=\"height\"></div>\n    <div class=\"preview\"><canvas id=\"preview\"></canvas></div>\n\n    <hr>\n    <label>Batch Builder</label>\n    <div class=\"sub\">Fast-create crop maps for frame rows, sprite sheets, or card grids. The folder comes from the attached target folder; file assignments can come next.</div>\n    <div class=\"row\"><div><label>Rows</label><input id=\"gridRows\" type=\"number\" value=\"2\"></div><div><label>Cols</label><input id=\"gridCols\" type=\"number\" value=\"8\"></div></div>\n    <div class=\"row\"><div><label>Start X</label><input id=\"gridX\" type=\"number\" value=\"0\"></div><div><label>Start Y</label><input id=\"gridY\" type=\"number\" value=\"0\"></div></div>\n    <div class=\"row\"><div><label>Cell W</label><input id=\"gridW\" type=\"number\" value=\"200\"></div><div><label>Cell H</label><input id=\"gridH\" type=\"number\" value=\"300\"></div></div>\n    <div class=\"row\"><div><label>Gap X</label><input id=\"gridGapX\" type=\"number\" value=\"0\"></div><div><label>Gap Y</label><input id=\"gridGapY\" type=\"number\" value=\"0\"></div></div>\n    <label>Row prefixes</label><input id=\"rowPrefixes\" type=\"text\" value=\"wave,clap\" placeholder=\"wave,clap or run,walk\">\n    <label>Naming pattern</label><input id=\"namePattern\" type=\"text\" value=\"{prefix}_{index:02d}.png\">\n    <div class=\"row\"><button class=\"primary\" id=\"addGridBtn\">Add Grid Crops</button><button class=\"warn\" id=\"clearSheetCropsBtn\">Clear Sheet Crops</button></div>\n  </aside>\n</main>\n\n<script>\n'use strict';\nlet sources=[]; // {id,fileName,objectUrl,img,width,height,crops,targetFolderName,targetFiles,targetDirHandle}\nlet sourceIndex=-1,cropIndex=-1,zoom=1,drag=null,createDrag=null,shiftDown=false;\nconst els=id=>document.getElementById(id);\nconst stage=els('stage'),ctx=stage.getContext('2d');\nconst preview=els('preview'),pctx=preview.getContext('2d',{willReadFrequently:true});\nconst inputs=['name','x','y','w','h','format','removeBg','threshold','pad','resizeW','resizeH'].reduce((a,id)=>(a[id]=els(id),a),{});\nfunction setStatus(msg,cls=''){const s=els('status');s.textContent=msg;s.className='status '+cls;}\nfunction currentSource(){return sources[sourceIndex]||null}function currentCrop(){const s=currentSource();return s&&s.crops[cropIndex]||null}\nfunction cleanFile(v,fmt){v=String(v||'asset.png').trim().replace(/[\\\\/:?*\"<>|]+/g,'_').replace(/\\s+/g,'_');if(!/\\.(png|webp)$/i.test(v))v+='.'+(fmt||'png');return v.replace(/\\.(png|webp)$/i,'.'+(fmt||'png'))}\nfunction joinPath(...parts){return parts.map(p=>String(p||'').replace(/^\\/+|\\/+$/g,'')).filter(Boolean).join('/')}\nfunction selectedExportPath(c=currentCrop()){if(!c)return'No crop selected';return cleanFile(c.name,c.format)}\nfunction padNum(n,w){return String(n).padStart(w,'0')}function applyPattern(pattern,prefix,index){return pattern.replace(/\\{prefix\\}/g,prefix).replace(/\\{index(?::0(\\d+)d)?\\}/g,(_,w)=>padNum(index,+(w||2)))}\nfunction imageFiles(files){return [...files].filter(f=>/\\.(png|jpe?g|webp|gif)$/i.test(f.name||f.fileName||''))}\n\nfunction init(){bindEvents();drawStage();updateFolderUI();}\nfunction bindEvents(){\n  els('chooseSheetsBtn').onclick=()=>els('sheetInput').click();els('sheetInput').onchange=e=>handleFiles([...e.target.files]);\n  const drop=els('dropZone');['dragenter','dragover'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag')}));['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('drag')}));drop.addEventListener('drop',e=>handleFiles([...e.dataTransfer.files].filter(f=>f.type.startsWith('image/'))));\n  els('fitBtn').onclick=()=>{zoom=1;drawStage()};els('actualBtn').onclick=()=>{zoom='actual';drawStage()};els('zoomInBtn').onclick=()=>{zoom=(zoom==='actual'?1:zoom)*1.2;drawStage()};els('zoomOutBtn').onclick=()=>{zoom=(zoom==='actual'?1:zoom)/1.2;drawStage()};\n  els('newCrop').onclick=newCrop;els('duplicateCrop').onclick=duplicateCrop;els('deleteCrop').onclick=deleteCrop;els('clearSheetCropsBtn').onclick=clearSheetCrops;\n  els('exportSelected').onclick=exportSelected;els('exportActiveZip').onclick=exportActiveZip;els('writeActiveFolder').onclick=writeActiveToFolder;\n  els('downloadMap').onclick=downloadMap;els('loadMapBtn').onclick=()=>els('loadMapInput').click();els('loadMapInput').onchange=loadMap;\n  els('attachFolderBtn').onclick=attachFolder;els('folderInput').onchange=e=>attachFolderFallback([...e.target.files]);els('clearFolderBtn').onclick=clearTargetFolder;els('fileFilter').oninput=renderTargetFiles;els('autoAssignBtn').onclick=autoAssignByOrder;\n  els('filter').oninput=renderCrops;els('addGridBtn').onclick=addGridCrops;\n  Object.values(inputs).forEach(el=>{el.addEventListener('input',applyInputs);el.addEventListener('change',applyInputs)});\n  stage.addEventListener('pointerdown',pointerDown);window.addEventListener('pointermove',pointerMove,{passive:false});window.addEventListener('pointerup',pointerUp);\n  window.addEventListener('keydown',e=>{if(e.key==='Shift')shiftDown=true});window.addEventListener('keyup',e=>{if(e.key==='Shift')shiftDown=false});\n}\nfunction handleFiles(files){if(!files.length)return;files.forEach(file=>{if(!file.type.startsWith('image/'))return;const url=URL.createObjectURL(file);const img=new Image();img.onload=()=>{let existing=sources.find(s=>s.fileName===file.name);if(existing){URL.revokeObjectURL(existing.objectUrl);Object.assign(existing,{objectUrl:url,img,width:img.naturalWidth,height:img.naturalHeight})}else{sources.push({id:file.name.replace(/\\.[^.]+$/,''),fileName:file.name,objectUrl:url,img,width:img.naturalWidth,height:img.naturalHeight,crops:[],targetFolderName:'',targetFiles:[],targetDirHandle:null})}if(sourceIndex<0)sourceIndex=sources.length-1;renderSources();selectSource(sourceIndex<0?0:sourceIndex);setStatus('Loaded '+sources.length+' source sheet(s).','ok')};img.onerror=()=>setStatus('Could not load image: '+file.name,'err');img.src=url})}\nfunction renderSources(){const list=els('sourceList');list.innerHTML='';sources.forEach((s,i)=>{const div=document.createElement('div');div.className='sourceItem '+(i===sourceIndex?'active':'');const folder=s.targetFolderName?` \u00b7 folder: ${s.targetFolderName}`:'';div.innerHTML=`<strong>${s.id}</strong><small>${s.fileName} \u00b7 ${s.width}\u00d7${s.height} \u00b7 ${s.crops.length} crops${folder}</small>`;div.onclick=()=>selectSource(i);list.appendChild(div)})}\nfunction selectSource(i){sourceIndex=i;if(!currentSource())return;if(cropIndex<0||cropIndex>=currentSource().crops.length)cropIndex=currentSource().crops.length?0:-1;els('sheetTitle').textContent=currentSource().fileName;els('sheetMeta').textContent=`${currentSource().width} \u00d7 ${currentSource().height} \u00b7 ${currentSource().crops.length} crops`;renderSources();renderTargetFiles();updateFolderUI();renderCrops();loadInputs();drawStage()}\n\nasync function attachFolder(){const s=currentSource();if(!s){setStatus('Load/select a source sheet first.','err');return}if(window.showDirectoryPicker){try{const dir=await window.showDirectoryPicker({mode:'readwrite'});s.targetDirHandle=dir;s.targetFolderName=dir.name;s.targetFiles=[];for await(const [name,handle] of dir.entries()){if(handle.kind==='file'&&/\\.(png|jpe?g|webp|gif)$/i.test(name))s.targetFiles.push({name,handle})}s.targetFiles.sort((a,b)=>a.name.localeCompare(b.name));updateFolderUI();renderSources();renderTargetFiles();setStatus('Attached target folder: '+dir.name+' ('+s.targetFiles.length+' image files).','ok');return}catch(e){if(e.name!=='AbortError')setStatus('Folder attach failed: '+e.message,'err')}}els('folderInput').click()}\nfunction attachFolderFallback(files){const s=currentSource();if(!s||!files.length)return;const imgs=imageFiles(files);const first=imgs[0];let folder='attached-folder';if(first&&first.webkitRelativePath){const parts=first.webkitRelativePath.split('/');folder=parts.length>1?parts[parts.length-2]:parts[0]}s.targetDirHandle=null;s.targetFolderName=folder;s.targetFiles=imgs.map(f=>({name:f.name,file:f,relativePath:f.webkitRelativePath||f.name})).sort((a,b)=>a.name.localeCompare(b.name));updateFolderUI();renderSources();renderTargetFiles();setStatus('Attached folder file list: '+folder+' ('+s.targetFiles.length+' image files). Direct write is unavailable in fallback mode; use ZIP export.','ok')}\nfunction clearTargetFolder(){const s=currentSource();if(!s)return;s.targetFolderName='';s.targetFiles=[];s.targetDirHandle=null;updateFolderUI();renderTargetFiles();renderSources()}\nfunction updateFolderUI(){const s=currentSource();const n=els('folderNotice');if(!s){n.textContent='No source sheet selected.';els('writeActiveFolder').disabled=true;return}if(s.targetFolderName){n.innerHTML=`Attached: <b>${s.targetFolderName}</b> \u00b7 ${s.targetFiles.length} image files. Click a filename below to assign it to the selected crop.`;els('writeActiveFolder').disabled=!s.targetDirHandle}else{n.innerHTML='No target folder attached. Attach the folder that already contains the images you are replacing, such as <span class=\"kbd\">decks/actions/images</span>.';els('writeActiveFolder').disabled=true}}\nfunction renderTargetFiles(){const list=els('targetFileList');list.innerHTML='';const s=currentSource();if(!s)return;const q=els('fileFilter').value.toLowerCase().trim();const assigned=new Set((s.crops||[]).map(c=>cleanFile(c.name,c.format)));(s.targetFiles||[]).forEach((f,idx)=>{if(q&&!f.name.toLowerCase().includes(q))return;const div=document.createElement('div');div.className='fileItem '+(assigned.has(f.name)?'used ':'')+(currentCrop()&&cleanFile(currentCrop().name,currentCrop().format)===f.name?'active':'');div.innerHTML=`<strong>${f.name}</strong><small>${assigned.has(f.name)?'assigned':'available'}</small>`;div.onclick=()=>assignFileToCrop(f.name);list.appendChild(div)})}\nfunction assignFileToCrop(name){const c=currentCrop();if(!c){setStatus('Select a crop first, then choose a target filename.','err');return}c.name=name;c.format=/\\.webp$/i.test(name)?'webp':'png';loadInputs();renderCrops();renderTargetFiles();drawStage();setStatus('Assigned crop to '+name,'ok')}\nfunction autoAssignByOrder(){const s=currentSource();if(!s||!s.crops.length||!s.targetFiles.length){setStatus('Need crops and an attached folder with image files first.','err');return}const files=s.targetFiles.map(f=>f.name).filter(n=>/\\.(png|webp)$/i.test(n));const count=Math.min(files.length,s.crops.length);for(let i=0;i<count;i++){s.crops[i].name=files[i];s.crops[i].format=/\\.webp$/i.test(files[i])?'webp':'png'}cropIndex=0;loadInputs();renderCrops();renderTargetFiles();drawStage();setStatus('Auto-assigned '+count+' crops by file order.','ok')}\n\nfunction renderCrops(){const list=els('cropList');list.innerHT - Save active sliced crops into project.assets.sprites.
- Save crop map into project.assets.maps.

const AssetSlicerStudioHost={
  getBridge(){
    return $("#assetSlicerFrame")?.contentWindow?.KGBAssetSlicerBridge||null;
  },

  async saveActiveCrops(){
    const bridge=this.getBridge();
    if(!bridge){
      alert("Asset Slicer is still loading. Try again in a second.");
      return;
    }

    try{
      const assets=await bridge.getActiveSlicedAssets();
      if(!assets.length){
        alert("No crops found on the active source sheet.");
        return;
      }

      assets.forEach(asset=>Studio.addAsset("sprites",asset));
      renderExplorer();
      Studio.renderProps();
      Studio.log("Saved "+assets.length+" sliced crop asset(s) to Studio.");
      alert("Saved "+assets.length+" sliced crop asset(s) to Studio.");
    }catch(e){
      alert("Could not save active crops: "+e.message);
    }
  },

  saveCropMap(){
    const bridge=this.getBridge();
    if(!bridge){
      alert("Asset Slicer is still loading. Try again in a second.");
      return;
    }

    try{
      const map=bridge.getCropMap();
      const sourceCount=(map.sources||[]).length;
      const cropCount=(map.sources||[]).reduce((n,s)=>n+(s.crops||[]).length,0);
      const asset={
        name:"Asset Slicer Crop Map "+new Date().toLocaleTimeString(),
        kind:"asset-slicer-cropmap",
        adapter:"asset-slicer",
        folder:"/slicer",
        tags:["asset-slicer","crop-map"],
        notes:"Saved from the embedded KGB Asset Slicer v0.7 module.",
        map,
        text:JSON.stringify(map,null,2),
        sourceCount,
        cropCount,
        updated:new Date().toISOString()
      };

      Studio.addAsset("maps",asset);
      Studio.log("Saved Asset Slicer crop map with "+cropCount+" crop(s).");
      alert("Saved crop map with "+cropCount+" crop(s).");
    }catch(e){
      alert("Could not save crop map: "+e.message);
    }
  },

  saveWorkspace(){
    const bridge=this.getBridge();
    if(!bridge?.getWorkspace){
      alert("Asset Slicer workspace bridge is still loading. Try again in a second.");
      return;
    }
    try{
      const workspace=bridge.getWorkspace();
      const sourceCount=(workspace.sources||[]).length;
      const cropCount=(workspace.sources||[]).reduce((n,s)=>n+(s.crops||[]).length,0);
      const asset={
        name:"Asset Slicer Workspace "+new Date().toLocaleTimeString(),
        kind:"asset-slicer-workspace",
        adapter:"asset-slicer",
        folder:"/slicer",
        tags:["asset-slicer","workspace"],
        notes:"Full Asset Slicer workspace saved from Studio, including source sheet image data.",
        workspace,
        map:{meta:{tool:"KGB Asset Slicer",version:"0.7-studio-workspace"},sources:(workspace.sources||[]).map(s=>({id:s.id,fileName:s.fileName,width:s.width,height:s.height,targetFolderName:s.targetFolderName||"",targetFiles:s.targetFiles||[],crops:s.crops||[]}))},
        text:JSON.stringify(workspace,null,2),
        sourceCount,
        cropCount,
        updated:new Date().toISOString()
      };
      Studio.addAsset("maps",asset);
      renderExplorer();
      Studio.renderProps();
      Studio.log("Saved Asset Slicer workspace with "+cropCount+" crop(s).");
      alert("Saved slicer workspace with "+cropCount+" crop(s).");
    }catch(e){
      alert("Could not save slicer workspace: "+e.message);
    }
  },

  async loadWorkspaceAsset(asset){
    const bridge=this.getBridge();
    if(!bridge?.setWorkspace||!asset?.workspace)return false;
    try{
      await bridge.setWorkspace(asset.workspace);
      Studio.log("Loaded Asset Slicer workspace: "+(asset.name||asset.id));
      return true;
    }catch(e){
      alert("Could not load slicer workspace: "+e.message);
      return false;
    }
  },

  loadCropMapAsset(asset){
    const bridge=this.getBridge();
    if(!bridge||!asset?.map)return false;
    try{
      bridge.setCropMap(asset.map);
      Studio.log("Loaded crop map into Asset Slicer: "+(asset.name||asset.id));
      return true;
    }catch(e){
      alert("Could not load crop map: "+e.message);
      return false;
    }
  },

  downloadStandalone(){
    const blob=new Blob([KGB_ASSET_SLICER_HTML],{type:"text/html"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="kgb_asset_slicer_v0_7_standalone.html";
    a.click();
    URL.revokeObjectURL(a.href);
  }
};

const KGB_GIF_FORGE_HTML="<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\" />\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n  <title>KGB GIF Forge \u2014 Studio Integrated</title>\n  <style>\n    :root{\n      --bg:#070a0f;\n      --panel:#0f1720;\n      --panel2:#121d28;\n      --line:#26384a;\n      --text:#e8f4ff;\n      --muted:#94a9ba;\n      --accent:#00f5ff;\n      --accent2:#7c3cff;\n      --danger:#ff3b6b;\n      --good:#9cff7a;\n      --shadow:0 0 22px rgba(0,245,255,.13);\n    }\n    *{box-sizing:border-box}\n    body{\n      margin:0;\n      font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,\"Segoe UI\",sans-serif;\n      background:\n        radial-gradient(circle at top left, rgba(0,245,255,.14), transparent 32vw),\n        radial-gradient(circle at bottom right, rgba(124,60,255,.16), transparent 36vw),\n        var(--bg);\n      color:var(--text);\n      min-height:100vh;\n    }\n    .wrap{max-width:1180px;margin:0 auto;padding:22px}\n    header{\n      border:1px solid var(--line);\n      background:linear-gradient(135deg,rgba(15,23,32,.94),rgba(8,12,18,.94));\n      border-radius:20px;\n      padding:22px;\n      box-shadow:var(--shadow);\n      margin-bottom:18px;\n    }\n    h1{margin:0 0 8px;font-size:clamp(28px,5vw,50px);letter-spacing:.04em;text-transform:uppercase}\n    .subtitle{color:var(--muted);max-width:820px;line-height:1.55}\n    .grid{display:grid;grid-template-columns:1fr 360px;gap:18px}\n    @media(max-width:900px){.grid{grid-template-columns:1fr}.side{order:-1}}\n    .card{\n      border:1px solid var(--line);\n      background:rgba(15,23,32,.9);\n      border-radius:18px;\n      padding:16px;\n      box-shadow:var(--shadow);\n    }\n    .drop{\n      border:2px dashed rgba(0,245,255,.45);\n      border-radius:18px;\n      padding:24px;\n      text-align:center;\n      background:rgba(0,245,255,.04);\n      cursor:pointer;\n      transition:.18s ease;\n      margin-bottom:14px;\n    }\n    .drop:hover,.drop.drag{background:rgba(0,245,255,.1);border-color:var(--accent)}\n    .drop strong{display:block;font-size:20px;margin-bottom:6px}\n    .drop span{color:var(--muted);font-size:14px}\n    input[type=file]{display:none}\n    .frames{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;min-height:160px}\n    .frame{\n      border:1px solid var(--line);\n      background:var(--panel2);\n      border-radius:14px;\n      overflow:hidden;\n      position:relative;\n    }\n    .frame.dragging{opacity:.45;outline:2px solid var(--accent)}\n    .thumb{\n      width:100%;aspect-ratio:4/5;object-fit:cover;display:block;background:#05070a;\n    }\n    .framebar{display:flex;align-items:center;gap:6px;padding:8px;font-size:12px;color:var(--muted)}\n    .framebar b{color:var(--text);margin-right:auto}\n    button,.btn{\n      border:1px solid rgba(0,245,255,.4);\n      background:linear-gradient(135deg,rgba(0,245,255,.13),rgba(124,60,255,.12));\n      color:var(--text);\n      padding:10px 12px;\n      border-radius:12px;\n      cursor:pointer;\n      font-weight:700;\n      letter-spacing:.02em;\n      transition:.15s ease;\n      text-decoration:none;\n      display:inline-flex;\n      justify-content:center;\n      align-items:center;\n      gap:8px;\n    }\n    button:hover,.btn:hover{transform:translateY(-1px);border-color:var(--accent);box-shadow:0 0 18px rgba(0,245,255,.18)}\n    button:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none}\n    .tiny{padding:6px 8px;border-radius:9px;font-size:12px}\n    .remove{border-color:rgba(255,59,107,.45);background:rgba(255,59,107,.1)}\n    .controls{display:grid;gap:13px}\n    label{display:block;color:var(--muted);font-size:13px;margin-bottom:6px}\n    input[type=number],select{\n      width:100%;padding:10px 11px;border-radius:12px;border:1px solid var(--line);\n      background:#070c12;color:var(--text);outline:none;\n    }\n    input[type=range]{width:100%}\n    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}\n    .check{display:flex;align-items:center;gap:10px;color:var(--text);font-weight:650}\n    .check input{width:18px;height:18px}\n    canvas{width:100%;background:#030507;border-radius:14px;border:1px solid var(--line);display:block}\n    .status{font-size:13px;color:var(--muted);line-height:1.45;min-height:38px}\n    .progress{height:10px;background:#05080c;border:1px solid var(--line);border-radius:999px;overflow:hidden}\n    .bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.12s linear}\n    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}\n    .download{grid-column:1/-1;border-color:rgba(156,255,122,.5);background:rgba(156,255,122,.1)}\n    .note{font-size:12px;color:var(--muted);line-height:1.45;border-top:1px solid var(--line);padding-top:12px}\n    .empty{color:var(--muted);text-align:center;padding:32px;border:1px dashed var(--line);border-radius:14px;grid-column:1/-1}\n  </style>\n</head>\n<body>\n  <div class=\"wrap\">\n    <header>\n      <h1>KGB GIF Forge <span style=\"color:var(--accent);font-size:.45em\">Studio</span></h1>\n      <div class=\"subtitle\">Drop still images, reorder frames, preview the motion, and export an animated GIF. Built as a lightweight browser-native utility for GitHub Pages / local use.</div>\n    </header>\n\n    <div class=\"grid\">\n      <main class=\"card\">\n        <div id=\"drop\" class=\"drop\">\n          <strong>Drop frames here</strong>\n          <span>PNG, JPG, WEBP, GIF stills. Or tap/click to select multiple images.</span>\n          <input id=\"fileInput\" type=\"file\" accept=\"image/*\" multiple />\n        </div>\n        <div id=\"frames\" class=\"frames\">\n          <div class=\"empty\">No frames loaded yet.</div>\n        </div>\n      </main>\n\n      <aside class=\"side card\">\n        <div class=\"controls\">\n          <canvas id=\"preview\" width=\"540\" height=\"675\"></canvas>\n\n          <div class=\"row\">\n            <div>\n              <label for=\"delay\">Frame delay, ms</label>\n              <input id=\"delay\" type=\"number\" min=\"20\" max=\"2000\" step=\"10\" value=\"150\" />\n            </div>\n            <div>\n              <label for=\"width\">Output width</label>\n              <input id=\"width\" type=\"number\" min=\"120\" max=\"1600\" step=\"10\" value=\"540\" />\n            </div>\n          </div>\n\n          <div class=\"row\">\n            <div>\n              <label for=\"fit\">Frame fit</label>\n              <select id=\"fit\">\n                <option value=\"contain\">Contain, no crop</option>\n                <option value=\"cover\">Cover, crop edges</option>\n              </select>\n            </div>\n            <div>\n              <label for=\"quality\">GIF quality</label>\n              <select id=\"quality\">\n                <option value=\"10\">High</option>\n                <option value=\"15\" selected>Balanced</option>\n                <option value=\"25\">Smaller file</option>\n              </select>\n            </div>\n          </div>\n\n          <label class=\"check\"><input id=\"pingpong\" type=\"checkbox\" checked /> Ping-pong loop</label>\n          <label class=\"check\"><input id=\"autoplay\" type=\"checkbox\" checked /> Preview animation</label>\n\n          <div class=\"actions\">\n            <button id=\"reverseBtn\">Reverse</button>\n            <button id=\"clearBtn\">Clear</button>\n            <button id=\"exportBtn\" class=\"download\">Export GIF</button>\n          </div>\n\n          <div class=\"progress\"><div id=\"bar\" class=\"bar\"></div></div>\n          <div id=\"status\" class=\"status\">Ready. Add frames to begin.</div>\n          <a id=\"download\" class=\"btn download\" style=\"display:none\" download=\"kgb-forged.gif\">Download GIF</a>\n\n          <div class=\"note\">\n            GIF export uses the tiny client-side <strong>gif.js</strong> encoder from CDN. For fully offline use, download <code>gif.js</code> and <code>gif.worker.js</code> into your repo and update the two URLs in this file.\n          </div>\n        </div>\n      </aside>\n    </div>\n  </div>\n\n  <script src=\"https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js\"><\/script>\n  <script>\n    const fileInput = document.getElementById('fileInput');\n    const drop = document.getElementById('drop');\n    const framesEl = document.getElementById('frames');\n    const canvas = document.getElementById('preview');\n    const ctx = canvas.getContext('2d');\n    const delayEl = document.getElementById('delay');\n    const widthEl = document.getElementById('width');\n    const fitEl = document.getElementById('fit');\n    const qualityEl = document.getElementById('quality');\n    const pingpongEl = document.getElementById('pingpong');\n    const autoplayEl = document.getElementById('autoplay');\n    const statusEl = document.getElementById('status');\n    const barEl = document.getElementById('bar');\n    const downloadEl = document.getElementById('download');\n    const exportBtn = document.getElementById('exportBtn');\n    const reverseBtn = document.getElementById('reverseBtn');\n    const clearBtn = document.getElementById('clearBtn');\n\n    let frames = [];\n    let previewIndex = 0;\n    let lastTick = 0;\n    let dragIndex = null;\n    let lastGifBlob = null;\n\n    function setStatus(msg){ statusEl.textContent = msg; }\n\n    function loadFiles(fileList){\n      const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));\n      if(!files.length) return;\n      setStatus(`Loading ${files.length} frame(s)...`);\n      let loaded = 0;\n      files.forEach(file => {\n        const url = URL.createObjectURL(file);\n        const img = new Image();\n        img.onload = () => {\n          frames.push({ file, url, img, name:file.name });\n          loaded++;\n          if(loaded === files.length){\n            renderFrames();\n            drawPreview();\n            setStatus(`${frames.length} frame(s) loaded. Drag frames to reorder, then export.`);\n          }\n        };\n        img.onerror = () => {\n          loaded++;\n          URL.revokeObjectURL(url);\n          if(loaded === files.length) renderFrames();\n        };\n        img.src = url;\n      });\n    }\n\n    function renderFrames(){\n      framesEl.innerHTML = '';\n      if(!frames.length){\n        framesEl.innerHTML = '<div class=\"empty\">No frames loaded yet.</div>';\n        return;\n      }\n      frames.forEach((fr, i) => {\n        const el = document.createElement('div');\n        el.className = 'frame';\n        el.draggable = true;\n        el.dataset.index = i;\n        el.innerHTML = `\n          <img class=\"thumb\" src=\"${fr.url}\" alt=\"Frame ${i+1}\">\n          <div class=\"framebar\">\n            <b>#${i+1}</b>\n            <button class=\"tiny\" data-action=\"up\">\u2191</button>\n            <button class=\"tiny\" data-action=\"down\">\u2193</button>\n            <button class=\"tiny remove\" data-action=\"remove\">\u00d7</button>\n          </div>\n        `;\n        el.addEventListener('dragstart', () => { dragIndex = i; el.classList.add('dragging'); });\n        el.addEventListener('dragend', () => { dragIndex = null; el.classList.remove('dragging'); });\n        el.addEventListener('dragover', e => e.preventDefault());\n        el.addEventListener('drop', e => {\n          e.preventDefault();\n          const to = i;\n          if(dragIndex === null || dragIndex === to) return;\n          const [moved] = frames.splice(dragIndex, 1);\n          frames.splice(to, 0, moved);\n          renderFrames();\n        });\n        el.querySelectorAll('button').forEach(btn => {\n          btn.addEventListener('click', () => frameAction(i, btn.dataset.action));\n        });\n        framesEl.appendChild(el);\n      });\n    }\n\n    function frameAction(i, action){\n      if(action === 'remove'){\n        URL.revokeObjectURL(frames[i].url);\n        frames.splice(i,1);\n      }\n      if(action === 'up' && i > 0){\n        [frames[i-1], frames[i]] = [frames[i], frames[i-1]];\n      }\n      if(action === 'down' && i < frames.length-1){\n        [frames[i+1], frames[i]] = [frames[i], frames[i+1]];\n      }\n      renderFrames();\n      drawPreview();\n    }\n\n    function getSequence(){\n      if(!pingpongEl.checked || frames.length < 3) return frames;\n      return frames.concat(frames.slice(1,-1).reverse());\n    }\n\n    function computeOutputSize(){\n      const first = frames[0]?.img;\n      const targetW = Math.max(120, Math.min(1600, parseInt(widthEl.value || '540', 10)));\n      if(!first) return {w:targetW,h:Math.round(targetW*1.25)};\n      return {w:targetW, h:Math.round(first.naturalHeight * targetW / first.naturalWidth)};\n    }\n\n    function drawImageFit(context, img, w, h, fit){\n      context.fillStyle = '#030507';\n      context.fillRect(0,0,w,h);\n      const iw = img.naturalWidth, ih = img.naturalHeight;\n      const scale = fit === 'cover' ? Math.max(w/iw, h/ih) : Math.min(w/iw, h/ih);\n      const nw = iw*scale, nh = ih*scale;\n      const x = (w-nw)/2, y = (h-nh)/2;\n      context.drawImage(img, x, y, nw, nh);\n    }\n\n    function drawPreview(){\n      if(!frames.length){\n        ctx.fillStyle = '#030507'; ctx.fillRect(0,0,canvas.width,canvas.height);\n        ctx.fillStyle = '#94a9ba'; ctx.font = '18px system-ui'; ctx.textAlign = 'center';\n        ctx.fillText('Drop images to preview GIF', canvas.width/2, canvas.height/2);\n        return;\n      }\n      const seq = getSequence();\n      const fr = seq[previewIndex % seq.length];\n      drawImageFit(ctx, fr.img, canvas.width, canvas.height, fitEl.value);\n    }\n\n    function tick(ts){\n      const delay = Math.max(20, parseInt(delayEl.value || '150', 10));\n      if(autoplayEl.checked && frames.length){\n        if(ts - lastTick > delay){\n          previewIndex = (previewIndex + 1) % getSequence().length;\n          drawPreview();\n          lastTick = ts;\n        }\n      }\n      requestAnimationFrame(tick);\n    }\n    requestAnimationFrame(tick);\n\n\n    function makeGifWorkerScript(){\n      // gif.js workers must usually be same-origin. Because this Forge runs\n      // inside iframe.srcdoc, a raw cross-origin workerScript can hang on mobile.\n      // This Blob worker is same-origin to the current document and imports the\n      // CDN worker script from inside the worker context.\n      try{\n        const workerBody = \"importScripts('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');\";\n        return URL.createObjectURL(new Blob([workerBody],{type:'application/javascript'}));\n      }catch(e){\n        return 'https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js';\n      }\n    }\n\n    async function exportGif(){\n      if(!frames.length){ setStatus('Add at least one image frame first.'); return; }\n      if(typeof GIF === 'undefined'){\n        setStatus('GIF encoder did not load. Check internet/CDN or vendor gif.js locally.');\n        return;\n      }\n      exportBtn.disabled = true;\n      downloadEl.style.display = 'none';\n      lastGifBlob = null;\n      barEl.style.width = '0%';\n\n      const {w,h} = computeOutputSize();\n      const work = document.createElement('canvas');\n      work.width = w; work.height = h;\n      const wctx = work.getContext('2d');\n      const sequence = getSequence();\n      const delay = Math.max(20, parseInt(delayEl.value || '150', 10));\n      const quality = parseInt(qualityEl.value || '15', 10);\n\n      const workerScriptUrl = makeGifWorkerScript();\n      const gif = new GIF({\n        workers: 1,\n        quality,\n        width: w,\n        height: h,\n        workerScript: workerScriptUrl\n      });\n\n      let sawProgress = false;\n      let finished = false;\n      const watchdog = setTimeout(() => {\n        if(!sawProgress && !finished){\n          setStatus('GIF encoder appears stuck. Try lower Output width, fewer frames, or use Save Frame Animation in Studio.');\n          exportBtn.disabled = false;\n        }\n      }, 12000);\n\n      setStatus(`Encoding ${sequence.length} frame(s) at ${w}\u00d7${h}...`);\n      for(const fr of sequence){\n        drawImageFit(wctx, fr.img, w, h, fitEl.value);\n        gif.addFrame(work, {copy:true, delay});\n      }\n\n      gif.on('progress', p => {\n        sawProgress = true;\n        barEl.style.width = `${Math.round(p*100)}%`;\n        setStatus(`Encoding GIF... ${Math.round(p*100)}%`);\n      });\n      gif.on('finished', blob => {\n        finished = true;\n        clearTimeout(watchdog);\n        try{ if(workerScriptUrl && workerScriptUrl.startsWith('blob:')) URL.revokeObjectURL(workerScriptUrl); }catch(e){}\n        lastGifBlob = blob;\n        const url = URL.createObjectURL(blob);\n        downloadEl.href = url;\n        downloadEl.style.display = 'flex';\n        downloadEl.textContent = `Download GIF (${(blob.size/1024/1024).toFixed(2)} MB)`;\n        setStatus('GIF forged. Download link is ready.');\n        barEl.style.width = '100%';\n        exportBtn.disabled = false;\n      });\n      gif.render();\n    }\n\n    drop.addEventListener('click', () => fileInput.click());\n    fileInput.addEventListener('change', e => loadFiles(e.target.files));\n    ['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => {e.preventDefault(); drop.classList.add('drag');}));\n    ['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => {e.preventDefault(); drop.classList.remove('drag');}));\n    drop.addEventListener('drop', e => loadFiles(e.dataTransfer.files));\n\n    exportBtn.addEventListener('click', exportGif);\n    reverseBtn.addEventListener('click', () => { frames.reverse(); renderFrames(); drawPreview(); });\n    clearBtn.addEventListener('click', () => {\n      frames.forEach(fr => URL.revokeObjectURL(fr.url));\n      frames = [];\n      previewIndex = 0;\n      renderFrames();\n      drawPreview();\n      downloadEl.style.display = 'none';\n      barEl.style.width = '0%';\n      setStatus('Cleared. Add new frames to begin.');\n    });\n    [delayEl,widthEl,fitEl,pingpongEl].forEach(el => el.addEventListener('input', drawPreview));\n\n    /*\n      KGB Studio Bridge\n      -----------------\n      Keeps the standalone GIF Forge intact while allowing Studio to:\n      - save/load GIF Forge projects\n      - load Studio image assets as frames\n      - save the last exported GIF as a Studio animation asset\n    */\n    function blobToDataUrl(blob){\n      return new Promise((resolve,reject)=>{\n        const reader = new FileReader();\n        reader.onerror = () => reject(reader.error || new Error('Could not read blob.'));\n        reader.onload = () => resolve(reader.result);\n        reader.readAsDataURL(blob);\n      });\n    }\n\n    function imageToDataUrl(img){\n      const cv = document.createElement('canvas');\n      cv.width = img.naturalWidth || img.width || 1;\n      cv.height = img.naturalHeight || img.height || 1;\n      const cx = cv.getContext('2d');\n      cx.drawImage(img,0,0,cv.width,cv.height);\n      return cv.toDataURL('image/png');\n    }\n\n    function dataUrlToFrame(dataUrl,name){\n      return new Promise((resolve,reject)=>{\n        const img = new Image();\n        img.onload = () => resolve({file:null,url:dataUrl,img,name:name||'frame.png',dataUrl});\n        img.onerror = () => reject(new Error('Could not load frame: '+(name||'frame')));\n        img.src = dataUrl;\n      });\n    }\n\n    function getProjectSync(){\n      const projectFrames = frames.map((fr,i)=>({\n        name:fr.name || ('frame_'+String(i+1).padStart(2,'0')+'.png'),\n        dataUrl: fr.dataUrl || imageToDataUrl(fr.img),\n        width: fr.img?.naturalWidth||0,\n        height: fr.img?.naturalHeight||0\n      }));\n\n      return {\n        tool:'KGB GIF Forge',\n        version:'studio-integrated',\n        savedAt:new Date().toISOString(),\n        settings:{\n          delay:+delayEl.value||150,\n          width:+widthEl.value||540,\n          fit:fitEl.value||'contain',\n          quality:+qualityEl.value||15,\n          pingpong:!!pingpongEl.checked,\n          autoplay:!!autoplayEl.checked\n        },\n        frames:projectFrames\n      };\n    }\n\n    window.KGBGifForgeBridge={\n      getFramesSummary(){\n        return frames.map((fr,i)=>({\n          index:i,\n          name:fr.name,\n          width:fr.img?.naturalWidth||0,\n          height:fr.img?.naturalHeight||0\n        }));\n      },\n\n      getProjectSync,\n\n      async getProject(){\n        return getProjectSync();\n      },\n\n      async setProject(project){\n        const p = project || {};\n        const s = p.settings || {};\n        delayEl.value = s.delay ?? 150;\n        widthEl.value = s.width ?? 540;\n        fitEl.value = s.fit || 'contain';\n        qualityEl.value = s.quality ?? 15;\n        pingpongEl.checked = s.pingpong ?? true;\n        autoplayEl.checked = s.autoplay ?? true;\n\n        frames.forEach(fr => {\n          if(fr.url && !String(fr.url).startsWith('data:')) URL.revokeObjectURL(fr.url);\n        });\n        frames = [];\n        previewIndex = 0;\n        lastGifBlob = null;\n        downloadEl.style.display = 'none';\n        barEl.style.width = '0%';\n\n        for(const fr of (p.frames||[])){\n          if(fr.dataUrl) frames.push(await dataUrlToFrame(fr.dataUrl,fr.name));\n        }\n\n        renderFrames();\n        drawPreview();\n        setStatus('Loaded GIF Forge project from Studio with '+frames.length+' frame(s).');\n      },\n\n      async appendFrames(frameList){\n        for(const fr of (frameList||[])){\n          if(fr.dataUrl) frames.push(await dataUrlToFrame(fr.dataUrl,fr.name));\n        }\n        renderFrames();\n        drawPreview();\n        setStatus('Loaded '+(frameList||[]).length+' Studio image asset(s) as GIF frame(s).');\n      },\n\n      async getFrameAnimationAsset(){\n        const project = getProjectSync();\n        if(!project.frames.length) throw new Error('No frames loaded. Add frames or load Studio images first.');\n\n        const width = Math.max(120, Math.min(1600, parseInt(widthEl.value || '540', 10)));\n        const first = frames[0]?.img;\n        const height = first ? Math.round(first.naturalHeight * width / first.naturalWidth) : Math.round(width*1.25);\n\n        return {\n          name:'GIF Forge Frame Animation '+new Date().toLocaleTimeString(),\n          kind:'gif-frame-animation',\n          adapter:'gif-forge',\n          source:'gif-forge',\n          folder:'/gif-forge',\n          tags:['animation','frames','gif-forge'],\n          notes:'Frame-sequence animation saved by KGB GIF Forge without GIF encoding.',\n          mime:'application/vnd.kgb.frame-animation+json',\n          extension:'json',\n          width,\n          height,\n          frameCount:getSequence().length,\n          delay:+delayEl.value||150,\n          pingpong:!!pingpongEl.checked,\n          quality:+qualityEl.value||15,\n          project,\n          previewDataUrl:project.frames[0]?.dataUrl||null,\n          importedAt:new Date().toISOString()\n        };\n      },\n\n      async getLastGifAsset(){\n        if(!lastGifBlob) throw new Error('No GIF has been exported yet. Click Export GIF first, then save it to Studio.');\n\n        const dataUrl = await blobToDataUrl(lastGifBlob);\n        const project = getProjectSync();\n        const width = Math.max(120, Math.min(1600, parseInt(widthEl.value || '540', 10)));\n        const first = frames[0]?.img;\n        const height = first ? Math.round(first.naturalHeight * width / first.naturalWidth) : Math.round(width*1.25);\n\n        return {\n          name:'GIF Forge Animation '+new Date().toLocaleTimeString(),\n          kind:'gif-animation',\n          adapter:'gif-forge',\n          source:'gif-forge',\n          folder:'/gif-forge',\n          tags:['gif','animation','gif-forge'],\n          notes:'Generated by KGB GIF Forge inside KGB Studio.',\n          mime:'image/gif',\n          extension:'gif',\n          size:lastGifBlob.size||0,\n          width,\n          height,\n          frameCount:getSequence().length,\n          delay:+delayEl.value||150,\n          pingpong:!!pingpongEl.checked,\n          quality:+qualityEl.value||15,\n          dataUrl,\n          previewDataUrl:dataUrl,\n          project,\n          importedAt:new Date().toISOString()\n        };\n      }\n    };\n    try{window.parent&&window.parent.postMessage({type:'KGB_GIF_FORGE_READY'},\"*\")}catch(e){}\n\n    drawPreview();\n  <\/script>\n</body>\n</html>\n";


/*
-------------------------------------------------------------------------------
ASSETS → GIF FORGE

The standalone KGB GIF Forge is hosted in an iframe to preserve its working
browser-native behavior.

Studio-side bridge:
- Save GIF Forge projects into project.assets.animations.
- Save the last generated GIF into project.assets.animations.
- Reopen GIF Forge project assets into the embedded forge.
-------------------------------------------------------------------------------
*/
const GifForgeStudioHost={
  getBridge(){
    return $("#gifForgeFrame")?.contentWindow?.KGBGifForgeBridge||null;
  },

  async saveProject(){
    const bridge=this.getBridge();
    if(!bridge){
      alert("GIF Forge is still loading. Try again in a second.");
      return;
    }

    try{
      const project=await bridge.getProject();
      const frameCount=(project.frames||[]).length;
      const asset={
        name:"GIF Forge Project "+new Date().toLocaleTimeString(),
        kind:"gif-forge-project",
        adapter:"gif-forge",
        source:"gif-forge",
        folder:"/gif-forge",
        tags:["gif","gif-forge","animation-project"],
        notes:"Saved from the embedded KGB GIF Forge module.",
        project,
        frameCount,
        settings:project.settings||{},
        updated:new Date().toISOString()
      };

      Studio.addAsset("animations",asset);
      renderExplorer();
      Studio.renderProps();
      Studio.log("Saved GIF Forge project with "+frameCount+" frame(s).");
      alert("Saved GIF Forge project with "+frameCount+" frame(s).");
    }catch(e){
      alert("Could not save GIF Forge project: "+e.message);
    }
  },

  async saveFrameAnimation(){
    const bridge=this.getBridge();
    if(!bridge){
      alert("GIF Forge is still loading. Try again in a second.");
      return;
    }

    try{
      const asset=await bridge.getFrameAnimationAsset();
      Studio.addAsset("animations",asset);
      renderExplorer();
      Studio.renderProps();
      Studio.log("Saved frame animation to Studio: "+asset.name);
      alert("Saved frame animation to Studio. This does not require GIF encoding.");
    }catch(e){
      alert("Could not save frame animation: "+e.message);
    }
  },

  async saveLastGif(){
    const bridge=this.getBridge();
    if(!bridge){
      alert("GIF Forge is still loading. Try again in a second.");
      return;
    }

    try{
      const asset=await bridge.getLastGifAsset();

      // Large GIF data URLs can make the Intelligence panel expensive to render.
      // Save quietly, refresh the Explorer, and leave the current panel alone.
      History.snapshot("add gif animation");
      asset.id ||= uid("animations");
      asset.created ||= new Date().toISOString();
      asset.updated=new Date().toISOString();
      Studio.state.project.assets.animations.push(asset);
      Studio.sync();
      renderExplorer();

      Studio.log("Saved generated GIF to Studio: "+asset.name);
      alert("Saved generated GIF to Studio. It is in Asset Library → animations.");
    }catch(e){
      alert("Could not save GIF to Studio: "+e.message);
    }
  },

  async loadProjectAsset(asset){
    const bridge=this.getBridge();
    if(!bridge||!asset?.project)return false;

    try{
      await bridge.setProject(asset.project);
      Studio.log("Loaded GIF Forge project: "+(asset.name||asset.id));
      return true;
    }catch(e){
      alert("Could not load GIF Forge project: "+e.message);
      return false;
    }
  },

  imageAssets(){
    return Object.entries(Studio.state.project.assets||{}).flatMap(([bucket,items])=>
      (items||[]).filter(a=>a.dataUrl&&String(a.mime||"").startsWith("image/")).map(asset=>({bucket,asset}))
    );
  },

  renderStudioImagePanel(){
    const panel=$("#gifStudioImagePanel");
    if(!panel)return;
    const rows=this.imageAssets();
    panel.innerHTML=
      '<div class="row">'+
        '<button class="primary" id="gifLoadSelectedImages">Load Selected as Frames</button>'+
        '<button id="gifAppendSelectedImages">Append Selected</button>'+
        '<button id="gifSelectAllImages">Select All</button>'+
        '<button id="gifClearImageSelect">Clear</button>'+
      '</div>'+
      '<div class="studioImageList">'+
      (rows.length?rows.map((row,i)=>'<label class="studioImageItem"><input type="checkbox" data-gif-img-index="'+i+'"><img src="'+row.asset.dataUrl+'"><span><b>'+esc(row.asset.name||row.asset.id)+'</b><br><span class="muted">'+esc(row.bucket)+' • '+esc(row.asset.kind||"image")+'</span></span></label>').join(""):'<p class="muted">No Studio image assets found yet. Slice/import images first.</p>')+
      '</div>';

    $("#gifSelectAllImages").onclick=()=>panel.querySelectorAll("[data-gif-img-index]").forEach(x=>x.checked=true);
    $("#gifClearImageSelect").onclick=()=>panel.querySelectorAll("[data-gif-img-index]").forEach(x=>x.checked=false);
    $("#gifLoadSelectedImages").onclick=()=>this.loadSelectedImages(false);
    $("#gifAppendSelectedImages").onclick=()=>this.loadSelectedImages(true);
  },

  selectedImageFrames(){
    const rows=this.imageAssets();
    return [...document.querySelectorAll("#gifStudioImagePanel [data-gif-img-index]:checked")].map(cb=>{
      const row=rows[+cb.dataset.gifImgIndex];
      const a=row?.asset;
      return a?{name:a.name||a.originalFileName||"studio_image.png",dataUrl:a.dataUrl}:null;
    }).filter(Boolean);
  },

  async loadSelectedImages(append=false){
    const bridge=this.getBridge();
    if(!bridge){
      alert("GIF Forge is still loading. Try again in a second.");
      return;
    }

    const selected=this.selectedImageFrames();
    if(!selected.length){
      alert("Select one or more Studio image assets first.");
      return;
    }

    try{
      if(append&&bridge.appendFrames){
        await bridge.appendFrames(selected);
      }else{
        const existing=await bridge.getProject();
        await bridge.setProject({...existing,frames:selected});
      }
      globalThis.KGBWorkspaceCache?.capture?.();
      Studio.log((append?"Appended ":"Loaded ")+selected.length+" Studio image asset(s) into GIF Forge.");
    }catch(e){
      alert("Could not load Studio images into GIF Forge: "+e.message);
    }
  },

  downloadStandalone(){
    const blob=new Blob([KGB_GIF_FORGE_HTML],{type:"text/html"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download="kgb_gif_forge_standalone.html";
    a.click();
    URL.revokeObjectURL(a.href);
  }
};

Studio.register({
  id:"asset.gifforge",
  section:"ASSETS",
  title:"GIF Forge",
  description:"Embedded KGB GIF Forge for creating animated GIF assets from image frames.",
  render(root,studio,opt){
    root.innerHTML=
      '<div class="gifHost">'+
        '<div class="card">'+
          '<div class="row gifToolbar">'+
            '<button class="primary" id="saveGifProject">Save GIF Forge Project to Studio</button>'+
            '<button id="saveLastGifAsset">Save Last GIF to Studio</button>'+
            '<button id="saveFrameAnimationAsset">Save Frame Animation to Studio</button>'+
            '<button id="toggleGifStudioImages">Load Studio Images</button>'+
            '<button id="downloadGifStandalone">Download Standalone GIF Forge</button>'+
            '<button id="focusGifWorkspace">Focus Workspace</button>'+
            '<button id="openGifLibrary">Asset Library</button>'+
            '<span class="muted">Add frames, then either export a real GIF or save a frame animation directly to Studio without GIF encoding.</span>'+
          '</div>'+
          '<div id="gifStudioImagePanel" class="studioImagePanel" style="display:none"></div>'+
        '</div>'+
        '<iframe id="gifForgeFrame" class="gifFrame" title="KGB GIF Forge"></iframe>'+
      '</div>';

    const frame=$("#gifForgeFrame");
    frame.srcdoc=KGB_GIF_FORGE_HTML;

    $("#saveGifProject").onclick=()=>GifForgeStudioHost.saveProject();
    $("#saveLastGifAsset").onclick=()=>GifForgeStudioHost.saveLastGif();
    $("#saveFrameAnimationAsset").onclick=()=>GifForgeStudioHost.saveFrameAnimation();
    $("#toggleGifStudioImages").onclick=()=>{const p=$("#gifStudioImagePanel");p.style.display=p.style.display==="none"?"block":"none";GifForgeStudioHost.renderStudioImagePanel();};
    $("#downloadGifStandalone").onclick=()=>GifForgeStudioHost.downloadStandalone();
    $("#focusGifWorkspace").onclick=()=>LayoutControls.toggleFocus();
    $("#openGifLibrary").onclick=()=>Studio.open("asset.library");

    frame.onload=()=>{
      GifForgeStudioHost.renderStudioImagePanel();
      if(opt?.asset?.kind==="gif-forge-project"&&opt.asset.project){
        setTimeout(()=>GifForgeStudioHost.loadProjectAsset(opt.asset),120);
      }else if(globalThis.KGBWorkspaceCache?.gif){
        setTimeout(()=>GifForgeStudioHost.loadProjectAsset({project:globalThis.KGBWorkspaceCache.gif,name:"In-session GIF Forge Project"}),120);
      }
    };
  },
  actions(root){
    root.innerHTML='<button class="primary" onclick="GifForgeStudioHost.saveProject()">Save Project</button><button onclick="GifForgeStudioHost.saveFrameAnimation()">Save Frames</button><button onclick="GifForgeStudioHost.saveLastGif()">Save GIF</button><button onclick="LayoutControls.toggleFocus()">Focus</button>';
  },
  properties(panel){
    panel.innerHTML='<div class="muted">GIF Forge runs as a standalone module inside Studio. Export a GIF first, then use Save Last GIF to Studio.</div>';
  }
});


const KGB_TAIO_HTML="<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\" />\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\" />\n<title>KGB TAIO Tool Suite \u2014 Studio Integrated</title>\n<style>\n:root{\n  --bg:#02080a;--panel:#061316;--panel2:#0a1d22;--line:#12363d;--text:#dffcff;--muted:#8fb8bf;\n  --cyan:#00eaff;--green:#7dff00;--mag:#ff2bd6;--amber:#ffb000;--red:#ff3b6b;--blue:#2b7cff;\n  --shadow:0 0 24px rgba(0,234,255,.22),0 0 42px rgba(125,255,0,.10)\n}\n*{box-sizing:border-box}html,body{height:100%;margin:0;background:radial-gradient(circle at 30% 0%,#0b2528 0,#02080a 42%,#000 100%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}button,input,select,textarea{font:inherit}button{border:1px solid #1f5963;border-radius:14px;background:linear-gradient(180deg,#0d3640,#071b20);color:var(--text);padding:10px 13px;font-weight:800;cursor:pointer;box-shadow:inset 0 0 0 1px rgba(255,255,255,.03)}button:hover{border-color:var(--cyan);box-shadow:0 0 18px rgba(0,234,255,.22)}button.primary{border-color:var(--green);box-shadow:0 0 18px rgba(125,255,0,.20);color:#f3ffe8}.danger{border-color:var(--red);color:#ffdbe4}.ghost{background:#041013}.mini{padding:7px 9px;border-radius:10px;font-size:.88rem}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;background:#02090b;color:var(--text);padding:10px;outline:none}textarea{min-height:180px;resize:vertical;line-height:1.35;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}label{display:block;font-size:.82rem;color:var(--muted);font-weight:750;margin:8px 0 5px}.app{height:100%;display:grid;grid-template-rows:auto 1fr}.top{position:sticky;top:0;z-index:10;border-bottom:1px solid #0e3138;background:rgba(2,8,10,.92);backdrop-filter:blur(10px);padding:12px 14px}.brand{display:flex;gap:12px;align-items:baseline;flex-wrap:wrap}.brand h1{margin:0;color:var(--green);letter-spacing:.08em;font-size:clamp(1.35rem,4vw,2.2rem);text-shadow:0 0 18px rgba(125,255,0,.35)}.brand span{color:var(--muted);font-weight:700}.topbar{display:grid;grid-template-columns:1fr auto;gap:10px;margin-top:10px;align-items:center}.search{display:flex;gap:8px}.quick{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.layout{min-height:0;display:grid;grid-template-columns:280px 1fr}.nav{border-right:1px solid #0e3138;background:rgba(3,14,16,.78);padding:12px;overflow:auto}.nav h3{font-size:.78rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin:12px 0 8px}.nav button{width:100%;text-align:left;margin:4px 0}.nav button.active{border-color:var(--green);color:#ecffdc;box-shadow:0 0 16px rgba(125,255,0,.20)}.main{min-width:0;overflow:auto;padding:14px}.tool{display:none;max-width:1240px;margin:0 auto}.tool.active{display:block}.card{background:linear-gradient(180deg,rgba(8,31,36,.96),rgba(3,12,15,.96));border:1px solid #12404a;border-radius:22px;padding:14px;box-shadow:var(--shadow);margin-bottom:14px}.card h2{margin:0 0 6px;color:var(--cyan);letter-spacing:.03em}.sub{color:var(--muted);margin:0 0 14px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.row>*{width:auto}.actions{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.out{white-space:pre-wrap;overflow:auto;min-height:140px;border:1px solid var(--line);border-radius:14px;background:#010607;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:5px 9px;color:var(--muted);font-size:.82rem}.ok{color:var(--green)}.bad{color:var(--red)}.warn{color:var(--amber)}.drop{border:1px dashed #1d6874;border-radius:16px;padding:10px;color:var(--muted);text-align:center;margin:8px 0}.drop.drag{border-color:var(--green);color:var(--green)}table{border-collapse:collapse;width:100%;font-size:.9rem}th,td{border:1px solid #12363d;padding:8px;vertical-align:top}th{background:#09252b;color:var(--cyan);position:sticky;top:0}.ins{background:rgba(125,255,0,.12)}.del{background:rgba(255,59,107,.14)}mark{background:rgba(125,255,0,.28);color:#fff;border-radius:4px}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:18px}.modal.open{display:flex}.modal .card{max-width:900px;max-height:86vh;overflow:auto}.toast{position:fixed;right:14px;bottom:14px;background:#061b20;border:1px solid var(--green);border-radius:14px;padding:10px 12px;box-shadow:0 0 24px rgba(125,255,0,.2);display:none;z-index:200}.light{--bg:#f6fbfc;--panel:#fff;--panel2:#f0fafb;--line:#b9d9dd;--text:#072127;--muted:#46636a;background:#f6fbfc;color:var(--text)}.light body{background:#f6fbfc}@media(max-width:850px){.layout{grid-template-columns:1fr}.nav{display:none;border-right:0;border-bottom:1px solid #0e3138;max-height:42vh}.nav.open{display:block}.topbar{grid-template-columns:1fr}.quick{justify-content:flex-start}.grid2,.grid3{grid-template-columns:1fr}.main{padding:10px}.card{border-radius:16px}textarea{min-height:145px}}\n</style>\n</head>\n<body>\n<div class=\"app\">\n<header class=\"top\">\n  <div class=\"brand\"><h1>KGB TAIO <span style=\"color:var(--cyan);font-size:.45em\">Studio</span></h1><span>Tactical All\u2011In\u2011One Operator Toolkit</span></div>\n  <div class=\"topbar\">\n    <div class=\"search\"><input id=\"toolSearch\" placeholder=\"Search tools\u2026 regex, json, diff, hash, csv\" oninput=\"filterTools()\"><button class=\"mini\" onclick=\"toggleNav()\">Tools</button></div>\n    <div class=\"quick\"><button class=\"mini\" onclick=\"showTool('scratch')\">Scratch</button><button class=\"mini\" onclick=\"openHelp()\">Help</button><button class=\"mini\" onclick=\"toggleTheme()\">Theme</button><button class=\"mini danger\" onclick=\"clearActiveTool()\">Clear Tool</button></div>\n  </div>\n</header>\n<div class=\"layout\">\n<nav id=\"nav\" class=\"nav\"></nav>\n<main class=\"main\">\n  <section id=\"regex\" class=\"tool active\" data-name=\"regex extractor tester pattern matches capture\">\n    <div class=\"card\"><h2>Regex Extractor</h2><p class=\"sub\">Test, highlight, extract, save, and reuse patterns. JavaScript regex syntax.</p>\n      <div class=\"grid2\"><div><label>Pattern</label><input id=\"regexPattern\" placeholder=\"e.g. \\b\\d{1,3}(?:\\.\\d{1,3}){3}\\b\"><div class=\"row\"><label><input type=\"checkbox\" id=\"flagG\" checked> global</label><label><input type=\"checkbox\" id=\"flagI\"> ignore case</label><label><input type=\"checkbox\" id=\"flagM\"> multiline</label><label><input type=\"checkbox\" id=\"flagS\"> dotAll</label></div><div class=\"actions\"><button onclick=\"runRegex()\">Run</button><button onclick=\"saveRegex()\">Save Pattern</button><select id=\"regexSaved\" onchange=\"loadRegex()\"><option value=\"\">Saved patterns\u2026</option></select></div></div><div><label>Replace With</label><input id=\"regexReplace\" placeholder=\"optional replacement\"><div class=\"actions\"><button onclick=\"replaceRegex()\">Replace</button><button onclick=\"copyFrom('regexMatches')\">Copy Matches</button></div></div></div>\n      <label>Input Text</label><textarea id=\"regexText\" placeholder=\"Paste text here\"></textarea><div id=\"regexStatus\" class=\"pill\">Ready</div><label>Highlighted Output</label><div id=\"regexHighlighted\" class=\"out\"></div><label>Matches / Groups</label><textarea id=\"regexMatches\" readonly></textarea>\n    </div>\n  </section>\n\n  <section id=\"extract\" class=\"tool\" data-name=\"grep cut awk lines extract unique key value\">\n    <div class=\"card\"><h2>Line Ops: GREP / CUT / AWK</h2><p class=\"sub\">Fast text extraction for logs, configs, command output, and messy blobs.</p><div class=\"grid2\"><div><label>Input</label><textarea id=\"lineInput\"></textarea></div><div><label>Output</label><textarea id=\"lineOutput\" readonly></textarea></div></div><div class=\"grid3\"><div><label>GREP pattern</label><input id=\"grepPattern\"><div class=\"row\"><label><input type=\"checkbox\" id=\"grepCase\"> case sensitive</label><label><input type=\"checkbox\" id=\"grepInvert\"> invert</label></div><button onclick=\"runGrep()\">GREP Lines</button></div><div><label>AWK delimiter</label><input id=\"awkDelimiter\" placeholder=\"default: whitespace\"><label>Fields</label><input id=\"awkFields\" placeholder=\"1,3,5-7\"><button onclick=\"runAwk()\">Extract Fields</button></div><div><label>CUT ranges</label><input id=\"cutRanges\" placeholder=\"1-5,8,10-\"><button onclick=\"runCut()\">Cut Chars</button></div></div><div class=\"actions\"><button onclick=\"sortUniqueLines()\">Sort Unique</button><button onclick=\"countLines()\">Count Lines</button><button onclick=\"copyFrom('lineOutput')\">Copy Output</button></div></div>\n  </section>\n\n  <section id=\"json\" class=\"tool\" data-name=\"json formatter fixer minify filter schema paths flatten\">\n    <div class=\"card\"><h2>JSON Ops</h2><p class=\"sub\">Format, repair common issues, filter, flatten paths, and generate a practical schema.</p><label>JSON / JS-ish Object Input</label><textarea id=\"jsonInput\"></textarea><div class=\"actions\"><button onclick=\"jsonFormat()\">Format</button><button onclick=\"jsonMinify()\">Minify</button><button onclick=\"jsonFix()\">Fix Common Issues</button><button onclick=\"jsonSchema()\">Schema</button><button onclick=\"jsonFlatten()\">Flatten Paths</button><button onclick=\"copyFrom('jsonOutput')\">Copy</button></div><div class=\"grid3\"><div><label>Key regex filter</label><input id=\"jsonKeyFilter\"></div><div><label>Value regex filter</label><input id=\"jsonValFilter\"></div><div><label>&nbsp;</label><button onclick=\"jsonFilter()\">Filter</button></div></div><label>Output</label><textarea id=\"jsonOutput\" readonly></textarea></div>\n  </section>\n\n  <section id=\"convert\" class=\"tool\" data-name=\"convert csv json xml plain markdown html\">\n    <div class=\"card\"><h2>Converters</h2><p class=\"sub\">JSON \u21c4 CSV, JSON \u21c4 XML, plain lines \u21c4 JSON, HTML \u21c4 Markdown.</p><div class=\"grid2\"><div><label>Input</label><textarea id=\"convInput\"></textarea></div><div><label>Output</label><textarea id=\"convOutput\" readonly></textarea></div></div><div class=\"row\"><select id=\"convMode\"><option value=\"jsonToCsv\">JSON \u2192 CSV</option><option value=\"csvToJson\">CSV \u2192 JSON</option><option value=\"jsonToXml\">JSON \u2192 XML</option><option value=\"xmlToJson\">XML \u2192 JSON</option><option value=\"linesToJson\">Lines \u2192 JSON Array</option><option value=\"jsonToLines\">JSON Array \u2192 Lines</option><option value=\"htmlToMd\">HTML \u2192 Markdown</option><option value=\"mdToHtml\">Markdown \u2192 HTML</option></select><button onclick=\"convertData()\">Convert</button><button onclick=\"moveText('convOutput','convInput')\">Output \u2192 Input</button><button onclick=\"copyFrom('convOutput')\">Copy</button></div></div>\n  </section>\n\n  <section id=\"compare\" class=\"tool\" data-name=\"diff compare common data keys values datasets\">\n    <div class=\"card\"><h2>Compare / Diff / Common Data</h2><p class=\"sub\">Line diff plus shared key/value discovery for two datasets.</p><div class=\"grid2\"><div><label>A / Original</label><textarea id=\"diffA\"></textarea></div><div><label>B / Modified</label><textarea id=\"diffB\"></textarea></div></div><div class=\"actions\"><button onclick=\"lineDiff()\">Line Diff</button><button onclick=\"commonData()\">Common Data</button><button onclick=\"copyFrom('diffOutput')\">Copy Output</button></div><label>Output</label><div id=\"diffOutput\" class=\"out\"></div></div>\n  </section>\n\n  <section id=\"viewer\" class=\"tool\" data-name=\"csv markdown viewer table render file\">\n    <div class=\"card\"><h2>File Viewers</h2><p class=\"sub\">Load or paste CSV/Markdown and preview it locally.</p><div class=\"drop\" id=\"fileDrop\">Drop a .csv, .md, .txt, .json, or .log file here</div><input type=\"file\" id=\"fileInput\" onchange=\"loadPickedFile()\"><div class=\"grid2\"><div><label>Input</label><textarea id=\"viewerInput\"></textarea><div class=\"actions\"><button onclick=\"renderCsv()\">Render CSV</button><button onclick=\"renderMarkdown()\">Render Markdown</button></div></div><div><label>Preview</label><div id=\"viewerOutput\" class=\"out\"></div></div></div></div>\n  </section>\n\n  <section id=\"encode\" class=\"tool\" data-name=\"encode decode base64 url html hash sha checksum\">\n    <div class=\"card\"><h2>Encoding + Hashing</h2><p class=\"sub\">Base64, URL, HTML encode/decode and browser-native SHA hashes.</p><div class=\"grid2\"><div><label>Input</label><textarea id=\"encInput\"></textarea></div><div><label>Output</label><textarea id=\"encOutput\" readonly></textarea></div></div><div class=\"row\"><select id=\"encMode\"><option value=\"b64e\">Base64 Encode</option><option value=\"b64d\">Base64 Decode</option><option value=\"urle\">URL Encode</option><option value=\"urld\">URL Decode</option><option value=\"htmle\">HTML Encode</option><option value=\"htmld\">HTML Decode</option></select><button onclick=\"processEnc()\">Process</button><select id=\"hashAlg\"><option>SHA-256</option><option>SHA-1</option><option>SHA-384</option><option>SHA-512</option></select><button onclick=\"hashText()\">Hash Text</button><button onclick=\"copyFrom('encOutput')\">Copy</button></div><label>Hash File</label><input type=\"file\" id=\"hashFile\" onchange=\"hashFile()\"><div id=\"hashStatus\" class=\"pill\">No file selected</div></div>\n  </section>\n\n  <section id=\"http\" class=\"tool\" data-name=\"http get fetch url api headers\">\n    <div class=\"card\"><h2>HTTP GETter</h2><p class=\"sub\">Local browser fetch tool. CORS rules still apply because this is client-side.</p><label>URL</label><input id=\"httpUrl\" placeholder=\"https://example.com/data.json\"><label>Headers JSON optional</label><textarea id=\"httpHeaders\" placeholder='{\"Authorization\":\"Bearer ...\"}'></textarea><div class=\"actions\"><button onclick=\"httpGet()\">GET</button><button onclick=\"copyFrom('httpOutput')\">Copy Response</button></div><textarea id=\"httpOutput\" readonly></textarea></div>\n  </section>\n\n  <section id=\"scratch\" class=\"tool\" data-name=\"scratch notes clipboard workspace\">\n    <div class=\"card\"><h2>Scratch Workspace</h2><p class=\"sub\">A persistent local notes/input staging area. Auto-saves in this browser.</p><textarea id=\"scratchPad\" oninput=\"localStorage.setItem('taioScratch',this.value)\"></textarea><div class=\"actions\"><button onclick=\"copyFrom('scratchPad')\">Copy Scratch</button><button onclick=\"downloadText('taio_scratch.txt',qs('#scratchPad').value)\">Download</button><button class=\"danger\" onclick=\"qs('#scratchPad').value='';localStorage.removeItem('taioScratch')\">Clear Scratch</button></div></div>\n  </section>\n</main>\n</div>\n</div>\n\n<div id=\"helpModal\" class=\"modal\"><div class=\"card\"><h2>KGB TAIO Help</h2><p class=\"sub\">This refresh keeps TAIO as a free, local, single-file browser toolkit. Most tools work fully offline after the page loads. HTTP GET depends on browser CORS.</p><div class=\"out\" style=\"font-family:inherit;line-height:1.5;white-space:normal\">\n<b>Navigation:</b> Use the left tool list or search bar. On mobile, tap <b>Tools</b> to show/hide the tool list.<br><br>\n<b>Regex Extractor:</b> enter a pattern and source text, then Run. It highlights matches and lists captures. Save Pattern stores it in localStorage.<br><br>\n<b>Line Ops:</b> GREP filters lines; AWK extracts delimited fields; CUT extracts character ranges. Use this for logs, CLI output, and quick data surgery.<br><br>\n<b>JSON Ops:</b> Format, minify, repair common malformed JSON, flatten object paths, filter key/value pairs, and generate a practical schema.<br><br>\n<b>Converters:</b> Convert JSON/CSV/XML/plain lines and HTML/Markdown. The XML converter is intentionally lightweight for common data shapes.<br><br>\n<b>Compare:</b> Line Diff shows added/removed/unchanged lines. Common Data parses JSON/CSV/list-like inputs when possible and finds shared keys/values.<br><br>\n<b>File Viewers:</b> Load or drag files. CSV renders as a table; Markdown renders with a safe lightweight renderer.<br><br>\n<b>Encoding + Hashing:</b> Base64, URL, HTML, and SHA hashing use browser APIs. MD5 was intentionally not carried forward because WebCrypto does not support it and it is legacy/weak.<br><br>\n<b>Scratch:</b> persistent local pad for notes and staging text between tools.\n</div><div class=\"actions\"><button onclick=\"closeHelp()\">Close</button></div></div></div>\n<div id=\"toast\" class=\"toast\"></div>\n<script>\n'use strict';\nconst TOOLS=[['regex','Data Extraction','Regex Extractor'],['extract','Data Extraction','Line Ops'],['json','Data Transformation','JSON Ops'],['convert','Data Transformation','Converters'],['compare','Analysis','Compare / Diff'],['viewer','Viewers','File Viewers'],['encode','Utility','Encoding + Hashing'],['http','Utility','HTTP GETter'],['scratch','Workspace','Scratch']];\nconst qs=s=>document.querySelector(s), qsa=s=>Array.from(document.querySelectorAll(s));\nfunction toast(msg){const t=qs('#toast');t.textContent=msg;t.style.display='block';clearTimeout(toast._t);toast._t=setTimeout(()=>t.style.display='none',1800)}\nfunction escapeHtml(s){return String(s??'').replace(/[&<>\"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c]))}\nfunction copyText(txt){navigator.clipboard?.writeText(txt).then(()=>toast('Copied')).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('Copied')})}\nfunction copyFrom(id){const el=qs('#'+id);copyText(el.value!==undefined?el.value:el.innerText)}\nfunction moveText(a,b){qs('#'+b).value=qs('#'+a).value;toast('Moved')}\nfunction downloadText(name,text){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain'}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}\nfunction buildNav(){const nav=qs('#nav');let h='';let cur='';TOOLS.forEach(([id,cat,name])=>{if(cat!==cur){cur=cat;h+=`<h3>${cat}</h3>`}h+=`<button id=\"nav_${id}\" onclick=\"showTool('${id}')\">${name}</button>`});nav.innerHTML=h;showTool('regex',false)}\nfunction showTool(id, closeMobile=true){qsa('.tool').forEach(x=>x.classList.toggle('active',x.id===id));qsa('.nav button').forEach(x=>x.classList.remove('active'));qs('#nav_'+id)?.classList.add('active');localStorage.setItem('taioActiveTool',id);if(closeMobile&&innerWidth<850)qs('#nav').classList.remove('open')}\nfunction filterTools(){const q=qs('#toolSearch').value.toLowerCase();qsa('.nav button').forEach(b=>{const id=b.id.replace('nav_','');const sec=qs('#'+id);b.style.display=((b.textContent+' '+(sec?.dataset.name||'')).toLowerCase().includes(q))?'block':'none'})}\nfunction toggleNav(){qs('#nav').classList.toggle('open')}\nfunction toggleTheme(){document.body.classList.toggle('light');localStorage.setItem('taioTheme',document.body.classList.contains('light')?'light':'dark')}\nfunction openHelp(){qs('#helpModal').classList.add('open')}function closeHelp(){qs('#helpModal').classList.remove('open')}\nfunction clearActiveTool(){const t=qs('.tool.active');t?.querySelectorAll('textarea,input:not([type=file])').forEach(e=>{if(e.type!=='checkbox')e.value=''})}\nfunction flags(){return ['flagG','flagI','flagM','flagS'].map(id=>qs('#'+id).checked?id.at(-1).toLowerCase():'').join('')}\nfunction runRegex(){const pat=qs('#regexPattern').value, txt=qs('#regexText').value;try{const re=new RegExp(pat,flags());let m, rows=[], count=0;if(re.global){while((m=re.exec(txt))){count++;rows.push([m.index,m[0],...m.slice(1)].map(x=>String(x??'')).join('\\t'));if(m[0]==='')re.lastIndex++}}else{m=re.exec(txt);if(m){count=1;rows.push([m.index,m[0],...m.slice(1)].map(x=>String(x??'')).join('\\t'))}}qs('#regexMatches').value=rows.join('\\n');qs('#regexHighlighted').innerHTML=escapeHtml(txt).replace(new RegExp(pat,flags().includes('g')?flags():flags()+'g'),m=>`<mark>${escapeHtml(m)}</mark>`);qs('#regexStatus').textContent=count+' match(es)';qs('#regexStatus').className='pill ok'}catch(e){qs('#regexStatus').textContent=e.message;qs('#regexStatus').className='pill bad'}}\nfunction replaceRegex(){try{qs('#regexMatches').value=qs('#regexText').value.replace(new RegExp(qs('#regexPattern').value,flags()),qs('#regexReplace').value);toast('Replaced into matches box')}catch(e){toast(e.message)}}\nfunction saveRegex(){const p=qs('#regexPattern').value;if(!p)return;const arr=JSON.parse(localStorage.getItem('taioRegex')||'[]');if(!arr.includes(p))arr.push(p);localStorage.setItem('taioRegex',JSON.stringify(arr));loadSavedRegex();toast('Saved')}\nfunction loadSavedRegex(){const sel=qs('#regexSaved');sel.innerHTML='<option value=\"\">Saved patterns\u2026</option>'+JSON.parse(localStorage.getItem('taioRegex')||'[]').map(p=>`<option>${escapeHtml(p)}</option>`).join('')}\nfunction loadRegex(){if(qs('#regexSaved').value)qs('#regexPattern').value=qs('#regexSaved').value}\nfunction runGrep(){const lines=qs('#lineInput').value.split(/\\r?\\n/), pat=qs('#grepPattern').value, cs=qs('#grepCase').checked, inv=qs('#grepInvert').checked;let re;try{re=new RegExp(pat,cs?'':'i')}catch(e){return toast(e.message)}qs('#lineOutput').value=lines.filter(l=>re.test(l)!==inv).join('\\n')}\nfunction fieldNums(spec){const out=[];spec.split(',').forEach(p=>{p=p.trim();if(!p)return;if(p.includes('-')){let[a,b]=p.split('-').map(x=>x?parseInt(x):null);a=a||1;b=b||a;for(let i=a;i<=b;i++)out.push(i-1)}else out.push(parseInt(p)-1)});return out.filter(n=>n>=0)}\nfunction runAwk(){const delim=qs('#awkDelimiter').value;const fields=fieldNums(qs('#awkFields').value);qs('#lineOutput').value=qs('#lineInput').value.split(/\\r?\\n/).map(l=>{const parts=delim?l.split(delim):l.trim().split(/\\s+/);return fields.map(i=>parts[i]??'').join(delim||' ')}).join('\\n')}\nfunction runCut(){const ranges=qs('#cutRanges').value.split(',').map(x=>x.trim()).filter(Boolean);qs('#lineOutput').value=qs('#lineInput').value.split(/\\r?\\n/).map(l=>ranges.map(r=>{let[a,b]=r.split('-');a=a?parseInt(a)-1:0;b=b?parseInt(b):l.length;return l.slice(a,b)}).join('')).join('\\n')}\nfunction sortUniqueLines(){qs('#lineOutput').value=[...new Set(qs('#lineInput').value.split(/\\r?\\n/).filter(Boolean))].sort().join('\\n')}function countLines(){const lines=qs('#lineInput').value.split(/\\r?\\n/);qs('#lineOutput').value=`Lines: ${lines.length}\\nNon-empty: ${lines.filter(x=>x.trim()).length}\\nCharacters: ${qs('#lineInput').value.length}`}\nfunction fixJsonString(s){return s.replace(/^\\uFEFF/,'').replace(/\\/\\/.*$/gm,'').replace(/\\/\\*[\\s\\S]*?\\*\\//g,'').replace(/,\\s*([}\\]])/g,'$1').replace(/([{,]\\s*)([A-Za-z_$][\\w$-]*)(\\s*:)/g,'$1\"$2\"$3').replace(/'/g,'\"')}\nfunction parseAny(s){s=s.trim();if(!s)return null;try{return JSON.parse(s)}catch{}try{return JSON.parse(fixJsonString(s))}catch{}if(s.includes(',')){return csvToObjects(s)}return s.split(/\\r?\\n/).filter(Boolean)}\nfunction jsonFormat(){try{qs('#jsonOutput').value=JSON.stringify(parseAny(qs('#jsonInput').value),null,2)}catch(e){qs('#jsonOutput').value='ERROR: '+e.message}}function jsonMinify(){try{qs('#jsonOutput').value=JSON.stringify(parseAny(qs('#jsonInput').value))}catch(e){qs('#jsonOutput').value='ERROR: '+e.message}}function jsonFix(){qs('#jsonOutput').value=fixJsonString(qs('#jsonInput').value);try{qs('#jsonOutput').value=JSON.stringify(JSON.parse(qs('#jsonOutput').value),null,2)}catch{}}\nfunction walk(o,fn,path=''){if(o&&typeof o==='object'){if(Array.isArray(o))o.forEach((v,i)=>walk(v,fn,`${path}[${i}]`));else Object.entries(o).forEach(([k,v])=>{const p=path?path+'.'+k:k;fn(k,v,p);walk(v,fn,p)})}}\nfunction jsonFlatten(){try{const rows=[];walk(parseAny(qs('#jsonInput').value),(k,v,p)=>{if(!v
