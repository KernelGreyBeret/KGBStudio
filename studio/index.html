></select></label><label>Start Hz<input id=\"sStart\" type=\"range\" min=\"40\" max=\"1400\" value=\"740\"></label><label>End Hz<input id=\"sEnd\" type=\"range\" min=\"20\" max=\"1000\" value=\"120\"></label><label>Duration ms<input id=\"sDur\" type=\"range\" min=\"40\" max=\"1800\" value=\"260\"></label><label>Volume<input id=\"sVol\" type=\"range\" min=\"1\" max=\"100\" value=\"22\"></label></div><div class=\"row\"><button id=\"sLoad\">Load Preset</button><button id=\"sPlay\">Play</button><button id=\"sExport\">Export JS</button></div><textarea id=\"sOut\" class=\"output\" readonly></textarea></div></section>\n<section id=\"palette\" class=\"tool\"><div class=\"card\"><h3>Palette Forge</h3><p class=\"hint\">Neon palette and gradient builder.</p><div class=\"grid\"><label>Base<input id=\"palBase\" type=\"color\" value=\"#78ff00\"></label><label>Accent<input id=\"palAccent\" type=\"color\" value=\"#00eaff\"></label><label>Hot<input id=\"palHot\" type=\"color\" value=\"#ff9d00\"></label><label>Count<input id=\"palCount\" type=\"range\" min=\"4\" max=\"16\" value=\"8\"></label></div><div class=\"row\"><button id=\"palGenerate\">Generate</button><button id=\"palExport\">Export CSS/JS</button></div><div id=\"swatches\" class=\"swatches\"></div><textarea id=\"palOut\" class=\"output\" readonly></textarea></div></section>\n<section id=\"tile\" class=\"tool\"><div class=\"card\"><h3>Tile Forge</h3><p class=\"hint\">Procedural terrain/tile generator for roads, rivers, stars, walls, neon grids, and bayou water.</p><div class=\"grid\"><label>Preset<select id=\"tPreset\"><option>neon-grid</option><option>road</option><option>river</option><option>stars</option><option>stone</option><option>bayou-water</option></select></label><label>Seed<input id=\"tSeed\" type=\"number\" value=\"1337\"></label><label>Density<input id=\"tDensity\" type=\"range\" min=\"1\" max=\"100\" value=\"45\"></label><label>Glow<input id=\"tGlow\" type=\"range\" min=\"0\" max=\"40\" value=\"12\"></label><label>Color A<input id=\"tColorA\" type=\"color\" value=\"#00eaff\"></label><label>Color B<input id=\"tColorB\" type=\"color\" value=\"#78ff00\"></label></div><div class=\"row\"><button id=\"tGenerate\">Regenerate</button><button id=\"tExport\">Export JS</button></div><textarea id=\"tOut\" class=\"output\" readonly></textarea></div></section>\n<section id=\"curve\" class=\"tool\"><div class=\"card\"><h3>Animation Curve Editor</h3><p class=\"hint\">Design easing curves for procedural animation. Drag the two yellow handles on the canvas.</p><div class=\"row\"><button data-curve=\".25,.1,.25,1\">Ease</button><button data-curve=\".42,0,1,1\">Ease In</button><button data-curve=\"0,0,.58,1\">Ease Out</button><button data-curve=\".42,0,.58,1\">InOut</button><button id=\"cExport\">Export JS</button></div><textarea id=\"cOut\" class=\"output\" readonly></textarea></div></section>\n<div class=\"card\"><h3>What was fixed</h3><p class=\"hint\">Tabs are real event listeners now, Particle Forge has an explicit Run button, and every tool refreshes its canvas when selected.</p></div>\n</aside>\n<main class=\"stage\"><canvas id=\"view\" width=\"900\" height=\"900\"></canvas></main>\n</div>\n<script>\n'use strict';\nconst canvas = document.getElementById('view');\nconst ctx = canvas.getContext('2d');\nconst $ = id => document.getElementById(id);\nlet active = 'particle';\nlet particles = [];\nlet animationHandle = null;\nlet curve = [.25,.1,.25,1];\nlet dragPoint = -1;\nlet tick = 0;\nfunction clearStage(){\n  ctx.setLineDash([]); ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over'; ctx.shadowBlur = 0;\n  ctx.clearRect(0,0,900,900);\n  const g = ctx.createRadialGradient(450,360,20,450,450,650);\n  g.addColorStop(0,'#082325'); g.addColorStop(.55,'#02090a'); g.addColorStop(1,'#000');\n  ctx.fillStyle = g; ctx.fillRect(0,0,900,900);\n}\nfunction stopLoop(){ if(animationHandle){ cancelAnimationFrame(animationHandle); animationHandle = null; } }\nfunction showTool(name){\n  active = name;\n  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b.dataset.tool === name));\n  document.querySelectorAll('.tool').forEach(s=>s.classList.toggle('active', s.id === name));\n  stopLoop();\n  if(name === 'particle') { resetParticles(); loopParticles(); }\n  if(name === 'sound') drawSoundPreview();\n  if(name === 'palette') makePalette();\n  if(name === 'tile') drawTile();\n  if(name === 'curve') drawCurve();\n}\ndocument.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => showTool(b.dataset.tool)));\nfunction rand(seed){ const x = Math.sin(seed * 999.123) * 10000; return x - Math.floor(x); }\nfunction hexToRgb(hex){ const n=parseInt(hex.slice(1),16); return [n>>16&255,n>>8&255,n&255]; }\nfunction mix(a,b,t){ a=hexToRgb(a); b=hexToRgb(b); return '#'+a.map((v,i)=>Math.round(v+(b[i]-v)*t).toString(16).padStart(2,'0')).join(''); }\nfunction syncParticleLabels(){ ['pCount','pSpeed','pLife','pSize','pGlow'].forEach(id => $(id+'Val').textContent = $(id).value); }\nfunction spawnParticle(i, preset){\n  const speed = +$('pSpeed').value;\n  const life = +$('pLife').value * (.55 + Math.random()*.9);\n  let x=450, y=550, a=Math.random()*Math.PI*2, s=speed*(.25+Math.random());\n  if(preset === 'boost'){ a = Math.PI/2 + (Math.random()-.5)*.24; x = 450 + (Math.random()-.5)*190; y = 535 + Math.random()*65; s *= 2.0; }\n  if(preset === 'explosion'){ a = Math.random()*Math.PI*2; x = 450; y = 450; s *= 1.8; }\n  if(preset === 'fire'){ a = -Math.PI/2 + (Math.random()-.5)*.9; x = 450+(Math.random()-.5)*90; y = 610; s *= .75; }\n  if(preset === 'smoke'){ a = -Math.PI/2 + (Math.random()-.5)*1.4; x = 450+(Math.random()-.5)*70; y = 610; s *= .35; }\n  if(preset === 'rain'){ a = Math.PI*.62; x = Math.random()*900; y = Math.random()*900; s *= 2.2; }\n  if(preset === 'snow'){ a = Math.PI/2 + (Math.random()-.5)*.8; x = Math.random()*900; y = Math.random()*900; s *= .45; }\n  particles[i] = {x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,age:Math.random()*life,size:+$('pSize').value*(.45+Math.random()),hot:Math.random()>.5};\n}\nfunction resetParticles(){ syncParticleLabels(); particles=[]; const n=+$('pCount').value; const preset=$('pPreset').value; for(let i=0;i<n;i++) spawnParticle(i,preset); }\nfunction drawEmitter(){\n  ctx.save(); ctx.globalCompositeOperation='lighter';\n  ctx.strokeStyle = '#78ff00'; ctx.shadowColor = '#78ff00'; ctx.shadowBlur = 18; ctx.lineWidth = 5;\n  ctx.beginPath(); ctx.arc(450,450,54,0,Math.PI*2); ctx.stroke();\n  ctx.fillStyle = '#071719'; ctx.fillRect(370,440,160,28);\n  ctx.fillStyle = '#00eaff'; ctx.shadowColor = '#00eaff'; ctx.fillRect(390,448,120,10);\n  ctx.restore();\n}\nfunction drawParticlesFrame(){\n  clearStage();\n  if($('pPreset').value === 'boost') drawEmitter();\n  ctx.save(); ctx.globalCompositeOperation='lighter';\n  const a=$('pColorA').value, b=$('pColorB').value, preset=$('pPreset').value;\n  for(let i=0;i<particles.length;i++){\n    let p = particles[i];\n    p.age++; p.x += p.vx; p.y += p.vy;\n    if(preset==='fire'){ p.vy -= .025; p.vx *= .995; }\n    if(preset==='smoke'){ p.vy -= .012; p.vx *= .995; p.size += .035; }\n    if(preset==='snow'){ p.vx += Math.sin((tick+i)*.02)*.015; }\n    if(p.age>p.life || p.x<-100 || p.x>1000 || p.y<-100 || p.y>1000){ spawnParticle(i,preset); p=particles[i]; }\n    const k = Math.max(0, 1 - p.age/p.life);\n    const color = p.hot ? b : a;\n    ctx.globalAlpha = k;\n    ctx.shadowColor = color; ctx.shadowBlur = +$('pGlow').value;\n    ctx.fillStyle = color;\n    if(preset === 'rain') { ctx.strokeStyle = color; ctx.lineWidth = Math.max(1,p.size*.4); ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x-p.vx*3,p.y-p.vy*3); ctx.stroke(); }\n    else { ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(.5,p.size*k),0,Math.PI*2); ctx.fill(); }\n  }\n  ctx.restore(); ctx.globalAlpha=1; tick++;\n}\nfunction loopParticles(){ drawParticlesFrame(); animationHandle = requestAnimationFrame(loopParticles); }\nfunction exportParticles(){ $('pOut').value = `function drawKGBParticles(ctx, particles, opts={}) {\\n  const colorA = opts.colorA || '${$('pColorA').value}';\\n  const colorB = opts.colorB || '${$('pColorB').value}';\\n  const glow = opts.glow ?? ${$('pGlow').value};\\n  ctx.save();\\n  ctx.globalCompositeOperation = 'lighter';\\n  for (const p of particles) {\\n    p.age++; p.x += p.vx; p.y += p.vy;\\n    const k = Math.max(0, 1 - p.age / p.life);\\n    ctx.globalAlpha = k;\\n    ctx.shadowColor = p.hot ? colorB : colorA;\\n    ctx.shadowBlur = glow;\\n    ctx.fillStyle = p.hot ? colorB : colorA;\\n    ctx.beginPath();\\n    ctx.arc(p.x, p.y, p.size * k, 0, Math.PI * 2);\\n    ctx.fill();\\n  }\\n  ctx.restore();\\n}`; }\n$('pRun').onclick = () => { resetParticles(); showTool('particle'); };\n$('pBurst').onclick = () => { $('pPreset').value='explosion'; resetParticles(); };\n$('pExport').onclick = exportParticles;\n['pPreset','pCount','pSpeed','pLife','pSize','pGlow','pColorA','pColorB'].forEach(id => $(id).addEventListener('input', resetParticles));\nfunction applySoundPreset(){ const p=$('sPreset').value; const m={laser:['sawtooth',880,90,180,18],boost:['sawtooth',90,260,900,16],coin:['square',620,1240,150,18],boom:['triangle',180,42,650,36],jump:['square',280,720,180,16],hurt:['sawtooth',240,80,220,30]}[p]; $('sWave').value=m[0]; $('sStart').value=m[1]; $('sEnd').value=m[2]; $('sDur').value=m[3]; $('sVol').value=m[4]; drawSoundPreview(); }\nfunction playSfx(){ const ac=new(window.AudioContext||window.webkitAudioContext)(); const o=ac.createOscillator(); const g=ac.createGain(); o.type=$('sWave').value; o.frequency.setValueAtTime(+$('sStart').value,ac.currentTime); o.frequency.exponentialRampToValueAtTime(Math.max(1,+$('sEnd').value),ac.currentTime+$('sDur').value/1000); g.gain.setValueAtTime(+$('sVol').value/100,ac.currentTime); g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+$('sDur').value/1000); o.connect(g).connect(ac.destination); o.start(); o.stop(ac.currentTime+$('sDur').value/1000); }\nfunction drawSoundPreview(){ clearStage(); ctx.save(); ctx.strokeStyle='#00eaff'; ctx.shadowColor='#00eaff'; ctx.shadowBlur=18; ctx.lineWidth=5; ctx.beginPath(); const start=+$('sStart').value,end=+$('sEnd').value,dur=+$('sDur').value; for(let x=80;x<=820;x++){ const t=(x-80)/740; const f=start+(end-start)*t; const amp=120*Math.exp(-t*3); const y=450 + Math.sin(t*dur*.18)*amp*(+$('sVol').value/100); x===80?ctx.moveTo(x,y):ctx.lineTo(x,y); } ctx.stroke(); ctx.restore(); }\nfunction exportSfx(){ $('sOut').value = `function playKGBSfx(type='${$('sWave').value}', start=${$('sStart').value}, end=${$('sEnd').value}, ms=${$('sDur').value}, volume=${$('sVol').value/100}) {\\n  const ac = new (window.AudioContext || window.webkitAudioContext)();\\n  const osc = ac.createOscillator();\\n  const gain = ac.createGain();\\n  osc.type = type;\\n  osc.frequency.setValueAtTime(start, ac.currentTime);\\n  osc.frequency.exponentialRampToValueAtTime(Math.max(1,end), ac.currentTime + ms/1000);\\n  gain.gain.setValueAtTime(volume, ac.currentTime);\\n  gain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + ms/1000);\\n  osc.connect(gain).connect(ac.destination);\\n  osc.start(); osc.stop(ac.currentTime + ms/1000);\\n}`; }\n$('sLoad').onclick=applySoundPreset; $('sPlay').onclick=playSfx; $('sExport').onclick=exportSfx; ['sWave','sStart','sEnd','sDur','sVol'].forEach(id=>$(id).addEventListener('input', drawSoundPreview));\nfunction makePalette(){ clearStage(); const n=+$('palCount').value, base=$('palBase').value, acc=$('palAccent').value, hot=$('palHot').value; const colors=[]; for(let i=0;i<n;i++){ const t=i/(n-1); colors.push(t<.5?mix(base,acc,t*2):mix(acc,hot,(t-.5)*2)); } $('swatches').innerHTML=''; colors.forEach(c=>{ const d=document.createElement('div'); d.className='swatch'; d.style.background=c; d.title=c; d.onclick=()=>{ navigator.clipboard?.writeText(c); $('palOut').value='Copied '+c; }; $('swatches').appendChild(d); }); ctx.font='bold 24px ui-monospace,Consolas,monospace'; colors.forEach((c,i)=>{ const w=680/n; ctx.fillStyle=c; ctx.shadowColor=c; ctx.shadowBlur=22; ctx.fillRect(110+i*w,310,w-8,150); ctx.fillText(c,110+i*w,500); }); $('palOut').value=colors.join('\\n'); }\nfunction exportPalette(){ const arr=[...document.querySelectorAll('.swatch')].map(x=>x.title); $('palOut').value = `:root {\\n${arr.map((c,i)=>`  --kgb-color-${i+1}: ${c};`).join('\\n')}\\n}\\n\\nconst KGB_PALETTE = ${JSON.stringify(arr,null,2)};`; }\n$('palGenerate').onclick=makePalette; $('palExport').onclick=exportPalette; ['palBase','palAccent','palHot','palCount'].forEach(id=>$(id).addEventListener('input', makePalette));\nfunction drawTile(){ clearStage(); const seed=+$('tSeed').value, d=+$('tDensity').value, a=$('tColorA').value, b=$('tColorB').value, preset=$('tPreset').value, gl=+$('tGlow').value; ctx.shadowBlur=gl; if(preset==='neon-grid'){ ctx.lineWidth=2; for(let i=0;i<900;i+=40){ ctx.strokeStyle=i%80?a:b; ctx.shadowColor=ctx.strokeStyle; ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,900); ctx.moveTo(0,i); ctx.lineTo(900,i); ctx.stroke(); } } else if(preset==='road'){ ctx.fillStyle='#070707'; ctx.fillRect(280,0,340,900); ctx.strokeStyle=a; ctx.lineWidth=8; ctx.shadowColor=a; ctx.beginPath(); ctx.moveTo(280,0); ctx.lineTo(180,900); ctx.moveTo(620,0); ctx.lineTo(720,900); ctx.stroke(); ctx.strokeStyle=b; ctx.setLineDash([40,40]); ctx.beginPath(); ctx.moveTo(450,0); ctx.lineTo(450,900); ctx.stroke(); ctx.setLineDash([]); } else if(preset==='river'||preset==='bayou-water'){ ctx.fillStyle='#062018'; ctx.fillRect(0,0,900,900); for(let i=0;i<d*4;i++){ const x=rand(seed+i)*900, y=rand(seed+i+99)*900, w=40+rand(seed+i+2)*180; ctx.strokeStyle=rand(seed+i+3)>.5?a:b; ctx.shadowColor=ctx.strokeStyle; ctx.lineWidth=1+rand(seed+i+4)*5; ctx.beginPath(); ctx.moveTo(x,y); ctx.bezierCurveTo(x+80,y-20,x+w,y+50,x+w*1.3,y); ctx.stroke(); } } else if(preset==='stars'){ for(let i=0;i<d*8;i++){ const x=rand(seed+i)*900, y=rand(seed+i+88)*900, r=rand(seed+i+2)*3+1; ctx.fillStyle=rand(seed+i+3)>.5?a:b; ctx.shadowColor=ctx.fillStyle; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); } } else { for(let i=0;i<d*3;i++){ const x=rand(seed+i)*900, y=rand(seed+i+9)*900, w=20+rand(seed+i+2)*80, h=20+rand(seed+i+3)*80; ctx.fillStyle=rand(seed+i+4)>.5?'#121212':'#242424'; ctx.strokeStyle=rand(seed+i+5)>.5?a:b; ctx.shadowColor=ctx.strokeStyle; ctx.lineWidth=2; ctx.fillRect(x,y,w,h); ctx.strokeRect(x,y,w,h); } } }\nfunction exportTile(){ $('tOut').value = `function drawKGBTile(ctx, w, h, seed=${$('tSeed').value}) {\\n  // Generated preset: ${$('tPreset').value}\\n  // Copy this function and adapt colors/spacing as needed.\\n}`; }\n$('tGenerate').onclick=drawTile; $('tExport').onclick=exportTile; ['tPreset','tSeed','tDensity','tGlow','tColorA','tColorB'].forEach(id=>$(id).addEventListener('input', drawTile));\nfunction bez(t,p0,p1,p2,p3){ const u=1-t; return u*u*u*p0+3*u*u*t*p1+3*u*t*t*p2+t*t*t*p3; }\nfunction drawCurve(){ clearStage(); const [x1,y1,x2,y2]=curve; const sx=160,sy=720,ex=740,ey=160; ctx.strokeStyle='#10363c'; ctx.lineWidth=4; ctx.strokeRect(sx,ey,ex-sx,sy-ey); ctx.strokeStyle='#00eaff'; ctx.shadowColor='#00eaff'; ctx.shadowBlur=14; ctx.lineWidth=6; ctx.beginPath(); for(let i=0;i<=100;i++){ const t=i/100, x=bez(t,sx,sx+x1*(ex-sx),sx+x2*(ex-sx),ex), y=bez(t,sy,sy-y1*(sy-ey),sy-y2*(sy-ey),ey); i?ctx.lineTo(x,y):ctx.moveTo(x,y); } ctx.stroke(); [[x1,y1],[x2,y2]].forEach(p=>{ const x=sx+p[0]*(ex-sx), y=sy-p[1]*(sy-ey); ctx.fillStyle='#fff400'; ctx.shadowColor='#fff400'; ctx.shadowBlur=16; ctx.beginPath(); ctx.arc(x,y,14,0,Math.PI*2); ctx.fill(); ctx.strokeStyle='#001'; ctx.stroke(); }); exportCurve(); }\nfunction setCurve(a,b,c,d){ curve=[a,b,c,d]; drawCurve(); }\nfunction exportCurve(){ $('cOut').value = `const KGB_EASE = cubicBezier(${curve.map(v=>+v.toFixed(3)).join(', ')});\\nfunction cubicBezier(x1,y1,x2,y2){\\n  return function(t){\\n    const u=1-t;\\n    return 3*u*u*t*y1 + 3*u*t*t*y2 + t*t*t;\\n  };\\n}`; }\ndocument.querySelectorAll('[data-curve]').forEach(b=>b.addEventListener('click',()=>setCurve(...b.dataset.curve.split(',').map(Number)))); $('cExport').onclick=exportCurve;\ncanvas.addEventListener('pointerdown',e=>{ if(active!=='curve') return; const r=canvas.getBoundingClientRect(), x=(e.clientX-r.left)*900/r.width, y=(e.clientY-r.top)*900/r.height, sx=160, sy=720, ex=740, ey=160; dragPoint=-1; [[curve[0],curve[1]],[curve[2],curve[3]]].forEach((p,i)=>{ const px=sx+p[0]*(ex-sx), py=sy-p[1]*(sy-ey); if(Math.hypot(x-px,y-py)<35) dragPoint=i; }); });\ncanvas.addEventListener('pointermove',e=>{ if(active!=='curve'||dragPoint<0) return; const r=canvas.getBoundingClientRect(), x=(e.clientX-r.left)*900/r.width, y=(e.clientY-r.top)*900/r.height, sx=160, sy=720, ex=740, ey=160; curve[dragPoint*2]=Math.max(0,Math.min(1,(x-sx)/(ex-sx))); curve[dragPoint*2+1]=Math.max(0,Math.min(1,(sy-y)/(sy-ey))); drawCurve(); });\naddEventListener('pointerup',()=>dragPoint=-1);\napplySoundPreset(); makePalette(); drawTile(); drawCurve(); showTool('particle');\n\n/*\n  KGB Studio Bridge\n  -----------------\n  Exposes active Forge Suite outputs to KGB Studio while keeping the standalone\n  tool intact.\n*/\nfunction forgeSuiteCurrentOutput(){\n  if(active==='particle'){ exportParticles(); return $('pOut').value; }\n  if(active==='sound'){ exportSfx(); return $('sOut').value; }\n  if(active==='palette'){ exportPalette(); return $('palOut').value; }\n  if(active==='tile'){ exportTile(); return $('tOut').value; }\n  if(active==='curve'){ exportCurve(); return $('cOut').value; }\n  return '';\n}\nfunction forgeSuiteSettings(){\n  return {\n    particle:{\n      preset:$('pPreset')?.value,\n      count:+($('pCount')?.value||0),\n      speed:+($('pSpeed')?.value||0),\n      life:+($('pLife')?.value||0),\n      size:+($('pSize')?.value||0),\n      glow:+($('pGlow')?.value||0),\n      colorA:$('pColorA')?.value,\n      colorB:$('pColorB')?.value\n    },\n    sound:{\n      preset:$('sPreset')?.value,\n      wave:$('sWave')?.value,\n      start:+($('sStart')?.value||0),\n      end:+($('sEnd')?.value||0),\n      duration:+($('sDur')?.value||0),\n      volume:+($('sVol')?.value||0)\n    },\n    palette:{\n      base:$('palBase')?.value,\n      accent:$('palAccent')?.value,\n      hot:$('palHot')?.value,\n      count:+($('palCount')?.value||0),\n      colors:[...document.querySelectorAll('.swatch')].map(x=>x.title)\n    },\n    tile:{\n      preset:$('tPreset')?.value,\n      seed:+($('tSeed')?.value||0),\n      density:+($('tDensity')?.value||0),\n      glow:+($('tGlow')?.value||0),\n      colorA:$('tColorA')?.value,\n      colorB:$('tColorB')?.value\n    },\n    curve:{values:curve.slice()}\n  };\n}\nwindow.KGBForgeSuiteBridge={\n  setTool(name){\n    if(typeof showTool==='function')showTool(name);\n  },\n  setParticlePreset(name){\n    showTool('particle');\n    $('pPreset').value=name||'rain';\n    resetParticles();\n  },\n  rain(){\n    this.setParticlePreset('rain');\n  },\n  exportActive(){\n    const output=forgeSuiteCurrentOutput();\n    const settings=forgeSuiteSettings();\n    return {\n      tool:active,\n      name:'KGB '+active.charAt(0).toUpperCase()+active.slice(1)+' Forge '+new Date().toLocaleTimeString(),\n      output,\n      settings,\n      exportedAt:new Date().toISOString()\n    };\n  },\n  getWorkspace(){\n    return {\n      tool:'KGB Forge Suite',\n      version:'v1.1-studio-integrated',\n      active,\n      settings:forgeSuiteSettings(),\n      output:forgeSuiteCurrentOutput(),\n      savedAt:new Date().toISOString()\n    };\n  }\n};\ntry{window.parent&&window.parent.postMessage({type:'KGB_FORGE_SUITE_READY'},\"*\")}catch(e){}\n\n<\/script>\n</body>\n</html>\n";


/*
-------------------------------------------------------------------------------
ASSETS → KGB FORGE SUITE v1.1

Procedural production tools:
- Particle Forge
- Sound Forge
- Palette Forge
- Tile Forge
- Curve Editor

Outputs are saved into the correct Studio buckets so Game Package Builder and
Export Center automatically include them.
-------------------------------------------------------------------------------
*/
const ForgeSuiteStudioHost={
  getBridge(){
    return $("#forgeSuiteFrame")?.contentWindow?.KGBForgeSuiteBridge||null;
  },

  bucketForTool(tool){
    return {
      particle:"particles",
      sound:"sounds",
      palette:"palettes",
      tile:"tiles",
      curve:"misc"
    }[tool]||"misc";
  },

  kindForTool(tool){
    return {
      particle:"procedural-particle-effect",
      sound:"procedural-sound-effect",
      palette:"color-palette",
      tile:"procedural-tile-pattern",
      curve:"animation-curve"
    }[tool]||"forge-suite-output";
  },

  adapterForTool(tool){
    return "forge-suite-"+(tool||"output");
  },

  saveActive(){
    const bridge=this.getBridge();
    if(!bridge?.exportActive){
      alert("Forge Suite is still loading. Try again in a second.");
      return;
    }

    try{
      const out=bridge.exportActive();
      const bucket=this.bucketForTool(out.tool);
      const asset={
        name:out.name,
        kind:this.kindForTool(out.tool),
        adapter:this.adapterForTool(out.tool),
        source:"kgb-forge-suite-v1.1",
        folder:"/forge-suite/"+out.tool,
        tags:["forge-suite",out.tool,"procedural"],
        notes:"Saved from embedded KGB Forge Suite v1.1.",
        text:out.output||"",
        code:out.output||"",
        settings:out.settings?.[out.tool]||out.settings||{},
        forgeWorkspace:out,
        mime:"text/javascript",
        extension:"js",
        updated:new Date().toISOString()
      };

      if(out.tool==="palette"){
        asset.mime="application/json";
        asset.extension="json";
        asset.colors=out.settings?.palette?.colors||[];
        asset.text=JSON.stringify({colors:asset.colors,settings:asset.settings,cssOrJs:out.output},null,2);
      }

      if(out.tool==="curve"){
        asset.mime="application/json";
        asset.extension="json";
        asset.curve=out.settings?.curve?.values||[];
        asset.text=JSON.stringify({curve:asset.curve,code:out.output},null,2);

  }
};

/*
-------------------------------------------------------------------------------
SYSTEMS → RUNTIME PREVIEW

A lightweight runtime test bench for project assets. This is not the final KGB
Arcade Runtime yet. It is the safe bridge between Studio assets and the future
runtime pipeline.

Preview support:
- Shape Forge assets: use saved exportedHTML / exportedAnimatedHTML / exportedJS.
- Imported image assets: generate a tiny animated canvas preview.
- Imported audio assets: generate a native audio-control preview.
- Other assets: show metadata placeholder.
-------------------------------------------------------------------------------
*/
const RuntimePreviewUI={
  currentId:null,
  playing:true,
  previewObjectUrls:[],

  clearPreviewObjectUrls(){
    (this.previewObjectUrls||[]).forEach(url=>{try{URL.revokeObjectURL(url)}catch(e){}});
    this.previewObjectUrls=[];
  },

  hostAnimTimer:null,
  hostAnimIndex:0,
  clearHostAnim(){
    if(this.hostAnimTimer){
      clearInterval(this.hostAnimTimer);
      this.hostAnimTimer=null;
    }
  },

  rows(){
    const assets=Studio.state.project.assets||{};
    return Object.entries(assets).flatMap(([bucket,items])=>
      (items||[]).map(asset=>({bucket,asset}))
    );
  },

  previewable(row){
    const a=row.asset;
    return !!(
      a.exportedHTML||
      a.exportedAnimatedHTML||
      a.exportedJS||
      a.previewDataUrl||
      a.dataUrl||
      String(a.mime||"").startsWith("audio/")||
      a.objects?.length||
      a.shapes?.length||
      (a.kind==="gif-frame-animation"&&a.project?.frames?.length)
    );
  },

  label(row){
    const a=row.asset;
    return row.bucket+" / "+(a.name||a.id)+" — "+(a.kind||"asset");
  },

  render(root){
    const rows=this.rows().filter(r=>this.previewable(r));
    const selectedId=this.currentId || rows[0]?.asset?.id || "";

    root.innerHTML=
      '<div class="card">'+
        '<h3>Runtime Preview</h3>'+
        '<p class="muted">Pick a project asset and preview it like runtime material. Shape Forge assets can run their saved JS/HTML exports. Imported images and audio get simple wrappers.</p>'+
        '<div class="runtimeControls">'+
          '<div><label>Asset</label><select id="runtimeAsset">'+(rows.length?rows.map(r=>'<option value="'+esc(r.bucket+":"+r.asset.id)+'" '+((r.asset.id===selectedId)?"selected":"")+'>'+esc(this.label(r))+'</option>').join(""):'<option>No previewable assets</option>')+'</select></div>'+
          '<div><label>Mode</label><select id="runtimeMode"><option value="auto">Auto</option><option value="static">Static</option><option value="animated">Animated</option></select></div>'+
          '<div><label>Scale</label><input id="runtimeScale" type="range" min="0.2" max="2.5" step="0.05" value="1"></div>'+
          '<div><label>X Offset</label><input id="runtimeX" type="range" min="-240" max="240" step="5" value="0"></div>'+
          '<div><label>Y Offset</label><input id="runtimeY" type="range" min="-180" max="180" step="5" value="0"></div>'+
          '<button id="runtimeRefresh">Refresh</button>'+
        '</div>'+
        '<div class="row" style="margin-top:10px">'+
          '<button id="runtimePlayPause">Pause</button>'+
          '<button id="runtimeOpenAsset">Open Asset</button>'+
          '<button id="runtimeAssetLibrary">Asset Library</button>'+
          '<button id="runtimeAssetIntake">Asset Intake</button>'+
          '<button id="runtimeShapeForge">Shape Forge</button>'+
        '</div>'+
        '<iframe id="runtimeFrame" class="runtimeFrame" title="Runtime Preview"></iframe>'+
        '<div id="runtimeHostFrame" class="runtimeHostFrame" style="display:none"></div>'+
        '<div id="runtimeInfo" class="runtimeInfo"></div>'+
      '</div>';

    $("#runtimeAsset").onchange=()=>{this.currentId=this.selectedRow()?.asset?.id||null;this.refresh()};
    $("#runtimeMode").onchange=()=>this.refresh();
    $("#runtimeScale").oninput=()=>this.refresh();
    $("#runtimeX").oninput=()=>this.refresh();
    $("#runtimeY").oninput=()=>this.refresh();
    $("#runtimeRefresh").onclick=()=>this.refresh();
    $("#runtimePlayPause").onclick=()=>{
      this.playing=!this.playing;
      $("#runtimePlayPause").textContent=this.playing?"Pause":"Play";
      this.refresh();
    };
    $("#runtimeOpenAsset").onclick=()=>{
      const row=this.selectedRow();
      if(row)Studio.selectAsset(row.bucket,row.asset.id);
    };
    $("#runtimeAssetLibrary").onclick=()=>Studio.open("asset.library");
    $("#runtimeAssetIntake").onclick=()=>Studio.open("asset.intake");
    $("#runtimeShapeForge").onclick=()=>Studio.open("asset.shapeforge");

    this.refresh();
  },

  selectedRow(){
    const value=$("#runtimeAsset")?.value||"";
    const [bucket,id]=value.split(":");
    return this.rows().find(r=>r.bucket===bucket&&r.asset.id===id)||null;
  },

  controls(){
    return {
      mode:$("#runtimeMode")?.value||"auto",
      scale:+($("#runtimeScale")?.value||1),
      x:+($("#runtimeX")?.value||0),
      y:+($("#runtimeY")?.value||0),
      playing:this.playing
    };
  },

  refresh(){
    this.clearPreviewObjectUrls();
    this.clearHostAnim();

    const row=this.selectedRow();
    const frame=$("#runtimeFrame");
    const host=$("#runtimeHostFrame");
    const info=$("#runtimeInfo");
    if(!frame||!info)return;

    if(!row){
      if(host){host.style.display="none";host.innerHTML="";}
      frame.style.display="block";
      frame.srcdoc=this.placeholderHTML("No previewable asset selected.","Create a Shape Forge asset, import an image/audio file, or save an export first.");
      info.innerHTML="";
      return;
    }

    const a=row.asset;
    const c=this.controls();

    if(a.kind==="gif-frame-animation"){
      frame.style.display="none";
      frame.srcdoc="about:blank";
      if(host){
        host.style.display="grid";
        this.renderHostFrameAnimation(host,a,c);
      }
    }else{
      if(host){host.style.display="none";host.innerHTML="";}
      frame.style.display="block";
      frame.srcdoc=this.htmlForAsset(row,c);
    }

    info.innerHTML=
      '<div class="card"><b>Bucket</b><br><span class="muted">'+esc(row.bucket)+'</span></div>'+
      '<div class="card"><b>Kind</b><br><span class="muted">'+esc(a.kind||"asset")+'</span></div>'+
      '<div class="card"><b>Adapter</b><br><span class="muted">'+esc(a.adapter||"none")+'</span></div>'+
      '<div class="card"><b>Runtime Mode</b><br><span class="muted">'+esc(c.mode)+(c.playing?" / playing":" / paused")+'</span></div>';
  },


  renderHostFrameAnimation(host,asset,c){
    this.clearHostAnim();

    const project=asset.project||{};
    let frames=(project.frames||[])
      .filter(fr=>fr&&fr.dataUrl)
      .map(fr=>({name:fr.name||"frame",src:fr.dataUrl}));

    if(!frames.length&&asset.previewDataUrl){
      frames=[{name:"preview",src:asset.previewDataUrl}];
    }

    const settings=project.settings||{};
    const delay=Math.max(20,asset.delay||settings.delay||150);
    const pingpong=asset.pingpong??settings.pingpong??true;
    let sequence=frames.slice();

    if(pingpong&&frames.length>2){
      sequence=sequence.concat(frames.slice(1,-1).reverse());
    }

    host.innerHTML=
      '<div class="hostAnimStage">'+
        '<img id="hostAnimImg" alt="Frame Animation">'+
        '<div id="hostAnimStatus" class="hostAnimStatus"></div>'+
        '<div class="hostAnimControls">'+
          '<button id="hostAnimPrev">Previous</button>'+
          '<button id="hostAnimNext">Next</button>'+
          '<button id="hostAnimToggle">'+(c.playing?"Pause":"Play")+'</button>'+
        '</div>'+
      '</div>';

    const img=host.querySelector("#hostAnimImg");
    const status=host.querySelector("#hostAnimStatus");
    const prev=host.querySelector("#hostAnimPrev");
    const next=host.querySelector("#hostAnimNext");
    const toggle=host.querySelector("#hostAnimToggle");

    const scale=Math.max(.1,Math.min(3,c.scale||1));
    img.style.transform="translate("+((c.x||0))+"px,"+((c.y||0))+"px) scale("+scale+")";

    let playing=!!c.playing;

    const show=()=>{
      if(!sequence.length){
        img.removeAttribute("src");
        status.textContent="No frame data found in this animation asset.";
        return;
      }
      const fr=sequence[this.hostAnimIndex%sequence.length];
      img.src=fr.src;
      status.textContent=(asset.name||"Frame Animation")+" • frame "+((this.hostAnimIndex%sequence.length)+1)+" / "+sequence.length+" • source frames "+frames.length;
    };

    const step=(dir=1)=>{
      if(!sequence.length)return;
      this.hostAnimIndex=(this.hostAnimIndex+dir+sequence.length)%sequence.length;
      show();
    };

    prev.onclick=()=>step(-1);
    next.onclick=()=>step(1);
    toggle.onclick=()=>{
      playing=!playing;
      toggle.textContent=playing?"Pause":"Play";
    };

    this.hostAnimIndex=0;
    show();

    if(sequence.length>1){
      this.hostAnimTimer=setInterval(()=>{if(playing)step(1)},delay);
    }
  },

  htmlForAsset(row,c){
    const a=row.asset;

    if(a.kind==="shape-forge-project"||a.adapter==="shape-forge-full"||a.exportedJS){
      if(c.mode==="animated"&&a.exportedAnimatedHTML)return a.exportedAnimatedHTML;
      if((c.mode==="static"||c.mode==="auto")&&a.exportedHTML)return a.exportedHTML;
      if(a.exportedJS)return this.shapeJSWrapper(a,c);
    }

    if(a.kind==="gif-frame-animation"&&a.project?.frames?.length){
      return this.frameAnimationWrapper(a,c);
    }

    if(a.dataUrl&&String(a.mime||"").toLowerCase().includes("gif")){
      return this.animatedImageWrapper(a,c);
    }

    if(a.dataUrl&&String(a.mime||"").startsWith("image/")){
      return this.imageWrapper(a,c);
    }

    if(a.dataUrl&&String(a.mime||"").startsWith("audio/")){
      return this.audioWrapper(a,c);
    }

    if(a.previewDataUrl){
      return this.imageWrapper({...a,dataUrl:a.previewDataUrl,mime:"image/png"},c);
    }

    return this.placeholderHTML(a.name||"Unsupported asset","This asset does not yet have runtime preview data.");
  },

  baseStyle(){
    return '<style>html,body{margin:0;height:100%;overflow:hidden;background:#05090a;color:#d9fbff;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif}body{display:grid;place-items:center}.panel{border:1px solid #1b3d45;border-radius:18px;background:#071014;padding:22px;text-align:center;box-shadow:0 0 28px #00eaff22}canvas{max-width:96vw;max-height:92vh;background:#020506;border:1px solid #12343b;border-radius:16px;box-shadow:0 0 24px #00eaff2e}audio{width:min(720px,92vw)}</style>';
  },

  placeholderHTML(title,msg){
    return '<!doctype html><html><head><meta charset="utf-8">'+this.baseStyle()+'</head><body><div class="panel"><h1>'+esc(title)+'</h1><p>'+esc(msg)+'</p></div></body></html>';
  },

  imageWrapper(asset,c){
    const data=JSON.stringify(asset.dataUrl||"");
    return '<!doctype html><html><head><meta charset="utf-8">'+this.baseStyle()+'</head><body><canvas id="c" width="960" height="540"></canvas><script>const img=new Image();img.src='+data+';const canvas=document.getElementById("c"),ctx=canvas.getContext("2d");const scale='+JSON.stringify(c.scale)+';const ox='+JSON.stringify(c.x)+';const oy='+JSON.stringify(c.y)+';const playing='+JSON.stringify(c.playing)+';function grid(){ctx.fillStyle="#020506";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle="#00eaff22";for(let x=0;x<canvas.width;x+=48){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke()}for(let y=0;y<canvas.height;y+=48){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke()}}function loop(t){grid();if(img.complete){const pulse=playing?1+Math.sin(t/360)*0.035:1;const w=img.naturalWidth*scale*pulse,h=img.naturalHeight*scale*pulse;ctx.drawImage(img,(canvas.width-w)/2+ox,(canvas.height-h)/2+oy,w,h)}if(playing)requestAnimationFrame(loop)}img.onload=()=>loop(0);loop(0);<\/script></body></html>';
  },

  frameAnimationWrapper(asset,c){
    const project=asset.project||{};

    const toObjectUrl=(dataUrl)=>{
      try{
        const out=dataUrlToBytes(dataUrl);
        const url=URL.createObjectURL(new Blob([out.bytes],{type:out.mime||"image/png"}));
        this.previewObjectUrls.push(url);
        return url;
      }catch(e){
        // Last-resort fallback: use the original data URL.
        return dataUrl;
      }
    };

    let frames=(project.frames||[]).filter(fr=>fr&&fr.dataUrl).map(fr=>({
      name:fr.name||"frame",
      src:toObjectUrl(fr.dataUrl)
    }));

    if(!frames.length&&asset.previewDataUrl){
      frames=[{name:"preview",src:toObjectUrl(asset.previewDataUrl)}];
    }

    const settings=project.settings||{};
    const delay=asset.delay||settings.delay||150;
    const pingpong=asset.pingpong??settings.pingpong??true;
    const payload=JSON.stringify({
      frames,
      delay,
      pingpong,
      scale:c.scale,
      x:c.x,
      y:c.y,
      playing:c.playing,
      title:asset.name||"Frame Animation"
    });

    return '<!doctype html><html><head><meta charset="utf-8">'+this.baseStyle()+
      '<style>'+
      '.animwrap{width:100vw;height:100vh;display:grid;place-items:center;overflow:hidden;background:radial-gradient(circle at center,#071014,#020506 72%)}'+
      '.animstage{display:grid;gap:10px;place-items:center;text-align:center}'+
      '.animstage img{max-width:92vw;max-height:82vh;object-fit:contain;border:1px solid #12343b;border-radius:16px;background:#020506;box-shadow:0 0 24px #00eaff2e}'+
      '.status{font-size:13px;color:#87aeb6;font-family:system-ui,Arial}'+
      '</style></head><body><div class="animwrap"><div class="animstage"><img id="frame" alt="Frame Animation"><div id="status" class="status"></div></div></div>'+
      '<script>'+
      'const cfg='+payload+';'+
      'const img=document.getElementById("frame"),status=document.getElementById("status");'+
      'let baseFrames=(cfg.frames||[]).filter(f=>f&&f.src),seq=[],idx=0;'+
      'function buildSeq(){seq=baseFrames.slice();if(cfg.pingpong&&seq.length>2)seq=seq.concat(seq.slice(1,-1).reverse())}'+
      'function applyTransform(){const s=Math.max(.1,Math.min(3,cfg.scale||1));img.style.transform="translate("+(cfg.x||0)+"px,"+(cfg.y||0)+"px) scale("+s+")"}'+
      'function show(){if(!seq.length){status.textContent="No frame data found in this animation asset.";img.removeAttribute("src");return}const fr=seq[idx%seq.length];img.src=fr.src;status.textContent=(cfg.title||"Frame Animation")+" • frame "+((idx%seq.length)+1)+" / "+seq.length+" • source frames "+baseFrames.length}'+
      'buildSeq();applyTransform();show();'+
      'if(cfg.playing&&seq.length>1){setInterval(()=>{idx=(idx+1)%seq.length;show()},Math.max(20,cfg.delay||150))}'+
      '<\\/script></body></html>';
  },

  animatedImageWrapper(asset,c){
    const data=asset.dataUrl||"";
    const scale=Math.max(.1,Math.min(3,c.scale||1));
    const transform='translate('+((c.x||0))+'px,'+((c.y||0))+'px) scale('+scale+')';
    return '<!doctype html><html><head><meta charset="utf-8">'+this.baseStyle()+'<style>.gifbox{display:grid;place-items:center;width:100vw;height:100vh;overflow:hidden}.gifbox img{max-width:92vw;max-height:92vh;image-rendering:auto;transform:'+transform+';border:1px solid #12343b;border-radius:16px;box-shadow:0 0 24px #00eaff2e;background:#020506}</style></head><body><div class="gifbox"><img src="'+data+'" alt="'+esc(asset.name||"GIF animation")+'"></div></body></html>';
  },

  audioWrapper(asset,c){
    const data=asset.dataUrl||"";
    return '<!doctype html><html><head><meta charset="utf-8">'+this.baseStyle()+'</head><body><div class="panel"><h1>'+esc(asset.name||"Audio Asset")+'</h1><p>Runtime audio preview</p><audio controls '+(c.playing?"autoplay":"")+' src="'+data+'"></audio></div></body></html>';
  },

  shapeJSWrapper(asset,c){
    const js=asset.exportedJS||"";
    return '<!doctype html><html><head><meta charset="utf-8">'+this.baseStyle()+'</head><body><canvas id="c" width="960" height="540"></canvas><script>'+js+'\nconst canvas=document.getElementById("c"),ctx=canvas.getContext("2d");const scale='+JSON.stringify(c.scale)+';const ox='+JSON.stringify(c.x)+';const oy='+JSON.stringify(c.y)+';const playing='+JSON.stringify(c.playing)+';function grid(){ctx.fillStyle="#020506";ctx.fillRect(0,0,canvas.width,canvas.height);ctx.strokeStyle="#00eaff22";for(let x=0;x<canvas.width;x+=48){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke()}for(let y=0;y<canvas.height;y+=48){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke()}}function loop(t){grid();ctx.save();ctx.translate(canvas.width/2-384*scale+ox,canvas.height/2-384*scale+oy);if(playing){ctx.translate(384*scale,384*scale);ctx.rotate(Math.sin(t/550)*0.035);ctx.translate(-384*scale,-384*scale)}drawSprite(ctx,0,0,scale,t/1000);ctx.restore();if(playing)requestAnimationFrame(loop)}loop(0);<\/script></body></html>';
  }
};

Studio.register({
  id:"system.persistence",
  section:"SYSTEMS",
  title:"Persistence",
  description:"AutoSave, recovery, recent snapshots, and project backup controls.",
  async render(root){
    root.innerHTML=
      '<div class="card">'+
        '<h3>Project Persistence + Recovery</h3>'+
        '<p class="muted">AutoSave and snapshots are stored in this browser using IndexedDB. This protects normal browser sessions, but exported .kgbproject and production ZIP files are still the safest portable backups.</p>'+
        '<div class="row">'+
          '<button class="primary" id="manualSnapshot">Save Snapshot Now</button>'+
          '<button id="restoreAutosave">Restore Last AutoSave</button>'+
          '<button id="downloadCurrentProject">Download Current .kgbproject</button>'+
          '<button id="refreshSnapshots">Refresh</button>'+
        '</div>'+
        '<div class="assetStats">'+
          '<div class="assetStat"><span>Dirty State</span><b id="dirtyState">'+(ProjectPersistence.dirty?"Unsaved":"Clean")+'</b></div>'+
          '<div class="assetStat"><span>Last AutoSave</span><b id="lastAutosave">'+(ProjectPersistence.lastAutosaveAt?new Date(ProjectPersistence.lastAutosaveAt).toLocaleTimeString():"Not yet")+'</b></div>'+
          '<div class="assetStat"><span>Storage</span><b>IndexedDB</b></div>'+
          '<div class="assetStat"><span>Max Manual Snapshots</span><b>'+ProjectPersistence.maxSnapshots+'</b></div>'+
        '</div>'+
        '<h3>Project Health Check</h3>'+
        '<div id="healthGrid" class="snapshotGrid">'+ProjectHealth.html()+'</div>'+
        '<h3>Recent Snapshots</h3>'+
        '<div id="snapshotList" class="snapshotGrid"><div class="muted">Loading snapshots...</div></div>'+
      '</div>';

    $("#manualSnapshot").onclick=async()=>{
      const rec=await ProjectPersistence.saveSnapshot("manual");
      alert("Saved snapshot: "+rec.name);
      Studio.open("system.persistence");
    };
    $("#restoreAutosave").onclick=()=>ProjectPersistence.restoreLatest();
    $("#downloadCurrentProject").onclick=()=>dl(safe(Studio.state.project.meta.name)+".kgbproject.json",Studio.exportProject(),"application/json");
    $("#refreshSnapshots").onclick=()=>Studio.open("system.persistence");

    const snaps=await ProjectPersistence.snapshots();
    const list=$("#snapshotList");
    if(!snaps.length){
      list.innerHTML='<div class="muted">No snapshots found yet.</div>';
      return;
    }

    list.innerHTML=snaps.map(s=>
      '<div class="snapshotCard" data-snapshot="'+esc(s.id)+'">'+
        '<b>'+esc(s.name||"Untitled")+'</b>'+
        '<div class="mini">'+esc(s.type||"snapshot")+' • '+new Date(s.savedAt).toLocaleString()+' • '+Math.round((s.size||0)/1024)+' KB • '+(s.assetCount||0)+' asset(s)</div>'+
        '<div class="row">'+
          '<button data-act="restore">Restore</button>'+
          '<button data-act="download">Download</button>'+
          (s.type==="autosave"?'':'<button class="hot" data-act="delete">Delete</button>')+
        '</div>'+
      '</div>'
    ).join("");

    list.querySelectorAll("[data-snapshot]").forEach(card=>{
      const id=card.dataset.snapshot;
      const rec=snaps.find(s=>s.id===id);
      card.querySelector('[data-act="restore"]')?.addEventListener("click",()=>ProjectPersistence.restoreRecord(rec));
      card.querySelector('[data-act="download"]')?.addEventListener("click",()=>ProjectPersistence.downloadSnapshot(rec));
      card.querySelector('[data-act="delete"]')?.addEventListener("click",async()=>{
        if(confirm("Delete this snapshot?")){
          await ProjectPersistence.delete("snapshots",id);
          Studio.open("system.persistence");
        }
      });
    });
  },
  actions(root){
    root.innerHTML='<button class="primary" onclick="ProjectPersistence.saveSnapshot().then(()=>alert(\'Snapshot saved.\'))">Save Snapshot</button><button onclick="ProjectPersistence.restoreLatest()">Restore AutoSave</button><button onclick="Studio.open(\'build.validate\')">Health Check</button>';
  },
  properties(panel){
    panel.innerHTML='<div class="muted">AutoSave protects this browser session. Export .kgbproject files and production packages for portable backups.</div>';
  }
});

/*
-------------------------------------------------------------------------------
LAYOUT CONTROLS

The Studio shell has three columns:
- left: Operation Explorer
- center: active module workspace
- right: Intelligence / Comms

Canvas-heavy tools need more space, so these controls let the user collapse
either sidebar or enter full workspace focus mode. This is intentionally done
with body classes so it stays safe and does not disturb module code.
-------------------------------------------------------------------------------
*/
const LayoutControls={
  toggleLeft(){
    document.body.classList.toggle("left-collapsed");
    // Leaving focus mode when manually toggling a panel makes the behavior clearer.
    document.body.classList.remove("workspace-focus");
    Studio.log(document.body.classList.contains("left-collapsed")?"Explorer collapsed":"Explorer expanded");
  },

  toggleRight(){
    document.body.classList.toggle("right-collapsed");
    document.body.classList.remove("workspace-focus");
    Studio.log(document.body.classList.contains("right-collapsed")?"Intel collapsed":"Intel expanded");
  },

  toggleFocus(){
    document.body.classList.toggle("workspace-focus");
    Studio.log(document.body.classList.contains("workspace-focus")?"Workspace focus enabled":"Workspace focus disabled");
  },

  reset(){
    document.body.classList.remove("left-collapsed","right-collapsed","workspace-focus");
    Studio.log("Workspace layout reset.");
  }
};

an);border-radius:16px;box-shadow:0 0 30px #00eaff55;color:var(--txt)}.modalHead{position:sticky;top:0;display:flex;justify-content:space-between;align-items:center;gap:10px;background:#09171c;border-bottom:1px solid #1b3d45;padding:10px 12px}.modalHead b{color:var(--hot);letter-spacing:.04em}.modalBody{padding:12px 14px;line-height:1.45}.modalBody h3{color:#cffaff;margin:14px 0 6px}.modalBody ul{margin:6px 0 10px 20px;padding:0}.modalBody li{margin:4px 0}.modalBody code{background:#020506;border:1px solid #173941;border-radius:5px;padding:1px 4px;color:#fff400}.kbd{display:inline-block;border:1px solid #28535b;border-bottom-width:3px;border-radius:5px;padding:0 5px;background:#0b1a20;color:#dffcff;font-weight:800}\ndetails{border:1px solid #173941;border-radius:12px;background:#081217;margin:8px 0;overflow:hidden}summary{list-style:none;cursor:pointer;padding:10px 11px;font-weight:950;color:#cffaff;background:#0a1a20;border-bottom:1px solid #173941}summary::-webkit-details-marker{display:none}summary:after{content:'+';float:right;color:var(--hot)}details[open] summary:after{content:'\u2013'}details .inside{padding:8px}.miniBar{display:flex;gap:6px;overflow:auto;padding-bottom:2px}.miniBar button{white-space:nowrap}.compactLabel{font-size:11px;color:#9bc4ca;text-transform:uppercase;letter-spacing:.04em;margin-top:4px}.styleBox{border:1px solid #173941;border-radius:12px;padding:8px;background:#071116}.styleGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.styleButtons{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.styleButtons.wide{grid-template-columns:1fr 1fr 1fr 1fr 1fr}.quickTools{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.quickTools button{padding:7px 4px;font-size:12px}\n@media(max-width:1050px){html,body{overflow:hidden}.topbar{height:44px}.brand{font-size:14px}.topActions button{font-size:12px;padding:5px 7px;min-height:30px}main{display:grid;grid-template-rows:50vh 50vh;grid-template-columns:50% 50%;min-height:0}.stage{grid-row:1;grid-column:1 / span 2;height:50vh;position:sticky;top:0;z-index:2}.panel{grid-row:2;grid-column:1;height:50vh;min-width:0;overflow:auto;border:0;border-top:1px solid var(--line);border-right:1px solid var(--line);padding:7px}.right{grid-row:2;grid-column:2;height:50vh;min-width:0;overflow:auto;border:0;border-top:1px solid var(--line);padding:7px}canvas{width:min(96vw,49vh);height:min(96vw,49vh)}.hud{font-size:10px;padding:5px}.grid,.three,.styleGrid,.styleButtons,.styleButtons.wide{grid-template-columns:1fr}.row{gap:6px}.row button,.row .filebtn{flex:1 1 auto}.quickTools{grid-template-columns:1fr 1fr}.palette{grid-template-columns:repeat(4,1fr)}summary{padding:9px}.inside{padding:7px}.desktopOnly{display:none!important}}\n</style>\n</head>\n<body>\n<header class=\"topbar\">\n  <div class=\"brand\">KGB SHAPE FORGE v6.4</div>\n  <div class=\"topActions\">\n    <button id=\"undoBtn\" class=\"tiny\" data-hint=\"Undo the last drawing/edit step.\">Undo</button>\n    <button id=\"redoBtn\" class=\"tiny\" data-hint=\"Redo the last undone step.\">Redo</button>\n    <button id=\"helpBtn\" class=\"tiny primary\" data-hint=\"Open the built-in README/help guide.\">Help</button>\n    <button id=\"clearBtn\" class=\"tiny danger\" data-hint=\"Clear the project canvas.\">Clear</button>\n  </div>\n</header>\n<main>\n<section class=\"panel\">\n  <details open>\n    <summary>Tools</summary>\n    <div class=\"inside\">\n      <div class=\"quickTools\" id=\"tools\">\n        <button data-tool=\"select\" class=\"active\" data-hint=\"Select objects. Drag to move. Use corner handles to scale, the top handle to rotate, and multi-select for shape operations.\">Select</button>\n        <button data-tool=\"pen\" data-hint=\"Freehand pen. Creates a procedural path using current stroke, width, glow, and opacity.\">Pen</button>\n        <button data-tool=\"smooth\" data-hint=\"Smooth pen. Records hand movement, then exports smoother quadratic curves.\">Smooth</button>\n        <button data-tool=\"line\" data-hint=\"Straight line tool. Drag from start to end.\">Line</button>\n        <button data-tool=\"bezier\" data-hint=\"Bezier tool. Tap start, control 1, control 2, end. Hit Finish Bezier when done.\">Bezier</button>\n        <button data-tool=\"bucket\" data-hint=\"Fill bucket. If objects are selected, changes their fill/stroke. If nothing selected, adds a background fill object.\">Bucket</button>\n        <button data-tool=\"ellipse\" data-hint=\"Ellipse/circle tool. Drag to size. Turn Shape Fill ON for filled ellipses.\">Ellipse</button>\n        <button data-tool=\"rect\" data-hint=\"Rounded rectangle tool. Drag to size. Use radius slider for corner roundness.\">Round Rect</button>\n        <button data-tool=\"poly\" data-hint=\"Rounded polygon tool. Pick side count, drag to size, and use roundness to soften corners.\">Polygon</button>\n        <button data-tool=\"eraser\" data-hint=\"Eraser draws destination-out strokes. Useful for carving visual gaps.\">Eraser</button>\n      </div>\n      <div class=\"row\"><button id=\"finishBezierBtn\" class=\"tiny\" data-hint=\"Turns placed Bezier points into one curve object.\">Finish Bezier</button><button id=\"clearBezierBtn\" class=\"tiny\" data-hint=\"Clears Bezier points without making a shape.\">Clear Bezier</button></div>\n      <div class=\"row\"><button id=\"fillToggle\" data-hint=\"When ON, new ellipses, rectangles, and polygons use the Fill Color.\">Shape Fill: OFF</button><button id=\"mirrorToggle\" data-hint=\"When ON, drawing on one side also creates a mirrored partner across the centerline.\">Mirror: OFF</button></div>\n      <div class=\"tinyNote\" id=\"toolHelp\">Hold a button for a hint. Desktop hover works too.</div>\n    </div>\n  </details>\n\n  <details open>\n    <summary>Stroke / Fill</summary>\n    <div class=\"inside styleBox\">\n      <div class=\"styleGrid\">\n        <label><span class=\"compactLabel\">Stroke</span><input id=\"strokeColor\" type=\"color\" value=\"#ff9700\"></label>\n        <label><span class=\"compactLabel\">Fill</span><input id=\"fillColor\" type=\"color\" value=\"#05090a\"></label>\n      </div>\n      <div class=\"palette\" id=\"palette\"></div>\n      <div class=\"styleButtons wide\"><button id=\"applyStrokeBtn\" class=\"tiny\" title=\"Apply current stroke color to selected objects.\">Stroke Color</button><button id=\"applyStrokeWidthBtn\" class=\"tiny\" title=\"Apply current line width to selected objects.\">Stroke Width</button><button id=\"applyStrokeBothBtn\" class=\"tiny\" title=\"Apply current stroke color and line width to selected objects.\">Stroke Both</button><button id=\"applyFillBtn\" class=\"tiny\" title=\"Apply current fill color to selected objects.\">Fill</button><button id=\"applyAllStyleBtn\" class=\"tiny primary\" title=\"Apply stroke, fill, width, glow, and opacity to selected objects.\">All Style</button></div>\n      <label>Line width <input id=\"lineWidth\" type=\"range\" min=\"1\" max=\"54\" value=\"7\"><span id=\"lineWidthVal\" class=\"small\"></span></label>\n      <label>Glow blur <input id=\"glowBlur\" type=\"range\" min=\"0\" max=\"80\" value=\"18\"><span id=\"glowBlurVal\" class=\"small\"></span></label>\n      <label>Opacity <input id=\"opacity\" type=\"range\" min=\"0.05\" max=\"1\" step=\"0.05\" value=\"1\"><span id=\"opacityVal\" class=\"small\"></span></label>\n    </div>\n  </details>\n\n  <details>\n    <summary>Shape Settings</summary>\n    <div class=\"inside col\">\n      <label>Round rect radius <input id=\"radius\" type=\"range\" min=\"0\" max=\"120\" value=\"18\"><span id=\"radiusVal\" class=\"small\"></span></label>\n      <label>Polygon sides <input id=\"polySides\" type=\"range\" min=\"3\" max=\"12\" step=\"1\" value=\"3\"><span id=\"polySidesVal\" class=\"small\"></span></label>\n      <label>Polygon roundness <input id=\"polyRound\" type=\"range\" min=\"0\" max=\"0.48\" step=\"0.02\" value=\"0.18\"><span id=\"polyRoundVal\" class=\"small\"></span></label>\n      <label>Smoothing <input id=\"smoothness\" type=\"range\" min=\"0\" max=\"1\" step=\"0.05\" value=\"0.55\"><span id=\"smoothnessVal\" class=\"small\"></span></label>\n    </div>\n  </details>\n</section>\n<section class=\"stage\">\n  <div class=\"wrap\"><canvas id=\"drawCanvas\" width=\"768\" height=\"768\"></canvas><div class=\"hud\" id=\"hud\">Static canvas. Bottom panels scroll. Trace guides are not exported.</div></div>\n</section>\n<section class=\"panel right\">\n  <details open>\n    <summary>Selection</summary>\n    <div class=\"inside\">\n      <div id=\"selectionInfo\" class=\"pill\">None</div>\n      <div class=\"row\"><button id=\"multiToggle\" data-hint=\"Lets you select multiple objects. Needed for Union/Subtract/Intersect.\">Multi Select: OFF</button><button id=\"selectAllBtn\" class=\"tiny\">Select All</button><button id=\"clearSelBtn\" class=\"tiny\">Clear Sel</button></div>\n      <div class=\"row\"><button id=\"bringForwardBtn\" class=\"tiny\">Bring Forward</button><button id=\"sendBackBtn\" class=\"tiny\">Send Back</button><button id=\"dupBtn\" class=\"tiny\">Duplicate</button><button id=\"deleteBtn\" class=\"tiny danger\">Delete</button></div>\n    </div>\n  </details>\n\n  <details open>\n    <summary>Transform</summary>\n    <div class=\"inside col\">\n      <label class=\"check\"><input id=\"ratioLock\" type=\"checkbox\" checked> Lock ratio</label>\n      <label>Scale X / squash-stretch <input id=\"scaleX\" type=\"range\" min=\"0.1\" max=\"3\" step=\"0.05\" value=\"1\"></label>\n      <label>Scale Y / squash-stretch <input id=\"scaleY\" type=\"range\" min=\"0.1\" max=\"3\" step=\"0.05\" value=\"1\"></label>\n      <label>Rotate <input id=\"rotate\" type=\"range\" min=\"-180\" max=\"180\" step=\"1\" value=\"0\"></label>\n      <div class=\"row\"><button id=\"applyTransformBtn\" class=\"tiny primary\">Apply Sliders</button><button id=\"resetTransformBtn\" class=\"tiny\">Reset</button><button id=\"bakeBtn\" class=\"tiny warn\">Bake</button></div>\n    </div>\n  </details>\n\n  <details>\n    <summary>Shape Ops</summary>\n    <div class=\"inside\">\n      <div class=\"row\"><button id=\"unionBtn\" class=\"primary\">Merge / Union</button><button id=\"subtractBtn\" class=\"warn\">Subtract</button><button id=\"intersectBtn\" class=\"primary\">Intersect</button></div>\n    </div>\n  </details>\n\n  <details>\n    <summary>Trace Image</summary>\n    <div class=\"inside col\">\n      <label class=\"filebtn\">Load Trace Image<input id=\"traceInput\" type=\"file\" accept=\"image/*\" class=\"hidden\"></label>\n      <label>Trace opacity <input id=\"traceOpacity\" type=\"range\" min=\"0\" max=\"1\" step=\"0.05\" value=\"0.45\"></label>\n      <label>Trace scale <input id=\"traceScale\" type=\"range\" min=\"0.1\" max=\"3\" step=\"0.05\" value=\"1\"></label>\n      <div class=\"row\"><button id=\"traceCenterBtn\" class=\"tiny\">Center</button><button id=\"traceFitBtn\" class=\"tiny\">Fit</button><button id=\"traceToggle\" class=\"tiny\">Hide/Show</button><button id=\"clearTraceBtn\" class=\"tiny danger\">Clear</button></div>\n    </div>\n  </details>\n\n  <details>\n    <summary>Animation / Onion</summary>\n    <div class=\"inside col\">\n      <div class=\"row\"><button id=\"prevFrameBtn\" class=\"tiny\">Prev</button><button id=\"nextFrameBtn\" class=\"tiny\">Next</button><button id=\"addFrameBtn\" class=\"tiny primary\">Add Frame</button><button id=\"dupFrameBtn\" class=\"tiny\">Dup Frame</button><button id=\"delFrameBtn\" class=\"tiny danger\">Del Frame</button></div>\n      <label class=\"check\"><input id=\"onionToggle\" type=\"checkbox\"> Onion skin</label>\n      <label>FPS <input id=\"fps\" type=\"range\" min=\"1\" max=\"24\" value=\"8\"><span id=\"fpsVal\" class=\"small\"></span></label>\n      <div class=\"row\"><button id=\"playBtn\" class=\"tiny\">Play</button><button id=\"stopBtn\" class=\"tiny\">Stop</button></div>\n    </div>\n  </details>\n\n  <details>\n    <summary>File / Export</summary>\n    <div class=\"inside col\">\n      <div class=\"row\"><button id=\"saveProjectBtn\">Save JSON</button><label class=\"filebtn\">Load JSON<input id=\"loadProjectInput\" type=\"file\" accept=\"application/json\" class=\"hidden\"></label></div>\n      <div class=\"row\"><button id=\"exportHtmlBtn\" class=\"primary\">Export HTML</button><button id=\"exportJsBtn\">Export JS</button><button id=\"exportAnimBtn\" class=\"warn\">Export Animation</button></div>\n      <textarea id=\"output\" placeholder=\"Exported code appears here.\"></textarea>\n      <div class=\"row\"><button id=\"copyBtn\">Copy Output</button><button id=\"downloadBtn\">Download Output</button></div>\n    </div>\n  </details>\n\n  <details>\n    <summary>Objects</summary>\n    <div class=\"inside\" id=\"objectList\"></div>\n  </details>\n</section>\n</main>\n<div class=\"hint\" id=\"hint\"></div>\n<div class=\"modal\" id=\"helpModal\" aria-hidden=\"true\">\n  <div class=\"modalCard\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"helpTitle\">\n    <div class=\"modalHead\">\n      <b id=\"helpTitle\">KGB Sprite Forge README</b>\n      <button id=\"closeHelpBtn\" class=\"tiny danger\">Close</button>\n    </div>\n    <div class=\"modalBody\">\n      <h3>Core idea</h3>\n      <p>This tool is a canvas-sprite forge. You draw vector-ish canvas objects, edit them, then export JavaScript/HTML that redraws the sprite with <code>ctx</code> commands instead of PNG assets.</p>\n\n      <h3>Top buttons</h3>\n      <ul>\n        <li><b>Undo / Redo</b> walk backward or forward through edits.</li>\n        <li><b>Help</b> opens this guide.</li>\n        <li><b>Clear</b> wipes the current project.</li>\n      </ul>\n\n      <h3>Drawing tools</h3>\n      <ul>\n        <li><b>Select</b>: pick objects. Drag selected objects to move them. Use corner handles to resize. Use the top round handle to rotate.</li>\n        <li><b>Pen</b>: freehand stroke. Best for organic outlines, fur marks, scratches, wrinkles, and neon details.</li>\n        <li><b>Smooth</b>: freehand stroke that gets softened into smoother curves after drawing.</li>\n        <li><b>Line</b>: straight segment.</li>\n        <li><b>Bezier</b>: tap/click points in this order: start, control 1, control 2, end. Then use <b>Finish Bezier</b>.</li>\n        <li><b>Bucket</b>: changes selected object fill/stroke, or creates a full-canvas fill if nothing is selected.</li>\n        <li><b>Ellipse</b>, <b>Round Rect</b>, <b>Polygon</b>: drag to create basic shapes. Polygon sides and roundness are adjustable.</li>\n        <li><b>Eraser</b>: carves visual gaps with a destination-out stroke.</li>\n      </ul>\n\n      <h3>Stroke / fill / glow</h3>\n      <ul>\n        <li><b>Stroke color</b> controls outlines and pen/line color.</li>\n        <li><b>Fill color</b> controls filled shapes and compound shape fills.</li>\n        <li><b>Stroke Color</b> changes only the selected object stroke color. <b>Stroke Width</b> changes only stroke thickness. <b>Stroke Both</b> changes both. <b>Fill</b> changes fill. <b>All Style</b> applies color, width, glow, and opacity.</li>\n        <li><b>Glow</b> is canvas shadow blur. Higher glow = more neon bloom.</li>\n      </ul>\n\n      <h3>Shape operations</h3>\n      <ul>\n        <li>Select at least two filled-ish shapes, then use <b>Merge / Union</b>, <b>Subtract</b>, or <b>Intersect</b>.</li>\n        <li><b>Merge / Union</b> combines selected shapes into one compound silhouette.</li>\n        <li><b>Subtract</b> uses the oldest/bottom selected object as the base and cuts the other selected shapes out of it.</li>\n        <li><b>Intersect</b> keeps only the overlapping area.</li>\n        <li>Compound shapes keep a restylable bitmap-style stroke/outline. Stroke color and stroke width can be changed after merge/subtract/intersect.</li>\n      </ul>\n\n      <h3>Trace image</h3>\n      <ul>\n        <li><b>Load Image</b> puts a reference image underneath your drawing so you can trace over it.</li>\n        <li><b>Trace ON/OFF</b> hides or shows it. <b>Fit</b> sizes it to the canvas. <b>Center</b> recenters it.</li>\n        <li>On desktop, switch to Select and hold <span class=\"kbd\">T</span> while dragging the canvas to move the trace image.</li>\n      </ul>\n\n      <h3>Onion skin</h3>\n      <p>Onion skin is an animation aid. It lightly shows the previous frame/pose behind the current drawing so you can line up movement. Think old-school animation paper: faint previous pose under the new pose.</p>\n\n      <h3>Animation export</h3>\n      <p><b>Export Animated HTML</b> wraps your sprite in a tiny demo loop. It adds a procedural wobble/squash/rotate animation around the sprite center. It is not a full animation timeline yet; it is a starting export so you can see how to animate the generated canvas sprite in a game loop.</p>\n\n      <h3>Practical workflow</h3>\n      <ul>\n        <li>Load a trace image.</li>\n        <li>Build the big silhouette with ellipse/rect/polygon + shape ops.</li>\n        <li>Add neon outlines and details with Pen/Smooth/Bezier.</li>\n        <li>Select pieces and tweak scale/rotation/style until the sprite reads clearly.</li>\n        <li>Export JS or HTML and paste the draw function into your game.</li>\n      </ul>\n    </div>\n  </div>\n</div>\n\n<script>\nconst canvas=document.getElementById('drawCanvas'),ctx=canvas.getContext('2d'),$=id=>document.getElementById(id);\nctx.lineCap='round';ctx.lineJoin='round';\nconst ui={stroke:$('strokeColor'),fill:$('fillColor'),width:$('lineWidth'),glow:$('glowBlur'),opacity:$('opacity'),radius:$('radius'),smooth:$('smoothness'),sides:$('polySides'),round:$('polyRound'),sx:$('scaleX'),sy:$('scaleY'),rot:$('rotate'),out:$('output')};\nconst palette=['#ff9700','#ffb000','#ff5a00','#9cff00','#62ff00','#00eaff','#00baff','#008dff','#ff4766','#fff400','#05090a','#ffffff'];\nconst clone=o=>JSON.parse(JSON.stringify(o));\nlet tool='select',shapeFill=false,mirrorOn=false,multi=false,drawing=false,start=null,current=null,history=[],redo=[],bezierPts=[];\nlet selected=[],dragging=false,dragStart=null,baseCmds=null,handleMode=null,keys={},traceDragging=false;\nlet project={w:768,h:768,commands:[],trace:{src:null,visible:true,opacity:.35,x:0,y:0,scale:1,w:0,h:0}};\nlet traceImg=new Image();\nfunction settings(){return{stroke:ui.stroke.value,fill:ui.fill.value,width:+ui.width.value,glow:+ui.glow.value,opacity:+ui.opacity.value,radius:+ui.radius.value,smooth:+ui.smooth.value,fillOn:shapeFill,sides:+ui.sides.value,round:+ui.round.value}}\nfunction activeCmds(){return project.commands}\nfunction pushHistory(){history.push(JSON.stringify(project));if(history.length>80)history.shift();redo.length=0}\nfunction restore(str){project=JSON.parse(str);selected=[];loadTraceFromProject();syncUI();render()}\nfunction centerOf(c){const b=boundsOf(c);return{x:(b.x1+b.x2)/2,y:(b.y1+b.y2)/2}}\nfunction ensureTr(c){if(!c.tr){const cc=centerOf(c);c.tr={x:0,y:0,sx:1,sy:1,rot:0,cx:cc.x,cy:cc.y}}return c.tr}\nfunction pointer(e){const r=canvas.getBoundingClientRect();const p=e.touches?e.touches[0]:e;return{x:(p.clientX-r.left)*canvas.width/r.width,y:(p.clientY-r.top)*canvas.height/r.height}}\nfunction roundRectPath(c,x,y,w,h,r){if(w<0){x+=w;w=-w}if(h<0){y+=h;h=-h}r=Math.min(r,Math.abs(w)/2,Math.abs(h)/2);c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath()}\nfunction polygonPoints(cx,cy,rx,ry,sides,rot=-Math.PI/2){let pts=[];for(let i=0;i<sides;i++){const a=rot+i*Math.PI*2/sides;pts.push({x:cx+Math.cos(a)*rx,y:cy+Math.sin(a)*ry})}return pts}\nfunction roundedPolyPath(c,pts,round=.18){c.beginPath();if(round<=0){c.moveTo(pts[0].x,pts[0].y);pts.slice(1).forEach(p=>c.lineTo(p.x,p.y));c.closePath();return}for(let i=0;i<pts.length;i++){const p0=pts[(i-1+pts.length)%pts.length],p=pts[i],p1=pts[(i+1)%pts.length];const d0=Math.hypot(p.x-p0.x,p.y-p0.y),d1=Math.hypot(p.x-p1.x,p.y-p1.y);const r=Math.min(d0,d1)*round;const a={x:p.x+(p0.x-p.x)*(r/d0),y:p.y+(p0.y-p.y)*(r/d0)};const b={x:p.x+(p1.x-p.x)*(r/d1),y:p.y+(p1.y-p.y)*(r/d1)};if(i===0)c.moveTo(a.x,a.y);else c.lineTo(a.x,a.y);c.quadraticCurveTo(p.x,p.y,b.x,b.y)}c.closePath()}\nfunction applyTransform(c,cmd){const tr=ensureTr(cmd);c.translate(tr.x||0,tr.y||0);c.translate(tr.cx||384,tr.cy||384);c.rotate((tr.rot||0)*Math.PI/180);c.scale(tr.sx||1,tr.sy||1);c.translate(-(tr.cx||384),-(tr.cy||384))}\nfunction drawPathShape(c,cmd,forHit=false){if(cmd.kind==='path'||cmd.kind==='erase'){const pts=cmd.points;if(!pts?.length)return;c.beginPath();c.moveTo(pts[0].x,pts[0].y);if(cmd.curve&&pts.length>3){for(let i=1;i<pts.length-2;i++){let xc=(pts[i].x+pts[i+1].x)/2,yc=(pts[i].y+pts[i+1].y)/2;c.quadraticCurveTo(pts[i].x,pts[i].y,xc,yc)}c.quadraticCurveTo(pts[pts.length-2].x,pts[pts.length-2].y,pts.at(-1).x,pts.at(-1).y)}else pts.slice(1).forEach(p=>c.lineTo(p.x,p.y));return}\n if(cmd.kind==='line'){c.beginPath();c.moveTo(cmd.x1,cmd.y1);c.lineTo(cmd.x2,cmd.y2);return}\n if(cmd.kind==='bezier'){c.beginPath();c.moveTo(cmd.points[0].x,cmd.points[0].y);for(let i=1;i+2<cmd.points.length;i+=3)c.bezierCurveTo(cmd.points[i].x,cmd.points[i].y,cmd.points[i+1].x,cmd.points[i+1].y,cmd.points[i+2].x,cmd.points[i+2].y);return}\n if(cmd.kind==='ellipse'){c.beginPath();c.ellipse((cmd.x1+cmd.x2)/2,(cmd.y1+cmd.y2)/2,Math.abs(cmd.x2-cmd.x1)/2,Math.abs(cmd.y2-cmd.y1)/2,0,0,Math.PI*2);return}\n if(cmd.kind==='rect'){roundRectPath(c,cmd.x1,cmd.y1,cmd.x2-cmd.x1,cmd.y2-cmd.y1,cmd.s?.radius||18);return}\n if(cmd.kind==='poly'){roundedPolyPath(c,polygonPoints((cmd.x1+cmd.x2)/2,(cmd.y1+cmd.y2)/2,Math.abs(cmd.x2-cmd.x1)/2,Math.abs(cmd.y2-cmd.y1)/2,cmd.s?.sides||3,-Math.PI/2),cmd.s?.round??.18);return}\n}\nfunction compoundMask(cmd){const o=document.createElement('canvas'),oc=o.getContext('2d');o.width=o.height=768;oc.lineCap='round';oc.lineJoin='round';function part(p,mode,target=oc){target.save();target.globalCompositeOperation=mode;target.fillStyle='#fff';target.strokeStyle='#fff';target.lineWidth=Math.max(2,p.s?.width||2);applyTransform(target,p);drawPathShape(target,p);if(['path','line','bezier','erase'].includes(p.kind)&&!p.s?.fillOn)target.stroke();else target.fill();target.restore()}if(cmd.op==='union')cmd.parts.forEach(p=>part(p,'source-over'));if(cmd.op==='subtract'){part(cmd.parts[0],'source-over');cmd.parts.slice(1).forEach(p=>part(p,'destination-out'))}if(cmd.op==='intersect'){part(cmd.parts[0],'source-over');cmd.parts.slice(1).forEach(p=>{const t=document.createElement('canvas'),tc=t.getContext('2d');t.width=t.height=768;tc.lineCap='round';tc.lineJoin='round';part(p,'source-over',tc);oc.globalCompositeOperation='destination-in';oc.drawImage(t,0,0);oc.globalCompositeOperation='source-over'})}return o}\nfunction drawCompound(c,cmd){\n  const mask=compoundMask(cmd),fillLayer=document.createElement('canvas'),fc=fillLayer.getContext('2d'),strokeLayer=document.createElement('canvas'),sc=strokeLayer.getContext('2d');\n  fillLayer.width=fillLayer.height=strokeLayer.width=strokeLayer.height=768;\n  const fill=cmd.s?.fill||'#ff9700',stroke=cmd.s?.stroke||fill,width=Math.max(0,cmd.s?.width??7),glow=cmd.s?.glow||0;\n  if(width>0){\n    const steps=Math.max(12,Math.ceil(width*2.5));\n    for(let i=0;i<steps;i++){\n      const a=i*Math.PI*2/steps,dx=Math.cos(a)*width,dy=Math.sin(a)*width;\n      sc.drawImage(mask,dx,dy);\n    }\n    sc.globalCompositeOperation='destination-out';\n    sc.drawImage(mask,0,0);\n    sc.globalCompositeOperation='source-in';\n    sc.fillStyle=stroke;\n    sc.fillRect(0,0,768,768);\n    sc.globalCompositeOperation='source-over';\n  }\n  fc.fillStyle=fill;fc.fillRect(0,0,768,768);fc.globalCompositeOperation='destination-in';fc.drawImage(mask,0,0);fc.globalCompositeOperation='source-over';\n  c.save();c.shadowColor=stroke;c.shadowBlur=glow;c.drawImage(strokeLayer,0,0);c.restore();\n  c.save();c.shadowColor=fill;c.shadowBlur=Math.max(0,glow*.45);c.drawImage(fillLayer,0,0);c.restore();\n}\nfunction drawCommand(c,cmd,ghost=false){c.save();c.globalAlpha=(cmd.s?.opacity??1)*(ghost?.55:1);if(cmd.kind==='fill'){c.fillStyle=cmd.s.fill;c.fillRect(0,0,768,768);c.restore();return}applyTransform(c,cmd);if(cmd.kind==='compound'){drawCompound(c,cmd);c.restore();return}if(cmd.kind==='erase'){c.globalCompositeOperation='destination-out';c.lineWidth=cmd.s?.width||7;drawPathShape(c,cmd);c.stroke();c.restore();return}c.strokeStyle=cmd.s?.stroke||'#ff9700';c.fillStyle=cmd.s?.fill||'#05090a';c.lineWidth=cmd.s?.width||7;c.shadowColor=(cmd.s?.glow||0)>0?c.strokeStyle:'transparent';c.shadowBlur=cmd.s?.glow||0;drawPathShape(c,cmd);if(cmd.s?.fillOn && ['ellipse','rect','poly'].includes(cmd.kind))c.fill();c.stroke();c.restore()}\nfunction render(){ctx.clearRect(0,0,768,768);ctx.fillStyle='#020506';ctx.fillRect(0,0,768,768);if(project.trace.visible&&traceImg.complete&&traceImg.naturalWidth&&project.trace.src){ctx.save();ctx.globalAlpha=project.trace.opacity;ctx.drawImage(traceImg,project.trace.x,project.trace.y,traceImg.width*project.trace.scale,traceImg.height*project.trace.scale);ctx.restore()}activeCmds().forEach(c=>drawCommand(ctx,c));if(current)drawCommand(ctx,current,true);drawBezierPreview();drawSelection();syncUI(false)}\nfunction drawBezierPreview(){if(!bezierPts.length)return;ctx.save();ctx.strokeStyle='#fff400';ctx.fillStyle='#fff400';ctx.lineWidth=2;ctx.shadowColor='#fff400';ctx.shadowBlur=10;ctx.beginPath();ctx.moveTo(bezierPts[0].x,bezierPts[0].y);for(let i=1;i+2<bezierPts.length;i+=3)ctx.bezierCurveTo(bezierPts[i].x,bezierPts[i].y,bezierPts[i+1].x,bezierPts[i+1].y,bezierPts[i+2].x,bezierPts[i+2].y);ctx.stroke();bezierPts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill()});ctx.restore()}\nfunction transformedBounds(cmd){const b=boundsOf(cmd),tr=ensureTr(cmd);let pts=[{x:b.x1,y:b.y1},{x:b.x2,y:b.y1},{x:b.x2,y:b.y2},{x:b.x1,y:b.y2}].map(p=>transformPoint(p,tr));return{x1:Math.min(...pts.map(p=>p.x)),y1:Math.min(...pts.map(p=>p.y)),x2:Math.max(...pts.map(p=>p.x)),y2:Math.max(...pts.map(p=>p.y))}}\nfunction transformPoint(p,tr){let x=p.x-tr.cx,y=p.y-tr.cy;x*=tr.sx||1;y*=tr.sy||1;const a=(tr.rot||0)*Math.PI/180,ca=Math.cos(a),sa=Math.sin(a);return{x:x*ca-y*sa+tr.cx+(tr.x||0),y:x*sa+y*ca+tr.cy+(tr.y||0)}}\nfunction selectionBounds(){if(!selected.length)return null;let bs=selected.map(i=>transformedBounds(activeCmds()[i]));return{x1:Math.min(...bs.map(b=>b.x1)),y1:Math.min(...bs.map(b=>b.y1)),x2:Math.max(...bs.map(b=>b.x2)),y2:Math.max(...bs.map(b=>b.y2))}}\nfunction drawSelection(){const b=selectionBounds();if(!b)return;ctx.save();ctx.strokeStyle='#00eaff';ctx.lineWidth=2;ctx.setLineDash([8,6]);ctx.strokeRect(b.x1,b.y1,b.x2-b.x1,b.y2-b.y1);ctx.setLineDash([]);const hs=10,pts=handlesFor(b);for(const k in pts){const p=pts[k];ctx.fillStyle=k==='rot'?'#fff400':'#00eaff';ctx.strokeStyle='#001316';ctx.lineWidth=2;ctx.beginPath();if(k==='rot'){ctx.arc(p.x,p.y,7,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.beginPath();ctx.moveTo((b.x1+b.x2)/2,b.y1);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#fff400';ctx.stroke()}else{ctx.rect(p.x-hs/2,p.y-hs/2,hs,hs);ctx.fill();ctx.stroke()}}ctx.restore()}\nfunction handlesFor(b){const mx=(b.x1+b.x2)/2,my=(b.y1+b.y2)/2;return{nw:{x:b.x1,y:b.y1},ne:{x:b.x2,y:b.y1},sw:{x:b.x1,y:b.y2},se:{x:b.x2,y:b.y2},rot:{x:mx,y:b.y1-38},c:{x:mx,y:my}}}\nfunction hitHandle(p){const b=selectionBounds();if(!b)return null;const h=handlesFor(b);for(const k of ['rot','nw','ne','sw','se'])if(Math.hypot(p.x-h[k].x,p.y-h[k].y)<16)return k;return null}\nfunction alphaBoundsOfCanvas(cnv){\n  // Used by compound/shape-op objects. After Union/Subtract/Intersect, the old\n  // component rectangles are no longer accurate. This scans the generated alpha\n  // mask and returns the real visible pixel boundary, so the cyan selection box\n  // hugs the actual compound silhouette instead of the original full rectangle.\n  const w=cnv.width,h=cnv.height,ctx2=cnv.getContext('2d'),data=ctx2.getImageData(0,0,w,h).data;\n  let x1=w,y1=h,x2=0,y2=0,found=false;\n  for(let y=0;y<h;y++){\n    for(let x=0;x<w;x++){\n      if(data[(y*w+x)*4+3]>8){\n        if(x<x1)x1=x;if(y<y1)y1=y;if(x>x2)x2=x;if(y>y2)y2=y;found=true;\n      }\n    }\n  }\n  if(!found)return{x1:0,y1:0,x2:1,y2:1};\n  const pad=Math.max(4,Math.ceil((ui?.width?.valueAsNumber||7)+2));\n  return{x1:Math.max(0,x1-pad),y1:Math.max(0,y1-pad),x2:Math.min(w,x2+pad),y2:Math.min(h,y2+pad)};\n}\nfunction boundsOf(cmd){if(cmd.kind==='fill')return{x1:0,y1:0,x2:768,y2:768};if(cmd.kind==='compound')return alphaBoundsOfCanvas(compoundMask(cmd));if(['path','erase','bezier'].includes(cmd.kind)){let pts=cmd.points||[];return{x1:Math.min(...pts.map(p=>p.x)),y1:Math.min(...pts.map(p=>p.y)),x2:Math.max(...pts.map(p=>p.x)),y2:Math.max(...pts.map(p=>p.y))}}if(cmd.kind==='line')return{x1:Math.min(cmd.x1,cmd.x2),y1:Math.min(cmd.y1,cmd.y2),x2:Math.max(cmd.x1,cmd.x2),y2:Math.max(cmd.y1,cmd.y2)};return{x1:Math.min(cmd.x1,cmd.x2),y1:Math.min(cmd.y1,cmd.y2),x2:Math.max(cmd.x1,cmd.x2),y2:Math.max(cmd.y1,cmd.y2)}}\nfunction hitTest(p){const hc=document.createElement('canvas'),hctx=hc.getContext('2d');hc.width=hc.height=768;for(let i=activeCmds().length-1;i>=0;i--){const c=activeCmds()[i];hctx.clearRect(0,0,768,768);hctx.save();hctx.strokeStyle='#fff';hctx.fillStyle='#fff';hctx.lineWidth=Math.max(12,c.s?.width||7);applyTransform(hctx,c);if(c.kind==='compound'){drawCompound(hctx,c);hctx.restore();if(hctx.getImageData(p.x,p.y,1,1).data[3]>0)return i;continue}drawPathShape(hctx,c,true);if(['ellipse','rect','poly'].includes(c.kind)&&c.s?.fillOn)hctx.fill();hctx.stroke();hctx.restore();if(hctx.getImageData(p.x,p.y,1,1).data[3]>0)return i}return-1}\nfunction addCommand(cmd){cmd.s=cmd.s||settings();ensureTr(cmd);project.commands.push(cmd);if(mirrorOn&&!['fill','compound'].includes(cmd.kind)){let m=clone(cmd);mirrorCmd(m);project.commands.push(m)}selected=[project.commands.length-1];render()}\nfunction mirrorCmd(c){function mx(x){return 768-x}if(c.points)c.points.forEach(p=>p.x=mx(p.x));['x1','x2'].for     if(!bridge)return false;

    if(asset?.project){
      bridge.setProject(asset.project);
      this.setEditingAsset(asset);
      if($("#forgeAssetName"))$("#forgeAssetName").value=asset.name||"Shape Forge Project";
      Studio.log("Loaded Shape Forge asset: "+(asset.name||asset.id));
    }else{
      bridge.newProject();
      this.clearEditingAsset();
      if($("#forgeAssetName"))$("#forgeAssetName").value="New Shape Forge Project";
      Studio.log("Started new Shape Forge project.");
    }

    Studio.renderProps();
    return true;
  },

  buildAssetPayload(){
    const bridge=this.getBridge();
    if(!bridge)throw new Error("Shape Forge is still loading.");

    const forgeProject=bridge.getProject();
    return {
      name:this.currentName(),
      kind:"shape-forge-project",
      adapter:"shape-forge-full",
      folder:"/",
      tags:["shape","forge","standalone","v6.4"],
      notes:"Saved from the full embedded KGB Shape Forge v6.4 module.",
      project:forgeProject,
      commands:forgeProject.commands||[],
      exportedJS:bridge.exportJS(),
      exportedHTML:bridge.exportHTML(false),
      exportedAnimatedHTML:bridge.exportHTML(true),
      previewDataUrl:bridge.getPreviewDataUrl(),
      updated:new Date().toISOString()
    };
  },

  saveNew(){
    const payload=this.buildAssetPayload();
    const saved=Studio.addAsset("shapes",payload);
    this.setEditingAsset(saved);
    Studio.state.selection={type:"shapes",id:saved.id};
    renderExplorer();
    Studio.renderProps();
    Studio.log("Saved new Shape Forge asset: "+saved.name);
  },

  updateExisting(){
    if(!this.currentAssetId){
      alert("No existing Shape Forge asset is currently loaded. Use Save New first.");
      return;
    }
    const payload=this.buildAssetPayload();
    Studio.updateAsset("shapes",this.currentAssetId,payload);
    const refreshed=Studio.find("shapes",this.currentAssetId);
    this.setEditingAsset(refreshed);
    Studio.state.selection={type:"shapes",id:this.currentAssetId};
    renderExplorer();
    Studio.renderProps();
    Studio.log("Updated Shape Forge asset: "+(refreshed?.name||this.currentAssetId));
  },

  filename(name,ext){
    return String(name||"shape_forge_export")
      .toLowerCase()
      .replace(/[^a-z0-9]+/g,"_")
      .replace(/^_+|_+$/g,"")
      .slice(0,64)+"."+ext;
  },

  downloadText(text,name,type="text/plain"){
    const blob=new Blob([text||""],{type});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=name;
    a.click();
    URL.revokeObjectURL(a.href);
  },

  async copyText(text){
    try{
      await navigator.clipboard.writeText(text||"");
      Studio.log("Copied export to clipboard.");
    }catch(e){
      alert("Clipboard copy failed: "+e.message);
    }
  },

  currentExportJS(asset=this.currentAsset){
    const bridge=this.getBridge();
    if(bridge)return bridge.exportJS();
    return asset?.exportedJS||"";
  },

  currentExportHTML(asset=this.currentAsset,animated=false){
    const bridge=this.getBridge();
    if(bridge)return bridge.exportHTML(animated);

    if(animated && asset?.exportedAnimatedHTML)return asset.exportedAnimatedHTML;
    if(!animated && asset?.exportedHTML)return asset.exportedHTML;

    // Fallback for older assets that only saved exportedJS.
    if(asset?.exportedJS){
      return '<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>'+esc(asset.name||"Shape Forge Export")+'</title><style>html,body{margin:0;height:100%;display:grid;place-items:center;background:#05090a}canvas{width:min(92vw,768px);height:auto;background:#020506}</style></head><body><canvas id="c" width="768" height="768"></canvas><script>'+asset.exportedJS+'\nconst canvas=document.getElementById("c"),ctx=canvas.getContext("2d");drawSprite(ctx,0,0,1,0);<\\/script></body></html>';
    }

    return "";
  },

  copyCurrentJS(){
    this.copyText(this.currentExportJS());
  },

  downloadCurrentJS(){
    const name=this.filename(this.currentName(),"js");
    this.downloadText(this.currentExportJS(),name,"text/javascript");
  },

  downloadCurrentHTML(animated=false){
    const name=this.filename(this.currentName()+(animated?"_animated_demo":"_demo"),"html");
    this.downloadText(this.currentExportHTML(this.currentAsset,animated),name,"text/html");
  },

  copyAssetJS(asset){
    this.copyText(asset?.exportedJS||"");
  },

  downloadAssetJS(asset){
    this.downloadText(asset?.exportedJS||"",this.filename(asset?.name||"shape_forge_asset","js"),"text/javascript");
  },

  downloadAssetHTML(asset,animated=false){
    const html=this.currentExportHTML(asset,animated);
    this.downloadText(html,this.filename((asset?.name||"shape_forge_asset")+(animated?"_animated_demo":"_demo"),"html"),"text/html");
  },

  startNewProject(){
    this.loadIntoFrame(null);
  }
};

/*
-------------------------------------------------------------------------------
IN-SESSION EMBEDDED WORKSPACE CACHE

Embedded iframe tools are intentionally isolated. Before Studio opens another
module, this cache snapshots the current iframe state so normal in-session view
changes do not immediately wipe unsaved Slicer/GIF Forge work.
-------------------------------------------------------------------------------
*/
globalThis.KGBWorkspaceCache={
  slicer:null,
  gif:null,
  taio:null,
  capture(){
    try{
      const b=$("#assetSlicerFrame")?.contentWindow?.KGBAssetSlicerBridge;
      if(b?.getWorkspace)this.slicer=b.getWorkspace();
    }catch(e){console.warn("slicer workspace capture failed",e)}
    try{
      const b=$("#gifForgeFrame")?.contentWindow?.KGBGifForgeBridge;
      if(b?.getProjectSync)this.gif=b.getProjectSync();
    }catch(e){console.warn("gif workspace capture failed",e)}
    try{
      const b=$("#taioFrame")?.contentWindow?.KGBTAIOBridge;
      if(b?.getWorkspace)this.taio=b.getWorkspace();
    }catch(e){console.warn("taio workspace capture failed",e)}
  }
};
