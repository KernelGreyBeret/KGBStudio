<style>
:root{--bg:#020607;--panel:#071014;--line:#1b3b42;--text:#d9fff8;--muted:#7aa7a6;--green:#b8ff19;--cyan:#00e5ff;--mag:#ff2bd6;--orange:#ff8a00}
*{box-sizing:border-box}html,body{height:100%;margin:0;background:radial-gradient(circle at 50% 0%,#102124,#020607 45%,#000);color:var(--text);font:14px system-ui,Segoe UI,Arial;overflow:hidden}
button,input,textarea,select{font:inherit}button{border:1px solid #22515b;background:#071014;color:var(--text);border-radius:12px;padding:8px 10px;font-weight:800;cursor:pointer}button:hover{border-color:var(--cyan)}button.active{border-color:var(--green);color:var(--green)}button.primary{background:linear-gradient(#d9ff63,#77d900);color:#071014;border-color:var(--green)}button.hot{border-color:var(--mag)}input,textarea,select{width:100%;background:#02080a;color:var(--text);border:1px solid #21464e;border-radius:12px;padding:9px}textarea{min-height:110px;font-family:monospace}label{display:block;margin:10px 0 5px;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}
.app{height:100%;display:grid;grid-template-rows:58px 54px 1fr}.top,.nav{display:flex;gap:8px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--line);background:rgba(2,6,7,.92);overflow:auto}.brand{font-weight:1000;letter-spacing:.12em;white-space:nowrap}.pill{border:1px solid var(--green);color:var(--green);border-radius:99px;padding:2px 7px;font-size:11px}.status{margin-left:auto;color:var(--muted);white-space:nowrap}.shell{min-height:0;display:grid;grid-template-columns:320px 1fr 330px}.left,.right{min-height:0;overflow:auto;background:rgba(7,16,20,.88);padding:12px;border-right:1px solid var(--line)}.right{border-right:0;border-left:1px solid var(--line)}.center{min-width:0;min-height:0;display:grid;grid-template-rows:54px 1fr}.bar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;border-bottom:1px solid var(--line);background:#02080a}.work{min-height:0;overflow:auto;padding:14px}.card{background:linear-gradient(#0b171c,#040a0c);border:1px solid #1a3c43;border-radius:16px;padding:14px;margin-bottom:12px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.muted{color:var(--muted)}.treeHead{display:flex;justify-content:space-between;align-items:center;color:var(--green);font-weight:1000;border-bottom:1px solid #18373d;margin-top:10px;padding:7px 0}.treeItem{display:flex;justify-content:space-between;align-items:center;gap:8px;border:1px solid #18373d;border-radius:12px;background:#030b0e;margin:7px 0;padding:8px}.treeItem b{font-size:12px}.treeItem span{font-size:11px;color:var(--muted)}pre{white-space:pre-wrap;max-height:260px;overflow:auto;background:#02080a;border:1px solid #18373d;border-radius:12px;padding:10px;color:#bff}.stage{display:grid;place-items:center;min-height:520px;border:1px solid #18373d;border-radius:18px;background:#000;overflow:hidden}canvas{max-width:100%;height:auto;touch-action:none}.sprite{display:grid;grid-template-columns:1fr 270px;gap:12px}.tools{display:grid;grid-template-columns:1fr 1fr;gap:8px}.moduleCard{border:1px solid #21464e;border-radius:14px;padding:12px;background:#030b0e}.badge{background:var(--green);color:#071014;border-radius:99px;padding:2px 7px;font-size:11px;font-weight:1000}.modalBg{position:fixed;inset:0;display:none;place-items:center;background:rgba(0,0,0,.72);z-index:9;padding:18px}.modalBg.show{display:grid}.modal{max-width:880px;width:100%;max-height:88vh;overflow:auto;background:#061014;border:1px solid var(--cyan);border-radius:18px;padding:16px}.cmd{position:fixed;inset:0;display:none;place-items:start center;background:rgba(0,0,0,.65);z-index:10;padding-top:10vh}.cmd.show{display:grid}.cmdBox{width:min(760px,92vw);background:#061014;border:1px solid var(--cyan);border-radius:18px;padding:12px;box-shadow:0 0 40px rgba(0,229,255,.22)}.cmdItem{padding:10px;border:1px solid #18373d;border-radius:12px;margin-top:8px;background:#030b0e;cursor:pointer}.cmdItem:hover{border-color:var(--green)}.thumb{width:100%;aspect-ratio:1.6;border:1px solid #18373d;border-radius:14px;background:#000;display:grid;place-items:center;overflow:hidden;margin-bottom:10px}.thumb canvas{width:100%;height:100%}.mini{font-size:11px;color:var(--muted)}.tag{display:inline-block;border:1px solid #22515b;border-radius:99px;padding:2px 7px;margin:2px;color:var(--cyan);font-size:11px}.shapeShell{display:grid;grid-template-columns:1fr 280px;gap:12px}.shapeTools{display:grid;grid-template-columns:1fr 1fr;gap:8px}.shapeStage{display:grid;place-items:center;min-height:520px;border:1px solid #18373d;border-radius:18px;background:#000;overflow:hidden}@media(max-width:900px){.shapeShell{grid-template-columns:1fr}.shapeStage{min-height:48vh}}
@media(max-width:900px){.shell{grid-template-columns:1fr;grid-template-rows:auto 1fr auto}.left,.right{max-height:28vh;border:0;border-bottom:1px solid var(--line)}.right{border-top:1px solid var(--line)}.grid,.grid3,.sprite{grid-template-columns:1fr}.status{display:none}.stage{min-height:48vh}}

/*
  Workspace Focus UI
  ------------------
  These body classes let the center workspace expand without destroying the
  three-column layout. The columns are still in the DOM, just hidden/collapsed.
*/
body.left-collapsed .shell{grid-template-columns:0 1fr 340px}
body.right-collapsed .shell{grid-template-columns:330px 1fr 0}
body.left-collapsed.right-collapsed .shell{grid-template-columns:0 1fr 0}
body.left-collapsed .left{display:none}
body.right-collapsed .right{display:none}
body.workspace-focus .shell{grid-template-columns:0 1fr 0}
body.workspace-focus .left,body.workspace-focus .right{display:none}
body.workspace-focus .workspaceFocusBtn{border-color:var(--green);color:var(--green)}
body.left-collapsed #toggleLeftBtn,body.right-collapsed #toggleRightBtn{border-color:var(--green);color:var(--green)}
.focusHint{font-size:11px;color:var(--muted)}

<body>
<div class="app">
<header class="top"><div class="brand">KGB STUDIO <span class="pill">v0.8.1</span></div><button id="newBtn">New Operation</button><button id="undoBtn">Undo</button><button id="redoBtn">Redo</button><button id="cmdBtn">Operator Console</button><button id="toggleLeftBtn" title="Collapse/expand Operation Explorer">Explorer</button><button id="toggleRightBtn" title="Collapse/expand Intelligence/Comms">Intel</button><button id="focusBtn" class="workspaceFocusBtn" title="Focus workspace">Focus</button><button id="saveBtn">Save JSON</button><button id="loadBtn">Load JSON</button><input id="loadInput" type="file" accept=".json" hidden><button id="exportBtn">Export</button><button id="helpBtn">Help</button><div id="status" class="status">Ready.</div></header>
<nav id="nav" class="nav"></nav>
<section class="shell">
<aside class="left"><div class="card"><h3>Operation Explorer</h3><label>Operation Name</label><input id="projectName"><label>Search Arsenal</label><input id="filter" placeholder="Search assets, kinds, tags..."><div id="explorer"></div></div></aside>
<main class="center"><div class="bar"><div><b id="title"></b><div id="subtitle" class="muted"></div></div><div id="actions" class="row"></div></div><div id="work" class="work"></div></main>
<aside class="right"><div class="card"><h3>Intelligence</h3><div id="props" class="muted">No asset selected.</div></div><div class="card"><h3>Comms</h3><pre id="log"></pre></div></aside>
</section>
</div>
<div id="modalBg" class="modalBg"><div class="modal"><div class="row" style="justify-content:space-between"><h2 id="modalTitle">Help</h2><button id="closeModal">Close</button></div><div id="modalBody"></div></div></div>
<div id="cmd" class="cmd"><div class="cmdBox"><input id="cmdSearch" placeholder="Type a command..."><div id="cmdList"></div></div></div>

<script>

/*
===============================================================================
KGB STUDIO v0.8.1 — WORKSPACE FOCUS UI

WHY THIS VERSION EXISTS
-----------------------
Shape Forge and future canvas-heavy modules need more room than the default
three-column layout gives them. This is a UI-only quality-of-life patch that
keeps v0.8 functionality intact.

WHAT'S NEW IN v0.8.1
--------------------
- Added Explorer collapse toggle for the left column.
- Added Intel collapse toggle for the right column.
- Added Focus mode to hide both sidebars and expand the workspace.
- Added Ctrl/Cmd+B shortcut for Explorer collapse.
- Added Ctrl/Cmd+I shortcut for Intel collapse.
- Added Ctrl/Cmd+. shortcut for Focus mode.
- Added Operator Console commands for all layout toggles.
- Added comments around LayoutControls.

SAFE ARCHITECTURE RULE
----------------------
This build does not change project schema, adapters, Shape Forge, Sprite Forge,
AssetRegistry, or History. It only changes layout behavior.

REPO ACTION
-----------
Replace root index.html with this file.

SUGGESTED COMMIT
----------------
Add KGB Studio v0.8.1 workspace focus UI

===============================================================================
*/
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const uid=p=>p+"_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,7);
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]||c))}
function safe(s){return String(s||"kgb_project").toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"")}
function dl(n,t,m="text/plain"){const b=new Blob([t],{type:m}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=n;a.click();URL.revokeObjectURL(a.href)}
function project(name="Untitled KGB Game"){const now=new Date().toISOString();return{meta:{name,created:now,updated:now,studioVersion:"0.8.1"},mission:{note:""},assets:{sprites:[],animations:[],shapes:[],particles:[],sounds:[],palettes:[],tiles:[],maps:[],misc:[]},settings:{theme:"kgb-neon",target:"web-pwa"}}}
function norm(p){let b=project(p?.meta?.name);return{...b,...p,meta:{...b.meta,...(p.meta||{})},assets:{...b.assets,...(p.assets||{})},settings:{...b.settings,...(p.settings||{})}}}

/* EVENT BUS: simple pub/sub so modules can emit events without tight coupling. */
const Bus={handlers:{},on(e,fn){(this.handlers[e] ||= []).push(fn)},emit(e,data){(this.handlers[e]||[]).forEach(fn=>fn(data));Studio.log("event: "+e)}};

/* OPERATOR CONSOLE BACKEND: still called Commands internally, but this is our operator search/run system. */
const Commands={
 list:[],
 add(id,label,run){this.list.push({id,label,run})},
 open(){renderCommands();$("#cmd").classList.add("show");$("#cmdSearch").value="";$("#cmdSearch").focus()},
 close(){$("#cmd").classList.remove("show")},
 run(id){let c=this.list.find(x=>x.id===id);if(c){c.run();this.close()}}
};
function renderCommands(){let q=($("#cmdSearch")?.value||"").toLowerCase();$("#cmdList").innerHTML=Commands.list.filter(c=>!q||c.label.toLowerCase().includes(q)||c.id.includes(q)).map(c=>'<div class="cmdItem" data-cmd="'+c.id+'"><b>'+esc(c.label)+'</b><br><span class="muted">'+esc(c.id)+'</span></div>').join("");$("#cmdList").querySelectorAll("[data-cmd]").forEach(x=>x.onclick=()=>Commands.run(x.dataset.cmd))}

/* HISTORY: snapshot-based undo/redo for project-level asset mutations. */
const History={undo:[],redo:[],snapshot(label){Studio.sync();this.undo.push({label,state:JSON.stringify(Studio.state.project)});this.redo=[];updateHistoryButtons()},restore(item){Studio.hydrate(JSON.parse(item.state))},undoIt(){if(!this.undo.length)return;this.redo.push({label:"redo",state:JSON.stringify(Studio.state.project)});this.restore(this.undo.pop());Studio.log("Undo")},redoIt(){if(!this.redo.length)return;this.undo.push({label:"undo",state:JSON.stringify(Studio.state.project)});this.restore(this.redo.pop());Studio.log("Redo")}};
function updateHistoryButtons(){$("#undoBtn").disabled=!History.undo.length;$("#redoBtn").disabled=!History.redo.length}


/*
-------------------------------------------------------------------------------
ASSET REGISTRY FACADE

This is the safe v0.6 version of AssetDB.

Instead of replacing the known-good project.assets arrays, this facade gives us
AssetDB-like capabilities while keeping the existing schema stable.

Later, when we're ready, this can become a true UUID AssetDB. For now it gives:
- all()      -> list every asset across all buckets
- find()     -> search all assets
- get()      -> retrieve an asset by bucket/id
- usedBy()   -> dependency graph foundation
- summary()  -> counts by bucket
-------------------------------------------------------------------------------
*/
const AssetRegistry={
  buckets(){
    return Studio.state.project.assets || {};
  },

  all(){
    const out=[];
    Object.entries(this.buckets()).forEach(([bucket,items])=>{
      (items||[]).forEach(asset=>{
        out.push({bucket,asset});
      });
    });
    return out;
  },

  find(query){
    const q=String(query||"").toLowerCase();
    return this.all().filter(({bucket,asset})=>{
      const text=[
        bucket,
        asset.id,
        asset.name,
        asset.kind,
        asset.adapter,
        ...(asset.tags||[])
      ].join(" ").toLowerCase();
      return !q || text.includes(q);
    });
  },

  get(bucket,id){
    return (this.buckets()[bucket]||[]).find(asset=>asset.id===id);
  },

  usedBy(bucket,id){
    return this.all().filter(({asset})=>{
      return (asset.dependencies||[]).some(dep=>dep.bucket===bucket && dep.id===id);
    });
  },

  summary(){
    const rows={};
    Object.entries(this.buckets()).forEach(([bucket,items])=>{
      rows[bucket]=(items||[]).length;
    });
    return rows;
  }
};

/*
-------------------------------------------------------------------------------
ASSET PREVIEW HELPERS

The Intelligence panel needs a fast way to preview selected assets.

For now:
- Sprite assets with procedural objects are drawn on a mini canvas.
- Other assets get a labeled tactical placeholder card.

This stays intentionally simple so it cannot break the working editor.
-------------------------------------------------------------------------------
*/
function renderAssetPreview(asset,canvas){
  if(!canvas)return;

  const ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Dark tactical background.
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Light grid gives every preview the same KGB Studio visual language.
  ctx.strokeStyle="#00e5ff33";
  ctx.lineWidth=1;
  for(let x=0;x<canvas.width;x+=24){
    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,canvas.height);
    ctx.stroke();
  }
  for(let y=0;y<canvas.height;y+=24){
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();
  }

  // Sprite Forge assets currently store procedural objects directly on asset.objects.
  if(asset?.objects?.length){
    ctx.save();
    ctx.scale(0.36,0.36);
    ctx.translate(170,35);

    // Reuse SpriteForge.draw safely by temporarily pointing its ctx at preview ctx.
    const oldCtx=SpriteForge.ctx;
    SpriteForge.ctx=ctx;
    asset.objects.forEach(o=>SpriteForge.draw(o));
    SpriteForge.ctx=oldCtx;

    ctx.restore();
    return;
  }

  // Shape Forge assets store vector objects on asset.shapes.
  if(asset?.shapes?.length && typeof ShapeForge!=="undefined"){
    ctx.save();
    ctx.scale(0.36,0.36);
    ctx.translate(170,35);

    // Reuse ShapeForge.drawShape safely by temporarily pointing its ctx at preview ctx.
    const oldCtx=ShapeForge.ctx;
    ShapeForge.ctx=ctx;
    asset.shapes.forEach(o=>ShapeForge.drawShape(o));
    ShapeForge.ctx=oldCtx;

    ctx.restore();
    return;
  }

  // Generic fallback preview for non-canvas assets.
  ctx.fillStyle="#b8ff19";
  ctx.font="bold 18px system-ui";
  ctx.fillText(String(asset?.kind||"asset").toUpperCase(),20,42);
  ctx.fillStyle="#7aa7a6";
  ctx.font="14px system-ui";
  ctx.fillText(String(asset?.name||"Unnamed Asset"),20,68);
}

/*
-------------------------------------------------------------------------------
DEPENDENCY VIEW HELPERS

Dependencies are optional in this stable schema.

A dependency is expected to look like:
  { bucket: "sprites", id: "sprites_xxxxx" }

This creates the foundation for richer dependency graphs later.
-------------------------------------------------------------------------------
*/
function dependencyLabel(dep){
  if(!dep)return "unknown dependency";
  const target=AssetRegistry.get(dep.bucket,dep.id);
  return target ? (target.name||target.id) : `${dep.bucket}/${dep.id}`;
}


/* STUDIO CORE: owns module registry, adapter registry, shared project state, selection, and mutation helpers. */
const Studio={
 modules:new Map(), adapters:new Map(), state:{project:project(),selection:null},
 log(m){$("#log").textContent="["+new Date().toLocaleTimeString()+"] "+m+"\n"+$("#log").textContent;$("#status").textContent=m},
 register(m){this.modules.set(m.id,m)},
 installAdapter(a){this.adapters.set(a.id,a);this.register(a.toModule())},
 open(id,opt={}){const m=this.modules.get(id);if(!m)return this.log("Missing module "+id);$("#title").textContent=m.title;$("#subtitle").textContent=m.description||"";$("#work").innerHTML="";$("#actions").innerHTML="";$("#props").innerHTML="";m.render?.($("#work"),this,opt);m.actions?.($("#actions"),this,opt);m.properties?.($("#props"),this,opt);$$("[data-section]").forEach(b=>b.classList.toggle("active",b.dataset.section===m.section));Bus.emit("module:opened",{id});this.log("Opened "+m.title)},
 sync(){this.state.project.meta.name=$("#projectName").value.trim()||"Untitled KGB Game";this.state.project.meta.updated=new Date().toISOString()},
 exportProject(){this.sync();return JSON.stringify(this.state.project,null,2)},
 hydrate(p){this.state.project=norm(p);$("#projectName").value=this.state.project.meta.name;renderExplorer();this.renderProps();updateHistoryButtons();this.log("Project loaded")},
 mutate(label,fn){History.snapshot(label);fn();this.sync();renderExplorer();this.renderProps();Bus.emit("project:changed",{label})},
 addAsset(type,a){this.mutate("add "+type,()=>{a.id ||= uid(type);a.created ||= new Date().toISOString();a.updated=new Date().toISOString();this.state.project.assets[type].push(a)});this.log("Saved "+type.slice(0,-1)+": "+a.name);return a},
 find(type,id){return(this.state.project.assets[type]||[]).find(a=>a.id===id)},
 updateAsset(type,id,patch){this.mutate("update asset",()=>{let a=this.find(type,id);if(a)Object.assign(a,patch,{id,updated:new Date().toISOString()})});},
 deleteAsset(type,id){this.mutate("delete asset",()=>{let arr=this.state.project.assets[type]||[],i=arr.findIndex(a=>a.id===id);if(i>=0)arr.splice(i,1);this.state.selection=null})},
 duplicateAsset(type,id){this.mutate("duplicate asset",()=>{let a=this.find(type,id);if(a){let c=JSON.parse(JSON.stringify(a));c.id=uid(type);c.name=(c.name||"Asset")+" Copy";this.state.project.assets[type].push(c)}})},
 selectAsset(type,id){let a=this.find(type,id);if(!a)return;this.state.selection={type,id};this.renderProps();let adapter=[...this.adapters.values()].find(ad=>ad.canOpen?.(a));if(adapter)this.open(adapter.moduleId,{asset:a});else this.log("Selected "+a.name)},
 renderProps(){
  let s=this.state.selection,p=$("#props");

  // Nothing selected: keep Intelligence quiet and clear.
  if(!s){
    p.innerHTML='<div class="muted">No asset selected.</div>';
    return;
  }

  let a=this.find(s.type,s.id);
  if(!a){
    p.textContent="Missing asset";
    return;
  }

  // Optional dependency data. This does not require a schema migration.
  let deps=a.dependencies||[];
  let usedBy=AssetRegistry.usedBy(s.type,s.id);

  // Rich Intelligence panel. This is still backed by the stable v0.5/v0.6 asset shape.
  p.innerHTML=
    '<div class="thumb"><canvas id="assetThumb" width="320" height="200"></canvas></div>'+
    '<label>Name</label><input id="pname" value="'+esc(a.name||"")+'">'+
    '<label>Bucket</label><input disabled value="'+esc(s.type)+'">'+
    '<label>Kind</label><input disabled value="'+esc(a.kind||"asset")+'">'+
    '<label>Folder</label><input id="pfolder" value="'+esc(a.folder||"/")+'">'+
    '<label>Tags comma-separated</label><input id="ptags" value="'+esc((a.tags||[]).join(", "))+'">'+
    '<label>Notes</label><textarea id="pnotes">'+esc(a.notes||"")+'</textarea>'+
    '<div class="row">'+
      '<button class="primary" id="applyP">Apply</button>'+
      '<button id="openP">Open</button>'+
      '<button id="dupeP">Duplicate</button>'+
      '<button class="hot" id="delP">Delete</button>'+
    '</div>'+
    '<p class="mini">ID: '+esc(a.id||"")+'</p>'+
    '<p class="mini">Dependencies: '+deps.length+' • Used by: '+usedBy.length+'</p>'+
    '<div>'+
      deps.map(dep=>'<span class="tag">uses '+esc(dependencyLabel(dep))+'</span>').join("")+
      usedBy.map(item=>'<span class="tag">used by '+esc(item.asset.name||item.asset.id)+'</span>').join("")+
    '</div>'+
    '<label>Raw Asset JSON</label><textarea id="pjson">'+esc(JSON.stringify(a,null,2))+'</textarea>';

  renderAssetPreview(a,$("#assetThumb"));

  // Apply writes the friendly fields back into the raw JSON object, then saves.
  $("#applyP").onclick=()=>{
    try{
      let raw=JSON.parse($("#pjson").value);
      raw.name=$("#pname").value;
      raw.folder=$("#pfolder").value||"/";
      raw.tags=$("#ptags").value.split(",").map(x=>x.trim()).filter(Boolean);
      raw.notes=$("#pnotes").value;
      this.updateAsset(s.type,s.id,raw);
    }catch(e){
      alert(e.message);
    }
  };

  $("#openP").onclick=()=>this.selectAsset(s.type,s.id);
  $("#dupeP").onclick=()=>this.duplicateAsset(s.type,s.id);
  $("#delP").onclick=()=>{
    if(confirm("Delete asset?"))this.deleteAsset(s.type,s.id);
  };
}
};

/*
-------------------------------------------------------------------------------
SHAPE FORGE MODULE

Shape Forge is the canonical vector-shape editor path.

This first stable version is deliberately conservative:
- It uses simple object geometry, not complex boolean path math yet.
- It saves into project.assets.shapes using the existing v0.5/v0.7 schema.
- It provides enough drawing/editing to become useful without risking the shell.
- More advanced boolean operations come later after the stable module pattern holds.

Current shape object model:
{
  id,
  type: "rect" | "roundrect" | "ellipse" | "polygon" | "line" | "path",
  x, y, w, h,
  sides,
  points,
  style:{ fill, stroke, weight, glow, opacity }
}
-------------------------------------------------------------------------------
*/
const ShapeForge={
  canvas:null,
  ctx:null,
  shapes:[],
  selectedId:null,
  tool:"select",
  isDown:false,
  draft:null,
  start:null,
  currentAsset:null,

  style:{
    fill:"#ff8a00",
    stroke:"#00e5ff",
    weight:4,
    glow:10,
    opacity:1,
    sides:3,
    radius:18
  },

  init(asset){
    this.canvas=$("#shapeCanvas");
    this.ctx=this.canvas.getContext("2d");
    this.shapes=asset?.shapes?JSON.parse(JSON.stringify(asset.shapes)):[];
    this.currentAsset=asset||null;
    this.selectedId=null;
    this.tool="select";
    this.render();

    // Pointer events work for mouse, stylus, and touch.
    this.canvas.onpointerdown=e=>this.down(e);
    this.canvas.onpointermove=e=>this.move(e);
    this.canvas.onpointerup=e=>this.up(e);
    this.canvas.onpointercancel=e=>this.up(e);
  },

  pos(e){
    const r=this.canvas.getBoundingClientRect();
    return {
      x:(e.clientX-r.left)*this.canvas.width/r.width,
      y:(e.clientY-r.top)*this.canvas.height/r.height
    };
  },

  down(e){
    this.canvas.setPointerCapture(e.pointerId);
    this.isDown=true;
    const p=this.pos(e);
    this.start=p;

    // Select/move mode.
    if(this.tool==="select"){
      const hit=this.hit(p.x,p.y);
      this.selectedId=hit?.id||null;
      this.draft=hit?{
        x:p.x,
        y:p.y,
        ox:hit.x,
        oy:hit.y,
        pts:hit.points?JSON.parse(JSON.stringify(hit.points)):null
      }:null;
      this.render();
      return;
    }

    // Pen tool records a point path.
    if(this.tool==="pen"){
      this.draft={
        id:uid("shape"),
        type:"path",
        points:[p],
        style:{...this.style}
      };
      return;
    }

    // All other tools start as rectangle-like bounding boxes.
    this.draft={
      id:uid("shape"),
      type:this.tool,
      x:p.x,
      y:p.y,
      w:1,
      h:1,
      sides:+this.style.sides||3,
      radius:+this.style.radius||18,
      style:{...this.style}
    };
  },

  move(e){
    if(!this.isDown)return;
    const p=this.pos(e);

    // Move existing selected shape.
    if(this.tool==="select"&&this.selectedId&&this.draft){
      const o=this.shapes.find(x=>x.id===this.selectedId);
      if(o){
        if(o.points&&this.draft.pts){
          const dx=p.x-this.draft.x, dy=p.y-this.draft.y;
          o.points=this.draft.pts.map(pt=>({x:pt.x+dx,y:pt.y+dy}));
        }else{
          o.x=this.draft.ox+(p.x-this.draft.x);
          o.y=this.draft.oy+(p.y-this.draft.y);
        }
        this.render();
      }
      return;
    }

    // Continue path drawing.
    if(this.tool==="pen"&&this.draft){
      this.draft.points.push(p);
      this.render();
      this.drawShape(this.draft);
      return;
    }

    // Resize draft shape from start point to current point.
    if(this.draft){
      this.draft.w=p.x-this.start.x;
      this.draft.h=p.y-this.start.y;
      this.render();
      this.drawShape(this.draft);
    }
  },

  up(){
    if(!this.isDown)return;
    this.isDown=false;

    // Finish draft shape.
    if(this.draft&&this.tool!=="select"){
      this.shapes.push(this.draft);
      this.selectedId=this.draft.id;
      this.draft=null;
      this.render();
      Bus.emit("shape:changed",{});
    }
  },

  bounds(o){
    if(o.type==="path"||o.type==="line"){
      const pts=o.type==="line"
        ? [{x:o.x,y:o.y},{x:o.x+o.w,y:o.y+o.h}]
        : o.points;
      const xs=pts.map(p=>p.x), ys=pts.map(p=>p.y);
      return {
        x:Math.min(...xs)-10,
        y:Math.min(...ys)-10,
        w:Math.max(...xs)-Math.min(...xs)+20,
        h:Math.max(...ys)-Math.min(...ys)+20
      };
    }
    return {
      x:Math.min(o.x,o.x+o.w),
      y:Math.min(o.y,o.y+o.h),
      w:Math.abs(o.w),
      h:Math.abs(o.h)
    };
  },

  hit(x,y){
    for(let i=this.shapes.length-1;i>=0;i--){
      const b=this.bounds(this.shapes[i]);
      if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h)return this.shapes[i];
    }
    return null;
  },

  selected(){
    return this.shapes.find(o=>o.id===this.selectedId);
  },

  render(){
    const c=this.canvas,ctx=this.ctx;
    if(!ctx)return;

    ctx.clearRect(0,0,c.width,c.height);

    // Tactical background.
    const bg=ctx.createRadialGradient(256,256,20,256,256,420);
    bg.addColorStop(0,"#092126");
    bg.addColorStop(1,"#000");
    ctx.fillStyle=bg;
    ctx.fillRect(0,0,c.width,c.height);

    // Grid.
    ctx.strokeStyle="#00e5ff22";
    ctx.lineWidth=1;
    for(let x=0;x<c.width;x+=32){
      ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke();
    }
    for(let y=0;y<c.height;y+=32){
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width,y);ctx.stroke();
    }

    // Draw all vector objects.
    this.shapes.forEach(o=>this.drawShape(o));

    // Draw selection bounds.
    const s=this.selected();
    if(s){
      const b=this.bounds(s);
      ctx.save();
      ctx.setLineDash([8,6]);
      ctx.strokeStyle="#fff";
      ctx.lineWidth=2;
      ctx.strokeRect(b.x-6,b.y-6,b.w+12,b.h+12);
      ctx.restore();
    }
  },

  drawShape(o){
    const ctx=this.ctx;
    if(!ctx||!o)return;
    const s=o.style||this.style;

    ctx.save();
    ctx.globalAlpha=s.opacity ?? 1;
    ctx.shadowColor=s.stroke||"#00e5ff";
    ctx.shadowBlur=s.glow||0;
    ctx.lineWidth=s.weight||2;
    ctx.strokeStyle=s.stroke||"#00e5ff";
    ctx.fillStyle=s.fill||"#ff8a00";

    ctx.beginPath();

    if(o.type==="rect"){
      ctx.rect(o.x,o.y,o.w,o.h);
    }

    if(o.type==="roundrect"){
      this.roundRectPath(ctx,o.x,o.y,o.w,o.h,o.radius||18);
    }

    if(o.type==="ellipse"){
      ctx.ellipse(o.x+o.w/2,o.y+o.h/2,Math.abs(o.w/2),Math.abs(o.h/2),0,0,Math.PI*2);
    }

    if(o.type==="polygon"){
      this.polygonPath(ctx,o.x,o.y,o.w,o.h,o.sides||3);
    }

    if(o.type==="line"){
      ctx.moveTo(o.x,o.y);
      ctx.lineTo(o.x+o.w,o.y+o.h);
    }

    if(o.type==="path"&&o.points?.length){
      ctx.moveTo(o.points[0].x,o.points[0].y);
      for(let i=1;i<o.points.length;i++)ctx.lineTo(o.points[i].x,o.points[i].y);
    }

    if(o.type!=="line"&&o.type!=="path")ctx.fill();
    ctx.stroke();
    ctx.restore();
  },

  roundRectPath(ctx,x,y,w,h,r){
    const x1=Math.min(x,x+w), y1=Math.min(y,y+h);
    const x2=Math.max(x,x+w), y2=Math.max(y,y+h);
    const rr=Math.min(Math.abs(r),Math.abs(x2-x1)/2,Math.abs(y2-y1)/2);
    ctx.moveTo(x1+rr,y1);
    ctx.arcTo(x2,y1,x2,y2,rr);
    ctx.arcTo(x2,y2,x1,y2,rr);
    ctx.arcTo(x1,y2,x1,y1,rr);
    ctx.arcTo(x1,y1,x2,y1,rr);
    ctx.closePath();
  },

  polygonPath(ctx,x,y,w,h,sides){
    const cx=x+w/2, cy=y+h/2;
    const rx=Math.abs(w/2), ry=Math.abs(h/2);
    const n=Math.max(3,Math.min(12,+sides||3));
    for(let i=0;i<n;i++){
      const a=-Math.PI/2+(i/n)*Math.PI*2;
      const px=cx+Math.cos(a)*rx;
      const py=cy+Math.sin(a)*ry;
      if(i===0)ctx.moveTo(px,py);
      else ctx.lineTo(px,py);
    }
    ctx.closePath();
  },

  applyStyleToSelected(){
    const o=this.selected();
    if(!o)return;
    o.style={...this.style};
    if(o.type==="polygon")o.sides=+this.style.sides||3;
    if(o.type==="roundrect")o.radius=+this.style.radius||18;
    this.render();
  },

  payload(){
    return {
      name:$("#shapeName")?.value||"Shape Asset",
      kind:"vector-shape",
      adapter:"shape-forge",
      folder:"/",
      tags:["shape","vector"],
      notes:"",
      shapes:JSON.parse(JSON.stringify(this.shapes)),
      drawFunction:this.exportJS()
    };
  },

  exportJS(){
    return "function drawKGBShape(ctx){\n  const shapes="+JSON.stringify(this.shapes,null,2)+";\n  // Use KGB Studio Shape Forge renderer or port drawShape logic here.\n}";
  },

  del(){
    if(!this.selectedId)return;
    this.shapes=this.shapes.filter(o=>o.id!==this.selectedId);
    this.selectedId=null;
    this.render();
    Bus.emit("shape:changed",{});
  },

  dupe(){
    const o=this.selected();
    if(!o)return;
    const n=JSON.parse(JSON.stringify(o));
    n.id=uid("shape");
    if(n.points)n.points=n.points.map(p=>({x:p.x+18,y:p.y+18}));
    else{n.x+=18;n.y+=18;}
    this.shapes.push(n);
    this.selectedId=n.id;
    this.render();
    Bus.emit("shape:changed",{});
  },

  clear(){
    if(confirm("Clear Shape Forge canvas?")){
      this.shapes=[];
      this.selectedId=null;
      this.render();
      Bus.emit("shape:changed",{});
    }
  }
};

/*
-------------------------------------------------------------------------------
SHAPE FORGE ADAPTER

This follows the same safe adapter pattern as Sprite Forge:
- render() draws the module UI
- save() writes shape assets into project.assets.shapes
- exportAsset() prints reusable JS
- canOpen() allows shape assets to reopen in Shape Forge
-------------------------------------------------------------------------------
*/
Studio.installAdapter(createToolAdapter({
  id:"shape-forge",
  moduleId:"asset.shapeforge",
  section:"ASSETS",
  title:"Shape Forge",
  description:"Stable vector shape editor for reusable KGB Studio geometry.",
  canOpen:a=>a.adapter==="shape-forge"||a.kind==="vector-shape",

  render(r,s,opt){

render(r,s,opt){let a=opt?.asset;r.innerHTML='<div class="sprite"><div class="card"><h3>Canvas</h3><div class="stage"><canvas id="spriteCanvas" width="512" height="512"></canvas></div></div><div class="card"><h3>Tools</h3><div class="tools"><button data-tool="select" class="active">Select</button><button data-tool="pen">Pen</button><button data-tool="rect">Rect</button><button data-tool="ellipse">Ellipse</button><button data-tool="triangle">Triangle</button><button id="del">Delete</button><button id="dupe">Duplicate</button><button id="clear" class="hot">Clear</button></div><label>Fill</label><input id="fill" type="color" value="#ff8a00"><label>Stroke</label><input id="stroke" type="color" value="#b8ff19"><label>Weight</label><input id="weight" type="range" min="1" max="24" value="4"><label>Glow</label><input id="glow" type="range" min="0" max="50" value="12"><label>Sprite Name</label><input id="sfName" value="'+esc(a?.name||"New Procedural Sprite")+'"><div class="row"><button class="primary" id="saveSprite">'+(a?"Update":"Save")+' Asset</button><button id="exportJS">Export JS</button></div></div></div><div class="card"><h3>Export</h3><pre id="spriteOut"></pre></div>';SpriteForge.init(a);$$("[data-tool]").forEach(b=>b.onclick=()=>{$$("[data-tool]").forEach(x=>x.classList.remove("active"));b.classList.add("active");SpriteForge.tool=b.dataset.tool});["fill","stroke","weight","glow"].forEach(id=>$("#"+id).oninput=()=>{SpriteForge.style={fill:$("#fill").value,stroke:$("#stroke").value,weight:+$("#weight").value,glow:+$("#glow").value};let o=SpriteForge.selected();if(o){o.style={...SpriteForge.style};SpriteForge.render()}});$("#del").onclick=()=>SpriteForge.del();$("#dupe").onclick=()=>SpriteForge.dupe();$("#clear").onclick=()=>SpriteForge.clear();$("#saveSprite").onclick=()=>{let payload=SpriteForge.payload();if(a?.id)Studio.updateAsset("sprites",a.id,payload);else Studio.addAsset("sprites",payload)};$("#exportJS").onclick=()=>$("#spriteOut").textContent=SpriteForge.exportJS()},
save(){let p=SpriteForge.payload();if(SpriteForge.currentAsset?.id)Studio.updateAsset("sprites",SpriteForge.currentAsset.id,p);else Studio.addAsset("sprites",p)},exportAsset(){$("#spriteOut").textContent=SpriteForge.exportJS()}}));

Studio.register({id:"system.runtime",section:"SYSTEMS",title:"Runtime Preview",description:"Preview saved sprite asset",render(r){r.innerHTML='<div class="card"><h3>Runtime Preview</h3><div class="stage"><canvas id="run" width="720" height="420"></canvas></div></div>';let c=$("#run"),ctx=c.getContext("2d");function loop(t){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle="#000";ctx.fillRect(0,0,c.width,c.height);ctx.strokeStyle="#00e5ff33";for(let x=0;x<c.width;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke()}let spr=Studio.state.project.assets.sprites.at(-1);if(spr?.objects){ctx.save();ctx.translate(100+Math.sin(t/600)*30,0);let old=SpriteForge.ctx;SpriteForge.ctx=ctx;spr.objects.forEach(o=>SpriteForge.draw(o));SpriteForge.ctx=old;ctx.restore()}else{ctx.fillStyle="#b8ff19";ctx.fillText("Save a sprite asset first.",30,40)}requestAnimationFrame(loop)}loop(0)}});

/*
-------------------------------------------------------------------------------
LAYOUT CONTROLS

The Studio shell has three columns:
- left: Operation Explorer
- center: active module workspace
- right: Intelligence / Comms

Canvas-heavy tools need more space, so these controls let the user collapse
either sidebar or enter full workspace focus mode. This is intentionally done
with body classes so it stays safe and does not disturb module code.
-------------------------------------------------------------------------------
*/
const LayoutControls={
  toggleLeft(){
    document.body.classList.toggle("left-collapsed");
    // Leaving focus mode when manually toggling a panel makes the behavior clearer.
    document.body.classList.remove("workspace-focus");
    Studio.log(document.body.classList.contains("left-collapsed")?"Explorer collapsed":"Explorer expanded");
  },

  toggleRight(){
    document.body.classList.toggle("right-collapsed");
    document.body.classList.remove("workspace-focus");
    Studio.log(document.body.classList.contains("right-collapsed")?"Intel collapsed":"Intel expanded");
  },

  toggleFocus(){
    document.body.classList.toggle("workspace-focus");
    Studio.log(document.body.classList.contains("workspace-focus")?"Workspace focus enabled":"Workspace focus disabled");
  },

  reset(){
    document.body.classList.remove("left-collapsed","right-collapsed","workspace-focus");
    Studio.log("Workspace layout reset.");
  }
};

/* OPERATOR REGISTRATION: add searchable actions to the Operator Console. */
function registerCommands(){Commands.add("open.shape","Open Shape Forge",()=>Studio.open("asset.shapeforge"));Commands.add("open.sprite","Open Sprite Forge",()=>Studio.open("asset.spriteforge"));Commands.add("open.assets","Open Asset Library",()=>Studio.open("asset.library"));Commands.add("open.runtime","Open Runtime Preview",()=>Studio.open("system.runtime"));Commands.add("open.registry","Open Asset Registry",()=>Studio.open("system.registry"));Commands.add("open.inspector","Open Asset Inspector",()=>Studio.open("asset.inspector"));Commands.add("open.platform","Open Platform Status",()=>Studio.open("system.platform"));Commands.add("open.changelog","Open Changelog",()=>Studio.open("system.changelog"));Commands.add("open.export","Open Export Center",()=>Studio.open("build.export"));Commands.add("project.save","Download Project JSON",()=>dl(safe($("#projectName").value)+".kgbproject.json",Studio.exportProject(),"application/json"));Commands.add("history.undo","Undo",()=>History.undoIt());Commands.add("history.redo","Redo",()=>History.redoIt());Commands.add("layout.toggle.left","Toggle Explorer Column",()=>LayoutControls.toggleLeft());Commands.add("layout.toggle.right","Toggle Intel Column",()=>LayoutControls.toggleRight());Commands.add("layout.focus","Toggle Workspace Focus",()=>LayoutControls.toggleFocus());Commands.add("layout.reset","Reset Workspace Layout",()=>LayoutControls.reset())}
/* BOOT: wires the UI, registers operators, opens the first module, and starts Studio. */
function boot(){renderNav();registerCommands();$("#projectName").value=Studio.state.project.meta.name;renderExplorer();updateHistoryButtons();$("#filter").oninput=renderExplorer;$("#projectName").oninput=()=>{Studio.sync();renderExplorer()};$("#newBtn").onclick=()=>{if(confirm("New project?"))Studio.hydrate(project())};$("#saveBtn").onclick=()=>dl(safe($("#projectName").value)+".kgbproject.json",Studio.exportProject(),"application/json");$("#loadBtn").onclick=()=>$("#loadInput").click();$("#loadInput").onchange=async e=>{let f=e.target.files[0];if(!f)return;try{Studio.hydrate(JSON.parse(await f.text()));Studio.open("mission.brief")}catch(err){alert(err.message)}};$("#exportBtn").onclick=()=>Studio.open("build.export");$("#undoBtn").onclick=()=>History.undoIt();$("#redoBtn").onclick=()=>History.redoIt();$("#cmdBtn").onclick=()=>Commands.open();$("#toggleLeftBtn").onclick=()=>LayoutControls.toggleLeft();$("#toggleRightBtn").onclick=()=>LayoutControls.toggleRight();$("#focusBtn").onclick=()=>LayoutControls.toggleFocus();$("#cmdSearch").oninput=renderCommands;$("#cmd").onclick=e=>{if(e.target.id==="cmd")Commands.close()};document.addEventListener("keydown",e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="k"){e.preventDefault();Commands.open()} if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="z"){e.preventDefault();History.undoIt()} if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="b"){e.preventDefault();LayoutControls.toggleLeft()} if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="i"){e.preventDefault();LayoutControls.toggleRight()} if((e.ctrlKey||e.metaKey)&&e.key==="."){e.preventDefault();LayoutControls.toggleFocus()}});$("#helpBtn").onclick=()=>{$("#modalTitle").textContent="KGB Studio v0.8.1 Help";$("#modalBody").innerHTML="<p><b>v0.8.1 adds workspace focus controls.</b></p><p>Use the topbar buttons: Explorer collapses the left column, Intel collapses the right column, and Focus hides both so the center workspace expands.</p><p>Shortcuts: Ctrl/Cmd+B toggles Explorer, Ctrl/Cmd+I toggles Intel, Ctrl/Cmd+. toggles Focus, Ctrl/Cmd+K opens the Operator Console.</p><p><b>Repo path:</b> replace root <code>index.html</code> with this file.</p>";$("#modalBg").classList.add("show")};$("#closeModal").onclick=()=>$("#modalBg").classList.remove("show");$("#modalBg").onclick=e=>{if(e.target.id==="modalBg")$("#modalBg").classList.remove("show")};Studio.open("mission.brief");Studio.log("KGB Studio v0.8.1 workspace focus UI online")}
document.addEventListener("DOMContentLoaded",boot);
</script>
