<style>

ht:auto;touch-action:none}.sprite{display:grid;grid-template-columns:1fr 270px;gap:12px}.tools{display:grid;grid-template-columns:1fr 1fr;gap:8px}.moduleCard{border:1px solid #21464e;border-radius:14px;padding:12px;background:#030b0e}.badge{background:var(--green);color:#071014;border-radius:99px;padding:2px 7px;font-size:11px;font-weight:1000}.modalBg{position:fixed;inset:0;display:none;place-items:center;background:rgba(0,0,0,.72);z-index:9;padding:18px}.modalBg.show{display:grid}.modal{max-width:880px;width:100%;max-height:88vh;overflow:auto;background:#061014;border:1px solid var(--cyan);border-radius:18px;padding:16px}.cmd{position:fixed;inset:0;display:none;place-items:start center;background:rgba(0,0,0,.65);z-index:10;padding-top:10vh}.cmd.show{display:grid}.cmdBox{width:min(760px,92vw);background:#061014;border:1px solid var(--cyan);border-radius:18px;padding:12px;box-shadow:0 0 40px rgba(0,229,255,.22)}.cmdItem{padding:10px;border:1px solid #18373d;border-radius:12px;margin-top:8px;background:#030b0e;cursor:pointer}.cmdItem:hover{border-color:var(--green)}.thumb{width:100%;aspect-ratio:1.6;border:1px solid #18373d;border-radius:14px;background:#000;display:grid;place-items:center;overflow:hidden;margin-bottom:10px}.thumb canvas{width:100%;height:100%}.mini{font-size:11px;color:var(--muted)}.tag{display:inline-block;border:1px solid #22515b;border-radius:99px;padding:2px 7px;margin:2px;color:var(--cyan);font-size:11px}.shapeShell{display:grid;grid-template-columns:1fr 280px;gap:12px}.shapeTools{display:grid;grid-template-columns:1fr 1fr;gap:8px}.shapeStage{display:grid;place-items:center;min-height:520px;border:1px solid #18373d;border-radius:18px;background:#000;overflow:hidden}@media(max-width:900px){.shapeShell{grid-template-columns:1fr}.shapeStage{min-height:48vh}}

/*
  Workspace Focus UI
  ------------------
  IMPORTANT FIX:
  Do NOT use display:none on grid children here.

  CSS grid auto-placement will remove display:none items from the grid flow.
  When the left panel disappeared, the center workspace got auto-placed into

  Instead, keep the left/right grid items present, but collapse their columns

<script>

/*
===============================================================================
KGB STUDIO v0.10.3 — SHAPE FORGE REOPEN HOTFIX

WHY THIS VERSION EXISTS
-----------------------
v0.10.2 successfully created and saved full Shape Forge projects into Studio
assets, and they appeared correctly in the Asset Library / Inspector.

The missing piece was reopening those saved assets back into the embedded Shape
Forge. The asset was being selected, but Studio's selection logic only auto-
opened assets through registered ToolAdapters. The full Shape Forge host is now
a direct Studio module, not a ToolAdapter, so saved shape-forge-project assets
needed an explicit route.

WHAT'S FIXED IN v0.10.3
-----------------------
Fixed:
- Saved shape-forge-project assets now reopen in ASSETS -> Shape Forge.
- Existing saved Shape Forge project data is passed back into the embedded forge.
- Open button in Operation Explorer now supports round-trip editing.
- Update Existing can now be used after reopening a saved Shape Forge asset.

Kept stable:
- New Project.
- Save New.
- Update Existing.
- Preview thumbnail capture.
- Inspector preview support.
- v0.10.1 script parser hotfix.
- Embedded Shape Forge undo/redo timing fix.

REPO ACTION
-----------
Replace /studio/index.html with this file.

SUGGESTED COMMIT
----------------
Fix Shape Forge asset reopen flow

===============================================================================
*/
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const uid=p=>p+"_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,7);
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]||c))}
function safe(s){return String(s||"kgb_project").toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"")}
function dl(n,t,m="text/plain"){const b=new Blob([t],{type:m}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=n;a.click();URL.revokeObjectURL(a.href)}
function project(name="Untitled KGB Game"){const now=new Date().toISOString();return{meta:{name,created:now,updated:now,studioVersion:"0.10.3"},mission:{note:""},assets:{sprites:[],animations:[],shapes:[],particles:[],sounds:[],palettes:[],tiles:[],maps:[],misc:[]},settings:{theme:"kgb-neon",target:"web-pwa"}}}
function norm(p){let b=project(p?.meta?.name);return{...b,...p,meta:{...b.meta,...(p.meta||{})},assets:{...b.assets,...(p.assets||{})},settings:{...b.settings,...(p.settings||{})}}}

/* EVENT BUS: simple pub/sub so modules can emit events without tight coupling. */
const Bus={handlers:{},on(e,fn){(this.handlers[e] ||= []).push(fn)},emit(e,data){(this.handlers[e]||[]).forEach(fn=>fn(data));Studio.log("event: "+e)}};

/* OPERATOR CONSOLE BACKEND: still called Commands internally, but this is our operator search/run system. */
const Commands={
 list:[],
 add(id,label,run){this.list.push({id,label,run})},
 open(){renderCommands();$("#cmd").classList.add("show");$("#cmdSearch").value="";$("#cmdSearch").focus()},
 close(){$("#cmd").classList.remove("show")},
 run(id){let c=this.list.find(x=>x.id===id);if(c){c.run();this.close()}}
};
function renderCommands(){let q=($("#cmdSearch")?.value||"").toLowerCase();$("#cmdList").innerHTML=Commands.list.filter(c=>!q||c.label.toLowerCase().includes(q)||c.id.includes(q)).map(c=>'<div class="cmdItem" data-cmd="'+c.id+'"><b>'+esc(c.label)+'</b><br><span class="muted">'+esc(c.id)+'</span></div>').join("");$("#cmdList").querySelectorAll("[data-cmd]").forEach(x=>x.onclick=()=>Commands.run(x.dataset.cmd))}

/* HISTORY: snapshot-based undo/redo for project-level asset mutations. */
const History={undo:[],redo:[],snapshot(label){Studio.sync();this.undo.push({label,state:JSON.stringify(Studio.state.project)});this.redo=[];updateHistoryButtons()},restore(item){Studio.hydrate(JSON.parse(item.state))},undoIt(){if(!this.undo.length)return;this.redo.push({label:"redo",state:JSON.stringify(Studio.state.project)});this.restore(this.undo.pop());Studio.log("Undo")},redoIt(){if(!this.redo.length)return;this.undo.push({label:"undo",state:JSON.stringify(Studio.state.project)});this.restore(this.redo.pop());Studio.log("Redo")}};
function updateHistoryButtons(){$("#undoBtn").disabled=!History.undo.length;$("#redoBtn").disabled=!History.redo.length}


/*
-------------------------------------------------------------------------------
ASSET REGISTRY FACADE

This is the safe v0.6 version of AssetDB.

Instead of replacing the known-good project.assets arrays, this facade gives us
AssetDB-like capabilities while keeping the existing schema stable.

Later, when we're ready, this can become a true UUID AssetDB. For now it gives:
- all()      -> list every asset across all buckets
- find()     -> search all assets
- get()      -> retrieve an asset by bucket/id
- usedBy()   -> dependency graph foundation
- summary()  -> counts by bucket
-------------------------------------------------------------------------------
*/
const AssetRegistry={
  buckets(){
    return Studio.state.project.assets || {};
  },

  all(){
    const out=[];
    Object.entries(this.buckets()).forEach(([bucket,items])=>{
      (items||[]).forEach(asset=>{
        out.push({bucket,asset});
      });
    });
    return out;
  },

  find(query){
    const q=String(query||"").toLowerCase();
    return this.all().filter(({bucket,asset})=>{
      const text=[
        bucket,
        asset.id,
        asset.name,
        asset.kind,
        asset.adapter,
        ...(asset.tags||[])
      ].join(" ").toLowerCase();
      return !q || text.includes(q);
    });
  },

  get(bucket,id){
    return (this.buckets()[bucket]||[]).find(asset=>asset.id===id);
  },

  usedBy(bucket,id){
    return this.all().filter(({asset})=>{
      return (asset.dependencies||[]).some(dep=>dep.bucket===bucket && dep.id===id);
    });
  },

  summary(){
    const rows={};
    Object.entries(this.buckets()).forEach(([bucket,items])=>{
      rows[bucket]=(items||[]).length;
    });
    return rows;
  }
};

/*
-------------------------------------------------------------------------------
ASSET PREVIEW HELPERS

The Intelligence panel needs a fast way to preview selected assets.

For now:
- Sprite assets with procedural objects are drawn on a mini canvas.
- Other assets get a labeled tactical placeholder card.

This stays intentionally simple so it cannot break the working editor.
-------------------------------------------------------------------------------
*/
function renderAssetPreview(asset,canvas){
  if(!canvas)return;

  const ctx=canvas.getContext("2d");
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Dark tactical background.
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Light grid gives every preview the same KGB Studio visual language.
  ctx.strokeStyle="#00e5ff33";
  ctx.lineWidth=1;
  for(let x=0;x<canvas.width;x+=24){
    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,canvas.height);
    ctx.stroke();
  }
  for(let y=0;y<canvas.height;y+=24){
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();
  }

  // Sprite Forge assets currently store procedural objects directly on asset.objects.
  if(asset?.objects?.length){
    ctx.save();
    ctx.scale(0.36,0.36);
    ctx.translate(170,35);

    // Reuse SpriteForge.draw safely by temporarily pointing its ctx at preview ctx.
    const oldCtx=SpriteForge.ctx;
    SpriteForge.ctx=ctx;
    asset.objects.forEach(o=>SpriteForge.draw(o));
    SpriteForge.ctx=oldCtx;

    ctx.restore();
    return;
  }

  // Shape Forge assets store vector objects on asset.shapes.
  if(asset?.shapes?.length && typeof ShapeForge!=="undefined"){
    ctx.save();
    ctx.scale(0.36,0.36);
    ctx.translate(170,35);

    // Reuse ShapeForge.drawShape safely by temporarily pointing its ctx at preview ctx.
    const oldCtx=ShapeForge.ctx;
    ShapeForge.ctx=ctx;
    asset.shapes.forEach(o=>ShapeForge.drawShape(o));
    ShapeForge.ctx=oldCtx;

    ctx.restore();
    return;
  }

  // Saved full Shape Forge assets can provide a preview data URL snapshot.
  if(asset?.previewDataUrl){
    const img=new Image();
    img.onload=()=>{
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle="#000";
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
    };
    img.src=asset.previewDataUrl;
    return;
  }

  // Generic fallback preview for non-canvas assets.
  ctx.fillStyle="#b8ff19";
  ctx.font="bold 18px system-ui";
  ctx.fillText(String(asset?.kind||"asset").toUpperCase(),20,42);
  ctx.fillStyle="#7aa7a6";
  ctx.font="14px system-ui";
  ctx.fillText(String(asset?.name||"Unnamed Asset"),20,68);
}

/*
-------------------------------------------------------------------------------
DEPENDENCY VIEW HELPERS

Dependencies are optional in this stable schema.

A dependency is expected to look like:
  { bucket: "sprites", id: "sprites_xxxxx" }

This creates the foundation for richer dependency graphs later.
-------------------------------------------------------------------------------
*/
function dependencyLabel(dep){
  if(!dep)return "unknown dependency";
  const target=AssetRegistry.get(dep.bucket,dep.id);
  return target ? (target.name||target.id) : `${dep.bucket}/${dep.id}`;
}


/* STUDIO CORE: owns module registry, adapter registry, shared project state, selection, and mutation helpers. */
const Studio={
 modules:new Map(), adapters:new Map(), state:{project:project(),selection:null},
 log(m){$("#log").textContent="["+new Date().toLocaleTimeString()+"] "+m+"\n"+$("#log").textContent;$("#status").textContent=m},
 register(m){this.modules.set(m.id,m)},
 installAdapter(a){this.adapters.set(a.id,a);this.register(a.toModule())},
 open(id,opt={}){const m=this.modules.get(id);if(!m)return this.log("Missing module "+id);$("#title").textContent=m.title;$("#subtitle").textContent=m.description||"";$("#work").innerHTML="";$("#actions").innerHTML="";$("#props").innerHTML="";m.render?.($("#work"),this,opt);m.actions?.($("#actions"),this,opt);m.properties?.($("#props"),this,opt);$$("[data-section]").forEach(b=>b.classList.toggle("active",b.dataset.section===m.section));Bus.emit("module:opened",{id});this.log("Opened "+m.title)},
 sync(){this.state.project.meta.name=$("#projectName").value.trim()||"Untitled KGB Game";this.state.project.meta.updated=new Date().toISOString()},
 exportProject(){this.sync();return JSON.stringify(this.state.project,null,2)},
 hydrate(p){this.state.project=norm(p);$("#projectName").value=this.state.project.meta.name;renderExplorer();this.renderProps();updateHistoryButtons();this.log("Project loaded")},
 mutate(label,fn){History.snapshot(label);fn();this.sync();renderExplorer();this.renderProps();Bus.emit("project:changed",{label})},
 addAsset(type,a){this.mutate("add "+type,()=>{a.id ||= uid(type);a.created ||= new Date().toISOString();a.updated=new Date().toISOString();this.state.project.assets[type].push(a)});this.log("Saved "+type.slice(0,-1)+": "+a.name);return a},
 find(type,id){return(this.state.project.assets[type]||[]).find(a=>a.id===id)},
 updateAsset(type,id,patch){this.mutate("update asset",()=>{let a=this.find(type,id);if(a)Object.assign(a,patch,{id,updated:new Date().toISOString()})});},
 deleteAsset(type,id){this.mutate("delete asset",()=>{let arr=this.state.project.assets[type]||[],i=arr.findIndex(a=>a.id===id);if(i>=0)arr.splice(i,1);this.state.selection=null})},
 duplicateAsset(type,id){this.mutate("duplicate asset",()=>{let a=this.find(type,id);if(a){let c=JSON.parse(JSON.stringify(a));c.id=uid(type);c.name=(c.name||"Asset")+" Copy";this.state.project.assets[type].push(c)}})},
 selectAsset(type,id){
  let a=this.find(type,id);
  if(!a)return;

  this.state.selection={type,id};
  this.renderProps();

  // Full Shape Forge projects are handled by the direct Shape Forge host module,
  // not by the older ToolAdapter system. This explicit route restores the full
  // round-trip flow: saved asset -> Open -> embedded forge -> Update Existing.
  if(type==="shapes"&&(a.kind==="shape-forge-project"||a.adapter==="shape-forge-full")){
    this.open("asset.shapeforge",{asset:a});
    return;
  }

  let adapter=[...this.adapters.values()].find(ad=>ad.canOpen?.(a));
  if(adapter)this.open(adapter.moduleId,{asset:a});
  else this.log("Selected "+a.name);
},
 renderProps(){
  let s=this.state.selection,p=$("#props");

  // Nothing selected: keep Intelligence quiet and clear.
  if(!s){
    p.innerHTML='<div class="muted">No asset selected.</div>';
    return;
  }

  let a=this.find(s.type,s.id);
  if(!a){
    p.textContent="Missing asset";
    return;
  }

  // Optional dependency data. This does not require a schema migration.
  let deps=a.dependencies||[];
  let usedBy=AssetRegistry.usedBy(s.type,s.id);

  // Rich Intelligence panel. This is still backed by the stable v0.5/v0.6 asset shape.
  p.innerHTML=
    '<div class="thumb"><canvas id="assetThumb" width="320" height="200"></canvas></div>'+
    '<label>Name</label><input id="pname" value="'+esc(a.name||"")+'">'+
    '<label>Bucket</label><input disabled value="'+esc(s.type)+'">'+
    '<label>Kind</label><input disabled value="'+esc(a.kind||"asset")+'">'+
    '<label>Folder</label><input id="pfolder" value="'+esc(a.folder||"/")+'">'+
    '<label>Tags comma-separated</label><input id="ptags" value="'+esc((a.tags||[]).join(", "))+'">'+
    '<label>Notes</label><textarea id="pnotes">'+esc(a.notes||"")+'</textarea>'+
    '<div class="row">'+
      '<button class="primary" id="applyP">Apply</button>'+
      '<button id="openP">Open</button>'+
      '<button id="dupeP">Duplicate</button>'+
      '<button class="hot" id="delP">Delete</button>'+

/*
-------------------------------------------------------------------------------
SHAPE FORGE MODULE

Shape Forge is the canonical vector-shape editor path.

This first stable version is deliberately conservative:
- It uses simple object geometry, not complex boolean path math yet.
- It saves into project.assets.shapes using the existing v0.5/v0.7 schema.
- It provides enough drawing/editing to become useful without risking the shell.
- More advanced boolean operations come later after the stable module pattern holds.

Current shape object model:
{
  id,
  type: "rect" | "roundrect" | "ellipse" | "polygon" | "line" | "path",
  x, y, w, h,
  sides,
  points,
  style:{ fill, stroke, weight, glow, opacity }
}
-------------------------------------------------------------------------------
*/
const ShapeForge={
  canvas:null,
  ctx:null,
  shapes:[],
  selectedId:null,
  tool:"select",
  isDown:false,
  draft:null,
  start:null,
  currentAsset:null,
  transformMode:null,
  transformStart:null,

  style:{
    fill:"#ff8a00",
    stroke:"#00e5ff",
    weight:4,
    glow:10,
    opacity:1,
    sides:3,
    radius:18
  },


  /*
  TRANSFORM GIZMO HELPERS
  -----------------------
  These helpers are intentionally local to Shape Forge for now. Once proven,
  the same pattern can be extracted into a shared Studio transform gizmo.
  */
  handleSize(){return 10},

  selectedBounds(){
    const s=this.selected();
    return s?this.bounds(s):null;
  },

  handlesForBounds(b){
    if(!b)return [];
    const x=b.x,y=b.y,w=b.w,h=b.h,cx=x+w/2,cy=y+h/2,hs=this.handleSize();
    return [
      {id:"nw",x,y},{id:"n",x:cx,y},{id:"ne",x:x+w,y},
      {id:"e",x:x+w,y:cy},{id:"se",x:x+w,y:y+h},{id:"s",x:cx,y:y+h},
      {id:"sw",x,y:y+h},{id:"w",x,y:cy}
    ].map(h=>({...h,size:hs}));
  },

  hitHandle(x,y){
    const b=this.selectedBounds();
    if(!b)return null;
    return this.handlesForBounds(b).find(h=>{
      const r=h.size/2+3;
      return x>=h.x-r&&x<=h.x+r&&y>=h.y-r&&y<=h.y+r;
    })||null;
  },

  drawTransformGizmo(){
    const ctx=this.ctx,b=this.selectedBounds();
    if(!ctx||!b)return;

    ctx.save();
    ctx.setLineDash([8,6]);
    ctx.strokeStyle="#fff";
    ctx.lineWidth=2;
    ctx.strokeRect(b.x-6,b.y-6,b.w+12,b.h+12);

    ctx.setLineDash([]);
    this.handlesForBounds(b).forEach(h=>{
      ctx.fillStyle="#020607";
      ctx.strokeStyle="#b8ff19";
      ctx.lineWidth=2;
      ctx.shadowColor="#b8ff19";
      ctx.shadowBlur=8;
      ctx.beginPath();
      ctx.rect(h.x-h.size/2,h.y-h.size/2,h.size,h.size);
      ctx.fill();
      ctx.stroke();
    });
    ctx.restore();
  },

  beginTransform(handle,p){
    const s=this.selected();
    if(!s)return;
    this.transformMode=handle.id;
    this.transformStart={pointer:p,shape:JSON.parse(JSON.stringify(s)),bounds:this.bounds(s)};
  },

  applyResize(p,lockAspect){
    const s=this.selected(),st=this.transformStart;
    if(!s||!st)return;

    const mode=this.transformMode,b=st.bounds;
    let x=b.x,y=b.y,w=b.w,h=b.h;
    const dx=p.x-st.pointer.x,dy=p.y-st.pointer.y;

    if(mode.includes("e"))w=b.w+dx;
    if(mode.includes("s"))h=b.h+dy;
    if(mode.includes("w")){x=b.x+dx;w=b.w-dx}
    if(mode.includes("n")){y=b.y+dy;h=b.h-dy}

    if(lockAspect&&b.w&&b.h){
      const ratio=b.w/b.h;
      if(Math.abs(w-b.w)>Math.abs(h-b.h))h=w/ratio;
      else w=h*ratio;
    }

    this.applyBoundsToShape(s,{x,y,w,h},st.shape);
    this.refreshTransformFields();
  },

  applyBoundsToShape(shape,bounds,source){
    const src=source||shape;

    if(src.type==="compound"&&src.children){
      const old=this.bounds(src);
      const sx=old.w?bounds.w/old.w:1,sy=old.h?bounds.h/old.h:1;
      const mapPoint=p=>({x:bounds.x+(p.x-old.x)*sx,y:bounds.y+(p.y-old.y)*sy});
      const transformChild=(child)=>{
        const copy=JSON.parse(JSON.stringify(child));
        if(copy.children)copy.children=copy.children.map(transformChild);
        else if(copy.points)copy.points=copy.points.map(mapPoint);
        else if(copy.type==="line"){
          const p1=mapPoint({x:copy.x,y:copy.y}),p2=mapPoint({x:copy.x+copy.w,y:copy.y+copy.h});
          copy.x=p1.x;copy.y=p1.y;copy.w=p2.x-p1.x;copy.h=p2.y-p1.y;
        }else{
          const cb=this.bounds(copy);
          copy.x=bounds.x+(copy.x-old.x)*sx;
          copy.y=bounds.y+(copy.y-old.y)*sy;
          copy.w=(copy.w||cb.w)*sx;
          copy.h=(copy.h||cb.h)*sy;
        }
        return copy;
      };
      shape.children=src.children.map(transformChild);
      return;
    }

    if(src.type==="path"&&src.points){
      const old=this.bounds(src);
      const sx=old.w?bounds.w/old.w:1,sy=old.h?bounds.h/old.h:1;
      shape.points=src.points.map(pt=>({x:bounds.x+(pt.x-old.x)*sx,y:bounds.y+(pt.y-old.y)*sy}));
      return;
    }

    if(src.type==="line"){
      shape.x=bounds.x;shape.y=bounds.y;shape.w=bounds.w;shape.h=bounds.h;
      return;
    }

    shape.x=bounds.x;shape.y=bounds.y;shape.w=bounds.w;shape.h=bounds.h;
  },

  refreshTransformFields(){
    const b=this.selectedBounds();
    if(!b)return;
    const vals={shapeX:b.x,shapeY:b.y,shapeW:b.w,shapeH:b.h};
    Object.entries(vals).forEach(([id,val])=>{
      const el=document.getElementById(id);
      if(el)el.value=Math.round(val);
    });
  },

  applyTransformFields(){
    const s=this.selected();
    if(!s)return;
    this.applyBoundsToShape(s,{
      x:+$("#shapeX").value||0,
      y:+$("#shapeY").value||0,
      w:+$("#shapeW").value||1,
      h:+$("#shapeH").value||1
    },JSON.parse(JSON.stringify(s)));
    this.render();
    Bus.emit("shape:transform",{mode:"fields"});
  },

  mirrorSelected(axis){
    const s=this.selected(),b=this.selectedBounds();
    if(!s||!b)return;
    this.mirrorShape(s,axis,b);
    this.render();
    Bus.emit("shape:transform",{mode:"mirror-"+axis});
  },

  mirrorShape(shape,axis,b){
    const mirrorPoint=pt=>axis==="x"
      ? {x:b.x+b.w-(pt.x-b.x),y:pt.y}
      : {x:pt.x,y:b.y+b.h-(pt.y-b.y)};

    if(shape.type==="compound"&&shape.children){
      shape.children.forEach(child=>this.mirrorShape(child,axis,b));
      return;
    }
    if(shape.points){shape.points=shape.points.map(mirrorPoint);return}
    if(shape.type==="line"){
      const p1=mirrorPoint({x:shape.x,y:shape.y});
      const p2=mirrorPoint({x:shape.x+shape.w,y:shape.y+shape.h});
      shape.x=p1.x;shape.y=p1.y;shape.w=p2.x-p1.x;shape.h=p2.y-p1.y;
      return;
    }
    if(axis==="x")shape.x=b.x+b.w-(shape.x-b.x)-shape.w;
    if(axis==="y")shape.y=b.y+b.h-(shape.y-b.y)-shape.h;
  },

  init(asset){
    this.canvas=$("#shapeCanvas");
    this.ctx=this.canvas.getContext("2d");
    this.shapes=asset?.shapes?JSON.parse(JSON.stringify(asset.shapes)):[];
    this.currentAsset=asset||null;
    this.selectedId=null;
    this.tool="select";
    this.render();

    // Pointer events work for mouse, stylus, and touch.
    this.canvas.onpointerdown=e=>this.down(e);
    this.canvas.onpointermove=e=>this.move(e);
    this.canvas.onpointerup=e=>this.up(e);
    this.canvas.onpointercancel=e=>this.up(e);
  },

  pos(e){
    const r=this.canvas.getBoundingClientRect();
    return {
      x:(e.clientX-r.left)*this.canvas.width/r.width,
      y:(e.clientY-r.top)*this.canvas.height/r.height
    };
  },

  down(e){
    this.canvas.setPointerCapture(e.pointerId);
    this.isDown=true;
    const p=this.pos(e);
    this.start=p;

    // Select/move/resize mode.
    if(this.tool==="select"){
      const handle=this.hitHandle(p.x,p.y);
      if(handle){
        this.beginTransform(handle,p);
        return;
      }

      const hit=this.hit(p.x,p.y);
      this.selectedId=hit?.id||null;
      this.draft=hit?{
        x:p.x,
        y:p.y,
        ox:hit.x,
        oy:hit.y,
        pts:hit.points?JSON.parse(JSON.stringify(hit.points)):null,
        original:hit.type==="compound"?JSON.parse(JSON.stringify(hit)):null
      }:null;
      this.render();
      this.refreshTransformFields();
      return;
    }

    // Pen tool records a point path.
    if(this.tool==="pen"){
      this.draft={
        id:uid("shape"),
        type:"path",
        points:[p],
        style:{...this.style}
      };
      return;
    }

    // All other tools start as rectangle-like bounding boxes.
    this.draft={
      id:uid("shape"),
      type:this.tool,
      x:p.x,
      y:p.y,
      w:1,
      h:1,
      sides:+this.style.sides||3,
      radius:+this.style.radius||18,
      style:{...this.style}
    };
  },

  move(e){
    if(!this.isDown)return;
    const p=this.pos(e);

    // Resize selected shape from a transform handle.
    if(this.transformMode){
      this.applyResize(p,e.shiftKey);
      this.render();
      return;
    }

    // Move existing selected shape.
    if(this.tool==="select"&&this.selectedId&&this.draft){
      const o=this.shapes.find(x=>x.id===this.selectedId);
      if(o){
        if(o.points&&this.draft.pts){
          const dx=p.x-this.draft.x, dy=p.y-this.draft.y;
          o.points=this.draft.pts.map(pt=>({x:pt.x+dx,y:pt.y+dy}));
        }else if(o.type==="compound"){
          const dx=p.x-this.draft.x;
          const dy=p.y-this.draft.y;
          this.translateShape(o,dx,dy,this.draft.original);
        }else{
          o.x=this.draft.ox+(p.x-this.draft.x);
          o.y=this.draft.oy+(p.y-this.draft.y);
        }
        this.render();
      }
      return;
    }

    // Continue path drawing.
    if(this.tool==="pen"&&this.draft){
      this.draft.points.push(p);
      this.render();
      this.drawShape(this.draft);
      return;
    }

    // Resize draft shape from start point to current point.
    if(this.draft){
      this.draft.w=p.x-this.start.x;
      this.draft.h=p.y-this.start.y;
      this.render();
      this.drawShape(this.draft);
    }
  },

  up(){
    if(!this.isDown)return;
    this.isDown=false;

    // Finish transform operation.
    if(this.transformMode){
      this.transformMode=null;
      this.transformStart=null;
      this.render();
      Bus.emit("shape:transform",{mode:"resize"});
      return;
    }

    // Finish draft shape.
    if(this.draft&&this.tool!=="select"){
      this.shapes.push(this.draft);
      this.selectedId=this.draft.id;
      this.draft=null;
      this.render();
      Bus.emit("shape:changed",{});
    }
  },

  bounds(o){
    // Compound shapes are operation groups created by Union/Subtract/Intersect.
    // Their bounds are the union of their child bounds.
    if(o.type==="compound"&&o.children?.length){
      const boxes=o.children.map(c=>this.bounds(c));
      const x1=Math.min(...boxes.map(b=>b.x));
      const y1=Math.min(...boxes.map(b=>b.y));
      const x2=Math.max(...boxes.map(b=>b.x+b.w));
      const y2=Math.max(...boxes.map(b=>b.y+b.h));
      return {x:x1,y:y1,w:x2-x1,h:y2-y1};
    }

    if(o.type==="path"||o.type==="line"){
      const pts=o.type==="line"
        ? [{x:o.x,y:o.y},{x:o.x+o.w,y:o.y+o.h}]
        : o.points;
      const xs=pts.map(p=>p.x), ys=pts.map(p=>p.y);
      return {
        x:Math.min(...xs)-10,
        y:Math.min(...ys)-10,
        w:Math.max(...xs)-Math.min(...xs)+20,
        h:Math.max(...ys)-Math.min(...ys)+20
      };
    }
    return {
      x:Math.min(o.x,o.x+o.w),
      y:Math.min(o.y,o.y+o.h),
      w:Math.abs(o.w),
      h:Math.abs(o.h)
    };
  },

  hit(x,y){
    for(let i=this.shapes.length-1;i>=0;i--){
      const b=this.bounds(this.shapes[i]);
      if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h)return this.shapes[i];
    }
    return null;
  },

  selected(){
    return this.shapes.find(o=>o.id===this.selectedId);
  },

  render(){
    const c=this.canvas,ctx=this.ctx;
    if(!ctx)return;

    ctx.clearRect(0,0,c.width,c.height);

    // Tactical background.
    const bg=ctx.createRadialGradient(256,256,20,256,256,420);
    bg.addColorStop(0,"#092126");
    bg.addColorStop(1,"#000");
    ctx.fillStyle=bg;
    ctx.fillRect(0,0,c.width,c.height);

    // Grid.
    ctx.strokeStyle="#00e5ff22";
    ctx.lineWidth=1;
    for(let x=0;x<c.width;x+=32){
      ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke();
    }
    for(let y=0;y<c.height;y+=32){
      ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width,y);ctx.stroke();
    }

    // Draw all vector objects.
    this.shapes.forEach(o=>this.drawShape(o));

    // Draw transform handles around the selected object.
    this.drawTransformGizmo();

    // Keep the operation checklist and transform fields in sync with the canvas.
    this.refreshShapeList();
    this.refreshTransformFields();
  },

  drawShape(o){
    const ctx=this.ctx;
    if(!ctx||!o)return;

    // Compound shapes are generated by Union/Subtract/Intersect.
    // We render them through an offscreen canvas so we can use canvas
    // compositing safely without complex geometry libraries.
    if(o.type==="compound"){
      this.drawCompound(o);
      return;
    }

    const s=o.style||this.style;

    ctx.save();
    ctx.globalAlpha=s.opacity ?? 1;
    ctx.shadowColor=s.stroke||"#00e5ff";
    ctx.shadowBlur=s.glow||0;
    ctx.lineWidth=s.weight||2;
    ctx.strokeStyle=s.stroke||"#00e5ff";
    ctx.fillStyle=s.fill||"#ff8a00";

    ctx.beginPath();

    if(o.type==="rect"){
      ctx.rect(o.x,o.y,o.w,o.h);
    }

    if(o.type==="roundrect"){
      this.roundRectPath(ctx,o.x,o.y,o.w,o.h,o.radius||18);
    }

    if(o.type==="ellipse"){
      ctx.ellipse(o.x+o.w/2,o.y+o.h/2,Math.abs(o.w/2),Math.abs(o.h/2),0,0,Math.PI*2);
    }

    if(o.type==="polygon"){
      this.polygonPath(ctx,o.x,o.y,o.w,o.h,o.sides||3);
    }

    if(o.type==="line"){
      ctx.moveTo(o.x,o.y);
      ctx.lineTo(o.x+o.w,o.y+o.h);
    }

    if(o.type==="path"&&o.points?.length){
      ctx.moveTo(o.points[0].x,o.points[0].y);
      for(let i=1;i<o.points.length;i++)ctx.lineTo(o.points[i].x,o.points[i].y);
    }

    if(o.type!=="line"&&o.type!=="path")ctx.fill();
    ctx.stroke();
    ctx.restore();
  },

  roundRectPath(ctx,x,y,w,h,r){
    const x1=Math.min(x,x+w), y1=Math.min(y,y+h);
    const x2=Math.max(x,x+w), y2=Math.max(y,y+h);
    const rr=Math.min(Math.abs(r),Math.abs(x2-x1)/2,Math.abs(y2-y1)/2);
    ctx.moveTo(x1+rr,y1);
    ctx.arcTo(x2,y1,x2,y2,rr);
    ctx.arcTo(x2,y2,x1,y2,rr);
    ctx.arcTo(x1,y2,x1,y1,rr);
    ctx.arcTo(x1,y1,x2,y1,rr);
    ctx.closePath();
  },

  polygonPath(ctx,x,y,w,h,sides){
    const cx=x+w/2, cy=y+h/2;
    const rx=Math.abs(w/2), ry=Math.abs(h/2);
    const n=Math.max(3,Math.min(12,+sides||3));
    for(let i=0;i<n;i++){
      const a=-Math.PI/2+(i/n)*Math.PI*2;
      const px=cx+Math.cos(a)*rx;
      const py=cy+Math.sin(a)*ry;
      if(i===0)ctx.moveTo(px,py);
      else ctx.lineTo(px,py);
    }
    ctx.closePath();
  },


  drawCompound(o){
    const ctx=this.ctx;
    const c=this.canvas || {width:512,height:512};

    const off=document.createElement("canvas");
    off.width=c.width;
    off.height=c.height;
    const oldCtx=this.ctx;
    const ox=off.getContext("2d");

    // Draw into offscreen using the same drawShape method.
    this.ctx=ox;

    if(o.mode==="union"){
      o.children.forEach(child=>this.drawShape(child));
    }

    if(o.mode==="subtract"){
      this.drawShape(o.children[0]);
      ox.globalCompositeOperation="destination-out";
      o.children.slice(1).forEach(child=>this.drawShape(child));
      ox.globalCompositeOperation="source-over";
    }

    if(o.mode==="intersect"){
      this.drawShape(o.children[0]);
      ox.globalCompositeOperation="destination-in";
      o.children.slice(1).forEach(child=>this.drawShape(child));
      ox.globalCompositeOperation="source-over";
    }

    this.ctx=oldCtx;
    ctx.drawImage(off,0,0);
  },

  translateShape(shape,dx,dy,source){
    // Move a shape from a source copy by dx/dy. This avoids drift while dragging.
    const src=source||shape;

    if(shape.type==="compound"&&shape.children&&src.children){
      shape.children=shape.children.map((child,i)=>{
        const copy=JSON.parse(JSON.stringify(child));
        this.translateShape(copy,dx,dy,src.children[i]);
        return copy;
      });
      return;
    }

    if(shape.points&&src.points){
      shape.points=src.points.map(p=>({x:p.x+dx,y:p.y+dy}));
      return;
    }

    shape.x=(src.x||0)+dx;
    shape.y=(src.y||0)+dy;
  },

  selectedForOps(){
    return $$(".shapePick:checked").map(cb=>this.shapes.find(s=>s.id===cb.value)).filter(Boolean);
  },

  refreshShapeList(){
    const list=$("#shapeList");
    if(!list)return;

    list.innerHTML=this.shapes.length
      ? this.shapes.map((s,i)=>'<label><input class="shapePick" type="checkbox" value="'+s.id+'"> '+(i+1)+'. '+esc(s.type)+' <span class="mini">'+esc(s.id)+'</span></label>').join("")
      : '<div class="muted">No shapes yet.</div>';
  },

  shapeOp(mode){
    const picked=this.selectedForOps();

    if(picked.length<2){
      alert("Select at least two shapes in the Shape Objects list first.");
      return;
    }

    const compound={
      id:uid("shape"),
      type:"compound",
      mode,
      children:JSON.parse(JSON.stringify(picked)),
      style:{...this.style}
    };

    const pickedIds=new Set(picked.map(s=>s.id));
    this.shapes=this.shapes.filter(s=>!pickedIds.has(s.id));
    this.shapes.push(compound);
    this.selectedId=compound.id;

    this.render();
    this.refreshShapeList();
    Bus.emit("shape:operation",{mode,count:picked.length});
  },

  applyStyleToSelected(){
    const o=this.selected();
    if(!o)return;
    o.style={...this.style};
    if(o.type==="polygon")o.sides=+this.style.sides||3;
    if(o.type==="roundrect")o.radius=+this.style.radius||18;
    this.render();
  },

  payload(){
    return {
      name:$("#shapeName")?.value||"Shape Asset",
      kind:"vector-shape",
      adapter:"shape-forge",
      folder:"/",
      tags:["shape","vector"],
      notes:"",
      shapes:JSON.parse(JSON.stringify(this.shapes)),
      drawFunction:this.exportJS()
    };
  },

  exportJS(){
    return "function drawKGBShape(ctx){\n  const shapes="+JSON.stringify(this.shapes,null,2)+";\n  // Use KGB Studio Shape Forge renderer or port drawShape logic here.\n}";
  },

  del(){
    if(!this.selectedId)return;
    this.shapes=this.shapes.filter(o=>o.id!==this.selectedId);
    this.selectedId=null;
    this.render();
    Bus.emit("shape:changed",{});
  },

  dupe(){
    const o=this.selected();
    if(!o)return;
    const n=JSON.parse(JSON.stringify(o));
    n.id=uid("shape");
    if(n.points)n.points=n.points.map(p=>({x:p.x+18,y:p.y+18}));
    else{n.x+=18;n.y+=18;}
    this.shapes.push(n);
    this.selectedId=n.id;
    this.render();
    Bus.emit("shape:changed",{});
  },

  clear(){
    if(confirm("Clear Shape Forge canvas?")){
      this.shapes=[];
      this.selectedId=null;
      this.render();
      Bus.emit("shape:changed",{});
    }
  }
};

}});

/*
-------------------------------------------------------------------------------
LAYOUT CONTROLS

The Studio shell has three columns:
- left: Operation Explorer
- center: active module workspace
- right: Intelligence / Comms

Canvas-heavy tools need more space, so these controls let the user collapse
either sidebar or enter full workspace focus mode. This is intentionally done
with body classes so it stays safe and does not disturb module code.
-------------------------------------------------------------------------------
*/
const LayoutControls={
  toggleLeft(){
    document.body.classList.toggle("left-collapsed");
    // Leaving focus mode when manually toggling a panel makes the behavior clearer.
    document.body.classList.remove("workspace-focus");
    Studio.log(document.body.classList.contains("left-collapsed")?"Explorer collapsed":"Explorer expanded");
  },

  toggleRight(){
    document.body.classList.toggle("right-collapsed");
    document.body.classList.remove("workspace-focus");
    Studio.log(document.body.classList.contains("right-collapsed")?"Intel collapsed":"Intel expanded");
  },

  toggleFocus(){
    document.body.classList.toggle("workspace-focus");
    Studio.log(document.body.classList.contains("workspace-focus")?"Workspace focus enabled":"Workspace focus disabled");
  },

  reset(){
    document.body.classList.remove("left-collapsed","right-collapsed","workspace-focus");
    Studio.log("Workspace layout reset.");
  }
};

w:1;grid-column:1 / span 2;height:50vh;position:sticky;top:0;z-index:2}.panel{grid-row:2;grid-column:1;height:50vh;min-width:0;overflow:auto;border:0;border-top:1px solid var(--line);border-right:1px solid var(--line);padding:7px}.right{grid-row:2;grid-column:2;height:50vh;min-width:0;overflow:auto;border:0;border-top:1px solid var(--line);padding:7px}canvas{width:min(96vw,49vh);height:min(96vw,49vh)}.hud{font-size:10px;padding:5px}.grid,.three,.styleGrid,.styleButtons,.styleButtons.wide{grid-template-columns:1fr}.row{gap:6px}.row button,.row .filebtn{flex:1 1 auto}.quickTools{grid-template-columns:1fr 1fr}.palette{grid-template-columns:repeat(4,1fr)}summary{padding:9px}.inside{padding:7px}.desktopOnly{display:none!important}}\n</style>\n</head>\n<body>\n<header class=\"topbar\">\n  <div class=\"brand\">KGB SHAPE FORGE v6.4</div>\n  <div class=\"topActions\">\n    <button id=\"undoBtn\" class=\"tiny\" data-hint=\"Undo the last drawing/edit step.\">Undo</button>\n    <button id=\"redoBtn\" class=\"tiny\" data-hint=\"Redo the last undone step.\">Redo</button>\n    <button id=\"helpBtn\" class=\"tiny primary\" data-hint=\"Open the built-in README/help guide.\">Help</button>\n    <button id=\"clearBtn\" class=\"tiny danger\" data-hint=\"Clear the project canvas.\">Clear</button>\n  </div>\n</header>\n<main>\n<section class=\"panel\">\n  <details open>\n    <summary>Tools</summary>\n    <div class=\"inside\">\n      <div class=\"quickTools\" id=\"tools\">\n        <button data-tool=\"select\" class=\"active\" data-hint=\"Select objects. Drag to move. Use corner handles to scale, the top handle to rotate, and multi-select for shape operations.\">Select</button>\n        <button data-tool=\"pen\" data-hint=\"Freehand pen. Creates a procedural path using current stroke, width, glow, and opacity.\">Pen</button>\n        <button data-tool=\"smooth\" data-hint=\"Smooth pen. Records hand movement, then exports smoother quadratic curves.\">Smooth</button>\n        <button data-tool=\"line\" data-hint=\"Straight line tool. Drag from start to end.\">Line</button>\n        <button data-tool=\"bezier\" data-hint=\"Bezier tool. Tap start, control 1, control 2, end. Hit Finish Bezier when done.\">Bezier</button>\n        <button data-tool=\"bucket\" data-hint=\"Fill bucket. If objects are selected, changes their fill/stroke. If nothing selected, adds a background fill object.\">Bucket</button>\n        <button data-tool=\"ellipse\" data-hint=\"Ellipse/circle tool. Drag to size. Turn Shape Fill ON for filled ellipses.\">Ellipse</button>\n        <button data-tool=\"rect\" data-hint=\"Rounded rectangle tool. Drag to size. Use radius slider for corner roundness.\">Round Rect</button>\n        <button data-tool=\"poly\" data-hint=\"Rounded polygon tool. Pick side count, drag to size, and use roundness to soften corners.\">Polygon</button>\n        <button data-tool=\"eraser\" data-hint=\"Eraser draws destination-out strokes. Useful for carving visual gaps.\">Eraser</button>\n      </div>\n      <div class=\"row\"><button id=\"finishBezierBtn\" class=\"tiny\" data-hint=\"Turns placed Bezier points into one curve object.\">Finish Bezier</button><button id=\"clearBezierBtn\" class=\"tiny\" data-hint=\"Clears Bezier points without making a shape.\">Clear Bezier</button></div>\n      <div class=\"row\"><button id=\"fillToggle\" data-hint=\"When ON, new ellipses, rectangles, and polygons use the Fill Color.\">Shape Fill: OFF</button><button id=\"mirrorToggle\" data-hint=\"When ON, drawing on one side also creates a mirrored partner across the centerline.\">Mirror: OFF</button></div>\n      <div class=\"tinyNote\" id=\"toolHelp\">Hold a button for a hint. Desktop hover works too.</div>\n    </div>\n  </details>\n\n  <details open>\n    <summary>Stroke / Fill</summary>\n    <div class=\"inside styleBox\">\n      <div class=\"styleGrid\">\n        <label><span class=\"compactLabel\">Stroke</span><input id=\"strokeColor\" type=\"color\" value=\"#ff9700\"></label>\n        <label><span class=\"compactLabel\">Fill</span><input id=\"fillColor\" type=\"color\" value=\"#05090a\"></label>\n      </div>\n      <div class=\"palette\" id=\"palette\"></div>\n      <div class=\"styleButtons wide\"><button id=\"applyStrokeBtn\" class=\"tiny\" title=\"Apply current stroke color to selected objects.\">Stroke Color</button><button id=\"applyStrokeWidthBtn\" class=\"tiny\" title=\"Apply current line width to selected objects.\">Stroke Width</button><button id=\"applyStrokeBothBtn\" class=\"tiny\" title=\"Apply current stroke color and line width to selected objects.\">Stroke Both</button><button id=\"applyFillBtn\" class=\"tiny\" title=\"Apply current fill color to selected objects.\">Fill</button><button id=\"applyAllStyleBtn\" class=\"tiny primary\" title=\"Apply stroke, fill, width, glow, and opacity to selected objects.\">All Style</button></div>\n      <label>Line width <input id=\"lineWidth\" type=\"range\" min=\"1\" max=\"54\" value=\"7\"><span id=\"lineWidthVal\" class=\"small\"></span></label>\n      <label>Glow blur <input id=\"glowBlur\" type=\"range\" min=\"0\" max=\"80\" value=\"18\"><span id=\"glowBlurVal\" class=\"small\"></span></label>\n      <label>Opacity <input id=\"opacity\" type=\"range\" min=\"0.05\" max=\"1\" step=\"0.05\" value=\"1\"><span id=\"opacityVal\" class=\"small\"></span></label>\n    </div>\n  </details>\n\n  <details>\n    <summary>Shape Settings</summary>\n    <div class=\"inside col\">\n      <label>Round rect radius <input id=\"radius\" type=\"range\" min=\"0\" max=\"120\" value=\"18\"><span id=\"radiusVal\" class=\"small\"></span></label>\n      <label>Polygon sides <input id=\"polySides\" type=\"range\" min=\"3\" max=\"12\" step=\"1\" value=\"3\"><span id=\"polySidesVal\" class=\"small\"></span></label>\n      <label>Polygon roundness <input id=\"polyRound\" type=\"range\" min=\"0\" max=\"0.48\" step=\"0.02\" value=\"0.18\"><span id=\"polyRoundVal\" class=\"small\"></span></label>\n      <label>Smoothing <input id=\"smoothness\" type=\"range\" min=\"0\" max=\"1\" step=\"0.05\" value=\"0.55\"><span id=\"smoothnessVal\" class=\"small\"></span></label>\n    </div>\n  </details>\n</section>\n<section class=\"stage\">\n  <div class=\"wrap\"><canvas id=\"drawCanvas\" width=\"768\" height=\"768\"></canvas><div class=\"hud\" id=\"hud\">Static canvas. Bottom panels scroll. Trace guides are not exported.</div></div>\n</section>\n<section class=\"panel right\">\n  <details open>\n    <summary>Selection</summary>\n    <div class=\"inside\">\n      <div id=\"selectionInfo\" class=\"pill\">None</div>\n      <div class=\"row\"><button id=\"multiToggle\" data-hint=\"Lets you select multiple objects. Needed for Union/Subtract/Intersect.\">Multi Select: OFF</button><button id=\"selectAllBtn\" class=\"tiny\">Select All</button><button id=\"clearSelBtn\" class=\"tiny\">Clear Sel</button></div>\n      <div class=\"row\"><button id=\"bringForwardBtn\" class=\"tiny\">Bring Forward</button><button id=\"sendBackBtn\" class=\"tiny\">Send Back</button><button id=\"dupBtn\" class=\"tiny\">Duplicate</button><button id=\"deleteBtn\" class=\"tiny danger\">Delete</button></div>\n    </div>\n  </details>\n\n  <details open>\n    <summary>Transform</summary>\n    <div class=\"inside col\">\n      <label class=\"check\"><input id=\"ratioLock\" type=\"checkbox\" checked> Lock ratio</label>\n      <label>Scale X / squash-stretch <input id=\"scaleX\" type=\"range\" min=\"0.1\" max=\"3\" step=\"0.05\" value=\"1\"></label>\n      <label>Scale Y / squash-stretch <input id=\"scaleY\" type=\"range\" min=\"0.1\" max=\"3\" step=\"0.05\" value=\"1\"></label>\n      <label>Rotate <input id=\"rotate\" type=\"range\" min=\"-180\" max=\"180\" step=\"1\" value=\"0\"></label>\n      <div class=\"row\"><button id=\"applyTransformBtn\" class=\"tiny primary\">Apply Sliders</button><button id=\"resetTransformBtn\" class=\"tiny\">Reset</button><button id=\"bakeBtn\" class=\"tiny warn\">Bake</button></div>\n    </div>\n  </details>\n\n  <details>\n    <summary>Shape Ops</summary>\n    <div class=\"inside\">\n      <div class=\"row\"><button id=\"unionBtn\" class=\"primary\">Merge / Union</button><button id=\"subtractBtn\" class=\"warn\">Subtract</button><button id=\"intersectBtn\" class=\"primary\">Intersect</button></div>\n    </div>\n  </details>\n\n  <details>\n    <summary>Trace Image</summary>\n    <div class=\"inside col\">\n      <label class=\"filebtn\">Load Trace Image<input id=\"traceInput\" type=\"file\" accept=\"image/*\" class=\"hidden\"></label>\n      <label>Trace opacity <input id=\"traceOpacity\" type=\"range\" min=\"0\" max=\"1\" step=\"0.05\" value=\"0.45\"></label>\n      <label>Trace scale <input id=\"traceScale\" type=\"range\" min=\"0.1\" max=\"3\" step=\"0.05\" value=\"1\"></label>\n      <div class=\"row\"><button id=\"traceCenterBtn\" class=\"tiny\">Center</button><button id=\"traceFitBtn\" class=\"tiny\">Fit</button><button id=\"traceToggle\" class=\"tiny\">Hide/Show</button><button id=\"clearTraceBtn\" class=\"tiny danger\">Clear</button></div>\n    </div>\n  </details>\n\n  <details>\n    <summary>Animation / Onion</summary>\n    <div class=\"inside col\">\n      <div class=\"row\"><button id=\"prevFrameBtn\" class=\"tiny\">Prev</button><button id=\"nextFrameBtn\" class=\"tiny\">Next</button><button id=\"addFrameBtn\" class=\"tiny primary\">Add Frame</button><button id=\"dupFrameBtn\" class=\"tiny\">Dup Frame</button><button id=\"delFrameBtn\" class=\"tiny danger\">Del Frame</button></div>\n      <label class=\"check\"><input id=\"onionToggle\" type=\"checkbox\"> Onion skin</label>\n      <label>FPS <input id=\"fps\" type=\"range\" min=\"1\" max=\"24\" value=\"8\"><span id=\"fpsVal\" class=\"small\"></span></label>\n      <div class=\"row\"><button id=\"playBtn\" class=\"tiny\">Play</button><button id=\"stopBtn\" class=\"tiny\">Stop</button></div>\n    </div>\n  </details>\n\n  <details>\n    <summary>File / Export</summary>\n    <div class=\"inside col\">\n      <div class=\"row\"><button id=\"saveProjectBtn\">Save JSON</button><label class=\"filebtn\">Load JSON<input id=\"loadProjectInput\" type=\"file\" accept=\"application/json\" class=\"hidden\"></label></div>\n      <div class=\"row\"><button id=\"exportHtmlBtn\" class=\"primary\">Export HTML</button><button id=\"exportJsBtn\">Export JS</button><button id=\"exportAnimBtn\" class=\"warn\">Export Animation</button></div>\n      <textarea id=\"output\" placeholder=\"Exported code appears here.\"></textarea>\n      <div class=\"row\"><button id=\"copyBtn\">Copy Output</button><button id=\"downloadBtn\">Download Output</button></div>\n    </div>\n  </details>\n\n  <details>\n    <summary>Objects</summary>\n    <div class=\"inside\" id=\"objectList\"></div>\n  </details>\n</section>\n</main>\n<div class=\"hint\" id=\"hint\"></div>\n<div class=\"modal\" id=\"helpModal\" aria-hidden=\"true\">\n  <div class=\"modalCard\" role=\"dialog\" aria-modal=\"true\" aria-labelledby=\"helpTitle\">\n    <div class=\"modalHead\">\n      <b id=\"helpTitle\">KGB Sprite Forge README</b>\n      <button id=\"closeHelpBtn\" class=\"tiny danger\">Close</button>\n    </div>\n    <div class=\"modalBody\">\n      <h3>Core idea</h3>\n      <p>This tool is a canvas-sprite forge. You draw vector-ish canvas objects, edit them, then export JavaScript/HTML that redraws the sprite with <code>ctx</code> commands instead of PNG assets.</p>\n\n      <h3>Top buttons</h3>\n      <ul>\n        <li><b>Undo / Redo</b> walk backward or forward through edits.</li>\n        <li><b>Help</b> opens this guide.</li>\n        <li><b>Clear</b> wipes the current project.</li>\n      </ul>\n\n      <h3>Drawing tools</h3>\n      <ul>\n        <li><b>Select</b>: pick objects. Drag selected objects to move them. Use corner handles to resize. Use the top round handle to rotate.</li>\n        <li><b>Pen</b>: freehand stroke. Best for organic outlines, fur marks, scratches, wrinkles, and neon details.</li>\n        <li><b>Smooth</b>: freehand stroke that gets softened into smoother curves after drawing.</li>\n        <li><b>Line</b>: straight segment.</li>\n        <li><b>Bezier</b>: tap/click points in this order: start, control 1, control 2, end. Then use <b>Finish Bezier</b>.</li>\n        <li><b>Bucket</b>: changes selected object fill/stroke, or creates a full-canvas fill if nothing is selected.</li>\n        <li><b>Ellipse</b>, <b>Round Rect</b>, <b>Polygon</b>: drag to create basic shapes. Polygon sides and roundness are adjustable.</li>\n        <li><b>Eraser</b>: carves visual gaps with a destination-out stroke.</li>\n      </ul>\n\n      <h3>Stroke / fill / glow</h3>\n      <ul>\n        <li><b>Stroke color</b> controls outlines and pen/line color.</li>\n        <li><b>Fill color</b> controls filled shapes and compound shape fills.</li>\n        <li><b>Stroke Color</b> changes only the selected object stroke color. <b>Stroke Width</b> changes only stroke thickness. <b>Stroke Both</b> changes both. <b>Fill</b> changes fill. <b>All Style</b> applies color, width, glow, and opacity.</li>\n        <li><b>Glow</b> is canvas shadow blur. Higher glow = more neon bloom.</li>\n      </ul>\n\n      <h3>Shape operations</h3>\n      <ul>\n        <li>Select at least two filled-ish shapes, then use <b>Merge / Union</b>, <b>Subtract</b>, or <b>Intersect</b>.</li>\n        <li><b>Merge / Union</b> combines selected shapes into one compound silhouette.</li>\n        <li><b>Subtract</b> uses the oldest/bottom selected object as the base and cuts the other selected shapes out of it.</li>\n        <li><b>Intersect</b> keeps only the overlapping area.</li>\n        <li>Compound shapes keep a restylable bitmap-style stroke/outline. Stroke color and stroke width can be changed after merge/subtract/intersect.</li>\n      </ul>\n\n      <h3>Trace image</h3>\n      <ul>\n        <li><b>Load Image</b> puts a reference image underneath your drawing so you can trace over it.</li>\n        <li><b>Trace ON/OFF</b> hides or shows it. <b>Fit</b> sizes it to the canvas. <b>Center</b> recenters it.</li>\n        <li>On desktop, switch to Select and hold <span class=\"kbd\">T</span> while dragging the canvas to move the trace image.</li>\n      </ul>\n\n      <h3>Onion skin</h3>\n      <p>Onion skin is an animation aid. It lightly shows the previous frame/pose behind the current drawing so you can line up movement. Think old-school animation paper: faint previous pose under the new pose.</p>\n\n      <h3>Animation export</h3>\n      <p><b>Export Animated HTML</b> wraps your sprite in a tiny demo loop. It adds a procedural wobble/squash/rotate animation around the sprite center. It is not a full animation timeline yet; it is a starting export so you can see how to animate the generated canvas sprite in a game loop.</p>\n\n      <h3>Practical workflow</h3>\n      <ul>\n        <li>Load a trace image.</li>\n        <li>Build the big silhouette with ellipse/rect/polygon + shape ops.</li>\n        <li>Add neon outlines and details with Pen/Smooth/Bezier.</li>\n        <li>Select pieces and tweak scale/rotation/style until the sprite reads clearly.</li>\n        <li>Export JS or HTML and paste the draw function into your game.</li>\n      </ul>\n    </div>\n  </div>\n</div>\n\n<script>\nconst canvas=document.getElementById('drawCanvas'),ctx=canvas.getContext('2d'),$=id=>document.getElementById(id);\nctx.lineCap='round';ctx.lineJoin='round';\nconst ui={stroke:$('strokeColor'),fill:$('fillColor'),width:$('lineWidth'),glow:$('glowBlur'),opacity:$('opacity'),radius:$('radius'),smooth:$('smoothness'),sides:$('polySides'),round:$('polyRound'),sx:$('scaleX'),sy:$('scaleY'),rot:$('rotate'),out:$('output')};\nconst palette=['#ff9700','#ffb000','#ff5a00','#9cff00','#62ff00','#00eaff','#00baff','#008dff','#ff4766','#fff400','#05090a','#ffffff'];\nconst clone=o=>JSON.parse(JSON.stringify(o));\nlet tool='select',shapeFill=false,mirrorOn=false,multi=false,drawing=false,start=null,current=null,history=[],redo=[],bezierPts=[];\nlet selected=[],dragging=false,dragStart=null,baseCmds=null,handleMode=null,keys={},traceDragging=false;\nlet project={w:768,h:768,commands:[],trace:{src:null,visible:true,opacity:.35,x:0,y:0,scale:1,w:0,h:0}};\nlet traceImg=new Image();\nfunction settings(){return{stroke:ui.stroke.value,fill:ui.fill.value,width:+ui.width.value,glow:+ui.glow.value,opacity:+ui.opacity.value,radius:+ui.radius.value,smooth:+ui.smooth.value,fillOn:shapeFill,sides:+ui.sides.value,round:+ui.round.value}}\nfunction activeCmds(){return project.commands}\nfunction pushHistory(){history.push(JSON.stringify(project));if(history.length>80)history.shift();redo.length=0}\nfunction restore(str){project=JSON.parse(str);selected=[];loadTraceFromProject();syncUI();render()}\nfunction centerOf(c){const b=boundsOf(c);return{x:(b.x1+b.x2)/2,y:(b.y1+b.y2)/2}}\nfunction ensureTr(c){if(!c.tr){const cc=centerOf(c);c.tr={x:0,y:0,sx:1,sy:1,rot:0,cx:cc.x,cy:cc.y}}return c.tr}\nfunction pointer(e){const r=canvas.getBoundingClientRect();const p=e.touches?e.touches[0]:e;return{x:(p.clientX-r.left)*canvas.width/r.width,y:(p.clientY-r.top)*canvas.height/r.height}}\nfunction roundRectPath(c,x,y,w,h,r){if(w<0){x+=w;w=-w}if(h<0){y+=h;h=-h}r=Math.min(r,Math.abs(w)/2,Math.abs(h)/2);c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath()}\nfunction polygonPoints(cx,cy,rx,ry,sides,rot=-Math.PI/2){let pts=[];for(let i=0;i<sides;i++){const a=rot+i*Math.PI*2/sides;pts.push({x:cx+Math.cos(a)*rx,y:cy+Math.sin(a)*ry})}return pts}\nfunction roundedPolyPath(c,pts,round=.18){c.beginPath();if(round<=0){c.moveTo(pts[0].x,pts[0].y);pts.slice(1).forEach(p=>c.lineTo(p.x,p.y));c.closePath();return}for(let i=0;i<pts.length;i++){const p0=pts[(i-1+pts.length)%pts.length],p=pts[i],p1=pts[(i+1)%pts.length];const d0=Math.hypot(p.x-p0.x,p.y-p0.y),d1=Math.hypot(p.x-p1.x,p.y-p1.y);const r=Math.min(d0,d1)*round;const a={x:p.x+(p0.x-p.x)*(r/d0),y:p.y+(p0.y-p.y)*(r/d0)};const b={x:p.x+(p1.x-p.x)*(r/d1),y:p.y+(p1.y-p.y)*(r/d1)};if(i===0)c.moveTo(a.x,a.y);else c.lineTo(a.x,a.y);c.quadraticCurveTo(p.x,p.y,b.x,b.y)}c.closePath()}\nfunction applyTransform(c,cmd){const tr=ensureTr(cmd);c.translate(tr.x||0,tr.y||0);c.translate(tr.cx||384,tr.cy||384);c.rotate((tr.rot||0)*Math.PI/180);c.scale(tr.sx||1,tr.sy||1);c.translate(-(tr.cx||384),-(tr.cy||384))}\nfunction drawPathShape(c,cmd,forHit=false){if(cmd.kind==='path'||cmd.kind==='erase'){const pts=cmd.points;if(!pts?.length)return;c.beginPath();c.moveTo(pts[0].x,pts[0].y);if(cmd.curve&&pts.length>3){for(let i=1;i<pts.length-2;i++){let xc=(pts[i].x+pts[i+1].x)/2,yc=(pts[i].y+pts[i+1].y)/2;c.quadraticCurveTo(pts[i].x,pts[i].y,xc,yc)}c.quadraticCurveTo(pts[pts.length-2].x,pts[pts.length-2].y,pts.at(-1).x,pts.at(-1).y)}else pts.slice(1).forEach(p=>c.lineTo(p.x,p.y));return}\n if(cmd.kind==='line'){c.beginPath();c.moveTo(cmd.x1,cmd.y1);c.lineTo(cmd.x2,cmd.y2);return}\n if(cmd.kind==='bezier'){c.beginPath();c.moveTo(cmd.points[0].x,cmd.points[0].y);for(let i=1;i+2<cmd.points.length;i+=3)c.bezierCurveTo(cmd.points[i].x,cmd.points[i].y,cmd.points[i+1].x,cmd.points[i+1].y,cmd.points[i+2].x,cmd.points[i+2].y);return}\n if(cmd.kind==='ellipse'){c.beginPath();c.ellipse((cmd.x1+cmd.x2)/2,(cmd.y1+cmd.y2)/2,Math.abs(cmd.x2-cmd.x1)/2,Math.abs(cmd.y2-cmd.y1)/2,0,0,Math.PI*2);return}\n if(cmd.kind==='rect'){roundRectPath(c,cmd.x1,cmd.y1,cmd.x2-cmd.x1,cmd.y2-cmd.y1,cmd.s?.radius||18);return}\n if(cmd.kind==='poly'){roundedPolyPath(c,polygonPoints((cmd.x1+cmd.x2)/2,(cmd.y1+cmd.y2)/2,Math.abs(cmd.x2-cmd.x1)/2,Math.abs(cmd.y2-cmd.y1)/2,cmd.s?.sides||3,-Math.PI/2),cmd.s?.round??.18);return}\n}\nfunction compoundMask(cmd){const o=document.createElement('canvas'),oc=o.getContext('2d');o.width=o.height=768;oc.lineCap='round';oc.lineJoin='round';function part(p,mode,target=oc){target.save();target.globalCompositeOperation=mode;target.fillStyle='#fff';target.strokeStyle='#fff';target.lineWidth=Math.max(2,p.s?.width||2);applyTransform(target,p);drawPathShape(target,p);if(['path','line','bezier','erase'].includes(p.kind)&&!p.s?.fillOn)target.stroke();else target.fill();target.restore()}if(cmd.op==='union')cmd.parts.forEach(p=>part(p,'source-over'));if(cmd.op==='subtract'){part(cmd.parts[0],'source-over');cmd.parts.slice(1).forEach(p=>part(p,'destination-out'))}if(cmd.op==='intersect'){part(cmd.parts[0],'source-over');cmd.parts.slice(1).forEach(p=>{const t=document.createElement('canvas'),tc=t.getContext('2d');t.width=t.height=768;tc.lineCap='round';tc.lineJoin='round';part(p,'source-over',tc);oc.globalCompositeOperation='destination-in';oc.drawImage(t,0,0);oc.globalCompositeOperation='source-over'})}return o}\nfunction drawCompound(c,cmd){\n  const mask=compoundMask(cmd),fillLayer=document.createElement('canvas'),fc=fillLayer.getContext('2d'),strokeLayer=document.createElement('canvas'),sc=strokeLayer.getContext('2d');\n  fillLayer.width=fillLayer.height=strokeLayer.width=strokeLayer.height=768;\n  const fill=cmd.s?.fill||'#ff9700',stroke=cmd.s?.stroke||fill,width=Math.max(0,cmd.s?.width??7),glow=cmd.s?.glow||0;\n  if(width>0){\n    const steps=Math.max(12,Math.ceil(width*2.5));\n    for(let i=0;i<steps;i++){\n      const a=i*Math.PI*2/steps,dx=Math.cos(a)*width,dy=Math.sin(a)*width;\n      sc.drawImage(mask,dx,dy);\n    }\n    sc.globalCompositeOperation='destination-out';\n    sc.drawImage(mask,0,0);\n    sc.globalCompositeOperation='source-in';\n    sc.fillStyle=stroke;\n    sc.fillRect(0,0,768,768);\n    sc.globalCompositeOperation='source-over';\n  }\n  fc.fillStyle=fill;fc.fillRect(0,0,768,768);fc.globalCompositeOperation='destination-in';fc.drawImage(mask,0,0);fc.globalCompositeOperation='source-over';\n  c.save();c.shadowColor=stroke;c.shadowBlur=glow;c.drawImage(strokeLayer,0,0);c.restore();\n  c.save();c.shadowColor=fill;c.shadowBlur=Math.max(0,glow*.45);c.drawImage(fillLayer,0,0);c.restore();\n}\nfunction drawCommand(c,cmd,ghost=false){c.save();c.globalAlpha=(cmd.s?.opacity??1)*(ghost?.55:1);if(cmd.kind==='fill'){c.fillStyle=cmd.s.fill;c.fillRect(0,0,768,768);c.restore();return}applyTransform(c,cmd);if(cmd.kind==='compound'){drawCompound(c,cmd);c.restore();return}if(cmd.kind==='erase'){c.globalCompositeOperation='destination-out';c.lineWidth=cmd.s?.width||7;drawPathShape(c,cmd);c.stroke();c.restore();return}c.strokeStyle=cmd.s?.stroke||'#ff9700';c.fillStyle=cmd.s?.fill||'#05090a';c.lineWidth=cmd.s?.width||7;c.shadowColor=(cmd.s?.glow||0)>0?c.strokeStyle:'transparent';c.shadowBlur=cmd.s?.glow||0;drawPathShape(c,cmd);if(cmd.s?.fillOn && ['ellipse','rect','poly'].includes(cmd.kind))c.fill();c.stroke();c.restore()}\nfunction render(){ctx.clearRect(0,0,768,768);ctx.fillStyle='#020506';ctx.fillRect(0,0,768,768);if(project.trace.visible&&traceImg.complete&&traceImg.naturalWidth&&project.trace.src){ctx.save();ctx.globalAlpha=project.trace.opacity;ctx.drawImage(traceImg,project.trace.x,project.trace.y,traceImg.width*project.trace.scale,traceImg.height*project.trace.scale);ctx.restore()}activeCmds().forEach(c=>drawCommand(ctx,c));if(current)drawCommand(ctx,current,true);drawBezierPreview();drawSelection();syncUI(false)}\nfunction drawBezierPreview(){if(!bezierPts.length)return;ctx.save();ctx.strokeStyle='#fff400';ctx.fillStyle='#fff400';ctx.lineWidth=2;ctx.shadowColor='#fff400';ctx.shadowBlur=10;ctx.beginPath();ctx.moveTo(bezierPts[0].x,bezierPts[0].y);for(let i=1;i+2<bezierPts.length;i+=3)ctx.bezierCurveTo(bezierPts[i].x,bezierPts[i].y,bezierPts[i+1].x,bezierPts[i+1].y,bezierPts[i+2].x,bezierPts[i+2].y);ctx.stroke();bezierPts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,5,0,Math.PI*2);ctx.fill()});ctx.restore()}\nfunction transformedBounds(cmd){const b=boundsOf(cmd),tr=ensureTr(cmd);let pts=[{x:b.x1,y:b.y1},{x:b.x2,y:b.y1},{x:b.x2,y:b.y2},{x:b.x1,y:b.y2}].map(p=>transformPoint(p,tr));return{x1:Math.min(...pts.map(p=>p.x)),y1:Math.min(...pts.map(p=>p.y)),x2:Math.max(...pts.map(p=>p.x)),y2:Math.max(...pts.map(p=>p.y))}}\nfunction transformPoint(p,tr){let x=p.x-tr.cx,y=p.y-tr.cy;x*=tr.sx||1;y*=tr.sy||1;const a=(tr.rot||0)*Math.PI/180,ca=Math.cos(a),sa=Math.sin(a);return{x:x*ca-y*sa+tr.cx+(tr.x||0),y:x*sa+y*ca+tr.cy+(tr.y||0)}}\nfunction selectionBounds(){if(!selected.length)return null;let bs=selected.map(i=>transformedBounds(activeCmds()[i]));return{x1:Math.min(...bs.map(b=>b.x1)),y1:Math.min(...bs.map(b=>b.y1)),x2:Math.max(...bs.map(b=>b.x2)),y2:Math.max(...bs.map(b=>b.y2))}}\nfunction drawSelection(){const b=selectionBounds();if(!b)return;ctx.save();ctx.strokeStyle='#00eaff';ctx.lineWidth=2;ctx.setLineDash([8,6]);ctx.strokeRect(b.x1,b.y1,b.x2-b.x1,b.y2-b.y1);ctx.setLineDash([]);const hs=10,pts=handlesFor(b);for(const k in pts){const p=pts[k];ctx.fillStyle=k==='rot'?'#fff400':'#00eaff';ctx.strokeStyle='#001316';ctx.lineWidth=2;ctx.beginPath();if(k==='rot'){ctx.arc(p.x,p.y,7,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.beginPath();ctx.moveTo((b.x1+b.x2)/2,b.y1);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#fff400';ctx.stroke()}else{ctx.rect(p.x-hs/2,p.y-hs/2,hs,hs);ctx.fill();ctx.stroke()}}ctx.restore()}\nfunction handlesFor(b){const mx=(b.x1+b.x2)/2,my=(b.y1+b.y2)/2;return{nw:{x:b.x1,y:b.y1},ne:{x:b.x2,y:b.y1},sw:{x:b.x1,y:b.y2},se:{x:b.x2,y:b.y2},rot:{x:mx,y:b.y1-38},c:{x:mx,y:my}}}\nfunction hitHandle(p){const b=selectionBounds();if(!b)return null;const h=handlesFor(b);for(const k of ['rot','nw','ne','sw','se'])if(Math.hypot(p.x-h[k].x,p.y-h[k].y)<16)return k;return null}\nfunction alphaBoundsOfCanvas(cnv){\n  // Used by compound/shape-op objects. After Union/Subtract/Intersect, the old\n  // component rectangles are no longer accurate. This scans the generated alpha\n  // mask and returns the real visible pixel boundary, so the cyan selection box\n  // hugs the actual compound silhouette instead of the original full rectangle.\n  const w=cnv.width,h=cnv.height,ctx2=cnv.getContext('2d'),data=ctx2.getImageData(0,0,w,h).data;\n  let x1=w,y1=h,x2=0,y2=0,found=false;\ /*
-------------------------------------------------------------------------------
FULL SHAPE FORGE HOST MODULE + ROUND-TRIP STATE

This module hosts the full standalone Shape Forge in an iframe and adds the
Studio-side asset lifecycle for full shape-forge-project assets:
- create new
- save new
- reopen existing
- update existing
-------------------------------------------------------------------------------
*/
const ShapeForgeStudioHost={
  currentAssetId:null,
  currentAsset:null,

  setEditingAsset(asset){
    this.currentAsset=asset||null;
    this.currentAssetId=asset?.id||null;
  },

  clearEditingAsset(){
    this.currentAsset=null;
    this.currentAssetId=null;
  },

  currentName(){
    return ($("#forgeAssetName")?.value||"New Shape Forge Project").trim() || "New Shape Forge Project";
  },

  getBridge(){
    return $("#shapeForgeFrame")?.contentWindow?.KGBShapeForgeBridge || null;
  },

  loadIntoFrame(asset){
    const bridge=this.getBridge();
    if(!bridge)return false;

    if(asset?.project){
      bridge.setProject(asset.project);
      this.setEditingAsset(asset);
      if($("#forgeAssetName"))$("#forgeAssetName").value=asset.name||"Shape Forge Project";
      Studio.log("Loaded Shape Forge asset: "+(asset.name||asset.id));
    }else{
      bridge.newProject();
      this.clearEditingAsset();
      if($("#forgeAssetName"))$("#forgeAssetName").value="New Shape Forge Project";
      Studio.log("Started new Shape Forge project.");
    }

    Studio.renderProps();
    return true;
  },

  buildAssetPayload(){
    const bridge=this.getBridge();
    if(!bridge)throw new Error("Shape Forge is still loading.");

    const forgeProject=bridge.getProject();
    return {
      name:this.currentName(),
      kind:"shape-forge-project",
      adapter:"shape-forge-full",
      folder:"/",
      tags:["shape","forge","standalone","v6.4"],
      notes:"Saved from the full embedded KGB Shape Forge v6.4 module.",
      project:forgeProject,
      commands:forgeProject.commands||[],
      exportedJS:bridge.exportJS(),
      previewDataUrl:bridge.getPreviewDataUrl(),
      updated:new Date().toISOString()
    };
  },

  saveNew(){
    const payload=this.buildAssetPayload();
    const saved=Studio.addAsset("shapes",payload);
    this.setEditingAsset(saved);
    Studio.state.selection={type:"shapes",id:saved.id};
    Studio.renderExplorer();
    Studio.renderProps();
    Studio.log("Saved new Shape Forge asset: "+saved.name);
  },

  updateExisting(){
    if(!this.currentAssetId){
      alert("No existing Shape Forge asset is currently loaded. Use Save New first.");
      return;
    }
    const payload=this.buildAssetPayload();
    Studio.updateAsset("shapes",this.currentAssetId,payload);
    const refreshed=Studio.find("shapes",this.currentAssetId);
    this.setEditingAsset(refreshed);
    Studio.state.selection={type:"shapes",id:this.currentAssetId};
    Studio.renderExplorer();
    Studio.renderProps();
    Studio.log("Updated Shape Forge asset: "+(refreshed?.name||this.currentAssetId));
  },

  startNewProject(){
    this.loadIntoFrame(null);
  }
};

Studio.register({
  id:"asset.shapeforge",
  section:"ASSETS",
  title:"Shape Forge",
  description:"Full integrated KGB Shape Forge v6.4 standalone tool with Studio round-trip save/open/update.",
  render(root,studio,opt){
    root.innerHTML=
      '<div class="forgeHost">'+
        '<div class="card">'+
          '<div class="forgeMeta">'+
            '<div><label>Shape Asset Name</label><input id="forgeAssetName" value="'+esc(opt?.asset?.name||"New Shape Forge Project")+'"></div>'+
            '<button id="newForgeProject">New Project</button>'+
            '<button class="primary" id="saveNewForgeAsset">Save New</button>'+
            '<button id="updateForgeAsset">Update Existing</button>'+
            '<button id="focusForgeWorkspace">Focus Workspace</button>'+
          '</div>'+
          '<div class="row forgeToolbar" style="margin-top:8px">'+
            '<button id="downloadForgeStandalone">Download Standalone Forge</button>'+
            '<span class="muted">Full standalone Shape Forge is running inside Studio. Open saved shape-forge-project assets from Operation Explorer to edit them here.</span>'+
          '</div>'+
        '</div>'+
        '<iframe id="shapeForgeFrame" class="forgeFrame" title="KGB Shape Forge"></iframe>'+
      '</div>';

    const frame=$("#shapeForgeFrame");
    frame.srcdoc=KGB_FULL_SHAPE_FORGE_HTML;

    $("#focusForgeWorkspace").onclick=()=>LayoutControls.toggleFocus();
    $("#newForgeProject").onclick=()=>ShapeForgeStudioHost.startNewProject();
    $("#saveNewForgeAsset").onclick=()=>ShapeForgeStudioHost.saveNew();
    $("#updateForgeAsset").onclick=()=>ShapeForgeStudioHost.updateExisting();

    $("#downloadForgeStandalone").onclick=()=>{
      const blob=new Blob([KGB_FULL_SHAPE_FORGE_HTML],{type:"text/html"});
      const a=document.createElement("a");
      a.href=URL.createObjectURL(blob);
      a.download="kgb_shape_forge_v6_4_standalone.html";
      a.click();
      URL.revokeObjectURL(a.href);
    };

    frame.onload=()=>{
      const asset=(opt?.asset?.kind==="shape-forge-project" || opt?.asset?.adapter==="shape-forge-full") ? opt.asset : null;
      ShapeForgeStudioHost.loadIntoFrame(asset);
    };
  },
  actions(root){
    root.innerHTML='<button onclick="LayoutControls.toggleFocus()">Focus</button><button onclick="ShapeForgeStudioHost.startNewProject()">New Project</button>';
  },
  properties(panel){
    const a=ShapeForgeStudioHost.currentAsset;
    panel.innerHTML=
      '<div class="card">'+
      '<h3>Shape Forge Host</h3>'+
      '<p class="muted">Current mode: '+esc(a ? "Editing existing asset" : "New unsaved project")+'</p>'+
      (a ? '<p class="mini">Asset ID: '+esc(a.id||"")+'</p><p class="mini">Kind: '+esc(a.kind||"")+'</p>' : '<p class="mini">Use Save New to create a Studio asset.</p>')+
      '</div>';
  }
});

function boot(){renderNav();registerCommands();$("#projectName").value=Studio.state.project.meta.name;renderExplorer();updateHistoryButtons();$("#filter").oninput=renderExplorer;$("#projectName").oninput=()=>{Studio.sync();renderExplorer()};$("#newBtn").onclick=()=>{if(confirm("New project?"))Studio.hydrate(project())};$("#saveBtn").onclick=()=>dl(safe($("#projectName").value)+".kgbproject.json",Studio.exportProject(),"application/json");$("#loadBtn").onclick=()=>$("#loadInput").click();$("#loadInput").onchange=async e=>{let f=e.target.files[0];if(!f)return;try{Studio.hydrate(JSON.parse(await f.text()));Studio.open("mission.brief")}catch(err){alert(err.message)}};$("#exportBtn").onclick=()=>Studio.open("build.export");$("#undoBtn").onclick=()=>History.undoIt();$("#redoBtn").onclick=()=>History.redoIt();$("#cmdBtn").onclick=()=>Commands.open();$("#toggleLeftBtn").onclick=()=>LayoutControls.toggleLeft();$("#toggleRightBtn").onclick=()=>LayoutControls.toggleRight();$("#focusBtn").onclick=()=>LayoutControls.toggleFocus();$("#cmdSearch").oninput=renderCommands;$("#cmd").onclick=e=>{if(e.target.id==="cmd")Commands.close()};document.addEventListener("keydown",e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="k"){e.preventDefault();Commands.open()} if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="z"){e.preventDefault();History.undoIt()} if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="b"){e.preventDefault();LayoutControls.toggleLeft()} if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="i"){e.preventDefault();LayoutControls.toggleRight()} if((e.ctrlKey||e.metaKey)&&e.key==="."){e.preventDefault();LayoutControls.toggleFocus()}});$("#helpBtn").onclick=()=>{$("#modalTitle").textContent="KGB Studio v0.10.3 Help";$("#modalBody").innerHTML="<p><b>v0.10.3 fixes reopening saved Shape Forge assets.</b></p><p>Saved shape-forge-project assets now route directly back into ASSETS → Shape Forge with their stored project data loaded into the embedded forge. After reopening, use Update Existing to save changes back to the same Studio asset.</p><p><b>Repo path:</b> replace <code>/studio/index.html</code> with this file.</p>";$("#modalBg").classList.add("show")};$("#closeModal").onclick=()=>$("#modalBg").classList.remove("show");$("#modalBg").onclick=e=>{if(e.target.id==="modalBg")$("#modalBg").classList.remove("show")};Studio.open("mission.brief");Studio.log("KGB Studio v0.10.3 Shape Forge reopen hotfix online")}
document.addEventListener("DOMContentLoaded",boot);
