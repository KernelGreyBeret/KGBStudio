<title>KGB Studio v0.6 - Stable Core Platform</title>
<style>
:root{--bg:#020607;--panel:#071014;--line:#1b3b42;--text:#d9fff8;--muted:#7aa7a6;--green:#b8ff19;--cyan:#00e5ff;--mag:#ff2bd6;--orange:#ff8a00}
*{box-sizing:border-box}html,body{height:100%;margin:0;background:radial-gradient(circle at 50% 0%,#102124,#020607 45%,#000);color:var(--text);font:14px system-ui,Segoe UI,Arial;overflow:hidden}
button,input,textarea,select{font:inherit}button{border:1px solid #22515b;background:#071014;color:var(--text);border-radius:12px;padding:8px 10px;font-weight:800;cursor:pointer}button:hover{border-color:var(--cyan)}button.active{border-color:var(--green);color:var(--green)}button.primary{background:linear-gradient(#d9ff63,#77d900);color:#071014;border-color:var(--green)}button.hot{border-color:var(--mag)}input,textarea,select{width:100%;background:#02080a;color:var(--text);border:1px solid #21464e;border-radius:12px;padding:9px}textarea{min-height:110px;font-family:monospace}label{display:block;margin:10px 0 5px;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}
.app{height:100%;display:grid;grid-template-rows:58px 54px 1fr}.top,.nav{display:flex;gap:8px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--line);background:rgba(2,6,7,.92);overflow:auto}.brand{font-weight:1000;letter-spacing:.12em;white-space:nowrap}.pill{border:1px solid var(--green);color:var(--green);border-radius:99px;padding:2px 7px;font-size:11px}.status{margin-left:auto;color:var(--muted);white-space:nowrap}.shell{min-height:0;display:grid;grid-template-columns:320px 1fr 330px}.left,.right{min-height:0;overflow:auto;background:rgba(7,16,20,.88);padding:12px;border-right:1px solid var(--line)}.right{border-right:0;border-left:1px solid var(--line)}.center{min-width:0;min-height:0;display:grid;grid-template-rows:54px 1fr}.bar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;border-bottom:1px solid var(--line);background:#02080a}.work{min-height:0;overflow:auto;padding:14px}.card{background:linear-gradient(#0b171c,#040a0c);border:1px solid #1a3c43;border-radius:16px;padding:14px;margin-bottom:12px}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.muted{color:var(--muted)}.treeHead{display:flex;justify-content:space-between;align-items:center;color:var(--green);font-weight:1000;border-bottom:1px solid #18373d;margin-top:10px;padding:7px 0}.treeItem{display:flex;justify-content:space-between;align-items:center;gap:8px;border:1px solid #18373d;border-radius:12px;background:#030b0e;margin:7px 0;padding:8px}.treeItem b{font-size:12px}.treeItem span{font-size:11px;color:var(--muted)}pre{white-space:pre-wrap;max-height:260px;overflow:auto;background:#02080a;border:1px solid #18373d;border-radius:12px;padding:10px;color:#bff}.stage{display:grid;place-items:center;min-height:520px;border:1px solid #18373d;border-radius:18px;background:#000;overflow:hidden}canvas{max-width:100%;height:auto;touch-action:none}.sprite{display:grid;grid-template-columns:1fr 270px;gap:12px}.tools{display:grid;grid-template-columns:1fr 1fr;gap:8px}.moduleCard{border:1px solid #21464e;border-radius:14px;padding:12px;background:#030b0e}.badge{background:var(--green);color:#071014;border-radius:99px;padding:2px 7px;font-size:11px;font-weight:1000}.modalBg{position:fixed;inset:0;display:none;place-items:center;background:rgba(0,0,0,.72);z-index:9;padding:18px}.modalBg.show{display:grid}.modal{max-width:880px;width:100%;max-height:88vh;overflow:auto;background:#061014;border:1px solid var(--cyan);border-radius:18px;padding:16px}.cmd{position:fixed;inset:0;display:none;place-items:start center;background:rgba(0,0,0,.65);z-index:10;padding-top:10vh}.cmd.show{display:grid}.cmdBox{width:min(760px,92vw);background:#061014;border:1px solid var(--cyan);border-radius:18px;padding:12px;box-shadow:0 0 40px rgba(0,229,255,.22)}.cmdItem{padding:10px;border:1px solid #18373d;border-radius:12px;margin-top:8px;background:#030b0e;cursor:pointer}.cmdItem:hover{border-color:var(--green)}

<body>
<div class="app">
<header class="top"><div class="brand">KGB STUDIO <span class="pill">v0.6</span></div><button id="newBtn">New Operation</button><button id="undoBtn">Undo</button><button id="redoBtn">Redo</button><button id="cmdBtn">Operator Console</button><button id="saveBtn">Save JSON</button><button id="loadBtn">Load JSON</button><input id="loadInput" type="file" accept=".json" hidden><button id="exportBtn">Export</button><button id="helpBtn">Help</button><div id="status" class="status">Ready.</div></header>

<main class="center"><div class="bar"><div><b id="title"></b><div id="subtitle" class="muted"></div></div><div id="actions" class="row"></div></div><div id="work" class="work"></div></main>

<div id="modalBg" class="modalBg"><div class="modal"><div class="row" style="justify-content:space-between"><h2 id="modalTitle">Help</h2><button id="closeModal">Close</button></div><div id="modalBody"></div></div></div>
<div id="cmd" class="cmd"><div class="cmdBox"><input id="cmdSearch" placeholder="Type a command..."><div id="cmdList"></div></div></div>

<script>

/*
===============================================================================
KGB STUDIO v0.6 — STABLE CORE PLATFORM

WHY THIS VERSION EXISTS
-----------------------
The previous v0.6 attempt tried to change too much at once:
- New operation schema
- New UUID AssetDB
- New plugin host
- New operator system
- New asset inspector assumptions

That broke startup. This version rebuilds the "badass v6" ideas safely on top
of the uploaded last-known-good v0.5 code.

SAFE ARCHITECTURE RULE FOR THIS BUILD
-------------------------------------
Do not replace the working v0.5 project schema yet.

Instead:
- Keep project.assets arrays.
- Add an AssetRegistry facade over the existing arrays.
- Keep adapters working.
- Keep Commands working, but brand them as Operators in the UI.
- Add platform modules without breaking old modules.
- Make one architectural move at a time.

WHAT'S NEW IN v0.6
------------------
- Operation-flavored UI language.
- AssetRegistry facade layered over existing project.assets buckets.
- SYSTEMS → Asset Registry module.
- SYSTEMS → Platform module.
- SYSTEMS → Changelog module.
- Safer dependency/relationship foundation using optional asset.dependencies.
- More comments and section headers for maintainability.

REPO ACTION
-----------
Replace root index.html with this file.

SUGGESTED COMMIT
----------------
Add KGB Studio v0.6 stable core platform

COMMENTING STANDARD
-------------------
Going forward, KGB Studio files should stay intentionally over-commented:
- Developer notes at the top of the script.
- Section headers for major systems.
- Plain-English explanations for risky logic.
- Changelog/commit notes for every release.

===============================================================================
*/
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const uid=p=>p+"_"+Date.now().toString(36)+"_"+Math.random().toString(36).slice(2,7);
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]||c))}
function safe(s){return String(s||"kgb_project").toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"")}
function dl(n,t,m="text/plain"){const b=new Blob([t],{type:m}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=n;a.click();URL.revokeObjectURL(a.href)}
function project(name="Untitled KGB Game"){const now=new Date().toISOString();return{meta:{name,created:now,updated:now,studioVersion:"0.6"},mission:{note:""},assets:{sprites:[],animations:[],shapes:[],particles:[],sounds:[],palettes:[],tiles:[],maps:[],misc:[]},settings:{theme:"kgb-neon",target:"web-pwa"}}}
function norm(p){let b=project(p?.meta?.name);return{...b,...p,meta:{...b.meta,...(p.meta||{})},assets:{...b.assets,...(p.assets||{})},settings:{...b.settings,...(p.settings||{})}}}

/* EVENT BUS: simple pub/sub so modules can emit events without tight coupling. */
const Bus={handlers:{},on(e,fn){(this.handlers[e] ||= []).push(fn)},emit(e,data){(this.handlers[e]||[]).forEach(fn=>fn(data));Studio.log("event: "+e)}};

/* OPERATOR CONSOLE BACKEND: still called Commands internally, but this is our operator search/run system. */
const Commands={
 list:[],
 add(id,label,run){this.list.push({id,label,run})},
 open(){renderCommands();$("#cmd").classList.add("show");$("#cmdSearch").value="";$("#cmdSearch").focus()},
 close(){$("#cmd").classList.remove("show")},
 run(id){let c=this.list.find(x=>x.id===id);if(c){c.run();this.close()}}
};
function renderCommands(){let q=($("#cmdSearch")?.value||"").toLowerCase();$("#cmdList").innerHTML=Commands.list.filter(c=>!q||c.label.toLowerCase().includes(q)||c.id.includes(q)).map(c=>'<div class="cmdItem" data-cmd="'+c.id+'"><b>'+esc(c.label)+'</b><br><span class="muted">'+esc(c.id)+'</span></div>').join("");$("#cmdList").querySelectorAll("[data-cmd]").forEach(x=>x.onclick=()=>Commands.run(x.dataset.cmd))}

/* HISTORY: snapshot-based undo/redo for project-level asset mutations. */
const History={undo:[],redo:[],snapshot(label){Studio.sync();this.undo.push({label,state:JSON.stringify(Studio.state.project)});this.redo=[];updateHistoryButtons()},restore(item){Studio.hydrate(JSON.parse(item.state))},undoIt(){if(!this.undo.length)return;this.redo.push({label:"redo",state:JSON.stringify(Studio.state.project)});this.restore(this.undo.pop());Studio.log("Undo")},redoIt(){if(!this.redo.length)return;this.undo.push({label:"undo",state:JSON.stringify(Studio.state.project)});this.restore(this.redo.pop());Studio.log("Redo")}};
function updateHistoryButtons(){$("#undoBtn").disabled=!History.undo.length;$("#redoBtn").disabled=!History.redo.length}


/*
-------------------------------------------------------------------------------
ASSET REGISTRY FACADE

This is the safe v0.6 version of AssetDB.

Instead of replacing the known-good project.assets arrays, this facade gives us
AssetDB-like capabilities while keeping the existing schema stable.

Later, when we're ready, this can become a true UUID AssetDB. For now it gives:
- all()      -> list every asset across all buckets
- find()     -> search all assets
- get()      -> retrieve an asset by bucket/id
- usedBy()   -> dependency graph foundation
- summary()  -> counts by bucket
-------------------------------------------------------------------------------
*/
const AssetRegistry={
  buckets(){
    return Studio.state.project.assets || {};
  },

  all(){
    const out=[];
    Object.entries(this.buckets()).forEach(([bucket,items])=>{
      (items||[]).forEach(asset=>{
        out.push({bucket,asset});
      });
    });
    return out;
  },

  find(query){
    const q=String(query||"").toLowerCase();
    return this.all().filter(({bucket,asset})=>{
      const text=[
        bucket,
        asset.id,
        asset.name,
        asset.kind,
        asset.adapter,
        ...(asset.tags||[])
      ].join(" ").toLowerCase();
      return !q || text.includes(q);
    });
  },

  get(bucket,id){
    return (this.buckets()[bucket]||[]).find(asset=>asset.id===id);
  },

  usedBy(bucket,id){
    return this.all().filter(({asset})=>{
      return (asset.dependencies||[]).some(dep=>dep.bucket===bucket && dep.id===id);
    });
  },

  summary(){
    const rows={};
    Object.entries(this.buckets()).forEach(([bucket,items])=>{
      rows[bucket]=(items||[]).length;
    });
    return rows;
  }
};


/* STUDIO CORE: owns module registry, adapter registry, shared project state, selection, and mutation helpers. */
const Studio={
 modules:new Map(), adapters:new Map(), state:{project:project(),selection:null},
 log(m){$("#log").textContent="["+new Date().toLocaleTimeString()+"] "+m+"\n"+$("#log").textContent;$("#status").textContent=m},
 register(m){this.modules.set(m.id,m)},
 installAdapter(a){this.adapters.set(a.id,a);this.register(a.toModule())},
 open(id,opt={}){const m=this.modules.get(id);if(!m)return this.log("Missing module "+id);$("#title").textContent=m.title;$("#subtitle").textContent=m.description||"";$("#work").innerHTML="";$("#actions").innerHTML="";$("#props").innerHTML="";m.render?.($("#work"),this,opt);m.actions?.($("#actions"),this,opt);m.properties?.($("#props"),this,opt);$$("[data-section]").forEach(b=>b.classList.toggle("active",b.dataset.section===m.section));Bus.emit("module:opened",{id});this.log("Opened "+m.title)},
 sync(){this.state.project.meta.name=$("#projectName").value.trim()||"Untitled KGB Game";this.state.project.meta.updated=new Date().toISOString()},
 exportProject(){this.sync();return JSON.stringify(this.state.project,null,2)},
 hydrate(p){this.state.project=norm(p);$("#projectName").value=this.state.project.meta.name;renderExplorer();this.renderProps();updateHistoryButtons();this.log("Project loaded")},
 mutate(label,fn){History.snapshot(label);fn();this.sync();renderExplorer();this.renderProps();Bus.emit("project:changed",{label})},
 addAsset(type,a){this.mutate("add "+type,()=>{a.id ||= uid(type);a.created ||= new Date().toISOString();a.updated=new Date().toISOString();this.state.project.assets[type].push(a)});this.log("Saved "+type.slice(0,-1)+": "+a.name);return a},
 find(type,id){return(this.state.project.assets[type]||[]).find(a=>a.id===id)},
 updateAsset(type,id,patch){this.mutate("update asset",()=>{let a=this.find(type,id);if(a)Object.assign(a,patch,{id,updated:new Date().toISOString()})});},
 deleteAsset(type,id){this.mutate("delete asset",()=>{let arr=this.state.project.assets[type]||[],i=arr.findIndex(a=>a.id===id);if(i>=0)arr.splice(i,1);this.state.selection=null})},
 duplicateAsset(type,id){this.mutate("duplicate asset",()=>{let a=this.find(type,id);if(a){let c=JSON.parse(JSON.stringify(a));c.id=uid(type);c.name=(c.name||"Asset")+" Copy";this.state.project.assets[type].push(c)}})},
 selectAsset(type,id){let a=this.find(type,id);if(!a)return;this.state.selection={type,id};this.renderProps();let adapter=[...this.adapters.values()].find(ad=>ad.canOpen?.(a));if(adapter)this.open(adapter.moduleId,{asset:a});else this.log("Selected "+a.name)},
 renderProps(){let s=this.state.selection,p=$("#props");if(!s){p.innerHTML='<div class="muted">No asset selected.</div>';return}let a=this.find(s.type,s.id);if(!a){p.textContent="Missing asset";return}p.innerHTML='<label>Name</label><input id="pname" value="'+esc(a.name)+'"><label>Bucket</label><input disabled value="'+esc(s.type)+'"><label>Kind</label><input disabled value="'+esc(a.kind)+'"><div class="row"><button class="primary" id="applyP">Apply</button><button id="dupeP">Duplicate</button><button class="hot" id="delP">Delete</button></div><label>Raw Asset JSON</label><textarea id="pjson">'+esc(JSON.stringify(a,null,2))+'</textarea>';$("#applyP").onclick=()=>{try{let raw=JSON.parse($("#pjson").value);raw.name=$("#pname").value;this.updateAsset(s.type,s.id,raw)}catch(e){alert(e.message)}};$("#dupeP").onclick=()=>this.duplicateAsset(s.type,s.id);$("#delP").onclick=()=>{if(confirm("Delete asset?"))this.deleteAsset(s.type,s.id)}}
};

const sections={MISSION:[["mission.brief","Brief"],["mission.project","Project JSON"]],ASSETS:[["asset.library","Asset Library"],["asset.spriteforge","Sprite Forge"],["asset.adapters","Module Adapters"]],SYSTEMS:[["system.runtime","Runtime Preview"],["system.taio","TAIO"],["system.registry","Asset Registry"],["system.platform","Platform"],["system.events","Event Bus"],["system.changelog","Changelog"]],BUILD:[["build.export","Export"],["build.validate","Validate"]],DEPLOY:[["deploy.notes","Deploy Notes"]]};
function renderNav(){let n=$("#nav");n.innerHTML="";Object.keys(sections).forEach(sec=>{let b=document.createElement("button");b.textContent=sec;b.dataset.section=sec;b.onclick=()=>Studio.open(sections[sec][0][0]);n.appendChild(b)})}
function renderExplorer(){let q=($("#filter")?.value||"").toLowerCase(),p=Studio.state.project,root=$("#explorer");let h='<div class="treeHead"><span>MISSION</span><button data-open="mission.brief">Open</button></div><div class="treeItem"><div><b>'+esc(p.meta.name)+'</b><br><span>'+esc(p.settings.target)+'</span></div><button data-open="mission.project">JSON</button></div>';["sprites","animations","shapes","particles","sounds","palettes","tiles","maps"].forEach(type=>{let arr=(p.assets[type]||[]).filter(a=>!q||(a.name||"").toLowerCase().includes(q)||(a.kind||"").toLowerCase().includes(q));h+='<div class="treeHead"><span>'+type.toUpperCase()+'</span><button data-open="'+(type==="sprites"?"asset.spriteforge":"asset.adapters")+'">+</button></div>';h+=arr.length?arr.map(a=>'<div class="treeItem"><div><b>'+esc(a.name||a.id)+'</b><br><span>'+esc(a.kind||"asset")+'</span></div><button data-type="'+type+'" data-id="'+a.id+'">Open</button></div>').join(""):'<div class="muted">No '+type+'.</div>'});root.innerHTML=h;root.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>Studio.open(b.dataset.open));root.querySelectorAll("[data-id]").forEach(b=>b.onclick=()=>Studio.selectAsset(b.dataset.type,b.dataset.id))}

/* TOOL ADAPTER FACTORY: promotes standalone tools into Studio modules without rewriting them. */
function createToolAdapter(o){return{...o,toModule(){return{id:o.moduleId,section:o.section,title:o.title,description:o.description,render:(r,s,opt)=>o.render(r,s,opt),actions:(r,s,opt)=>{r.innerHTML='<button id="adSave">Save Asset</button><button id="adExport">Export</button>';$("#adSave").onclick=()=>o.save?.(s,opt);$("#adExport").onclick=()=>o.exportAsset?.(s,opt)},properties:(p,s,opt)=>{p.innerHTML=opt?.asset?'<div class="muted">Opened: '+esc(opt.asset.name)+'</div>':'<div class="muted">'+esc(o.title)+' adapter active.</div>'}}}}}

/* SPRITE FORGE LITE: the first embedded canvas asset editor. Kept stable from v0.5. */
const SpriteForge={canvas:null,ctx:null,objects:[],selectedId:null,tool:"select",isDown:false,draft:null,start:null,currentAsset:null,style:{fill:"#ff8a00",stroke:"#b8ff19",weight:4,glow:12},
 init(asset){this.canvas=$("#spriteCanvas");this.ctx=this.canvas.getContext("2d");this.objects=asset?.objects?JSON.parse(JSON.stringify(asset.objects)):[];this.currentAsset=asset||null;this.selectedId=null;this.render();this.canvas.onpointerdown=e=>this.down(e);this.canvas.onpointermove=e=>this.move(e);this.canvas.onpointerup=e=>this.up(e);this.canvas.onpointercancel=e=>this.up(e)},
 pos(e){let r=this.canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*this.canvas.width/r.width,y:(e.clientY-r.top)*this.canvas.height/r.height}},
 down(e){this.canvas.setPointerCapture(e.pointerId);this.isDown=true;let p=this.pos(e);this.start=p;if(this.tool==="select"){let hit=this.hit(p.x,p.y);this.selectedId=hit?.id||null;this.draft=hit?{x:p.x,y:p.y,ox:hit.x,oy:hit.y,pts:hit.points?JSON.parse(JSON.stringify(hit.points)):null}:null;this.render();return}if(this.tool==="pen"){this.draft={type:"path",points:[p],style:{...this.style},id:uid("obj")};return}this.draft={type:this.tool,x:p.x,y:p.y,w:1,h:1,style:{...this.style},id:uid("obj")}},
 move(e){if(!this.isDown)return;let p=this.pos(e);if(this.tool==="select"&&this.selectedId&&this.draft){let o=this.objects.find(x=>x.id===this.selectedId);if(o){if(o.points&&this.draft.pts){let dx=p.x-this.draft.x,dy=p.y-this.draft.y;o.points=this.draft.pts.map(pt=>({x:pt.x+dx,y:pt.y+dy}))}else{o.x=this.draft.ox+(p.x-this.draft.x);o.y=this.draft.oy+(p.y-this.draft.y)}this.render()}return}if(this.tool==="pen"&&this.draft){this.draft.points.push(p);this.render();this.draw(this.draft);return}if(this.draft){this.draft.w=p.x-this.start.x;this.draft.h=p.y-this.start.y;this.render();this.draw(this.draft)}},
 up(){if(!this.isDown)return;this.isDown=false;if(this.draft&&this.tool!=="select"){this.objects.push(this.draft);this.selectedId=this.draft.id;this.draft=null;this.render();Bus.emit("sprite:changed",{})}},
 bounds(o){if(o.type==="path"){let xs=o.points.map(p=>p.x),ys=o.points.map(p=>p.y);return{x:Math.min(...xs)-10,y:Math.min(...ys)-10,w:Math.max(...xs)-Math.min(...xs)+20,h:Math.max(...ys)-Math.min(...ys)+20}}return{x:Math.min(o.x,o.x+o.w),y:Math.min(o.y,o.y+o.h),w:Math.abs(o.w),h:Math.abs(o.h)}},
 hit(x,y){for(let i=this.objects.length-1;i>=0;i--){let b=this.bounds(this.objects[i]);if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h)return this.objects[i]}return null},
 selected(){return this.objects.find(o=>o.id===this.selectedId)},
 render(){let c=this.canvas,ctx=this.ctx;if(!ctx)return;ctx.clearRect(0,0,c.width,c.height);let bg=ctx.createRadialGradient(256,256,20,256,256,420);bg.addColorStop(0,"#092126");bg.addColorStop(1,"#000");ctx.fillStyle=bg;ctx.fillRect(0,0,c.width,c.height);ctx.strokeStyle="#00e5ff22";for(let x=0;x<c.width;x+=32){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke()}for(let y=0;y<c.height;y+=32){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(c.width,y);ctx.stroke()}this.objects.forEach(o=>this.draw(o));let s=this.selected();if(s){let b=this.bounds(s);ctx.save();ctx.setLineDash([8,6]);ctx.strokeStyle="#fff";ctx.strokeRect(b.x-6,b.y-6,b.w+12,b.h+12);ctx.restore()}},
 draw(o){let ctx=this.ctx,s=o.style||this.style;ctx.save();ctx.shadowColor=s.stroke;ctx.shadowBlur=s.glow;ctx.lineWidth=s.weight;ctx.strokeStyle=s.stroke;ctx.fillStyle=s.fill;ctx.beginPath();if(o.type==="rect")ctx.rect(o.x,o.y,o.w,o.h);if(o.type==="ellipse")ctx.ellipse(o.x+o.w/2,o.y+o.h/2,Math.abs(o.w/2),Math.abs(o.h/2),0,0,Math.PI*2);if(o.type==="triangle"){ctx.moveTo(o.x+o.w/2,o.y);ctx.lineTo(o.x+o.w,o.y+o.h);ctx.lineTo(o.x,o.y+o.h);ctx.closePath()}if(o.type==="path"){ctx.moveTo(o.points[0].x,o.points[0].y);for(let i=1;i<o.points.length;i++)ctx.lineTo(o.points[i].x,o.points[i].y)}if(o.type!=="path")ctx.fill();ctx.stroke();ctx.restore()},
 payload(){return{name:$("#sfName")?.value||"Procedural Sprite",kind:"procedural-canvas-sprite",adapter:"sprite-forge",objects:JSON.parse(JSON.stringify(this.objects)),drawFunction:this.exportJS()}},
 exportJS(){return "function drawKGBSprite(ctx){\n  const objects="+JSON.stringify(this.objects,null,2)+";\n  // draw objects here\n}"},
 del(){if(!this.selectedId)return;this.objects=this.objects.filter(o=>o.id!==this.selectedId);this.selectedId=null;this.render();Bus.emit("sprite:changed",{})},dupe(){let o=this.selected();if(!o)return;let n=JSON.parse(JSON.stringify(o));n.id=uid("obj");if(n.points)n.points=n.points.map(p=>({x:p.x+18,y:p.y+18}));else{n.x+=18;n.y+=18}this.objects.push(n);this.selectedId=n.id;this.render();Bus.emit("sprite:changed",{})},clear(){if(confirm("Clear?")){this.objects=[];this.selectedId=null;this.render();Bus.emit("sprite:changed",{})}}
};

Studio.register({id:"mission.brief",section:"MISSION",title:"Mission Brief",description:"Operation command surface",render(r){r.innerHTML='<div class="card"><h3>KGB Studio v0.6 Stable Core Platform</h3><p class="muted">This rebuild keeps the last-known-good v0.5 engine intact, then adds the platform concepts safely: Operation language, Asset Registry facade, Platform module, and Changelog module.</p><div class="grid3"><div class="card"><h4>Asset Registry</h4><p>AssetDB-like search and summary without changing the working schema.</p></div><div class="card"><h4>Operator Console</h4><p>The command system is now treated as searchable operators.</p></div><div class="card"><h4>Safe Platform</h4><p>No risky project schema rewrite in this build.</p></div></div></div><div class="card"><h3>v0.6 Changelog</h3><pre>Added:\n- Operation-flavored UI labels.\n- AssetRegistry facade over existing project.assets arrays.\n- SYSTEMS → Asset Registry module.\n- SYSTEMS → Platform module.\n- SYSTEMS → Changelog module.\n- Dependency/used-by foundation through optional asset.dependencies.\n- Stronger top-of-file developer notes and system comments.\n\nChanged:\n- Command UI is now branded as Operator Console.\n- Properties panel is now branded as Intelligence.\n- Event Log is now Comms.\n\nKept stable:\n- Existing v0.5 project schema.\n- Existing adapters.\n- Existing Sprite Forge Lite.\n- Existing undo/redo and command wiring.\n\nSuggested commit:\nAdd KGB Studio v0.6 stable core platform</pre></div>'}});

Studio.register({id:"asset.adapters",section:"ASSETS",title:"Module Adapters",description:"Promoted tool registry",render(r){r.innerHTML='<div class="card"><h3>Adapter Registry</h3><p class="muted">Adapters are wrappers. Each one defines render, save, load/open, export, and asset compatibility.</p><div class="grid">'+[...Studio.adapters.values()].map(a=>'<div class="moduleCard"><div class="row" style="justify-content:space-between"><h4>'+esc(a.title)+'</h4><span class="badge">INSTALLED</span></div><p>'+esc(a.description)+'</p><button data-open="'+a.moduleId+'">Open</button></div>').join("")+'<div class="moduleCard"><h4>Next</h4><p>TAIO, Particle Forge, Sound Forge, Palette Forge, Tile Forge, GIF Forge, Asset Slicer, PWA Tester, ZIP Tool.</p></div></div></div>';r.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>Studio.open(b.dataset.open))}});

Studio.installAdapter(createToolAdapter({id:"sprite-forge",moduleId:"asset.spriteforge",section:"ASSETS",title:"Sprite Forge",description:"Promoted procedural canvas sprite tool",canOpen:a=>a.adapter==="sprite-forge"||a.kind==="procedural-canvas-sprite",
render(r,s,opt){let a=opt?.asset;r.innerHTML='<div class="sprite"><div class="card"><h3>Canvas</h3><div class="stage"><canvas id="spriteCanvas" width="512" height="512"></canvas></div></div><div class="card"><h3>Tools</h3><div class="tools"><button data-tool="select" class="active">Select</button><button data-tool="pen">Pen</button><button data-tool="rect">Rect</button><button data-tool="ellipse">Ellipse</button><button data-tool="triangle">Triangle</button><button id="del">Delete</button><button id="dupe">Duplicate</button><button id="clear" class="hot">Clear</button></div><label>Fill</label><input id="fill" type="color" value="#ff8a00"><label>Stroke</label><input id="stroke" type="color" value="#b8ff19"><label>Weight</label><input id="weight" type="range" min="1" max="24" value="4"><label>Glow</label><input id="glow" type="range" min="0" max="50" value="12"><label>Sprite Name</label><input id="sfName" value="'+esc(a?.name||"New Procedural Sprite")+'"><div class="row"><button class="primary" id="saveSprite">'+(a?"Update":"Save")+' Asset</button><button id="exportJS">Export JS</button></div></div></div><div class="card"><h3>Export</h3><pre id="spriteOut"></pre></div>';SpriteForge.init(a);$$("[data-tool]").forEach(b=>b.onclick=()=>{$$("[data-tool]").forEach(x=>x.classList.remove("active"));b.classList.add("active");SpriteForge.tool=b.dataset.tool});["fill","stroke","weight","glow"].forEach(id=>$("#"+id).oninput=()=>{SpriteForge.style={fill:$("#fill").value,stroke:$("#stroke").value,weight:+$("#weight").value,glow:+$("#glow").value};let o=SpriteForge.selected();if(o){o.style={...SpriteForge.style};SpriteForge.render()}});$("#del").onclick=()=>SpriteForge.del();$("#dupe").onclick=()=>SpriteForge.dupe();$("#clear").onclick=()=>SpriteForge.clear();$("#saveSprite").onclick=()=>{let payload=SpriteForge.payload();if(a?.id)Studio.updateAsset("sprites",a.id,payload);else Studio.addAsset("sprites",payload)};$("#exportJS").onclick=()=>$("#spriteOut").textContent=SpriteForge.exportJS()},
save(){let p=SpriteForge.payload();if(SpriteForge.currentAsset?.id)Studio.updateAsset("sprites",SpriteForge.currentAsset.id,p);else Studio.addAsset("sprites",p)},exportAsset(){$("#spriteOut").textContent=SpriteForge.exportJS()}}));

Studio.register({id:"system.runtime",section:"SYSTEMS",title:"Runtime Preview",description:"Preview saved sprite asset",render(r){r.innerHTML='<div class="card"><h3>Runtime Preview</h3><div class="stage"><canvas id="run" width="720" height="420"></canvas></div></div>';let c=$("#run"),ctx=c.getContext("2d");function loop(t){ctx.clearRect(0,0,c.width,c.height);ctx.fillStyle="#000";ctx.fillRect(0,0,c.width,c.height);ctx.strokeStyle="#00e5ff33";for(let x=0;x<c.width;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,c.height);ctx.stroke()}let spr=Studio.state.project.assets.sprites.at(-1);if(spr?.objects){ctx.save();ctx.translate(100+Math.sin(t/600)*30,0);let old=SpriteForge.ctx;SpriteForge.ctx=ctx;spr.objects.forEach(o=>SpriteForge.draw(o));SpriteForge.ctx=old;ctx.restore()}else{ctx.fillStyle="#b8ff19";ctx.fillText("Save a sprite asset first.",30,40)}requestAnimationFrame(loop)}loop(0)}});

/* OPERATOR REGISTRATION: add searchable actions to the Operator Console. */
function registerCommands(){Commands.add("open.sprite","Open Sprite Forge",()=>Studio.open("asset.spriteforge"));Commands.add("open.assets","Open Asset Library",()=>Studio.open("asset.library"));Commands.add("open.runtime","Open Runtime Preview",()=>Studio.open("system.runtime"));Commands.add("open.registry","Open Asset Registry",()=>Studio.open("system.registry"));Commands.add("open.platform","Open Platform Status",()=>Studio.open("system.platform"));Commands.add("open.changelog","Open Changelog",()=>Studio.open("system.changelog"));Commands.add("open.export","Open Export Center",()=>Studio.open("build.export"));Commands.add("project.save","Download Project JSON",()=>dl(safe($("#projectName").value)+".kgbproject.json",Studio.exportProject(),"application/json"));Commands.add("history.undo","Undo",()=>History.undoIt());Commands.add("history.redo","Redo",()=>History.redoIt())}
/* BOOT: wires the UI, registers operators, opens the first module, and starts Studio. */
function boot(){renderNav();registerCommands();$("#projectName").value=Studio.state.project.meta.name;renderExplorer();updateHistoryButtons();$("#filter").oninput=renderExplorer;$("#projectName").oninput=()=>{Studio.sync();renderExplorer()};$("#newBtn").onclick=()=>{if(confirm("New project?"))Studio.hydrate(project())};$("#saveBtn").onclick=()=>dl(safe($("#projectName").value)+".kgbproject.json",Studio.exportProject(),"application/json");$("#loadBtn").onclick=()=>$("#loadInput").click();$("#loadInput").onchange=async e=>{let f=e.target.files[0];if(!f)return;try{Studio.hydrate(JSON.parse(await f.text()));Studio.open("mission.brief")}catch(err){alert(err.message)}};$("#exportBtn").onclick=()=>Studio.open("build.export");$("#undoBtn").onclick=()=>History.undoIt();$("#redoBtn").onclick=()=>History.redoIt();$("#cmdBtn").onclick=()=>Commands.open();$("#cmdSearch").oninput=renderCommands;$("#cmd").onclick=e=>{if(e.target.id==="cmd")Commands.close()};document.addEventListener("keydown",e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="k"){e.preventDefault();Commands.open()} if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="z"){e.preventDefault();History.undoIt()}});$("#helpBtn").onclick=()=>{$("#modalTitle").textContent="KGB Studio v0.6 Help";$("#modalBody").innerHTML="<p><b>v0.6 is the stable core platform rebuild.</b></p><p>This version keeps the working v0.5 schema and adds the Asset Registry facade, Platform module, Changelog module, and Operator Console branding.</p><p>Use Ctrl/Cmd+K for the Operator Console. Undo/redo protects project-level asset actions like save/update/delete/duplicate.</p><p><b>Repo path:</b> replace root <code>index.html</code> with this file.</p>";$("#modalBg").classList.add("show")};$("#closeModal").onclick=()=>$("#modalBg").classList.remove("show");$("#modalBg").onclick=e=>{if(e.target.id==="modalBg")$("#modalBg").classList.remove("show")};Studio.open("mission.brief");Studio.log("KGB Studio v0.6 stable core platform online")}
document.addEventListener("DOMContentLoaded",boot);
</script>
